# Local-development override layer for the fishhawk chart.
# Renders cleanly standalone: `helm template fishhawk . -f values-local.yaml`.
# Localhost-flavored endpoints + lower resource asks; placeholders fill any
# render-time-needed fields. Not for cluster use as-is — secrets.mode is
# chartManaged with dev placeholders (#849), permitted only by profile: local.

# Local profile: acknowledges the dev-only conveniences (chart-managed Secret +
# in-cluster Postgres/MinIO default credentials) so fishhawk.validateSecrets
# permits them. A real cluster MUST keep profile: prod (values.yaml default).
profile: local

image:
  tag: "main"
  pullPolicy: Always

replicaCount: 1

# Local reaches fishhawkd via `kubectl port-forward` / NodePort, not an Ingress.
# Keep it off so config.externalUrl/oauthCallbackUrl below are used verbatim (no
# ingress-host derivation).
ingress:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

config:
  addr: ":8080"
  s3Region: "us-east-1"
  # Points at the in-cluster MinIO Service below. Assumes `helm install fishhawk`
  # so fishhawk.fullname renders to `fishhawk` (release name contains chart name).
  s3Endpoint: "http://fishhawk-minio:9000"
  s3Bucket: "fishhawk-traces"
  externalUrl: "http://localhost:5173"
  oauthCallbackUrl: "http://localhost:8080/v0/auth/github/callback"
  oauthRedirectAfterLogin: "http://localhost:5173/"
  oidcAudience: "fishhawkd-local"
  oidcJwksUrl: ""
  githubAppId: "123456"
  planReviewModel: "claude-sonnet-4-6"
  budgetTimezone: "UTC"

workers:
  slaTimer: false
  dispatchWatchdog: false
  reactionPoller: false
  mergeReconciler: false
  childCompletionSweeper: false
  invariantMonitor: false

# Self-contained local stack: in-cluster Postgres + MinIO. fishhawkd's
# FISHHAWKD_DATABASE_URL is overridden by the Deployment to target the in-cluster
# postgres Service; config.s3Endpoint above points at the in-cluster minio.
postgres:
  enabled: true

minio:
  enabled: true

# Chart-managed Secret with dev placeholders so the chart renders standalone
# (no out-of-band Secret needed). DEV-ONLY — never copy these to a prod values
# file. existingSecret (values.yaml) is intentionally NOT set here: chartManaged
# supersedes it via fishhawk.secretName, so the chart owns `<fullname>-secrets`.
secrets:
  mode: chartManaged
  values:
    # Targets the in-cluster Postgres Service. Matches the Deployment's
    # postgres.enabled override, kept here so chartManaged renders a complete
    # Secret even though the Deployment env wins at runtime.
    databaseUrl: "postgres://fishhawk:fishhawk@fishhawk-postgres:5432/fishhawk?sslmode=disable"
    githubWebhookSecret: "dev-webhook-secret"
    oauthClientSecret: "dev-oauth-client-secret"
    anthropicApiKey: "dev-anthropic-key"
    # Equal to minio.rootUser / minio.rootPassword so fishhawkd reaches the
    # in-cluster MinIO bucket (trace storage).
    awsAccessKeyId: "fishhawk"
    awsSecretAccessKey: "fishhawk-dev-secret"
    # Placeholder PEM so the private-key file volume renders + mounts. Not a
    # usable key — replace for any real GitHub App integration.
    githubAppPrivateKey: |
      -----BEGIN RSA PRIVATE KEY-----
      DEV-PLACEHOLDER-NOT-A-REAL-KEY
      -----END RSA PRIVATE KEY-----
