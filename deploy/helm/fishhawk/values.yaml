# Default values for the fishhawk chart.
# Override per-environment with `-f my-values.yaml` (see values-local.yaml for a
# localhost-flavored example).

# Deployment profile: `prod` (default) or `local`. This is the local-vs-prod
# signal the Secret guard (fishhawk.validateSecrets) keys off of — dev-only
# conveniences (a chart-managed Secret, in-cluster Postgres/MinIO default
# credentials) are permitted ONLY when profile is `local`. values-local.yaml
# sets profile: local. An operator copying values-local for a real cluster MUST
# change this back to prod (and supply real secrets) or the render fails loud.
profile: prod

image:
  # Published fishhawkd image built by backend/Dockerfile (#168) and pushed by
  # backend-release.yml. Do not build it here — the chart only references it.
  repository: ghcr.io/kuhlman-labs/fishhawkd
  # Image tag. Empty falls back to .Chart.AppVersion (the `main` rolling tag).
  # Pin to an immutable `sha-<short>` or `vX.Y.Z` tag for real deploys.
  tag: ""
  pullPolicy: IfNotPresent

# Topology mode — how the fishhawkd workload is split across Deployments.
#   allInOne (default) — one Deployment, replicaCount pods, with the background
#                        workers co-located. Safe out of the box; an existing
#                        install upgrades in place (the Deployment keeps its
#                        name/labels). Scaling past 1 replica with a worker
#                        toggle on is rejected by fishhawk.validateTopology,
#                        because the worker singletons (#851) are not yet
#                        leader-elected and would race the timers/reconcilers.
#   split              — a horizontally-scalable `-api` Deployment
#                        (deployment.api.replicaCount pods, every
#                        FISHHAWKD_ENABLE_* forced off) plus a single-replica
#                        `-worker` Deployment that owns the worker singletons.
#                        The Service routes only to the api pods. This is the
#                        way to scale fishhawkd horizontally while workers run.
deployment:
  mode: allInOne
  api:
    # API-tier replica count — used ONLY in split mode (ignored in allInOne).
    # The api pods run no background workers, so they scale horizontally;
    # webhook delivery dedup is shared across replicas via the Postgres store
    # (serve.go) whenever FISHHAWKD_DATABASE_URL is set, so this is safe > 1.
    replicaCount: 2
  # NOTE: the worker Deployment's replica count is intentionally NOT a knob — it
  # is hardcoded to 1 in deployment-worker.yaml (the worker singleton invariant)
  # until leader election lands (#851), to avoid exposing a silently-ignored
  # setting that could be raised past 1 and race the timers.

# Number of fishhawkd replicas in allInOne mode (ignored in split mode, where
# deployment.api.replicaCount drives the api tier). The worker singletons (#851)
# are not yet leader-elected, so in allInOne this MUST stay 1 while any worker
# toggle below is true — fishhawk.validateTopology fails the render otherwise. To
# scale fishhawkd horizontally with workers on, set deployment.mode=split instead
# of raising this.
replicaCount: 1

service:
  type: ClusterIP
  # Service port; targets the container's :8080 listener.
  port: 8080

# Optional Ingress + TLS (cert-manager), gated by ingress.enabled. Default false
# so the new template is inert for existing installs — local uses
# port-forward/NodePort (values-local.yaml keeps this off). See values-prod.yaml
# for a worked prod posture. When enabled, ingress.host is REQUIRED (the render
# fails loud otherwise). When config.externalUrl / config.oauthCallbackUrl are
# left empty AND the ingress is enabled, they are DERIVED from ingress.host
# (scheme https when tls.enabled, else http); explicit config values override.
ingress:
  enabled: false
  # IngressClass to bind (e.g. nginx). Empty omits ingressClassName so the
  # cluster's default IngressClass applies.
  className: ""
  # External hostname (e.g. app.fishhawk.example). Required when enabled.
  host: ""
  # HTTP path + pathType for the single rule. pathType is always emitted
  # (networking.k8s.io/v1 requires it on each path).
  path: "/"
  pathType: "Prefix"
  # Extra annotations merged onto the Ingress. The cert-manager cluster-issuer
  # annotation is added automatically when tls.enabled + tls.clusterIssuer set.
  annotations: {}
  tls:
    # When true, emit a tls block for ingress.host and (with clusterIssuer set)
    # the cert-manager.io/cluster-issuer annotation. cert-manager — not this
    # chart — provisions the named Secret from the referenced ClusterIssuer.
    enabled: false
    # ClusterIssuer cert-manager reads to mint the certificate. When set, renders
    # the cert-manager.io/cluster-issuer annotation. Empty skips the annotation.
    clusterIssuer: ""
    # TLS Secret name cert-manager populates. Empty defaults to <fullname>-tls.
    secretName: ""

# Pod resource requests/limits. Tune per cluster capacity.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Liveness + readiness both hit GET /healthz on the container's :8080 listener
# (fishhawkd --addr defaults to :8080; serve.go).
probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  readiness:
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3

# Non-secret FISHHAWKD_* environment, rendered into a ConfigMap. Empty values
# are omitted so unset keys stay unset (matching fishhawkd's ignore-if-unset
# semantics). Secret env (DB URL, API keys, OAuth secret, webhook secret, AWS
# creds, GitHub App private key) is supplied by the Secret object (#849),
# referenced via existingSecret below.
config:
  # Listen address. fishhawkd defaults to :8080; the probes/Service assume 8080.
  addr: ":8080"
  # Trace storage (S3 / MinIO). Bucket empty disables /v0/runs/{id}/trace.
  s3Region: "us-east-1"
  s3Endpoint: ""
  s3Bucket: ""
  # SPA root used for GitHub Check Run back-links (#231). Empty disables the
  # publish-to-GitHub path cleanly. When ingress.enabled, an empty value is
  # DERIVED from ingress.host (https when ingress.tls.enabled, else http); an
  # explicit value here overrides the derivation.
  externalUrl: ""
  # OAuth sign-in redirect URLs (non-secret halves; client secret is in #849).
  # When ingress.enabled, an empty oauthCallbackUrl is DERIVED as
  # <scheme>://<ingress.host>/v0/auth/github/callback; an explicit value wins.
  oauthCallbackUrl: ""
  oauthRedirectAfterLogin: "/"
  # Runner OIDC verification. Empty audience accepts unauthenticated callers
  # (v0 self-execution posture).
  oidcAudience: ""
  oidcJwksUrl: ""
  # GitHub App id (the private key is a secret, supplied by #849).
  githubAppId: ""
  # Plan-review model (ADR-027).
  planReviewModel: "claude-sonnet-4-6"
  # IANA timezone for daily budget rollover.
  budgetTimezone: "UTC"

# Background-worker enable toggles → FISHHAWKD_ENABLE_*. All default false so a
# fresh deploy doesn't race the timers. These workers are singletons: exactly one
# instance may run them. In allInOne mode that means keeping replicaCount=1 while
# any toggle is true (enforced by fishhawk.validateTopology). To run the workers
# alongside a scaled-out API tier, use deployment.mode=split — the workers run on
# the single-replica `-worker` Deployment while the `-api` Deployment scales
# freely. Leader election (the future alternative to this static worker
# singleton, which would let the workers run multi-replica) is deferred to #851.
workers:
  slaTimer: false
  dispatchWatchdog: false
  reactionPoller: false
  mergeReconciler: false
  childCompletionSweeper: false
  invariantMonitor: false

# DB-migration hook Job: runs `fishhawkd migrate up` against FISHHAWKD_DATABASE_URL
# (resolved identically to the serve Deployment) before serve accepts traffic
# against an unmigrated DB — the k8s analog of the ECS one-shot migrate Fargate
# task (infra/terraform/migrations.tf). The hook PHASE is derived automatically
# from postgres.enabled (not set here): pre-install,pre-upgrade for the
# external-DB prod baseline (postgres.enabled=false), so serve never starts
# against an unmigrated DB; post-install,post-upgrade for the in-cluster local
# stack (postgres.enabled=true), because Helm runs ALL pre-install hooks to
# completion before creating any normal resource — a pre-install hook depending
# on the in-cluster Postgres (a normal resource) would deadlock. Retry on a
# not-yet-ready DB is handled by Job backoffLimit (a fresh pod per attempt), not
# a shell wait loop, since the distroless fishhawkd image has no shell.
migrate:
  enabled: true
  backoffLimit: 6
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Optional in-cluster Postgres 16, gated by postgres.enabled. Default false so
# the prod baseline points fishhawkd at an external managed database via the
# existingSecret's FISHHAWKD_DATABASE_URL. Turned on by values-local.yaml for a
# self-contained Docker-Desktop stack. Mirrors docker-compose.yml
# (postgres:16-alpine, fishhawk/fishhawk/fishhawk). When enabled, the fishhawkd
# Deployment gets an explicit FISHHAWKD_DATABASE_URL env (overriding the secret)
# pointing at the in-cluster Service.
postgres:
  enabled: false
  image: postgres:16-alpine
  pullPolicy: IfNotPresent
  auth:
    user: fishhawk
    password: fishhawk
    database: fishhawk
  service:
    port: 5432
  persistence:
    size: 1Gi
    # Empty uses the cluster default StorageClass (e.g. Docker Desktop's
    # hostpath, which provisions ReadWriteOnce volumes).
    storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# Optional in-cluster MinIO (S3-compatible trace store), gated by minio.enabled.
# Default false so the prod baseline points at external S3. Mirrors
# docker-compose.yml (minio RELEASE.2025-01-20T14-49-07Z, path-style). When
# enabled, set config.s3Endpoint/s3Bucket to the in-cluster Service (see
# values-local.yaml). createBucket runs a post-install/upgrade Job that creates
# the bucket via mc.
minio:
  enabled: false
  image: minio/minio:RELEASE.2025-01-20T14-49-07Z
  # mc client image for the bucket-bootstrap Job. Pinned to the same release as
  # the server image (mc and the server are co-versioned) per CLAUDE.md's
  # run-time image-pinning rule.
  mcImage: minio/mc:RELEASE.2025-01-20T14-49-07Z
  pullPolicy: IfNotPresent
  rootUser: fishhawk
  rootPassword: fishhawk-dev-secret
  apiPort: 9000
  consolePort: 9001
  bucket: fishhawk-traces
  createBucket: true
  persistence:
    size: 1Gi
    storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Name of the pre-existing Secret carrying sensitive FISHHAWKD_* env, consumed by
# `secrets.mode: existing` (the default). The pod references it via envFrom
# secretRef (optional:false — fails loud if absent). For chartManaged /
# externalSecrets modes this is ignored; the chart-owned `<fullname>-secrets`
# name is used instead (see fishhawk.secretName).
existingSecret: fishhawk-secrets

# Secret provisioning (#849). Three converging modes, ALL consumed by the
# fishhawkd Deployment + migrate Job through the single `fishhawk.secretName`
# helper (no template duplication):
#   existing        — reference a pre-created Secret (default; back-compat with
#                     the pre-#849 posture). Resolves to `existingSecret` above.
#   chartManaged    — the chart renders the Secret from `secrets.values` (DEV
#                     ONLY; gated to profile: local by fishhawk.validateSecrets).
#   externalSecrets — emit an ExternalSecret CR referencing a SecretStore so the
#                     External Secrets Operator materializes the Secret in-cluster
#                     (prod hook/foundation; pairs with #182, needs ESO + a
#                     pre-provisioned SecretStore).
# chartManaged and externalSecrets both resolve to the chart-owned name
# `<fullname>-secrets`: chartManaged renders that Secret directly, externalSecrets
# has ESO materialize a Secret of that name via the ExternalSecret's target.
secrets:
  mode: existing

  # GitHub App private key, mounted as a FILE volume (never an env string). The
  # PEM is stored under a DOTTED Secret key, which envFrom skips (not a valid env
  # identifier), so it is consumed only via the mount. The non-secret file PATH
  # is advertised to fishhawkd via the ConfigMap
  # (FISHHAWKD_GITHUB_APP_PRIVATE_KEY_FILE = mountPath).
  githubApp:
    privateKeyFile:
      # enabled adds the PEM volume + readOnly mount. UPGRADE CAVEAT (#849): with
      # `existing`/`externalSecrets` mode the referenced Secret MUST carry the
      # `secretKey` below — a pre-#849 Secret won't, and Kubernetes refuses to
      # start the pod when a non-optional Secret-key mount is missing. Operators
      # with no GitHub App integration (or who manage the key outside Kubernetes)
      # should set this to false to drop the volume + mount.
      enabled: true
      secretKey: "github-app-private-key.pem"
      mountPath: "/etc/fishhawk/github-app-private-key.pem"

  # DEV-ONLY plaintext consumed by `chartManaged` mode. All empty by default so
  # the chart never bakes secrets unless explicitly populated (see
  # values-local.yaml). Empty keys are omitted from the rendered Secret, so an
  # unset value stays unset. NEVER populate these for a prod deploy.
  values:
    databaseUrl: ""           # FISHHAWKD_DATABASE_URL
    githubWebhookSecret: ""   # FISHHAWKD_GITHUB_WEBHOOK_SECRET
    oauthClientSecret: ""     # FISHHAWKD_OAUTH_CLIENT_SECRET
    anthropicApiKey: ""       # FISHHAWKD_ANTHROPIC_API_KEY
    awsAccessKeyId: ""        # AWS_ACCESS_KEY_ID (S3 / MinIO)
    awsSecretAccessKey: ""    # AWS_SECRET_ACCESS_KEY (S3 / MinIO)
    # PEM contents for the GitHub App private key (rendered under the dotted
    # secretKey above and mounted as a file, NOT injected as env).
    githubAppPrivateKey: ""

  # `externalSecrets` mode: emit an ExternalSecret CR (no inline Secret).
  # secretStoreRef.name MUST be set (the guard fails an empty one). apiVersion is
  # overridable to track ESO releases. Each `data` item maps a key in the
  # materialized Secret to a remote ref in the backing store.
  externalSecrets:
    apiVersion: "external-secrets.io/v1beta1"
    secretStoreRef:
      name: ""
      kind: ClusterSecretStore
    refreshInterval: "1h"
    data: []
    # - secretKey: FISHHAWKD_DATABASE_URL
    #   remoteRef:
    #     key: fishhawk/db
    #     property: url
