{{- if .Values.postgres.enabled }}
# Optional in-cluster Postgres 16 (postgres.enabled). Single-replica Deployment
# + PVC + ClusterIP Service, mirroring docker-compose.yml. Not for production —
# the prod baseline (values.yaml, postgres.enabled:false) points fishhawkd at an
# external managed database via the existingSecret.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "fishhawk.fullname" . }}-postgres
  labels:
    {{- include "fishhawk.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.postgres.persistence.size }}
  {{- with .Values.postgres.persistence.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fishhawk.fullname" . }}-postgres
  labels:
    {{- include "fishhawk.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  replicas: 1
  # Recreate avoids two pods contending for the single ReadWriteOnce PVC during
  # a rollout.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "fishhawk.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        {{- include "fishhawk.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image | quote }}
          imagePullPolicy: {{ .Values.postgres.pullPolicy }}
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.auth.user | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgres.auth.password | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.auth.database | quote }}
            # Keep data in a subdir so the PVC mount's lost+found doesn't collide
            # with Postgres' empty-dir check on first init.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgres.auth.user | quote }}
                - -d
                - {{ .Values.postgres.auth.database | quote }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "fishhawk.fullname" . }}-postgres
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "fishhawk.fullname" . }}-postgres
  labels:
    {{- include "fishhawk.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: {{ .Values.postgres.service.port }}
      targetPort: postgres
      protocol: TCP
  selector:
    {{- include "fishhawk.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
{{- end }}
