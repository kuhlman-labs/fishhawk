{{- if .Values.ingress.enabled -}}
{{- if not .Values.ingress.host -}}
{{- fail "ingress.enabled requires ingress.host to be set (the external hostname the Ingress routes and, when ingress.tls.enabled, requests a cert-manager certificate for)." -}}
{{- end -}}
# Ingress for fishhawkd, rendered only when ingress.enabled. ingress.host is
# required. When ingress.tls.enabled and ingress.tls.clusterIssuer is set, the
# cert-manager.io/cluster-issuer annotation + tls block direct cert-manager
# (NOT this chart) to provision the TLS Secret named below.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "fishhawk.fullname" . }}
  labels:
    {{- include "fishhawk.labels" . | nindent 4 }}
  {{- $annotations := .Values.ingress.annotations | default dict }}
  {{- if and .Values.ingress.tls.enabled .Values.ingress.tls.clusterIssuer }}
  {{- $annotations = merge (dict "cert-manager.io/cluster-issuer" .Values.ingress.tls.clusterIssuer) $annotations }}
  {{- end }}
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName | default (printf "%s-tls" (include "fishhawk.fullname" .)) }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: {{ .Values.ingress.path | default "/" }}
            pathType: {{ .Values.ingress.pathType | default "Prefix" }}
            backend:
              service:
                name: {{ include "fishhawk.fullname" . }}
                port:
                  name: http
{{- end }}
