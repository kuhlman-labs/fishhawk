apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fishhawk.fullname" . }}-config
  labels:
    {{- include "fishhawk.labels" . | nindent 4 }}
data:
  # Non-secret FISHHAWKD_* env. Empty values are omitted so unset keys stay
  # unset (matching fishhawkd's ignore-if-unset semantics).
  {{- with .Values.config.addr }}
  FISHHAWKD_ADDR: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.s3Region }}
  FISHHAWKD_S3_REGION: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.s3Endpoint }}
  FISHHAWKD_S3_ENDPOINT: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.s3Bucket }}
  FISHHAWKD_S3_BUCKET: {{ . | quote }}
  {{- end }}
  {{- with (include "fishhawk.externalUrl" .) }}
  FISHHAWKD_EXTERNAL_URL: {{ . | quote }}
  {{- end }}
  {{- with (include "fishhawk.oauthCallbackUrl" .) }}
  FISHHAWKD_OAUTH_CALLBACK_URL: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.oauthRedirectAfterLogin }}
  FISHHAWKD_OAUTH_REDIRECT_AFTER_LOGIN: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.oidcAudience }}
  FISHHAWKD_OIDC_AUDIENCE: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.oidcJwksUrl }}
  FISHHAWKD_OIDC_JWKS_URL: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.githubAppId }}
  FISHHAWKD_GITHUB_APP_ID: {{ . | quote }}
  {{- end }}
  {{- if .Values.secrets.githubApp.privateKeyFile.enabled }}
  # Non-secret FILE PATH where the GitHub App private key is mounted (the PEM
  # itself lives in the Secret, projected as a file — see the Deployment volume).
  FISHHAWKD_GITHUB_APP_PRIVATE_KEY_FILE: {{ .Values.secrets.githubApp.privateKeyFile.mountPath | quote }}
  {{- end }}
  {{- with .Values.config.planReviewModel }}
  FISHHAWKD_PLAN_REVIEW_MODEL: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.budgetTimezone }}
  FISHHAWKD_BUDGET_TIMEZONE: {{ . | quote }}
  {{- end }}
  {{- /* GHES / EMU / data-resident GHEC endpoint overrides (E44.2 / #1826).
         Unset keys stay unset, which is the github.com posture. */}}
  {{- with .Values.config.githubApiUrl }}
  FISHHAWKD_GITHUB_API_URL: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.githubUploadUrl }}
  FISHHAWKD_GITHUB_UPLOAD_URL: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.oauthAuthorizeUrl }}
  FISHHAWKD_OAUTH_AUTHORIZE_URL: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.oauthTokenUrl }}
  FISHHAWKD_OAUTH_TOKEN_URL: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.oauthUserUrl }}
  FISHHAWKD_OAUTH_USER_URL: {{ . | quote }}
  {{- end }}
  {{- with .Values.config.oauthOrgsUrl }}
  FISHHAWKD_OAUTH_ORGS_URL: {{ . | quote }}
  {{- end }}
  {{- /* Single-tenant profile (ADR-057 Mode 1, E44.9 / #1833). The account key
         alone enables it; the other keys render only when explicitly set, and
         fishhawkd REFUSES to start if one is set without the key. */}}
  {{- with .Values.singleTenant.accountKey }}
  FISHHAWKD_SINGLE_TENANT_ACCOUNT_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.singleTenant.granularity }}
  FISHHAWKD_SINGLE_TENANT_GRANULARITY: {{ . | quote }}
  {{- end }}
  {{- with .Values.singleTenant.autoJoinRole }}
  FISHHAWKD_SINGLE_TENANT_AUTO_JOIN_ROLE: {{ . | quote }}
  {{- end }}
  {{- with .Values.singleTenant.displayName }}
  FISHHAWKD_SINGLE_TENANT_DISPLAY_NAME: {{ . | quote }}
  {{- end }}
  {{- with .Values.singleTenant.provider }}
  FISHHAWKD_SINGLE_TENANT_PROVIDER: {{ . | quote }}
  {{- end }}
