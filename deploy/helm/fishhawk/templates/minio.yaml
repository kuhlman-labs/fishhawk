{{- if .Values.minio.enabled }}
# Optional in-cluster MinIO (minio.enabled), the local S3-compatible trace
# store. Single-replica Deployment + PVC + ClusterIP Service exposing the S3 API
# (9000) + web console (9001), mirroring docker-compose.yml. Not for production —
# the prod baseline (values.yaml, minio.enabled:false) points fishhawkd at
# external S3.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "fishhawk.fullname" . }}-minio
  labels:
    {{- include "fishhawk.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.minio.persistence.size }}
  {{- with .Values.minio.persistence.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fishhawk.fullname" . }}-minio
  labels:
    {{- include "fishhawk.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "fishhawk.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: minio
  template:
    metadata:
      labels:
        {{- include "fishhawk.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: minio
    spec:
      containers:
        - name: minio
          image: {{ .Values.minio.image | quote }}
          imagePullPolicy: {{ .Values.minio.pullPolicy }}
          args:
            - server
            - /data
            - --console-address
            - ":{{ .Values.minio.consolePort }}"
          ports:
            - name: api
              containerPort: 9000
              protocol: TCP
            - name: console
              containerPort: 9001
              protocol: TCP
          env:
            - name: MINIO_ROOT_USER
              value: {{ .Values.minio.rootUser | quote }}
            - name: MINIO_ROOT_PASSWORD
              value: {{ .Values.minio.rootPassword | quote }}
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.minio.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "fishhawk.fullname" . }}-minio
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "fishhawk.fullname" . }}-minio
  labels:
    {{- include "fishhawk.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  type: ClusterIP
  ports:
    - name: api
      port: {{ .Values.minio.apiPort }}
      targetPort: api
      protocol: TCP
    - name: console
      port: {{ .Values.minio.consolePort }}
      targetPort: console
      protocol: TCP
  selector:
    {{- include "fishhawk.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: minio
{{- end }}
