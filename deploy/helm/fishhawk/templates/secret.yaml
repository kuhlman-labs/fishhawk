{{- if eq .Values.secrets.mode "chartManaged" }}
{{- include "fishhawk.validateSecrets" . -}}
# Chart-managed Secret (#849), rendered ONLY in `secrets.mode: chartManaged`.
# DEV-ONLY: this bakes plaintext from `secrets.values` into a release manifest;
# fishhawk.validateSecrets fails the render unless profile is `local`. The
# Deployment + migrate Job consume this via fishhawk.secretName (the same name
# the other modes resolve to), so no template references it directly.
#
# Sensitive env (DATABASE_URL, webhook/OAuth secrets, Anthropic key, AWS creds)
# is delivered via envFrom secretRef. The GitHub App private key is stored under
# a DOTTED key (not a valid env identifier), so envFrom skips it — it is consumed
# only as a mounted file (see the Deployment volume + the ConfigMap path).
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fishhawk.secretName" . }}
  labels:
    {{- include "fishhawk.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- with .Values.secrets.values.databaseUrl }}
  FISHHAWKD_DATABASE_URL: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.values.githubWebhookSecret }}
  FISHHAWKD_GITHUB_WEBHOOK_SECRET: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.values.oauthClientSecret }}
  FISHHAWKD_OAUTH_CLIENT_SECRET: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.values.anthropicApiKey }}
  FISHHAWKD_ANTHROPIC_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.values.awsAccessKeyId }}
  AWS_ACCESS_KEY_ID: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.values.awsSecretAccessKey }}
  AWS_SECRET_ACCESS_KEY: {{ . | quote }}
  {{- end }}
  {{- if and .Values.secrets.githubApp.privateKeyFile.enabled .Values.secrets.values.githubAppPrivateKey }}
  {{ .Values.secrets.githubApp.privateKeyFile.secretKey }}: {{ .Values.secrets.values.githubAppPrivateKey | quote }}
  {{- end }}
{{- end }}
