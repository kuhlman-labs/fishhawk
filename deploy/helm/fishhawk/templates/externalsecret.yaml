{{- if eq .Values.secrets.mode "externalSecrets" }}
{{- include "fishhawk.validateSecrets" . -}}
# ExternalSecret CR (#849), rendered ONLY in `secrets.mode: externalSecrets`.
# This is a prod hook/foundation — it pairs with #182 and requires the External
# Secrets Operator (ESO) installed plus a pre-provisioned SecretStore /
# ClusterSecretStore. The chart does NOT install the ESO CRDs, so helm
# template/lint do not validate this against a schema; it is reconciled only in a
# cluster running ESO, which materializes a Secret named via fishhawk.secretName
# (target.name below) that the Deployment + migrate Job then consume — the same
# converged name as the other modes.
apiVersion: {{ .Values.secrets.externalSecrets.apiVersion }}
kind: ExternalSecret
metadata:
  name: {{ include "fishhawk.secretName" . }}
  labels:
    {{- include "fishhawk.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.secrets.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.secrets.externalSecrets.secretStoreRef.name | quote }}
    kind: {{ .Values.secrets.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ include "fishhawk.secretName" . }}
    creationPolicy: Owner
  data:
    {{- range .Values.secrets.externalSecrets.data }}
    - secretKey: {{ .secretKey | quote }}
      remoteRef:
        key: {{ .remoteRef.key | quote }}
        {{- with .remoteRef.property }}
        property: {{ . | quote }}
        {{- end }}
    {{- end }}
{{- end }}
