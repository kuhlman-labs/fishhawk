apiVersion: v2
name: fishhawk
description: >-
  Fishhawk control plane (fishhawkd) — the ADR-034 Kubernetes-deploy keystone
  chart. Ships the fishhawkd Deployment + Service + non-secret ConfigMap; the
  Secret object, in-cluster Postgres/MinIO, migrations Job, ingress/TLS, and
  worker-singleton are owned by follow-up issues #847-#851.
type: application
# Chart version: bump on chart-template changes.
version: 0.1.0
# appVersion tracks the fishhawkd image tag shipped by backend-release.yml.
# Defaults to the `main` rolling tag (matches infra/terraform image_tag default);
# override per-release via image.tag in values.yaml.
appVersion: "main"
