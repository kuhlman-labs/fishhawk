# Deploys fishhawkd to ECS Fargate (E13.7.4 / #168). Per-env via
# the GitHub environment matrix:
#
#  - dev  → fires after backend-build.yml succeeds (every push to
#    main builds + tags `:main` + `:sha-<commit>`; dev follows main).
#  - prod → fires after backend-release.yml succeeds (cuts a
#    `backend/v*` tag → image:vX.Y.Z + :latest); workflow_dispatch
#    is the rollback path.
#
# The job:
#  1. Resolves the image tag (sha-<commit> for dev autodeploys;
#     the release tag for prod; the dispatch input for rollbacks).
#  2. Renders + registers a new task-definition revision in the
#     migrate family with the new image, runs it as a one-shot
#     Fargate task, waits for completion, and fails loudly on a
#     non-zero exit (logs are surfaced).
#  3. Renders + registers a new revision of the serve family and
#     calls amazon-ecs-deploy-task-definition; that action waits
#     for the ECS service to converge on the new revision. The
#     service's circuit-breaker (slice 2) auto-rolls-back on
#     unhealthy task starts.
#
# Operator setup (one-time per environment):
#
#  - Each GitHub environment (`dev`, `prod`) carries:
#      AWS_DEPLOY_ROLE_ARN  — output from `terraform output -raw
#                              github_actions_deploy_role_arn`
#      AWS_REGION           — region the stack lives in
#  - Stored as Variables (not Secrets) — ARNs and region names
#    aren't sensitive.
name: backend-deploy

on:
  workflow_run:
    workflows: [backend-build, backend-release]
    types: [completed]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: "dev"
        type: choice
        options: [dev, prod]
      image_tag:
        description: "Image tag (e.g. v0.1.0, sha-abc123, main)"
        required: true
        default: "main"

permissions:
  contents: read
  id-token: write # OIDC for AWS role assumption

env:
  PROJECT: fishhawk
  IMAGE_REPO: ghcr.io/kuhlman-labs/fishhawkd

jobs:
  resolve:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}
    steps:
      - id: resolve
        env:
          INPUT_ENV: ${{ inputs.environment }}
          INPUT_TAG: ${{ inputs.image_tag }}
          # head_branch on a tag-triggered run is the bare tag name
          # (no refs/tags/ prefix). For backend-build's main-push
          # runs, head_branch is "main".
          RUN_HEAD: ${{ github.event.workflow_run.head_branch }}
          # The triggering workflow's name distinguishes
          # backend-build (dev) from backend-release (prod).
          RUN_NAME: ${{ github.event.workflow_run.name }}
          # head_sha lets us tag the dev image with sha-<short>
          # so deploys are traceable to a specific commit.
          RUN_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -eu
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            env_name="${INPUT_ENV}"
            tag="${INPUT_TAG}"
          elif [ "${RUN_NAME}" = "backend-release" ]; then
            env_name="prod"
            tag="${RUN_HEAD#backend/}"
          elif [ "${RUN_NAME}" = "backend-build" ]; then
            env_name="dev"
            tag="sha-${RUN_SHA:0:7}"
          else
            echo "::error::Unknown trigger source: ${RUN_NAME}"
            exit 1
          fi
          if [ -z "${tag}" ] || [ -z "${env_name}" ]; then
            echo "::error::Could not resolve environment / image tag"
            exit 1
          fi
          echo "Resolved: env=${env_name} tag=${tag}"
          echo "environment=${env_name}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${tag}" >> "$GITHUB_OUTPUT"

  migrate:
    needs: resolve
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve.outputs.environment }}
    concurrency:
      group: backend-deploy-${{ needs.resolve.outputs.environment }}
      cancel-in-progress: false
    env:
      AWS_ENV: ${{ needs.resolve.outputs.environment }}
      IMAGE_TAG: ${{ needs.resolve.outputs.image_tag }}
    steps:
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Register new migrate task definition
        id: register-migrate
        run: |
          set -eu
          FAMILY="${PROJECT}-${AWS_ENV}-migrate"
          IMAGE="${IMAGE_REPO}:${IMAGE_TAG}"

          aws ecs describe-task-definition --task-definition "$FAMILY" \
            --query taskDefinition > current.json

          # Mutate image; strip read-only fields that
          # register-task-definition rejects on round-trip.
          jq --arg image "$IMAGE" '
            .containerDefinitions[0].image = $image
            | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy, .deregisteredAt)
          ' current.json > new.json

          NEW_TD=$(aws ecs register-task-definition \
            --cli-input-json file://new.json \
            --query taskDefinition.taskDefinitionArn --output text)
          echo "Registered migrate task def: $NEW_TD"
          echo "task_def_arn=${NEW_TD}" >> "$GITHUB_OUTPUT"

      - name: Run migrations
        run: |
          set -eu
          CLUSTER="${PROJECT}-${AWS_ENV}"
          SERVICE="${PROJECT}-${AWS_ENV}"
          TD="${{ steps.register-migrate.outputs.task_def_arn }}"

          # Reuse the serve service's network config — same
          # subnets + SG + assignPublicIp setting (which differs
          # between dev and prod).
          NET=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
            --query 'services[0].networkConfiguration')

          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition "$TD" \
            --launch-type FARGATE \
            --network-configuration "$NET" \
            --query 'tasks[0].taskArn' --output text)

          if [ -z "$TASK_ARN" ] || [ "$TASK_ARN" = "None" ]; then
            echo "::error::run-task did not return a task ARN"
            exit 1
          fi
          echo "Migration task: $TASK_ARN"

          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::Migration failed (exit=$EXIT_CODE). Recent logs:"
            aws logs tail "/aws/ecs/${PROJECT}-${AWS_ENV}" \
              --log-stream-name-prefix migrate --since 10m || true
            exit 1
          fi
          echo "Migrations applied cleanly."

  deploy:
    needs: [resolve, migrate]
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve.outputs.environment }}
    concurrency:
      group: backend-deploy-${{ needs.resolve.outputs.environment }}
      cancel-in-progress: false
    env:
      AWS_ENV: ${{ needs.resolve.outputs.environment }}
      IMAGE_TAG: ${{ needs.resolve.outputs.image_tag }}
    steps:
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Render new serve task definition
        id: render-serve
        run: |
          set -eu
          FAMILY="${PROJECT}-${AWS_ENV}"
          IMAGE="${IMAGE_REPO}:${IMAGE_TAG}"

          aws ecs describe-task-definition --task-definition "$FAMILY" \
            --query taskDefinition > current.json

          jq --arg image "$IMAGE" '
            .containerDefinitions[0].image = $image
            | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy, .deregisteredAt)
          ' current.json > new.json

          echo "task_definition_path=$(pwd)/new.json" >> "$GITHUB_OUTPUT"

      # Registers the new revision and waits for the service to
      # converge. Times out after 10 min — Fargate cold-start is
      # ~30s per task, so a 1-replica rolling deploy fits easily.
      - uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-serve.outputs.task_definition_path }}
          service: ${{ env.PROJECT }}-${{ env.AWS_ENV }}
          cluster: ${{ env.PROJECT }}-${{ env.AWS_ENV }}
          wait-for-service-stability: true
          wait-for-minutes: 10

      - name: Smoke test
        run: |
          set -eu
          # Dev runs without an ALB; the smoke test only makes
          # sense when there's a stable hostname to hit. For dev,
          # the post-deploy verification is the
          # wait-for-service-stability above (and operators can
          # describe-tasks for the ENI public IP).
          DNS=$(aws elbv2 describe-load-balancers \
            --query "LoadBalancers[?LoadBalancerName=='${PROJECT}-${AWS_ENV}'].DNSName" \
            --output text 2>/dev/null || true)
          if [ -z "$DNS" ] || [ "$DNS" = "None" ]; then
            echo "::notice::No ALB for ${AWS_ENV} (bare-minimum dev profile); skipping HTTP smoke test."
            exit 0
          fi
          echo "Hitting http://${DNS}/healthz"
          curl -fsS --max-time 10 "http://${DNS}/healthz" | tee response.json
          echo
          echo "Healthz reachable."
