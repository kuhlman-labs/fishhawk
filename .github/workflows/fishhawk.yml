# Fishhawk self-execution workflow.
#
# This is the customer-side GitHub Actions workflow that backend
# fires `workflow_dispatch` against (per
# backend/internal/webhook/dispatcher.go's DefaultActionsWorkflowFile
# = "fishhawk.yml"). When a Fishhawk-labeled issue lands or a
# customer comments `/fishhawk run`, the backend creates a Run +
# Stages, then dispatches this workflow with the run/stage UUIDs
# as inputs.
#
# Per docs/METHODOLOGY.md, starting Day 21 every change to this
# repository must flow through Fishhawk itself — this workflow IS
# the path. Until Day 21 it's also a useful smoke test of the
# end-to-end demo loop.
#
# References:
#   - runner/action.yml — the composite action this workflow calls
#   - backend/internal/webhook/dispatcher.go — what fires this
#   - docs/MVP_SPEC.md §5.2 — the lifecycle this implements
name: Fishhawk

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Workflow run UUID (supplied by backend dispatcher)'
        required: true
        type: string
      stage_id:
        description: 'Stage UUID for this dispatch'
        required: true
        type: string
      workflow_id:
        description: 'Workflow ID from .fishhawk/workflows.yaml (e.g. feature_change)'
        required: true
        type: string
      stage:
        # The backend dispatcher sends the stage's executor ref here
        # (run.Stage.ExecutorRef, e.g. claude-code or codex). It is the
        # agent-provider identifier and is forwarded to the runner action's
        # `agent` input below to select which CLI is installed/invoked.
        description: 'Stage executor ref / agent provider (claude-code|codex)'
        required: false
        type: string
        default: claude-code

permissions:
  # id-token: write — the auth pre-step (#201) mints a GitHub
  # Actions OIDC token to exchange for the Fishhawk App's
  # installation token at the backend. The exchanged token is what
  # actions/checkout, push, and PR creation all authenticate with —
  # no long-lived secret needed in the workflow, no repo-level
  # "Allow Actions to create PRs" toggle, no write permissions on
  # the workflow's GITHUB_TOKEN.
  id-token: write
  contents: read

jobs:
  run:
    name: Run Fishhawk stage
    runs-on: ubuntu-latest
    steps:
      # Mint the Fishhawk App installation token via OIDC before
      # any git operation runs. The same token then flows into
      # actions/checkout AND the runner action (passed as
      # github-token), so push + PR creation authenticate as the
      # App rather than the workflow's GITHUB_TOKEN. Single
      # `installation_token_issued` audit entry per stage with
      # auth_method=oidc. (E5.X / #201.)
      #
      # Inlined here rather than referencing ./auth because ./auth
      # would itself require a prior checkout (chicken-and-egg).
      # Customers consuming the published runner can use
      # `kuhlman-labs/fishhawk/auth@auth/vX.Y.Z` directly without
      # this bootstrap concern.
      - name: Fishhawk auth (mint App installation token via OIDC)
        id: fishhawk-auth
        shell: bash
        env:
          BACKEND_URL: ${{ vars.FISHHAWK_BACKEND_URL || 'http://localhost:8080' }}
          RUN_ID: ${{ inputs.run_id }}
          STAGE_ID: ${{ inputs.stage_id }}
        run: |
          set -euo pipefail
          AUD="$BACKEND_URL"
          if [[ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" || -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]]; then
            echo "::error::OIDC env vars missing — needs 'permissions: id-token: write' on the workflow." >&2
            exit 1
          fi
          OIDC_RESP="$(curl -sS -f \
            -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=$(printf '%s' "$AUD" | jq -sRr @uri)")"
          OIDC_JWT="$(printf '%s' "$OIDC_RESP" | jq -r .value)"
          ENDPOINT="${BACKEND_URL%/}/v0/runs/${RUN_ID}/installation-token?stage_id=${STAGE_ID}"
          BACKEND_RESP="$(curl -sS -f -X POST \
            -H "Authorization: Bearer ${OIDC_JWT}" \
            -H "Content-Type: application/json" \
            --data '{}' \
            "${ENDPOINT}")"
          TOKEN="$(printf '%s' "$BACKEND_RESP" | jq -r .token)"
          if [[ -z "$TOKEN" || "$TOKEN" == "null" ]]; then
            echo "::error::Backend response missing token: $BACKEND_RESP" >&2
            exit 1
          fi
          echo "::add-mask::${TOKEN}"
          printf 'token=%s\n' "${TOKEN}" >> "${GITHUB_OUTPUT}"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ steps.fishhawk-auth.outputs.token }}
          # persist-credentials: false — actions/checkout sets the
          # http.<host>.extraheader via an includeIf'd external
          # credentials file, not the local config directly. With
          # the default (true), the runner's `git config --local
          # --replace-all` before push only overrides the local
          # entry; the includeIf'd one still loads, both
          # Authorization headers go on the request, GitHub
          # returns 400 "Duplicate header". Setting this to false
          # tells checkout to clean up after the initial fetch so
          # the runner is the sole source of push auth.
          persist-credentials: false

      - name: Run Fishhawk runner
        uses: ./runner
        with:
          run-id: ${{ inputs.run_id }}
          stage-id: ${{ inputs.stage_id }}
          backend-url: ${{ vars.FISHHAWK_BACKEND_URL || 'http://localhost:8080' }}
          workflow: ${{ inputs.workflow_id }}
          stage: ${{ inputs.stage }}
          # agent: the executor ref carried by the `stage` dispatch input
          # selects the provider CLI. The action installs Claude Code for
          # claude-code and Codex for codex, and exports only that
          # provider's API key. Defaults to claude-code, so existing
          # dispatches keep working with only ANTHROPIC_API_KEY set.
          agent: ${{ inputs.stage }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          # openai-api-key: consumed only when agent=codex. Unset/empty for
          # Claude dispatches, so OPENAI_API_KEY is not a new required secret.
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          github-token: ${{ steps.fishhawk-auth.outputs.token }}
          # fetch-prompt: runner pulls the constructed prompt from
          # GET /v0/stages/{stage-id}/prompt and writes it to a
          # temp file before invoking Claude Code. The signing-key
          # endpoint is one-shot per run, so the runner reuses the
          # key issued here for the trace and plan uploads below.
          fetch-prompt: 'true'
          upload-trace: 'true'
          # plan-out: matches prompt.PlanArtifactPath in the backend.
          # When the agent produces a standard_v1 plan at this path,
          # the runner validates locally and POSTs to /v0/runs/{id}/plan
          # so the artifact lands in the artifacts table and the UI
          # can render it for approval. (E5.X / #191.)
          plan-out: '/tmp/fishhawk-plan.json'
          # check-base-ref: makes the runner compute `git diff` against
          # this ref and emit a `git_diff` event into the trace bundle
          # (#247). The backend's policy re-evaluation reads the diff
          # from the bundle to decide pass/fail; without this, the SPA's
          # policy section is stuck on "pending." We don't pass
          # constraints-file because the backend pulls constraints
          # directly from .fishhawk/workflows.yaml — emitting the diff
          # is sufficient.
          #
          # The base ref is the repo's configured default branch
          # (read from the dispatch event's repository payload, so
          # repos with `develop` / `master` / etc. work too). actions/
          # checkout above fetches the default branch into the
          # remote-tracking ref `origin/<branch>` which is what the
          # runner's `git diff <ref>...HEAD` expects.
          check-base-ref: 'origin/${{ github.event.repository.default_branch }}'
