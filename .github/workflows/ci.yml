name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  detect:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      ts: ${{ steps.filter.outputs.ts }}
      openapi: ${{ steps.filter.outputs.openapi }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - '**/go.mod'
              - '**/go.sum'
              - 'go.work'
              - 'go.work.sum'
              - '.golangci.yml'
              # Go-test fixtures (e.g. backend/internal/agenteval/testdata/corpus)
              # are consumed by Go tests (TestScore, TestCalibrateCorpusReplay), so a
              # fixture-only change must run the Go job — otherwise it merges
              # unvalidated and can red-line main post-merge (#1298/#1301).
              - '**/testdata/**'
              - '.github/workflows/ci.yml'
            ts:
              - 'frontend/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - '.eslintrc*'
              - 'eslint.config.*'
              - '.prettierrc*'
              - '.github/workflows/ci.yml'
            openapi:
              - 'docs/api/**'
              - '.github/workflows/ci.yml'
            # The fishhawkd image build (backend/Dockerfile) resolves the
            # whole go.work workspace inside the container. A module added
            # to go.work without being wired into the Dockerfile's COPY
            # steps breaks `go mod download` — invisible to the `go` job
            # (which builds against the on-disk workspace) and previously
            # only caught post-merge by backend-build.yml (#733). Trigger
            # the build-only docker job on anything that changes the module
            # graph or the build context: go.mod/go.sum (any module),
            # go.work, the Dockerfile, and the ignore file.
            docker:
              - '**/go.mod'
              - '**/go.sum'
              - 'go.work'
              - 'go.work.sum'
              - 'backend/Dockerfile'
              - '.dockerignore'
              - '.github/workflows/ci.yml'

  # The Go gate is split into two PARALLEL jobs (go-lint, go-test) rather
  # than one serial job. Lint (~2 min) and test+coverage (~4 min) previously
  # ran back-to-back on one runner (~6.5 min); as concurrent jobs the Go
  # critical path is max(lint, test) instead of their sum. Both share the
  # setup-go build/module cache via the GHA cache backend, so the second job
  # to start reads a warm cache. Both gate on `detect` and the same
  # `go == 'true'` filter, and both are listed in `ci-pass.needs` so the
  # required rollup inherits both results.
  go-lint:
    name: Go (lint)
    needs: detect
    if: ${{ needs.detect.outputs.go == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          # Some transitive deps (pgx, testcontainers, golang-migrate) declare
          # `go 1.25` directives, so the toolchain on the runner must be >= 1.25
          # even though our own code only uses 1.22-era features (method-aware
          # ServeMux). Bumping conservatively to the major version line.
          go-version: '1.25'
          cache: true

      - name: Detect registered modules
        id: have-modules
        run: |
          if [ -f go.work ] && grep -q '^use ' go.work; then
            echo "yes=true" >> "$GITHUB_OUTPUT"
          else
            echo "yes=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Go modules registered in go.work yet. Skipping lint."
          fi

      - name: Schema sync (docs/spec ↔ embedded copies)
        if: steps.have-modules.outputs.yes == 'true'
        run: |
          # Each canonical schema/default under docs/spec/ is mirrored into
          # one or more embedded copies vendored into the Go modules.
          # scripts/sync-schemas is the single source of truth for those
          # pairs; re-run it and fail if anything changed, so a newly added
          # pair (e.g. operator-role, work-management) is covered here
          # automatically without editing this gate. Update both sides in
          # the same PR and run scripts/sync-schemas before committing.
          scripts/sync-schemas
          if ! git diff --exit-code; then
            echo "::error::Embedded schema copies drifted from docs/spec/. Run scripts/sync-schemas and commit the result." >&2
            exit 1
          fi

      - name: Install golangci-lint
        if: steps.have-modules.outputs.yes == 'true'
        run: |
          # v2.8.0 binaries are built with go1.25.x, so they can typecheck
          # packages whose deps require go 1.25. Older v2 releases (v2.0.x)
          # were built with go1.24 and reject go 1.25 packages.
          #
          # Pin install.sh to the v2.8.0 tag, NOT master: the master script
          # is unpinned and an upstream change to it broke CI (exit 1 right
          # after resolving v2.8.0) with no change on our side. The tagged
          # script matches the version it installs and is reproducible.
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/v2.8.0/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.8.0

      # golangci-lint keeps an incremental analysis cache at
      # ~/.cache/golangci-lint that setup-go's cache does NOT cover. Restoring
      # it across runs lets golangci re-lint only changed packages instead of
      # the whole workspace cold. The key rotates per-commit (so every run
      # writes back the latest cache) while restore-keys fall back to the most
      # recent prior cache for the same .golangci.yml; a config change drops to
      # the OS-level fallback and rebuilds. Keyed off .golangci.yml only (not
      # **/*.go) so an ordinary code change reuses the warm cache rather than
      # thrashing the exact key on every push.
      - name: Cache golangci-lint analysis cache
        if: steps.have-modules.outputs.yes == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/golangci-lint
          key: golangci-${{ runner.os }}-${{ hashFiles('.golangci.yml') }}-${{ github.sha }}
          restore-keys: |
            golangci-${{ runner.os }}-${{ hashFiles('.golangci.yml') }}-
            golangci-${{ runner.os }}-

      - name: Lint each module
        if: steps.have-modules.outputs.yes == 'true'
        # `scripts/test lint` is byte-for-byte the per-module
        # `golangci-lint run ./...` (AGENTS.md "Build, test, lint") and fails
        # closed when golangci-lint is missing (installed in the step above).
        # `go build ./...` is redundant here: lint typechecks/builds every
        # package (and go-test compiles them again) — exactly what the runner's
        # `scripts/test verify` gate already relies on.
        run: scripts/test lint

  go-test:
    name: Go (test + coverage)
    needs: detect
    if: ${{ needs.detect.outputs.go == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Detect registered modules
        id: have-modules
        run: |
          if [ -f go.work ] && grep -q '^use ' go.work; then
            echo "yes=true" >> "$GITHUB_OUTPUT"
          else
            echo "yes=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Go modules registered in go.work yet. Skipping test."
          fi

      # Route the Go gate through scripts/test instead of an inline `go test`
      # loop so CI runs the suite in the SAME tuned environment as the local
      # and runner gates (#1413, the #1402 testcontainer flake). The inline
      # loop bypassed scripts/test entirely, so in CI the testcontainers ryuk
      # reaper stayed ENABLED — a shared single-point-of-failure container that
      # times out under daemon load and cascades one flake into a whole-suite
      # red (#972) — and the shared fishhawk-test-postgres container (#1174)
      # was never reaped, so stale named containers accumulated across runs
      # (the `No such container` stale-reuse symptom). scripts/test exports
      # TESTCONTAINERS_RYUK_DISABLED=true and reaps fishhawk-test-postgres in
      # an EXIT trap, so both causes are removed at the source.
      - name: Test + coverage threshold (≥ 80% aggregate, excl. sqlc-generated)
        if: steps.have-modules.outputs.yes == 'true'
        # `scripts/test coverage` writes the per-module coverage.out profiles
        # and runs scripts/check-coverage.py --threshold 80 --exclude '/db/'
        # itself — identical to the gate this replaces (the /db/ exclude drops
        # sqlc-generated packages; new ones auto-skip). Targets: ARCHITECTURE
        # §9. Lower test-binary parallelism on a constrained daemon with
        # FISHHAWK_TEST_P (default 4, #1174).
        run: scripts/test coverage

  ts:
    name: TypeScript (lint + build + test)
    needs: detect
    if: ${{ needs.detect.outputs.ts == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      # pnpm version is pinned via `packageManager` in frontend/package.json;
      # action-setup defaults to reading the *root* package.json, so we
      # point it at frontend/ explicitly. Without this it errors out
      # with "No pnpm version is specified."
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: frontend/package.json

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  openapi:
    name: OpenAPI (lint)
    needs: detect
    if: ${{ needs.detect.outputs.openapi == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
      - name: Lint OpenAPI spec
        run: |
          # Pin to a concrete published version, NOT @latest: a floating
          # ref lets an upstream release red-line CI with no change on our
          # side. Bump deliberately. See #607/#608.
          npx -y @redocly/cli@2.31.5 lint \
            --config docs/api/redocly.yaml \
            docs/api/v0.openapi.yaml

  docker-build:
    name: Docker build (fishhawkd image, no push)
    needs: detect
    if: ${{ needs.detect.outputs.docker == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Build-only validation of the release build context. This mirrors
      # backend-build.yml's build step but with push/sign/sbom stripped:
      # no registry login, no credentials, no publish — the point is to
      # fail a PR when the go.work workspace no longer resolves inside the
      # container (the #733 class), not to produce an artifact. Reads the
      # release job's warm cache (scope=backend-build) for speed but writes
      # its own scope so a PR can never poison the published image's cache.
      - name: Build fishhawkd image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/Dockerfile
          push: false
          load: false
          build-args: |
            VERSION=ci-${{ github.sha }}
          cache-from: type=gha,scope=backend-build
          cache-to: type=gha,mode=max,scope=ci-docker-build
          provenance: false
          sbom: false

  # Rollup gate. The repo ruleset requires only this job; it inherits
  # the result of every job listed in `needs`. Add new jobs to that
  # list and they automatically become part of the gate without
  # touching the ruleset.
  ci-pass:
    name: CI Pass
    needs: [detect, go-lint, go-test, ts, openapi, docker-build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs
        run: |
          # Skipped jobs (e.g. the TS job when no TS files changed)
          # are NOT failures. Cancellations are.
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "::error::One or more required jobs failed."
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "::error::One or more required jobs was cancelled."
            exit 1
          fi
          echo "All required jobs passed (or were correctly skipped)."
