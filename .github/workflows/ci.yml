name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  detect:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      ts: ${{ steps.filter.outputs.ts }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - '**/go.mod'
              - '**/go.sum'
              - 'go.work'
              - 'go.work.sum'
              - '.golangci.yml'
              - '.github/workflows/ci.yml'
            ts:
              - 'frontend/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'package-lock.json'
              - 'yarn.lock'
              - '.eslintrc*'
              - 'eslint.config.*'
              - '.prettierrc*'
              - '.github/workflows/ci.yml'

  go:
    name: Go (lint + build + test)
    needs: detect
    if: ${{ needs.detect.outputs.go == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          # Some transitive deps (pgx, testcontainers, golang-migrate) declare
          # `go 1.25` directives, so the toolchain on the runner must be >= 1.25
          # even though our own code only uses 1.22-era features (method-aware
          # ServeMux). Bumping conservatively to the major version line.
          go-version: '1.25'
          cache: true

      - name: Detect registered modules
        id: have-modules
        run: |
          if [ -f go.work ] && grep -q '^use ' go.work; then
            echo "yes=true" >> "$GITHUB_OUTPUT"
          else
            echo "yes=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Go modules registered in go.work yet. Skipping lint/build/test."
          fi

      - name: Schema sync (docs/spec ↔ embedded copies)
        if: steps.have-modules.outputs.yes == 'true'
        run: |
          # Each schema has a canonical copy under docs/spec/ and an
          # embedded copy under backend/internal/<pkg>/schemas/. CI
          # fails if they drift; update both in the same PR.
          diff -u docs/spec/workflow-v0.schema.json \
                  backend/internal/spec/schemas/workflow-v0.schema.json
          diff -u docs/spec/plan-standard-v1.schema.json \
                  backend/internal/plan/schemas/plan-standard-v1.schema.json

      - name: Install golangci-lint
        if: steps.have-modules.outputs.yes == 'true'
        run: |
          # v2.8.0 binaries are built with go1.25.x, so they can typecheck
          # packages whose deps require go 1.25. Older v2 releases (v2.0.x)
          # were built with go1.24 and reject go 1.25 packages.
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.8.0

      - name: Lint, build, and test each module
        if: steps.have-modules.outputs.yes == 'true'
        run: |
          set -eu
          GOLANGCI_LINT="$(go env GOPATH)/bin/golangci-lint"
          for m in $(go work edit -json | jq -r '.Use[].DiskPath'); do
            echo "::group::go module: $m"
            (
              cd "$m"
              "$GOLANGCI_LINT" run ./...
              go build ./...
              go test -race -coverprofile=coverage.out -covermode=atomic ./...
            )
            echo "::endgroup::"
          done

      - name: Coverage threshold (≥ 80% aggregate, excl. sqlc-generated)
        if: steps.have-modules.outputs.yes == 'true'
        run: |
          set -eu
          # Build a list of per-module coverage profiles. The threshold
          # script aggregates across all of them; --exclude drops generated
          # packages before counting. Targets documented in
          # docs/ARCHITECTURE.md §9.
          profiles=()
          while IFS= read -r m; do
            profiles+=("$m/coverage.out")
          done < <(go work edit -json | jq -r '.Use[].DiskPath')
          python3 scripts/check-coverage.py \
            --threshold 80 \
            --exclude 'internal/run/db' \
            "${profiles[@]}"

  ts:
    name: TypeScript (lint + build + test)
    needs: detect
    if: ${{ needs.detect.outputs.ts == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: |
          echo "::notice::TypeScript pipeline lands with E7.1 (frontend scaffold, issue #37)."
          echo "Until then this job is a placeholder so the path filter is exercised."

  # Rollup gate. The repo ruleset requires only this job; it inherits
  # the result of every job listed in `needs`. Add new jobs to that
  # list and they automatically become part of the gate without
  # touching the ruleset.
  ci-pass:
    name: CI Pass
    needs: [detect, go, ts]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs
        run: |
          # Skipped jobs (e.g. the TS job when no TS files changed)
          # are NOT failures. Cancellations are.
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "::error::One or more required jobs failed."
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "::error::One or more required jobs was cancelled."
            exit 1
          fi
          echo "All required jobs passed (or were correctly skipped)."
