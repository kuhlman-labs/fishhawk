          schema: { $ref: '#/components/schemas/UUID' }
        - { name: repo, in: query, description: "Filter by repository (owner/name), resolved through the runs join.", schema: { type: string } }
        - { name: from, in: query, description: "Lower bound (inclusive) on run created_at, RFC3339.", schema: { type: string, format: date-time } }
        - { name: to, in: query, description: "Upper bound (inclusive) on run created_at, RFC3339.", schema: { type: string, format: date-time } }
        - { name: limit, in: query, description: "Maximum RUNS per page (whole-run bounded).", schema: { type: integer, default: 50, maximum: 200 } }
        - { name: cursor, in: query, description: "Opaque keyset continuation cursor from a prior page's X-Fishhawk-Export-Next-Cursor header.", schema: { type: string } }
      responses:
        '200':
