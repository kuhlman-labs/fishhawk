              schema: { type: string }
          content:
            text/markdown:
              schema: { type: string }
        '400':
          description: |
            `validation_failed` ‚Äî malformed `run_id`/`from`/`to`/`limit`,
            `from` after `to`, or `run_id` combined with `repo`/`from`/`to`;
            `cursor_invalid` ‚Äî opaque cursor failed to decode.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404':
          description: "`run_not_found` ‚Äî an explicitly requested run does not exist (fail-closed)."
        '503':
          description: "`audit_export_unconfigured` ‚Äî the audit, run, or signing repository is not configured on this instance."

  # ---------------------------------------------------------------------
  # Release notes (E33.2 / #1587, ADR-051 option B)
  # ---------------------------------------------------------------------
  /v0/releases/notes/preview:
    get:
      operationId: releaseNotesPreview
      summary: Preview evidence-derived release notes for a ref range
      description: |
        Assembles the merged-run evidence in `(from, to]` and renders it to
        release-notes markdown WITHOUT persisting anything (E33.2 / #1587). Per
        change the notes carry the plan summary + link, the reviewer verdicts,
        the acceptance outcome, and any deferred concerns; the header carries
        the ref range, the advisory semver-bump hint (the heuristic
        `suggested bump: <level> (because ‚Ä¶)` line derived from the same
        evidence, E33.4/E33.5), and the per-release cost rollup. A merged PR in
        range with no resolvable
        Fishhawk run (a human-led / loop-bypassing change) is rendered as an
        explicitly-marked reduced-evidence entry per the ADR-051 honesty
        constraint ‚Äî never fabricated with invented verdicts. Authenticated
        read-only.
      tags: [audit]
      parameters:
        - { name: repo, in: query, required: true, description: "Repository (owner/name) whose merged PRs are resolved.", schema: { type: string } }
        - { name: from, in: query, required: true, description: "Previous release ref (tag or SHA); the exclusive lower bound of the range.", schema: { type: string } }
        - { name: to, in: query, required: true, description: "Candidate ref (tag or SHA); the inclusive upper bound of the range.", schema: { type: string } }
      responses:
        '200':
          description: The rendered release notes as markdown.
          content:
            text/markdown:
              schema: { type: string }
        '400':
          description: "`validation_failed` ‚Äî `repo`, `from`, or `to` is missing, or `repo` is not `owner/name`."
        '401': { $ref: '#/components/responses/Unauthorized' }
        '502':
          description: |
            `release_notes_assembly_failed` ‚Äî the merged-PR resolver or evidence
            assembly failed (fails closed rather than rendering from a partial
            walk); `installation_resolution_failed` ‚Äî the GitHub App installation
            for the repo could not be resolved.
        '503':
          description: |
            `release_notes_unconfigured` ‚Äî the run, audit, concern, or artifact
            repository (or the GitHub client used to resolve merged PRs) is not
            configured; `github_app_not_installed` ‚Äî the App is not installed on
            the target repo.
  /v0/releases/notes:
    post:
      operationId: releaseNotesPersist
      summary: Persist evidence-derived release notes as an artifact
      description: |
        Assembles and renders exactly as `GET /v0/releases/notes/preview`, then
        persists the rendered notes as a `release_notes` artifact keyed to the
        caller-supplied `stage_id` (E33.2 / #1587). Because `artifact.Create` is
        stage-scoped and no first-class release stage type exists yet, the
        artifact attaches to a caller-chosen stage exactly as every other
        artifact is keyed. A persisting write ‚Äî requires the `write:runs` scope.
      tags: [audit]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [repo, from, to, stage_id]
              additionalProperties: false
              properties:
                repo: { type: string, description: "Repository (owner/name)." }
                from: { type: string, description: "Previous release ref (tag or SHA)." }
                to: { type: string, description: "Candidate ref (tag or SHA)." }
                stage_id: { $ref: '#/components/schemas/UUID' }
      responses:
        '201':
          description: The persisted release_notes artifact.
          content:
            application/json:
              schema:
                type: object
                properties:
                  artifact_id: { $ref: '#/components/schemas/UUID' }
                  stage_id: { $ref: '#/components/schemas/UUID' }
                  repo: { type: string }
                  from: { type: string }
                  to: { type: string }
                  content_hash: { type: string }
                  markdown: { type: string }
        '400':
          description: "`validation_failed` ‚Äî malformed body, missing `repo`/`from`/`to`/`stage_id`, or a non-UUID `stage_id`."
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404':
          description: "`stage_not_found` ‚Äî the `stage_id` is a valid UUID but keys no stage row (the artifact FK cannot resolve)."
        '500':
          description: "`release_notes_persist_failed` ‚Äî the artifact insert failed for a reason other than a missing stage."
        '502':
          description: "`release_notes_assembly_failed` / `installation_resolution_failed` ‚Äî as for the preview endpoint."
        '503':
          description: "`release_notes_unconfigured` / `github_app_not_installed` ‚Äî as for the preview endpoint."

  /v0/releases/cut:
    post:
      operationId: releaseCut
      summary: Record the operator's ratified release-version decision
      description: |
        Records the operator's ratified release version as a `release_cut`
        audit entry on the release run's chain (E33.5 / #1590, ADR-051), after
        validating that `artifact_id` names a persisted `release_notes`
        artifact. `version` is the ratified version; `bump_level` is the
        OPTIONAL advisory semver level (`patch`/`minor`/`major`) the operator
        settled on, recorded verbatim and never validated (it mirrors the
        advisory classifier hint). A persisting write ‚Äî requires the
        `write:runs` scope.

        Records the DECISION only: it appends the audit entry and performs NO
        git tag push and NO GitHub write. Tagging the release stays a human git
        action per the delegating posture ‚Äî the operator pushes the tag out of
        band once the cut is recorded.
      tags: [audit]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [repo, run_id, artifact_id, version]
              additionalProperties: false
              properties:
                repo: { type: string, description: "Repository (owner/name)." }
                run_id: { $ref: '#/components/schemas/UUID' }
                stage_id: { $ref: '#/components/schemas/UUID' }
                artifact_id: { $ref: '#/components/schemas/UUID' }
                version: { type: string, description: "The ratified release version." }
                bump_level:
                  type: string
                  description: "Optional advisory semver level (patch/minor/major), recorded verbatim."
      responses:
        '201':
          description: The release_cut decision was recorded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  version: { type: string }
                  artifact_id: { $ref: '#/components/schemas/UUID' }
                  content_hash: { type: string }
                  bump_level: { type: string }
                  recorded: { type: boolean }
        '400':
          description: "`validation_failed` ‚Äî malformed body, missing `repo`/`run_id`/`artifact_id`/`version`, or a non-UUID id."
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404':
          description: "`artifact_not_found` ‚Äî no artifact with that id."
        '409':
          description: "`artifact_wrong_kind` ‚Äî the artifact is not a `release_notes` artifact."
        '500':
          description: "`release_cut_failed` ‚Äî an artifact load fault; `release_cut_audit_failed` ‚Äî the durable `release_cut` audit append failed."
        '503':
          description: "`release_cut_unconfigured` ‚Äî artifact/audit repo not wired."

  /v0/releases/publish:
    post:
      operationId: releasePublish
      summary: Publish persisted release notes to a GitHub Release
      description: |
        Given a published GitHub Release (by `tag`) and a persisted
        `release_notes` artifact (by `artifact_id`), sets the Release body to
        the persisted notes markdown and attaches the notes as a fixed-name
        markdown asset (`release-notes.md`) via the App installation token, then
        records a `release_published` audit entry on the release run's chain
        (E33.3 / #1588, ADR-051 option B, publish half). A persisting write ‚Äî
        requires the `write:runs` scope.

        No App permission change: the Releases REST endpoints are covered by the
        App's existing `contents:write` grant (ADR-051 accepted-condition 3,
        confirmed on #1588).

        Idempotency keys on CONTENT HASH for BOTH surfaces (body AND asset): a
        re-invoke is a full no-op (`published:false, idempotent:true`, no PATCH,
        no asset upload, no new audit entry) only when the desired notes hash
        equals the last recorded `release_published` hash AND the live Release
        body already hashes to the desired notes. When the hash differs it
        PATCHes the body AND replaces the asset (delete the fixed-name asset,
        then upload) so the body and asset can never diverge.
      tags: [audit]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [repo, tag, run_id, artifact_id]
              additionalProperties: false
              properties:
                repo: { type: string, description: "Repository (owner/name)." }
                tag: { type: string, description: "The published GitHub Release tag." }
                run_id: { $ref: '#/components/schemas/UUID' }
                stage_id: { $ref: '#/components/schemas/UUID' }
                artifact_id: { $ref: '#/components/schemas/UUID' }
      responses:
        '200':
          description: |
            The Release was published, or a content-hash-equal re-invoke was a
            no-op (`idempotent: true`).
          content:
            application/json:
              schema:
                type: object
                properties:
                  release_url: { type: string }
                  tag: { type: string }
                  artifact_id: { $ref: '#/components/schemas/UUID' }
                  content_hash: { type: string }
                  published: { type: boolean }
                  idempotent: { type: boolean }
        '400':
          description: "`validation_failed` ‚Äî malformed body, missing `repo`/`tag`/`run_id`/`artifact_id`, or a non-UUID id."
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404':
          description: "`artifact_not_found` ‚Äî no artifact with that id; `release_not_found` ‚Äî no published GitHub Release for the tag."
        '409':
          description: "`artifact_wrong_kind` ‚Äî the artifact is not a `release_notes` artifact."
        '500':
          description: "`release_publish_failed` ‚Äî an artifact load/decode fault; `release_publish_audit_failed` ‚Äî the durable `release_published` audit append failed after the Release was updated."
        '502':
          description: "`installation_resolution_failed` / `release_lookup_failed` / `release_publish_failed` ‚Äî a GitHub round-trip failed."
        '503':
          description: "`release_publish_unconfigured` ‚Äî artifact/audit repo or GitHub client not wired; `github_app_not_installed` ‚Äî the App is not installed on the target repo."

  # ---------------------------------------------------------------------
  # Campaigns (ADR-047 / #1437)
  # ---------------------------------------------------------------------
  /v0/campaigns:
    get:
      operationId: listCampaigns
      summary: List campaigns
      description: |
        Cursor-paginated list ordered by `created_at` descending. Optional
        `repo` and `state` filters AND together.

        **Repo-scoped visibility (ADR-057 Amendment A2 / #2071).** For a
        non-admin cookie-session caller, this page is narrowed ‚Äî on top of the
        existing workspace-account scoping ‚Äî to repositories the caller holds
        at least `read` on at the forge. Rows for other repositories are
        OMITTED, not errored. Because the offset cursor counts rows BEFORE this
        narrowing, a page may come back shorter than `limit` while
        `next_cursor` is still non-empty; following the cursor to exhaustion
        still yields every visible row exactly once. Bearer / MCP identities
        and workspace admins are not filtered, and a deployment with no
        repo-ACL mirror wired behaves exactly as before.
      tags: [campaigns]
      parameters:
        - { name: repo, in: query, schema: { type: string } }
        - { name: state, in: query, schema: { type: string, enum: [pending, running, succeeded, failed, cancelled] } }
        - { name: limit, in: query, schema: { type: integer, default: 50, maximum: 200 } }
        - { name: cursor, in: query, schema: { type: string } }
      responses:
        '200':
          description: Page of campaigns.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Pagination'
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/Campaign' }
        '400':
          description: |
            `validation_failed` ‚Äî `limit` out of range or `state` not a known
            value; `cursor_invalid` ‚Äî opaque cursor failed to decode.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503':
          description: "`campaign_repo_unconfigured` ‚Äî no campaign repository wired."
    post:
      operationId: createCampaign
      summary: Create a campaign from an epic ref
      description: |
        Assembles a campaign from an epic: queries the epic's child issues
        and their `depends_on` edges via the work-management provider,
        wave-orders them with the campaign DAG engine, and persists the
        campaign + its items.

        This is a runless create with no run row, so it resolves the repo's
        GitHub App installation directly (`GET /repos/{owner}/{repo}/installation`)
        ‚Äî the same path `POST /v0/runs` uses ‚Äî which the GitHub provider needs
        to query the epic's children. A repo the App is not installed on fails
        closed with `422 repo_not_installed`.

        Pass `Idempotency-Key: <opaque-string>` to make the call retriable
        (E25.13). If a campaign with the same `(repo, key)` exists it is
        returned with a `200` carrying `idempotent: true` instead of minting a
        duplicate at `201`. The scope is `(repo, key)` so two callers picking
        the same key for different repos don't collide; no header = always
        create. Mirrors the `POST /v0/runs` idempotency contract.
      tags: [campaigns]
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
            description: |
              Opaque caller-chosen string. Same key + same repo = the existing
              campaign is returned (200, `idempotent: true`). Different key OR
              different repo = a fresh campaign is created (201). No header =
              always create.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [repo, epic_ref]
              properties:
                repo:
                  type: string
                  example: kuhlman-labs/fishhawk
                epic_ref:
                  type: string
                  description: The epic to decompose, in `issue:N` form.
                  example: "issue:1439"
                pause_policy:
                  type: string
                  enum: [pause_campaign, pause_item]
                  description: |
                    OPTIONAL pause behavior on an auto-driver gate hand-off
                    (E25.7). Omit to take the default `pause_campaign` (block
                    the whole campaign); `pause_item` pauses only the affected
                    item (continue-others).
                operator_agent:
                  type: object
                  additionalProperties: true
                  description: |
                    OPTIONAL campaign-level `operator_agent` delegation
                    override (E25.12) that tightens or relaxes the per-workflow
                    contract for ALL the campaign's issue-runs, winning
                    wholesale over the gate/workflow blocks. Same shape as the
                    workflow spec's `operator_agent` block; validated against it
                    (unknown fields rejected) at create. Omit (or send `null`)
                    for no override ‚Äî each issue-run inherits its workflow's
                    contract.
                items:
                  type: array
                  items: { type: string }
                  description: |
                    OPTIONAL subset filter (#2003): issue refs (bare number or
                    `issue:N`) naming the subset of the epic's children to scope
                    the campaign to. `epic_ref` stays required and every entry
                    must be a child of it; the DAG is built over just these
                    items. An included item whose `depends_on` targets an
                    EXCLUDED item fails `campaign_dangling_dependency` (the same
                    fail-closed guarantee a cross-epic edge gives). A ref that is
                    not a child of the epic fails `campaign_item_not_child`. Omit
                    (or send an empty array) to sweep every child ‚Äî the
                    backward-compatible default.
                  example: ["issue:1440", "issue:1441"]
      responses:
        '200':
          description: |
            Idempotent replay ‚Äî a campaign with the same `(repo,
            Idempotency-Key)` already exists; it is returned unchanged with
            `idempotent: true` instead of a fresh create.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Campaign' }
        '201':
          description: Campaign created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Campaign' }
        '400':
          description: |
            `validation_failed` ‚Äî `repo` not in owner/name form, `epic_ref`
            missing, `pause_policy` not a recognized value, `operator_agent`
            not a valid operator-agent block (malformed or an unknown knob),
            body malformed / unknown field, or a dependency cycle among the
            epic's children.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: "`insufficient_scope` ‚Äî bearer token missing `write:campaigns`."
        '422':
          description: |
            `repo_not_installed` ‚Äî the GitHub App is not installed on the
            target repo; `campaign_dangling_dependency` ‚Äî a child's
            `depends_on` targets an issue that is not a fellow child of the
            epic (assembly fails closed rather than dropping the edge), which
            also covers an `items` subset that includes an item whose
            `depends_on` points at an EXCLUDED item; `campaign_item_not_child` ‚Äî
            an `items` entry is not a child of the epic.
        '501':
          description: |
            `provider_unimplemented` ‚Äî the conventions name an unregistered
            provider; `epic_children_unsupported` ‚Äî the provider cannot query
            epic children.
        '502':
          description: |
            `installation_resolution_failed` ‚Äî a transient failure resolving
            the App installation; `epic_children_query_failed` ‚Äî the provider
            could not query the epic's children.
        '503':
          description: "`campaign_repo_unconfigured` ‚Äî no campaign repository wired."

  /v0/campaigns/{campaign_id}:
    get:
      operationId: getCampaign
      summary: Get a campaign
      tags: [campaigns]
      parameters:
        - { name: campaign_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: The campaign.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Campaign' }
        '400':
          description: "`validation_failed` ‚Äî `campaign_id` is not a valid UUID."
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/RepoForbidden' }
        '404':
          description: "`campaign_not_found` ‚Äî no campaign with that id."
        '503':
          description: |
            `campaign_repo_unconfigured` ‚Äî no campaign repository wired; or
            `service_unavailable` ‚Äî the repo-ACL mirror's store could not be
            reached so repo visibility could not be resolved (#2071).

  /v0/campaigns/{campaign_id}/items:
    get:
      operationId: listCampaignItems
      summary: List a campaign's items
      tags: [campaigns]
      parameters:
        - { name: campaign_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: The campaign's items, in insertion order.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/CampaignItem' }
        '400':
          description: "`validation_failed` ‚Äî `campaign_id` is not a valid UUID."
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/RepoForbidden' }
        '404':
          description: "`campaign_not_found` ‚Äî no campaign with that id."
        '503':
          description: |
            `campaign_repo_unconfigured` ‚Äî no campaign repository wired; or
            `service_unavailable` ‚Äî the repo-ACL mirror's store could not be
            reached so repo visibility could not be resolved (#2071).

  /v0/campaigns/{campaign_id}/status:
    get:
      operationId: getCampaignStatus
      summary: Get a campaign's rollup status + next action
      description: |
        The campaign, its items, the engine's readiness rollup, and the
        distilled `next_action`. This is the surface the operator-agent polls
        to drive a campaign. `next_action` precedence is FAILED-wins: a failed
        item yields `attention` regardless of whether eligible items exist.

        Reconcile-on-read (E26.2 / #1481): this GET also settles any running
        item whose linked run reached a terminal state and re-derives the
        campaign ‚Äî mirroring the auto-driver's advance pass ‚Äî so the rollup +
        `next_action` advance in DAG order as the operator drives each run to
        merge, with no auto-driver and no GitHub Actions. Best-effort and
        idempotent: the reconcile never fails the read, and a re-poll over an
        already-settled item performs no further transition.
      tags: [campaigns]
      parameters:
        - { name: campaign_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: Campaign rollup status.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CampaignStatus' }
        '400':
          description: "`validation_failed` ‚Äî `campaign_id` is not a valid UUID."
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/RepoForbidden' }
        '404':
          description: "`campaign_not_found` ‚Äî no campaign with that id."
        '503':
          description: |
            `campaign_repo_unconfigured` ‚Äî no campaign repository wired; or
            `service_unavailable` ‚Äî the repo-ACL mirror's store could not be
            reached so repo visibility could not be resolved (#2071).

  /v0/campaigns/{campaign_id}/runs:
    post:
      operationId: startCampaignItemRun
      summary: Start a run for an eligible campaign item
      description: |
        The operator-driven, campaign-aware run start (E26.2 / #1481): mint a
        run for one campaign item and link it to the campaign so the rollup +
        `next_action` track + DAG-gate it as the operator drives the run to
        merge ‚Äî without the backend auto-driver and without GitHub Actions.

        For the `issue_ref` it refuses unless the item is **eligible** per the
        campaign engine (every dependency has succeeded), naming the blocking
        dependency on refusal. On an eligible item it mints the run via the
        same seam the auto-driver uses (carrying `runner_kind` so the local
        loop gets `local`), links it to the item, transitions the item
        `pending`/`blocked` ‚Üí `running`, and advances a `pending` campaign to
        `running`.

        Pair this with `GET /v0/campaigns/{campaign_id}/status`, which is
        reconcile-on-read: it settles any running item whose linked run reached
        terminal and re-derives the campaign, so the rollup advances in DAG
        order as each run is driven to merge.
      tags: [campaigns]
      parameters:
        - { name: campaign_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/StartCampaignItemRunRequest' }
      responses:
        '201':
          description: The minted run and the linked campaign item.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StartCampaignItemRunResult' }
        '400':
          description: |
            `validation_failed` ‚Äî `campaign_id` is not a valid UUID, `issue_ref`
            or `workflow_id` is empty, `runner_kind` is unrecognized, or the
            body carries unknown fields.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: "`insufficient_scope` ‚Äî bearer token missing `write:campaigns`."
        '404':
          description: |
            `campaign_not_found` ‚Äî no campaign with that id;
            `campaign_item_not_found` ‚Äî no campaign item with that `issue_ref`.
        '409':
          description: |
            `campaign_not_startable` ‚Äî the campaign is paused (resume it first)
            or terminal; `item_not_eligible` ‚Äî the item is blocked on a
            dependency (the detail names it), already running, or terminal;
            `item_human_led` ‚Äî the item is deps-satisfied but `autonomy:low`
            (human-led); a human must lead it out of band (do not start an agent
            run) ‚Äî the detail does not name a ref to start;
            `invalid_transition` ‚Äî a concurrent change made the running
            transition illegal.
        '502':
          description: "`campaign_run_start_failed` ‚Äî the installation or workflow spec could not be resolved."
        '503':
          description: "`campaign_repo_unconfigured` ‚Äî no campaign repository wired."

  /v0/campaigns/{campaign_id}/resume:
    post:
      operationId: resumeCampaign
      summary: Resume a paused campaign
      description: |
        The operator's hand-back after the auto-driver paged a human at a run
        gate (E25.7 / ADR-047 Track C). Flips the campaign `paused` ‚Üí `running`
        (when the campaign itself was paused under the `pause_campaign` policy)
        AND every paused item `paused` ‚Üí `running`, so the next driver tick
        re-engages the campaign and the continuation proceeds.

        Serves both pause policies: under `pause_campaign` the campaign and the
        affected item are paused together; under `pause_item` only the item is
        paused while the campaign stays running. "Nothing to resume" ‚Äî the
        campaign is not paused AND no item is paused ‚Äî yields `409
        campaign_not_paused`.
      tags: [campaigns]
      parameters:
        - { name: campaign_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: The resumed campaign (now `running`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Campaign' }
        '400':
          description: "`validation_failed` ‚Äî `campaign_id` is not a valid UUID."
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: "`insufficient_scope` ‚Äî bearer token missing `write:campaigns`."
        '409':
          description: |
            `campaign_not_paused` ‚Äî the campaign has no paused state to resume;
            `invalid_transition` ‚Äî a concurrent change made the resume
            transition illegal.
        '503':
          description: "`campaign_repo_unconfigured` ‚Äî no campaign repository wired."

  # ---------------------------------------------------------------------
  # Work-item filing
  # ---------------------------------------------------------------------
  /v0/work-items:
    post:
      operationId: fileWorkItem
      summary: File a work item via the repo's work-management conventions
      description: |
        Provider-agnostic work-item filing (#1005). Loads the repo's
        work-management conventions (the shipped default in v0; a per-repo
        `work_management` config in a follow-up), applies them to the
        caller's request ‚Äî rendering the title from `title_format`,
        assembling the body from the type's skeleton + `sections`, merging
        `default_labels`, resolving board placement + complexity, allocating
        the sequential number for a numbered type (e.g. `adr`), and
        validating relations against the type's `epic_link` rule ‚Äî then
        dispatches the resolved item to the configured provider
        (`github_projects`; `jira` is interface-only in v0) and returns the
        created item.

        `summary` is the mandatory one-liner: it fills the `{summary}`
        title placeholder and is the required Summary field. The same call
        shape works for any repo because only the conventions differ.

        **Epic + child-number auto-derivation.** For a child type whose
        `title_format` references `{epic}`/`{n}` (e.g. `[E{epic}.{n}]`), when
        `relations.parent_epic` is set and `title_vars` omits them, the handler
        derives BOTH server-side (#1958): it reads the parent epic issue's title
        and parses its leading `[E<n>]` token into `{epic}`, then enumerates the
        epic's existing children (open and closed) and allocates `{n}` as the
        next number ‚Äî so `title_vars` can be omitted entirely; a supplied value
        overrides either derivation. The allocated number is collision-free
        within one deployment (concurrent omitted-`n` filings against the same
        epic are serialized), not globally unique. This fails closed: if no
        GitHub client/installation is available, the parent ref is unparseable,
        the issue fetch errors, or the parent title carries no `[E<n>]` token,
        `{epic}` is left unresolved and the `422` below is returned rather than a
        wrong title; a failed child-number lookup returns the same `422` with
        `details.n_discovery_failed`.

        **Sections fail loud.** When `body` is omitted, every `sections` key
        must match the type's `body_skeleton` exactly. An off-skeleton key
        returns `422 work_item_invalid` rather than silently dropping the
        content.

        When `run_id` names a run that is **in flight** (not terminal), a
        best-effort `work_item_filed` audit entry is appended to that run.
        Filing succeeds with no `run_id` (the operator-agent follow-up
        filing path, ADR-040) ‚Äî `audited` is then `false`. An audit-append
        failure never fails the response: the item is already filed.

        On the run-absent path the handler resolves the App's installation
        for the target repo (`GET /repos/{owner}/{repo}/installation`) so
        GitHub filing works without a run; a repo the App is not installed
        on fails closed. The run-absent path is operator-only: a run-bound
        agent token must file run-scoped (supply its own `run_id`) and is
        rejected with `403 run_scoped_filing_required` if it omits `run_id`.

        An unregistered/unimplemented provider id fails closed with `501
        provider_unimplemented` naming the missing provider ‚Äî never a panic.
      tags: [work-items]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WorkItemRequest' }
      responses:
        '201':
          description: Work item filed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkItemResponse' }
        '400':
          description: |
            `validation_failed` ‚Äî `repo` not in owner/name form, or `type` /
            `summary` / `run_id` missing or malformed.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: |
            `run_not_entitled` ‚Äî a `run_id` was supplied by a caller that is
            not that run's own run-bound agent token (`mcp:run:<uuid>`). Only
            the run's bound token may drive a `work_item_filed` audit entry
            onto its chain, so an arbitrary authenticated caller cannot inject
            an entry under their own actor_subject by knowing the run UUID.
            `run_repo_mismatch` ‚Äî the entitled `run_id` belongs to a different
            repository than the filing target; a run_id is honoured only when
            its repo matches `repo`, so a run-bound token cannot borrow an
            unrelated repository's installation context.
        '404':
          description: "`run_not_found` ‚Äî `run_id` supplied but no such run."
        '413':
          description: "`body_too_large` ‚Äî request body exceeds the size cap."
        '422':
          description: |
            `work_item_invalid` ‚Äî the request violates the conventions for
            its type (unknown type, missing complexity, unresolved title
            placeholder, an off-skeleton `sections` key, or an `epic_link`
            rule violation). Structured `details` accompany the relevant
            cases: `details.missing_placeholders` (the unresolved title
            placeholders, e.g. `["epic"]` when epic derivation failed closed)
            and `details.unknown_sections` / `details.expected_sections` (the
            off-skeleton key(s) and the type's skeleton section names).
        '501':
          description: |
            `provider_unimplemented` ‚Äî the conventions name a provider that
            is not registered (e.g. `jira`); `details.provider` names it and
            `details.registered` lists the available providers.
        '502':
          description: "`work_item_filing_failed` ‚Äî the provider rejected the filing."
        '503':
          description: "`run_lookup_unconfigured` ‚Äî `run_id` supplied but no run repository is wired."

  /v0/refinement/sessions:
    post:
      operationId: createRefinementSession
      summary: Draft an epic/children preview from a natural-language brief
      description: |
        Opens a refinement session (ADR-052 option A, E34.2): mints a session
        id, runs the drafting agent over the `brief`, persists the initial draft
        revision (`origin=brief`), and returns the session view ‚Äî the derived
        approval state, the revision count, the latest structured `EpicDraft`,
        the full filing preview (epic + every child rendered exactly as it would
        file), the topological wave DAG, and the (empty) decision history.

        Nothing files here ‚Äî the session is a draft artifact behind the E34.2
        preview + approval gate; the E34.3 filing executor is what turns an
        approved draft into provider work items.

        Requires `write:approvals` scope. `503 refinement_drafting_unavailable`
        when no agent-backed drafter is configured; `503
        refinement_repo_unconfigured` when no refinement repository is wired.
      tags: [refinement]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [brief]
              properties:
                brief: { type: string, description: The natural-language brief to decompose. }
      responses:
        '201':
          description: Session created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RefinementSession' }
        '400': { description: "`validation_failed` ‚Äî malformed JSON or unknown fields." }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { description: "`insufficient_scope` ‚Äî token lacks `write:approvals`." }
        '422': { description: "`validation_failed` ‚Äî `brief` is empty." }
        '502': { description: "`refinement_drafting_failed` ‚Äî the drafting agent did not produce a valid draft." }
        '503':
          description: |
            `refinement_repo_unconfigured` ‚Äî no refinement repository is wired;
            `refinement_drafting_unavailable` ‚Äî no agent-backed drafter configured.

  /v0/refinement/sessions/{session_id}:
    get:
      operationId: getRefinementSession
      summary: Get a refinement session's preview + approval state
      description: |
        Returns the session view: the derived approval `state`
        (`awaiting_approval` / `approved` / `rejected`), `drifted` when the
        latest revision's decision pins a content hash that no longer matches
        (fail-closed), the revision count, the latest `EpicDraft`, the full
        filing preview, the wave DAG, and the decision history.

        Session state is DERIVED, never stored: a decision counts only when it
        targets the latest revision and its pinned hash still matches ‚Äî so an
        edit after approval structurally re-gates the session.

        **Repo-scoped visibility (ADR-057 Amendment A2 / #2071).** Once a
        session has been FILED, it is authorized against the repository its
        filing session pinned: a non-admin cookie-session caller without at
        least `read` on that repository at the forge is denied 403
        `repo_forbidden`. The gate is scoped to READS: the draft-edit and
        decision endpoints below share this session load but are NOT gated on
        the mirror, because it is a non-authoritative TTL'd cache of a forge
        read permission and a decision is an approval. A session that has not
        yet been filed has no repository to authorize against and stays
        reachable to any caller holding the refinement scope.

        Requires `write:approvals` scope.
      tags: [refinement]
      parameters:
        - name: session_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: The session view.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RefinementSession' }
        '400': { description: "`validation_failed` ‚Äî `session_id` is not a UUID." }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: |
            `insufficient_scope` ‚Äî token lacks `write:approvals`; or
            `repo_forbidden` ‚Äî the caller does not hold `read` on the
            repository this session was filed against (#2071).
        '404': { description: "`refinement_session_not_found` ‚Äî no session with that id." }
        '503':
          description: |
            `refinement_repo_unconfigured`; or `service_unavailable` ‚Äî repo
            visibility could not be resolved (#2071).


  /v0/refinement/sessions/{session_id}/draft:
    patch:
      operationId: editRefinementDraft
      summary: Edit a refinement draft (agent amendment or direct field edit)
      description: |
        Appends a NEW draft revision ‚Äî which is precisely what invalidates a
        prior approval. Exactly one of the two arms:

        - `brief_amendment` ‚Äî composes the stored brief + amendment, re-runs the
          drafting agent (`origin=amendment`), bounded by a per-session budget of
          3 (a further amendment returns `409 amendment_budget_exhausted`).
        - `draft` ‚Äî a direct strict-decoded `EpicDraft` edit (`origin=edit`),
          validated with no agent call.

        Every successful edit writes a `refinement_draft_edited` audit entry on
        the global chain BEFORE persisting the revision (durable-before-state-
        change): an audit-append failure is a `500` and nothing is persisted.

        Requires `write:approvals` scope.
      tags: [refinement]
      parameters:
        - name: session_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                brief_amendment:
                  type: string
                  description: An amendment composed onto the stored brief and re-drafted by the agent.
                draft:
                  $ref: '#/components/schemas/EpicDraft'
      responses:
        '200':
          description: The updated session view (latest revision is the edit).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RefinementSession' }
        '400': { description: "`validation_failed` ‚Äî malformed JSON, unknown fields, or non-UUID `session_id`." }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { description: "`insufficient_scope` ‚Äî token lacks `write:approvals`." }
        '404': { description: "`refinement_session_not_found`." }
        '409': { description: "`amendment_budget_exhausted` ‚Äî the per-session brief-amendment budget is spent." }
        '422':
          description: |
            `validation_failed` ‚Äî neither or both arms supplied, or a `draft`
            that fails strict decode / validation (an empty field, a dangling or
            cyclic `depends_on` edge ‚Äî the error names the offending edge). A
            child with NO acceptance criteria is NOT a validation failure (as of
            E34.5 / #1596): it lands `200` and surfaces as an advisory
            `criteria_precheck` `no_blocking_criterion` finding instead.
        '500': { description: "`audit_append_failed` ‚Äî the edit's audit entry could not be durably recorded; nothing was persisted." }
        '502': { description: "`refinement_drafting_failed` ‚Äî the agent (brief-amendment arm) did not produce a valid draft." }
        '503':
          description: |
            `refinement_repo_unconfigured`; `refinement_drafting_unavailable`
            (brief-amendment arm only).

  /v0/refinement/sessions/{session_id}/decision:
    post:
      operationId: decideRefinementSession
      summary: Approve or reject the latest refinement draft revision
      description: |
        Records an append-only approve/reject verdict pinning the latest
        revision's `draft_id` + a content hash of the decoded `EpicDraft`, so
        "what was approved is what files". A missing/blank `reason` is `422`; a
        second decision on the same revision is `409 decision_already_recorded`
        (re-gate by editing, not by deciding twice).

        The `refinement_draft_approved` / `refinement_draft_rejected` audit entry
        is written on the global chain BEFORE the decision is persisted
        (durable-before-state-change): the audit entry IS the gate's record, so
        an audit-append failure is a `500` and no approval is recorded.

        Requires `write:approvals` scope.
      tags: [refinement]
      parameters:
        - name: session_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [decision, reason]
              properties:
                decision: { type: string, enum: [approved, rejected] }
                reason: { type: string, description: The required decision rationale (recorded and audited). }
      responses:
        '200':
          description: The updated session view (state reflects the decision).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RefinementSession' }
        '400': { description: "`validation_failed` ‚Äî malformed JSON, unknown fields, or non-UUID `session_id`." }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { description: "`insufficient_scope` ‚Äî token lacks `write:approvals`." }
        '404': { description: "`refinement_session_not_found`." }
        '409': { description: "`decision_already_recorded` ‚Äî the latest revision already carries a decision." }
        '422': { description: "`validation_failed` ‚Äî `decision` not in {approved, rejected}, or a missing/blank `reason`." }
        '500': { description: "`audit_append_failed` ‚Äî the decision's audit entry could not be durably recorded; nothing was persisted." }
        '503': { description: "`refinement_repo_unconfigured`." }

  /v0/refinement/sessions/{session_id}/file:
    post:
      operationId: fileRefinementSession
      summary: File an approved refinement draft into tracker items
      description: |
        The E34.3 filing executor (ADR-052 filing half): turns the session's
        approved, hash-pinned draft into real tracker items over the same
        conventions/provider pipeline hand-filed items use ‚Äî the epic first,
        then the children in dependency (wave) order. Parent links, sub-issue
        attachment, and `Depends on: #N` markers come from the provider's filing;
        sibling `depends_on` ordinals resolve to filed `#numbers` as filing
        proceeds. After all items file, the executor asserts the filed epic
        round-trips through the provider's epic-children query + campaign
        assembly (no dangling, no cycle) ‚Äî reported as `verified`.

        The draft must be approved (`409 refinement_not_approved` otherwise) and
        un-drifted (`409 refinement_draft_drifted` ‚Äî its content no longer
        matches the approval hash).

        **Idempotent.** A per-draft filing session pins the target `repo` at
        first invoke (a re-invoke naming a different repo is
        `409 refinement_filing_repo_mismatch`) and one durable row per filed item
        is recorded IMMEDIATELY after each provider create. A mid-sequence
        provider failure is `502 refinement_filing_failed` with the filed-so-far
        items and the failing ordinal in `details`; re-invoking resumes at the
        first unfiled ordinal and never re-files a recorded one. A fully
        completed session replays the recorded result as `200` with
        `already_completed=true` and files/audits nothing.

        Concurrent invocations for the same draft are serialized by a per-draft
        advisory lock, so two callers cannot both file ‚Äî the second observes the
        first's recorded progress. The residual at-least-once seam (a crash
        between the external create and the durable record) can re-file exactly
        one item on resume; GitHub's issue-create API offers no idempotency key
        to close it, and the unique `(draft_id, ordinal)` constraint prevents
        double-recording.

        The `refinement_filing_completed` audit entry is written on the global
        chain BEFORE the filing session's `completed_at` is set
        (durable-before-state-change): an audit-append failure is a `500` with
        the session left open so a re-invoke retries the close.

        Requires `write:approvals` scope (no new scope ‚Äî the E34.2 precedent).
      tags: [refinement]
      parameters:
        - name: session_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [repo]
              properties:
                repo: { type: string, description: "Target repository in `owner/name` form." }
      responses:
        '200':
          description: The filing result (fresh, resumed, or an already-completed replay).
          content:
            application/json:
              schema:
                type: object
                properties:
                  session_id: { type: string, format: uuid }
                  draft_id: { type: string, format: uuid }
                  repo: { type: string }
                  epic:
                    type: object
                    properties:
                      number: { type: integer }
                      url: { type: string }
                  children:
                    type: array
                    items:
                      type: object
                      properties:
                        ordinal: { type: integer, description: "1-based draft child ordinal." }
                        number: { type: integer }
                        url: { type: string }
                  resumed: { type: boolean, description: "True when this invocation resumed a partially-filed session." }
                  already_completed: { type: boolean, description: "True when replaying a fully-completed session (no writes performed)." }
                  verified: { type: boolean, description: "True when the filed epic passed the epic-children + campaign-assembly round-trip. False when the provider lacks the read-back capability (fail-open) or on a replay." }
        '400': { description: "`validation_failed` ‚Äî malformed JSON, unknown fields, non-UUID `session_id`, or `repo` not in `owner/name` form." }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { description: "`insufficient_scope` ‚Äî token lacks `write:approvals`." }
        '404': { description: "`refinement_session_not_found`." }
        '409': { description: "`refinement_not_approved` / `refinement_draft_drifted` / `refinement_filing_repo_mismatch`." }
        '500': { description: "`internal_error` ‚Äî e.g. `audit_append_failed`: the completion audit could not be recorded; items are durable but the session stays open for a retry." }
        '502': { description: "`refinement_filing_failed` (a provider create failed mid-sequence; resumable) or `refinement_filing_verification_failed` (the filed epic did not round-trip; items are durable, re-invoke re-verifies)." }
        '503': { description: "`refinement_repo_unconfigured`." }

  /v0/calibration:
    get:
      operationId: getCalibration
      summary: Get runtime calibration statistics
      description: |
        Returns aggregated actual-vs-predicted runtime statistics derived
        from `runtime_observed` audit entries. Agents call this before writing
        a plan to self-correct `predicted_runtime_minutes` using
        `calibration_ratio` and `confidence_band_accuracy`.

        All parameters are optional. Omit them to get all-time stats across
        all implement stages.

        Zero `samples` is a valid response on a fresh installation.
      tags: [calibration]
      parameters:
        - name: workflow_id
          in: query
          description: Scope results to a specific workflow ID.
          schema: { type: string }
        - name: stage_type
          in: query
          description: Stage type to aggregate (default `implement`).
          schema: { type: string, default: implement }
        - name: since
          in: query
          description: RFC 3339 lower bound; omit for all-time stats.
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: Calibration statistics (samples may be 0).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CalibrationResult' }
        '400':
          description: "`bad_since` ‚Äî `since` is not a valid RFC 3339 timestamp."
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503':
          description: Audit repository not configured on this instance.

  /v0/acceptance-triage/stats:
    get:
      operationId: getAcceptanceTriageStats
      summary: Get acceptance-triage statistics
      description: |
        Aggregates `acceptance_triage_decided` audit entries (E31.8) by class
        and disposition and reports `plan_review_miss_rate` ‚Äî the ADR-049
        decision #4 feedback metric: class-3 decisions (a failed criterion
        that was inferred-source or unresolvable against the approved plan ‚Äî
        a bad criterion the plan gate approved) over all triage decisions
        (E31.11).

        Rate semantics are per triage DECISION, not per run: a run
        re-triaged after a re-run counts each decision. An entry whose
        payload fails to decode is counted under class `""` so the
        denominator never silently shrinks. Zero `samples` is a valid
        response (rate 0, never NaN).
      tags: [calibration]
      parameters:
        - name: workflow_id
          in: query
          description: |
            Scope results to a specific workflow ID (best-effort per-entry
            run resolution; entries whose run cannot be resolved are
            skipped).
          schema: { type: string }
        - name: since
          in: query
          description: RFC 3339 lower bound; omit for all-time stats.
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: Acceptance-triage statistics (samples may be 0).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AcceptanceTriageStats' }
        '400':
          description: "`validation_failed` ‚Äî `since` is not a valid RFC 3339 timestamp."
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503':
          description: "`acceptance_stats_unconfigured` ‚Äî audit repository not configured on this instance."

  # ---------------------------------------------------------------------
  # Stages, artifacts, approvals
  # ---------------------------------------------------------------------
  /v0/stages/{stage_id}:
    get:
      operationId: getStage
      summary: Get a stage
      tags: [stages]
      parameters:
        - { name: stage_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: Stage details.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Stage' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v0/stages/{stage_id}/artifacts:
    get:
      operationId: listStageArtifacts
      summary: List artifacts for a stage
      tags: [stages]
      parameters:
        - { name: stage_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: Artifacts, ordered by created_at ascending.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Artifact' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v0/stages/{stage_id}/prompt:
    get:
      operationId: getStagePrompt
      summary: Fetch the constructed prompt for a stage
      description: |
        Returns the agent-facing prompt the runner should write to
        a temp file and pass to the executing agent's `--prompt-file`
        argument. Construction is server-side and deterministic so
        that two replays of the same stage produce byte-identical
        prompts and the audit log records exactly what the agent
        was asked to do (see MVP_SPEC ¬ß4.4).

        Auth is the same per-run signing-key scheme used by the
        trace upload endpoint. The runner signs
        `sha256("prompt:" + stage_id)` with the private half issued
        at signing-key time and sends the hex signature in
        `X-Fishhawk-Signature`.

        Side effect (#1924): a successful authenticated fetch
        transitions a `dispatched` stage to `running` (best-effort;
        it sets `started_at` on that first transition). This gives
        local runs a real-time dispatched‚Üírunning liveness signal ‚Äî
        the signed fetch is the earliest proof a runner for this
        stage is alive. A flip failure is logged and never blocks the
        response. `pending` and every other state are left unchanged.

        Returns 501 when no prompt template is implemented yet for
        the stage's type ‚Äî caller should treat the stage as
        unsupported and fail rather than guess.
      tags: [stages]
      parameters:
        - { name: stage_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - in: header
          name: X-Fishhawk-Signature
          required: true
          schema:
            type: string
            description: Hex-encoded Ed25519 signature of `sha256("prompt:" + stage_id)`.
      responses:
        '200':
          description: Constructed prompt for the stage.
          content:
            application/json:
              schema:
                type: object
                required: [stage_id, stage_type, prompt, prompt_hash]
                properties:
                  stage_id: { $ref: '#/components/schemas/UUID' }
                  stage_type:
                    type: string
                    description: Stage type from the workflow spec (e.g. `implement`, `plan`).
                  prompt:
                    type: string
                    description: Plain-text prompt for the agent.
                  prompt_hash:
                    type: string
                    description: Hex-encoded sha256 of the prompt bytes.
                  agent_timeout_seconds:
                    type: integer
                    description: 'Wall-clock kill cap in seconds; 0 means the runner should apply its own fallback. For implement stages the value is dynamically widened above the spec budget to max(spec budget, approved-plan predicted_runtime_minutes x 2, implement-stage calibration p95 x 1.5), capped at 2x the spec budget; other stages return the spec-resolved value unchanged.'
                  decomposed_from_run_id:
                    type: string
                    format: uuid
                    description: Parent run ID when this run is a decomposed child. Absent for standalone runs. Runners use this with slice_index to route the child onto its own sole-writer slice branch fishhawk/run-<parent>/slice-<n> (ADR-041).
                  slice_index:
                    type: integer
                    description: Decomposed child's 0-based sub_plan position (ADR-041 / #1141), present only for decomposed children. The runner routes the child onto fishhawk/run-<shortID(decomposed_from_run_id)>/slice-<slice_index>. Omitted (treated as 0) for standalone runs and for slice 0.
                  verify_command:
                    type: string
                    description: Shell command for the verify gate; omitted when the spec declares none.
                  verify_timeout_seconds:
                    type: integer
                    description: Wall-clock cap for the verify command in seconds; 0 or absent means the runner applies its 10-minute fallback.
                  verify_max_iterations:
                    type: integer
                    description: Verify-fix loop budget from executor.verify.max_iterations; 0 or absent preserves the single-shot demote-on-failure gate, >0 caps the total verify-fix agent invocations across the stage.
                  min_runner_version:
                    type: string
                    description: Minimum runner version the backend requires; absent when the backend has no constraint. Runners older than this value must exit with code 3 (version_skew) rather than invoking the agent.
                  scope_files:
                    type: array
                    description: |
                      The approved plan's `scope.files`, echoed on implement
                      stages so the runner can bound the commit to exactly
                      these declared paths instead of `git add -A` (#581).
                      Absent when no approved plan is available
                      (`plan_missing_for_implement`) ‚Äî the runner falls back
                      to staging every change. Dirty-but-undeclared paths are
                      excluded from the commit and flagged as scope drift
                      (non-blocking).
                    items:
                      type: object
                      required: [path, operation]
                      properties:
                        path:
                          type: string
                          description: Repo-relative path the agent declared it would touch.
                        operation:
                          type: string
                          enum: [create, modify, delete]
                          description: Per-file intent from the standard_v1 plan scope.files entry.
                  scope_exemptions:
                    type: array
                    description: |
                      Operator `exempt_scope_files` for a recovery run
                      (#1229), echoed on the implement stage so the runner's
                      `MissingScopeFiles` shortfall gate subtracts each
                      operator-justified-unchanged declared path ‚Äî the inverse
                      of `add_scope_files` (it subtracts from the gate, it does
                      not widen scope). Resolved from the run's own
                      `plan_reused_from` provenance; absent on every
                      non-recovery run.
                    items:
                      type: object
                      required: [path, reason]
                      properties:
                        path:
                          type: string
                          description: Repo-relative declared scope.files path marked operator-justified-unchanged.
                        reason:
                          type: string
                          description: Operator justification for leaving the declared path unchanged.
                  diff_coverage:
                    type: object
                    required: [command, report_path, min_new_line_coverage]
                    description: |
                      The stage's spec-declared workflow-v1.6 `diff_coverage`
                      constraint (ADR-059 / #1888), echoed so the runner knows
                      what coverage command to run, where it writes its report,
                      and what threshold the BACKEND will hold the measurement
                      to. The runner MEASURES and emits the result as
                      `gate_evidence`; the backend re-evaluates the threshold
                      from the uploaded bundle and owns the category-B verdict.
                      Absent when the stage does not declare the constraint ‚Äî
                      the runner then runs no coverage command and the gate
                      never fires, byte-identical to before #1888.
                    properties:
                      command:
                        type: string
                        description: |
                          Shell command (`sh -c`) that produces the coverage
                          report. It runs from the repo root of a THROWAWAY
                          `git worktree` checkout of the stage's committed
                          tree, under the same containment as the verify gate:
                          bounded timeout, process-group kill, the runner's
                          default-deny gate-env allow-list, and a disposable
                          checkout so its filesystem side effects never reach
                          the real working tree.
                      report_path:
                        type: string
                        description: Repo-relative path the command writes the coverage report to. Validated repo-relative at spec-parse time.
                      format:
                        type: string
                        enum: [lcov]
                        description: Coverage report format. `lcov` is the only v1.6 member. Absent means lcov (the schema default).
                      min_new_line_coverage:
                        type: integer
                        minimum: 0
                        maximum: 100
                        description: Minimum percentage of the stage's ADDED lines the report must show as executed. Compared with `>=`, so a measurement exactly at the threshold passes.
                      base_ref:
                        type: string
                        description: |
                          Git ref the stage's diff is taken against (merge-base
                          semantics). Absent means the run's base branch, which
                          the RUNNER resolves at measurement time
                          (`--base-branch` > `GITHUB_REF_NAME` > `main`); an
                          empty ref never reaches git.
                  implement_model:
                    type: string
                    description: |
                      The backend-resolved implement model id (#1013), echoed
                      on implement stages so the runner pins the agent spawn to
                      it (`--model <implement_model>`). Resolved through the
                      implement-model ladder: operator gate decision < plan
                      `model_recommendation.implement_model` < spec
                      `executor.model` < deployment default. Absent when no rung
                      supplied a model ‚Äî the runner leaves the model unset and
                      the agent spawns on the adapter's built-in default,
                      byte-identical to today.
                  commit_author_name:
                    type: string
                    description: |
                      The GitHub App bot account's git author name
                      (`<app-slug>[bot]`), resolved backend-side from the App
                      so App-backed commits attribute to the App's bot account
                      (#722). Absent when the backend can't resolve it (no App
                      JWT, dev/CLI) ‚Äî the runner falls back to its default bot
                      identity.
                  commit_author_email:
                    type: string
                    description: |
                      The GitHub App bot account's git author email
                      (`<bot-user-id>+<app-slug>[bot]@users.noreply.github.com`),
                      paired with `commit_author_name` (#722). Absent under the
                      same conditions; the runner falls back to its default.
                  fixup:
                    type: boolean
                    description: |
                      True when this implement stage is an operator-triggered
                      implement-review fix-up pass (#762/#784): an unconsumed
                      `stage_fixup_triggered` audit entry routed review concerns
                      back to this stage. The runner takes its same-branch
                      `RebaseFromRemote` path (fetch + checkout + pull --rebase
                      on `fixup_branch`) and updates the open PR rather than
                      opening a new one. Absent on a normal implement dispatch ‚Äî
                      branch routing falls through to the per-stage branch.
                  fixup_branch:
                    type: string
                    description: |
                      The existing PR branch a fix-up pass commits onto. Present
                      only when `fixup` is true. Derived to match the runner's
                      branch formula exactly: non-decomposed
                      `fishhawk/run-<shortID(run_id)>/stage-<shortID(stage_id)>`,
                      decomposed `fishhawk/run-<shortID(decomposed_from_run_id)>`
                      (shortID = first 8 chars of the UUID). A divergence would
                      re-create the `checkout -b <existing branch>` failure
                      (#784).
                  fixup_expected_head_sha:
                    type: string
                    description: |
                      The run's recorded head SHA ‚Äî the newest `head_sha`
                      across the run's reported-head ledger entries
                      (`pull_request_opened` / `child_pushed` /
                      `fixup_pushed`), the same audit source the ADR-035
                      branch-lineage verifier treats as the run's legitimate
                      tips. Present only when `fixup` is true and resolution
                      succeeded. Before invoking the agent the runner fetches
                      + checks out `fixup_branch` and fails fast when the
                      fetched tip differs from this value (#967). Absent
                      (older backend, or backend-side resolution failure)
                      means the runner proceeds with checkout only, skipping
                      the comparison.
                  egress_target_hosts:
                    type: array
                    items: { type: string }
                    description: |
                      The acceptance stage's FULL spec-declared egress
                      target-host list (the E31.4/#1532 grammar), each a host
                      or host:port, served ONLY on acceptance stages (E31.7 /
                      #1535). The runner feeds it into the ADR-050 egress
                      proxy's allow-list before spawning the acceptance agent.
                      Distinct from the prompt text's target-instance line,
                      which renders only the first host. Absent on every other
                      stage type, and on an acceptance stage whose spec
                      declares no egress block ‚Äî the proxy then admits only
                      model + backend hosts (fail-closed).
                  acceptance_criteria_ids:
                    type: array
                    items: { type: string }
                    description: |
                      The approved plan's `verification.acceptance_criteria`
                      id list (the E31.1 join keys) in plan order, served ONLY
                      on acceptance stages (E31.7 / #1535). The runner
                      validates the acceptance verdict's `criteria[].id` join
                      keys against this set before shipping, failing closed on
                      an unknown id. Absent on every other stage type, and
                      when the approved plan carries no criteria.
                  acceptance_expected_head_sha:
                    type: string
                    description: |
                      The run's merge-candidate identity ‚Äî the newest
                      `head_sha` across the run's reported-head ledger
                      entries (`pull_request_opened` / `child_pushed` /
                      `fixup_pushed`, the same ADR-035 lineage source as
                      `fixup_expected_head_sha`) ‚Äî served ONLY on acceptance
                      stages (E31.18 / #1569). The runner's pre-spawn
                      target-identity gate compares the declared acceptance
                      target's `/healthz` `git_sha` against it before
                      spawning the acceptance agent, so acceptance validates
                      the merge candidate rather than whatever build answers
                      at the declared host. Absent on every other stage type
                      and when backend-side ledger resolution fails ‚Äî the
                      runner then treats the target as unverifiable and
                      warns-and-proceeds.
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: |
            Stage is not in a runnable state, or a decomposed child's slice scope could not be resolved.
          content:
            application/json:
              schema:
                allOf:
                  - { $ref: '#/components/schemas/Error' }
                  - description: |
                      `error.code` is one of:
                      - `stage_not_runnable` ‚Äî the stage is awaiting_approval, awaiting_children, succeeded, failed, or cancelled. `error.details.current_state` holds the stage's current state string and `error.details.stage_id` holds the stage UUID.
                      - `decomposed_scope_unresolved` ‚Äî the run is a decomposed child of a plan that declares a decomposition, but its slice scope could not be resolved (its persisted `slice_index` is out of range for the parent plan's sub_plans, or the matched sub-plan declares no scope files). The dispatch fails closed rather than serving the parent's full scope (#1721). `error.details.run_id` holds the child run UUID, `error.details.slice_index` the child's 0-based slice index (`-1` when the row carries none), and `error.details.parent_run_id` the parent (decomposed_from) run UUID.
        '501':
          description: Prompt construction not implemented for this stage type.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: Backend wiring incomplete (run, signing, or GitHub repo unconfigured).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

