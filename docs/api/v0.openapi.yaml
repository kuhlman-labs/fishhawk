openapi: 3.1.0
info:
  title: Fishhawk Backend API
  version: 0.1.0
  description: |
    The HTTP surface that the Fishhawk backend (`fishhawkd`) exposes to its
    three classes of caller:

    1. **The Web UI and CLI** — humans driving plan review, approval, audit
       search, and run management.
    2. **The runner** — `kuhlman-labs/fishhawk/runner@vX.Y` running on the
       customer's CI, requesting per-run signing keys and shipping signed
       trace bundles.
    3. **GitHub webhooks** — the customer's GitHub App installation pushing
       issue / PR / check events that drive workflow dispatch.

    Per ADR (#46) and `MVP_SPEC.md` §5.1.1, every customer-facing endpoint is
    prefixed with `/v0`. The `v0` prefix is **unstable** by design — the
    surface is allowed to change before v1. Once the v1 surface is published
    (post-Day 21), `/v0` and `/v1` coexist for one minor version cycle to
    let clients migrate, and `/v0` is then retired.

    Webhook ingestion (`/webhooks/github`) is unversioned because GitHub
    controls the request shape; the backend adapts as GitHub's webhook
    schema evolves.

  contact:
    name: Fishhawk
    url: https://github.com/kuhlman-labs/fishhawk
  license:
    name: Apache-2.0
    url: https://github.com/kuhlman-labs/fishhawk/blob/main/LICENSE

servers:
  - url: https://api.fishhawk.dev
    description: Production
  - url: http://localhost:8080
    description: Local dev (docker compose up)

# ---------------------------------------------------------------------------
# Security schemes — three auth models for three caller classes (ADR-005).
# ---------------------------------------------------------------------------
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: fishhawk_session
      description: |
        HTTP-only `Secure; SameSite=Lax` session cookie set by the OAuth
        callback. Same-origin SPA requests are auto-included; CSRF
        protection on state-changing endpoints (POST/PUT/PATCH/DELETE)
        requires an `X-CSRF-Token` request header whose value matches
        the `__Host-csrf` cookie issued alongside the session cookie.
        Mismatched / missing token → `403 csrf_required`. Bearer-token
        clients (see `bearerToken`) are immune to CSRF and bypass the
        header check.

    bearerToken:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: |
        Scoped server-issued token (NOT a JWT). Index into the
        `api_tokens` table; revocation is immediate. Used by the CLI
        and any programmatic caller.

    githubOIDC:
      type: http
      scheme: bearer
      bearerFormat: jwt
      description: |
        GitHub Actions OIDC token for runner authentication. Verified
        by the backend against GitHub's JWKS per request; no server-
        side state. Required by `POST /v0/runs/{run_id}/signing-key`.

  # -------------------------------------------------------------------------
  # Shared schemas. Detailed property schemas grow as endpoints are
  # implemented — what's frozen here is the envelope shape and the
  # canonical types every endpoint returns.
  # -------------------------------------------------------------------------
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: |
                Stable, machine-readable code. Snake-case identifier;
                clients switch on this. New codes are additive; codes
                are never repurposed.
              example: run_not_found
            message:
              type: string
              description: |
                Human-readable description. May change between
                versions; clients should not parse it.
              example: "No run with id 11111111-…"
            details:
              type: object
              additionalProperties: true
              description: |
                Optional code-specific structured fields. The keys
                under `details` are part of the contract for that
                specific code.
      examples:
        - error:
            code: run_not_found
            message: No run with id 11111111-2222-3333-4444-555555555555

    WorkItemRequest:
      type: object
      required: [repo, type, summary]
      description: |
        Provider-neutral work-item filing (#1005). The conventions layer
        turns this into a filed item; only `repo`, `type`, and `summary`
        are required. Unknown properties are rejected.
      additionalProperties: false
      properties:
        repo:
          type: string
          description: Target repository in `owner/name` form.
          example: kuhlman-labs/fishhawk
        type:
          type: string
          description: Work-item type; must be a key in the repo's conventions (e.g. feature, bug, chore, adr).
          example: feature
        summary:
          type: string
          description: |
            Mandatory one-liner: fills the `{summary}` title placeholder
            and is the required Summary field.
          example: Add the widget endpoint
        body:
          type: string
          description: Verbatim body. When omitted, the body is assembled from the type's skeleton + `sections`.
        sections:
          type: object
          additionalProperties: { type: string }
          description: >-
            Per-skeleton-section content keyed by section name; used only when
            `body` is empty. Keys MUST match the type's body skeleton exactly —
            an off-skeleton key fails the filing with `422 work_item_invalid`
            (the content is never silently dropped), and the unknown vs expected
            section names are reported in `details.unknown_sections` /
            `details.expected_sections`.
        title_vars:
          type: object
          additionalProperties: { type: string }
          description: >-
            Title placeholders beyond `{summary}`/`{number}` (e.g. `epic`, `n`).
            An unresolved placeholder fails the filing with `422
            work_item_invalid`, listing the still-missing names in
            `details.missing_placeholders`. For a child type whose
            `title_format` is `[E{epic}.{n}]`, the `{epic}` placeholder is
            auto-derived from the `parent_epic` relation (the parent epic
            issue's leading `[E<n>]` title token is read server-side), so you
            need only supply `{n}`. Derivation fails closed: if the parent has
            no parseable `[E<n>]` token, `{epic}` is left unresolved and the 422
            above is returned rather than a wrong title.
        labels:
          type: array
          items: { type: string }
          description: Labels merged on top of the type's `default_labels`.
        complexity:
          type: string
          description: Overrides the type's default complexity; must be a declared level.
          example: low
        status:
          type: string
          description: Overrides the type's default board status.
          example: Backlog
        relations:
          type: object
          additionalProperties: false
          properties:
            parent_epic: { type: string, description: "Epic this item rolls up to (e.g. `#1005`)." }
            supersedes: { type: array, items: { type: string } }
            companion_to: { type: array, items: { type: string } }
            evidence_runs: { type: array, items: { type: string } }
            depends_on:
              type: array
              items: { type: string }
              description: >-
                Issue references (`#N` or `N`) this item depends on, among the
                epic's children. Persisted as a `Depends on: #X, #Y` body
                marker (GitHub has no native depends_on relation) and read by
                the campaign epic-children query to assemble its wave DAG
                (ADR-047). File-time validation is format-only; cycle and
                existence checks are deferred to campaign-assembly time.
        existing_numbers:
          type: array
          items: { type: integer }
          description: >-
            Optional for a numbered type: the numbers already in use, so the next
            sequential number can be allocated. For the GitHub provider these are
            discovered server-side from the tracker when omitted (#1269); supply
            this list only to override/hint that discovery. A genuine discovery
            failure returns 422 `work_item_invalid` with a `discovery_failed`
            detail rather than allocating a wrong number.
        run_id:
          allOf: [ { $ref: '#/components/schemas/UUID' } ]
          description: Optional in-flight run; when set and non-terminal, a `work_item_filed` audit entry is appended to it.

    WorkItemResponse:
      type: object
      required: [type, title, number, url, provider, boarded, audited]
      description: The created item — exactly what landed, so the caller renders the result without a second fetch.
      properties:
        type: { type: string }
        title: { type: string }
        number: { type: integer, description: Created item number (e.g. GitHub issue number). }
        url: { type: string, description: Created item URL. }
        provider: { type: string, description: Provider id that filed the item. }
        applied_labels: { type: array, items: { type: string } }
        complexity: { type: string }
        status: { type: string }
        board_column: { type: string }
        boarded:
          type: boolean
          description: >-
            Whether the created item was placed on the configured project board with its
            status set (#1107). Best-effort: board placement no longer fails the filing — when
            it fails, the item is still created and this is `false` with the cause in
            `boarding_error` (also WARN-logged server-side). `false` with no `boarding_error`
            means no project board was configured (nothing to board).
        epic_linked:
          type: boolean
          description: >-
            Whether the parent epic was linked as a sub-issue (#1107). Best-effort like
            `boarded`: a link failure does not fail the filing — this is `false` with the cause
            in `epic_link_error`. `false` with no `epic_link_error` means no parent epic was
            requested.
        boarding_error:
          type: string
          description: The cause when best-effort board placement failed (#1107); absent on success.
        epic_link_error:
          type: string
          description: The cause when best-effort epic linking failed (#1107); absent on success.
        audited:
          type: boolean
          description: True when a `work_item_filed` audit entry was written (a run was in flight).

    Pagination:
      type: object
      description: |
        Cursor-based pagination envelope wrapped around list endpoints.
        `next_cursor` is null when the caller has reached the end. The
        cursor is opaque; clients pass it back unmodified.
      required: [items]
      properties:
        items:
          type: array
          items: {}
        next_cursor:
          type: [string, "null"]

    UUID:
      type: string
      format: uuid

    ScopeAmendment:
      type: object
      description: |
        One mid-stage scope amendment request (E22.X / #961): the
        implement agent's ask to fold specific file paths into the
        stage's effective `scope.files` while the stage is running,
        plus the operator's decision once made. Approved paths fold
        into the prompt-fetch scope AND the runner's pre-commit scope
        refresh, so the verified-tree gates verify the same folded
        tree that is pushed (#960). Denied/pending paths confer
        nothing; any undeclared created file still fails category-B
        (#818/#825).
      required: [id, run_id, stage_id, paths, reason, status, requested_at]
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        run_id: { $ref: '#/components/schemas/UUID' }
        stage_id:
          allOf: [{ $ref: '#/components/schemas/UUID' }]
          description: The executing implement stage the request hangs off.
        paths:
          type: array
          minItems: 1
          items:
            type: object
            required: [path, operation]
            properties:
              path:
                type: string
                description: |
                  Repo-relative path. Absolute paths and `..` segments
                  are rejected (400 `validation_failed`).
              operation:
                type: string
                enum: [modify, create]
        reason:
          type: string
          description: The agent's rationale for needing the paths.
        status:
          type: string
          enum: [pending, approved, denied]
        decision_reason:
          type: string
          description: Operator note; delivered to the agent verbatim on deny.
        decided_by:
          type: string
          description: Operator subject (never a run-bound token).
        requested_at:
          type: string
          format: date-time
        decided_at:
          type: string
          format: date-time
        effective_scope_files_after_approval:
          type: integer
          description: |
            Scope-cap headroom (#983), warn-only: the run's effective
            scope file count (plan `scope.files` ∪ approve-time
            `add_scope_files` ∪ approved amendments ∪ this
            amendment's paths, deduped by exact path) if this
            amendment is approved. Compare against
            `max_files_changed` — exceeding it means the
            post-implement gate may fail category-B as scoped, but
            the approve still succeeds (mid-stage amendments are
            often forced). Present on request/decision responses and
            on PENDING items in the list; absent when no cap is
            configured or the computation failed open.
        max_files_changed:
          type: integer
          description: |
            The implement stage's resolved `max_files_changed` cap
            (#983). Absent when no cap is configured or the
            computation failed open.

    Run:
      type: object
      description: |
        A workflow run record. State follows the explicit transition
        table in `backend/internal/run/transition.go`.
      required:
        [id, repo, workflow_id, workflow_sha, trigger_source, state,
         retry_attempt, max_retries_snapshot, runner_kind,
         runner_kind_resolved, drive, cost_usd_total, resolved_model,
         created_at, updated_at]
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        repo:
          type: string
          example: kuhlman-labs/fishhawk
        workflow_id:
          type: string
          example: feature_change
          description: Matches a top-level key in `.fishhawk/workflows.yaml`.
        workflow_sha:
          type: string
          description: Git SHA of `.fishhawk/workflows.yaml` at run time.
        trigger_source:
          type: string
          enum: [github_issue, cli, ui]
        trigger_ref:
          type: [string, "null"]
          example: "issue:1247"
        state:
          type: string
          enum: [pending, running, succeeded, failed, cancelled]
        parent_run_id:
          type: [string, "null"]
          format: uuid
          description: |
            Set by the dispatcher when a non-terminal run already
            existed for the same `(repo, trigger_ref)` at create
            time (#216). Lets the SPA render "follow-up to
            <short-id>" + a thread of related runs.
        decomposed_from:
          type: [string, "null"]
          format: uuid
          description: |
            Set when the orchestrator minted this run as a child of
            a decomposed parent plan (#455 / ADR-025 D4). Disambiguates
            "decomposition child" from `parent_run_id`'s CI-retry-chain
            semantic — both can be non-nil on a child whose CI failed
            and re-dispatched. SPA breadcrumb: "decomposed sub-plan of
            <parent short id>".
        upstream_run_id:
          type: [string, "null"]
          format: uuid
          description: |
            The upstream `feature_change` run whose `ci_green` /
            `review_merged` a standalone deploy-only `release` run's
            `required_upstream` pre-flight gate evaluates (E23.11 /
            #1417). A deploy-only run has no implement/review stage of
            its own, so the gate evaluates the referenced upstream
            instead; null (the appended-deploy / non-deploy default)
            leaves the gate evaluating the current run. DISTINCT from
            `parent_run_id` (#216): a deploy-gate safety reference, NOT
            a follow-up/lineage link — it carries none of the
            get_plan-resolution / resume-retry / decomposition
            provenance semantics `parent_run_id` does.
        pull_request_url:
          type: [string, "null"]
          description: |
            Set when the implement stage produces a `pull_request`
            artifact (#216). Denormalized so the threaded-runs view
            can group every run on a PR with a single equality
            filter on `GET /v0/runs?pull_request_url=…`.
          example: https://github.com/kuhlman-labs/fishhawk/pull/123
        retry_attempt:
          type: integer
          minimum: 0
          description: |
            Position in the CI-failure auto-retry chain (#279 /
            E16). 0 for the canonical first attempt; N for the Nth
            retry. Capped by `max_retries_snapshot` — the
            dispatcher refuses to create a new child when
            `retry_attempt >= max_retries_snapshot` and emits a
            `ci_retry_exhausted` audit row.
          example: 0
        max_retries_snapshot:
          type: integer
          minimum: 0
          description: |
            The workflow's `on_ci_failure.max_retries` cap at
            run-create time (#280 / E16). Snapshotted alongside
            `required_checks_snapshot` so a spec edit during a
            long-running auto-retry chain doesn't shift the
            goalposts on what the SPA renders. Defaults to 1 when
            the workflow has no `on_ci_failure:` block.
          example: 1
        runner_kind:
          type: string
          enum: [github_actions, local]
          description: |
            Execution backend the run uses (ADR-022 / #388). Today's
            published runner (`fishhawk/runner@v1`) on GitHub Actions
            is `github_actions`; the operator-local dev-loop runner
            (Phase C of E22 / #389) is `local`. The backend assigns
            this at run-create time based on the dispatch path; the
            runner never self-declares. Compliance consumers can
            filter to `github_actions` to reproduce the
            pre-pluggable-backends view via
            `GET /v0/runs?runner_kind=github_actions`.
          example: github_actions
        runner_kind_resolved:
          type: boolean
          description: |
            Whether `runner_kind` has been LOCKED by the run's first
            signed runner self-report (#1346 / #1348). `false` for the
            un-resolved create-time hint and for legacy rows; `true`
            once the first dispatch's signed self-report fixed the
            execution channel. The host-dispatch mismatch guardrail
            (#1355) reads this so it engages only against an
            already-resolved conflicting kind — an un-resolved run is
            always allowed to dispatch so first-dispatch auto-resolve
            still fires.
          example: false
        drive:
          type: boolean
          description: |
            Drive-mode opt-in (#1023 / #996 theme 1): when true,
            fishhawkd auto-advances the run's mechanical transitions
            and records a `run_auto_advanced` audit entry per advance;
            judgment points (gate approvals, concern routing, merge)
            always park. Resolved at run-create time — the workflow
            spec's `drive` default overridden by the request's `drive`
            field — and snapshotted on the row so a spec edit mid-run
            doesn't change an in-flight run's behavior. `false` for
            legacy rows (migration 0031). The recorded transitions
            surface on `GET /v0/runs/{run_id}` as `auto_advanced` +
            `next_action` + `derived_status`.
          example: false
        issue_context:
          $ref: '#/components/schemas/IssueContext'
          description: |
            Cached payload from the operator's `gh issue view`
            (#415). Populated for issue-triggered runs minted
            outside the webhook flow (CLI / MCP) so the prompt
            builder reads the title + body from the row instead
            of refetching from GitHub. Null on webhook-dispatched
            runs (which fetch fresh from GitHub at prompt-build
            time) and on non-issue triggers.
        cost_usd_total:
          type: number
          format: double
          minimum: 0
          description: |
            Rolled estimated US-dollar cost of the run's model usage
            (#649), accumulated from each stage bundle's signed manifest
            token counts via the shared pricing table. Recorded once per
            stage bundle (the raw trace variant only — see #678). 0 for
            legacy rows that predate the rollup.
          example: 2.99
        resolved_model:
          type: string
          description: |
            Pinned agent model id the run executed under (#649), stamped
            from the trace manifest at cost-rollup time. Empty string for
            legacy/unstamped runs.
          example: claude-opus-4-8
        concerns:
          $ref: '#/components/schemas/RunConcerns'
          description: |
            Summary of the run's OPEN review concerns (#964): count,
            per-state breakdown, and the stable concern IDs the fix-up
            endpoint's `concern_ids` addressing consumes. Emitted by
            `GET /v0/runs/{run_id}` ONLY — the list endpoint omits it
            (no per-row concern query) — and omitted when the run has
            no open concerns.
        derived_status:
          type: string
          enum: [awaiting_merge, ci_failed]
          description: |
            Presentation-only drive-mode status (#1023):
            `awaiting_merge` while a non-terminal drive run with an
            open PR has `checks_green_awaiting_merge` as its latest
            recorded auto-advance — every gate resolved, required
            checks green, merge (a judgment point) parked for the
            operator. `ci_failed` is its negative mirror (#1045): a
            non-terminal drive run with an open PR whose latest
            auto-advance is `ci_failed` — the review evidence settled
            but a required PR check concluded red, parking the run for
            operator classification (fix-up, an operator commit +
            vouch, or a checks re-run). Never a persisted run state:
            `state` stays `running` while parked here, and the
            transition table in `backend/internal/run/transition.go` is
            unchanged. Emitted by `GET /v0/runs/{run_id}` ONLY
            (distilled from `run_auto_advanced` audit entries, same
            single-read posture as `concerns`); omitted on non-drive
            runs, terminal runs, and whenever a later transition
            superseded the parked status.
        next_action:
          $ref: '#/components/schemas/RunNextAction'
          description: |
            Distilled operator next step (#1023) from the run's most
            recent `run_auto_advanced` audit entry — what (if
            anything) the drive run is waiting on the operator for.
            Emitted by `GET /v0/runs/{run_id}` ONLY; omitted on
            non-drive runs, terminal runs (the recorded step is
            history, not an instruction), and when the latest
            auto-advance carries no next action.
        auto_advanced:
          type: array
          items:
            $ref: '#/components/schemas/RunAutoAdvance'
          description: |
            The run's auto-advanced (or parked-with-next-action)
            transitions (#1023), distilled oldest-first from its
            `run_auto_advanced` audit entries so the operator sees
            which transitions advanced themselves. Emitted by
            `GET /v0/runs/{run_id}` ONLY — the list endpoint omits it
            (no per-row audit query) — and omitted when no drive
            transitions were recorded.
        delegation:
          $ref: '#/components/schemas/RunDelegation'
          description: |
            Evaluated `operator_agent` delegation surface (ADR-040 /
            #1026): one entry per configured `may_*` knob with whether
            current run state satisfies its named condition, plus the
            effective block's `must_page_human` list — so the operator
            agent reads its envelope from the server instead of
            re-deriving conditions client-side. Emitted by
            `GET /v0/runs/{run_id}` ONLY (no per-row evaluation on the
            list endpoint); omitted entirely when the run's workflow
            spec resolves no effective `operator_agent` block
            (fail-closed: nothing is delegated), on terminal runs, on
            legacy rows with no cached spec, and best-effort on any
            evaluation failure. Advisory on this read — the delegated
            action endpoints re-evaluate the condition server-side at
            action time and never trust a client-supplied verdict.
        lineage_complete:
          type: boolean
          description: |
            Lineage-completion signal (E22.X / #1137): true when the
            lineage-root run (a decomposed child's parent, else the run
            itself) is terminal AND every decomposed child of that root is
            terminal, derived from the existing `decomposed_from` child
            graph. The operator-local runner's per-run worktree sweep
            reads it to reclaim a terminal lineage's shared git worktree
            (keyed on the lineage root) at the next provision. Emitted by
            `GET /v0/runs/{run_id}` ONLY (a per-run child-graph query, same
            single-read posture as `concerns`); omitted on the list
            endpoint and whenever the graph can't be read (no run repo /
            read failure).
        fixup_model:
          $ref: '#/components/schemas/RunFixupModel'
          description: |
            The model the run's most-recent fix-up pass ran under (#1164),
            distilled from the newest `stage_fixup_triggered` audit entry's
            pinned model. Emitted by `GET /v0/runs/{run_id}` ONLY (a single
            audit read, same single-read posture as `concerns`); omitted on
            the list endpoint and when the run has had no fix-up (or the pin
            predates #1164).
        security_findings:
          type: array
          items:
            $ref: '#/components/schemas/SecurityFinding'
          description: |
            The run's unresolved high-severity code-scanning (CodeQL/SAST)
            findings on the implement diff (#1096), distilled from the newest
            `implement_security_findings` audit entry (the webhook ingest
            records ONE idempotent entry per scan, floored on the latest
            fix-up, so the newest entry reflects the current scan state). A
            SEPARATE signal from `concerns`: a finding here is held by its own
            merge gate (`security_findings_unresolved`) and routed to its own
            fix-up pass, never consuming a design-concern budget. Emitted by
            `GET /v0/runs/{run_id}` ONLY (a single audit read, same single-read
            posture as `concerns`); omitted on the list endpoint and when the
            run has no findings (no scan yet, a clean scan, or a clean re-scan
            after a fix-up cleared them).
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    RunFixupModel:
      type: object
      description: |
        The model a fix-up pass ran under (#1164): the source-tagged model
        plus the 1-based pass ordinal it was pinned on. Surfaced on
        `GET /v0/runs/{run_id}` only.
      required: [model, source, pass_ordinal]
      properties:
        model:
          type: string
          description: |
            The resolved fix-up model id. Empty string when the pass ran on
            the adapter's built-in default spawn (the empty-ladder pin).
        source:
          type: string
          description: |
            Which rung supplied the model: `operator` for an `implement_model`
            override, else the inherited source (`default` / `spec` / `plan`),
            or empty for the default spawn.
        pass_ordinal:
          type: integer
          minimum: 1
          description: The 1-based fix-up pass ordinal this model was pinned on.

    SecurityFinding:
      type: object
      description: |
        One high-severity GitHub code-scanning (CodeQL/SAST) finding on the
        implement diff (#1096): the subset a reviewer/operator needs to locate
        and open the alert. Surfaced on `GET /v0/runs/{run_id}` only.
      required: [number, rule_id, severity, path]
      properties:
        number:
          type: integer
          description: The alert's per-repo identifier.
        rule_id:
          type: string
          description: The analysis rule that fired (e.g. `go/sql-injection`).
        description:
          type: string
          description: Human-facing rule description.
        severity:
          type: string
          description: |
            Normalized security-severity level — `critical` or `high` (the
            gating levels; medium/low/none never surface here).
        state:
          type: string
          description: 'Alert state: `open`, `fixed`, or `dismissed`.'
        path:
          type: string
          description: Repo-relative file the finding's most-recent instance points at.
        start_line:
          type: integer
          description: 1-based line of the finding; omitted/0 when GitHub omits a location.
        html_url:
          type: string
          description: Link to the alert on GitHub.

    RunConcerns:
      type: object
      description: |
        A run's OPEN review concerns (#964) — states `raised`,
        `addressed_pending`, `reopened`. Every `plan_reviewed` /
        `implement_reviewed` verdict's concerns are persisted with
        server-minted stable UUIDs; this block surfaces what is still
        unresolved plus the IDs fix-up routing needs, in one read. Note
        text is intentionally elided (bounded payload) — read the
        originating `*_reviewed` audit entry for the full note.
      required: [open, by_state, items]
      properties:
        open:
          type: integer
          minimum: 0
          description: Number of open concerns on the run.
        by_state:
          type: object
          additionalProperties:
            type: integer
          description: Open-concern count per lifecycle state.
          example: { raised: 2, addressed_pending: 1 }
        items:
          type: array
          items:
            $ref: '#/components/schemas/RunConcernItem'

    RunConcernItem:
      type: object
      description: One open review concern.
      required: [id, stage_kind, severity, category, state, has_suggested_patch]
      properties:
        id:
          $ref: '#/components/schemas/UUID'
          description: |
            Stable server-minted concern ID — the primary addressing
            scheme for the fix-up endpoint's `concern_ids` (positional
            indices are deprecated).
        stage_kind:
          type: string
          enum: [plan, implement]
          description: |
            Stage the concern originated from. Only implement-stage
            concerns can be routed into an implement fix-up.
        severity:
          type: string
          description: |
            Reviewer-emitted severity, stored verbatim (tolerant
            decode — typically high/medium/low).
        category:
          type: string
          example: scope
        state:
          type: string
          description: |
            Lifecycle state. Open states are raised, addressed_pending,
            reopened; the full enum adds addressed, waived, superseded
            (closed states never appear in this block). `waived` is
            operator-reachable via `POST /v0/concerns/{concern_id}/waive`
            (#984); `addressed`/`reopened`/`superseded` are reached by
            reviewer `concern_resolutions` on a re-review.
        has_suggested_patch:
          type: boolean
          description: |
            Whether the reviewer attached a mechanical `suggested_patch`
            (a unified diff) to this concern (#1165). Only the boolean is
            surfaced — the diff text stays elided like the note. A routed
            fix-up whose concerns all carry a patch can be resolved by the
            near-deterministic apply path instead of a full agent loop.

    RunNextAction:
      type: object
      description: |
        The distilled operator next step on a drive run (#1023),
        recorded by the drive engine alongside an auto-advance or a
        park. Mirrors the `next_action` payload inside
        `run_auto_advanced` audit entries.
      required: [action]
      properties:
        action:
          type: string
          description: |
            Machine-readable next step. Current values:
            `run_implement_stage` (runner_kind `local` — dispatch the
            implement stage from the operator host), `run_plan_stage`
            (runner_kind `local` after a plan-gate revise re-opened the
            plan stage — re-dispatch it from the operator host, #1256),
            and `merge_pr` (all gates resolved, required checks green).
            `run_implement_stage` / `run_plan_stage` are now ALSO produced
            by the `retry_stage` and `resume_run`/`recover` re-open paths
            on a `local` run (#1271), not only by plan-approve and revise;
            no new action value is introduced.
          example: merge_pr
        detail:
          type: string
          description: One-line elaboration of the action.
        pr_url:
          type: string
          description: The pull request the action refers to, when relevant.
          example: https://github.com/kuhlman-labs/fishhawk/pull/123

    RunAutoAdvance:
      type: object
      description: |
        One drive-engine transition (#1023), distilled from a
        `run_auto_advanced` audit entry: the named rule that fired and
        the from/to edge it stamps. Rule names are a closed set
        (`backend/internal/drive`): `plan_approved_dispatch`,
        `revise_replan` (a plan-gate revise re-opened the plan stage,
        #1256), `retry_reopen` (a failed stage was retried back into
        pending and re-dispatched, #1271), `recover_redispatch` (a failed
        decomposition child was re-driven in place, #1271),
        `reviews_settled_gate`, `fixup_rereview_repark`,
        `checks_green_awaiting_merge`, `ci_failed` (the negative mirror
        of `checks_green_awaiting_merge`: a required PR check concluded
        red).
      required: [rule, from, to, ts]
      properties:
        rule:
          type: string
          description: The named drive rule that fired.
          example: plan_approved_dispatch
        from:
          type: string
          description: The transition's from edge.
          example: "plan:approved"
        to:
          type: string
          description: The transition's to edge.
          example: "implement:dispatched"
        parked:
          type: boolean
          description: |
            True when the mechanical rule could not be
            backend-executed (the runner_kind `local` dispatch — the
            runner is host-spawned per ADR-024) and the entry records
            a park-with-next-action instead of an executed advance.
            Absent/false for executed advances.
        ts:
          type: string
          format: date-time
          description: When the transition was recorded.

    RunDelegation:
      type: object
      description: |
        The run's evaluated `operator_agent` delegation envelope
        (ADR-040 / #1026). The effective block resolves per the spec's
        precedence — the pending approval gate's block when one is
        declared, else the workflow-level block, never merged — and
        each configured knob is evaluated against current run state by
        `backend/internal/delegation`.
      required: [actions]
      properties:
        actions:
          type: array
          items:
            $ref: '#/components/schemas/RunDelegationAction'
          description: |
            One entry per configured `may_*` knob, in knob order
            (approve, route_fixup, waive, retry, merge). Knobs the
            block leaves unset are absent — fail-closed, those actions
            are not delegated.
        must_page_human:
          type: array
          items:
            type: string
          description: |
            The effective block's `must_page_human` event list —
            events that always page the human regardless of the
            `may_*` knobs (closed set per the workflow-v0 schema, e.g.
            `reviewer_reject`, `gating_reviewer_reject`,
            `advisory_reviewer_reject`, `plan_rejection`). The explicit
            reviewer-reject classes (workflow-v0.7+, #1378) make the
            taxonomy self-documenting; the legacy bare `reviewer_reject`
            resolves to the gating sense.
          example: [reviewer_reject, budget_override]
        reviewer_reject_class:
          type: string
          enum: [gating_reviewer_reject, advisory_reviewer_reject]
          description: |
            The reviewer-reject page-event class the run currently
            resolves to (#1378), from the implement stage's ADR-027
            review authority: `gating_reviewer_reject` (agent-only
            review — a reject pages the human) or
            `advisory_reviewer_reject` (agent + human — a reject is
            arbitrable / auto-routed). Omitted when the implement stage
            is gateless (no agent reviewers). This only makes the
            authority-resolved class legible; it does not change the
            page/auto decision.
          example: gating_reviewer_reject
        model_policy:
          $ref: '#/components/schemas/RunDelegationModelPolicy'

    RunDelegationModelPolicy:
      type: object
      description: |
        The effective `operator_agent` block's scenario-A
        model-selection contract (#1421), passed through as static
        config for the operator agent to read and apply via the existing
        per-stage model override channels (#1416), bounded by — never
        widening — the deployment per-adapter allow-list. Declarative
        only: no backend resolution code reads it. Omitted entirely when
        the effective block declares no `model_policy`, keeping
        unconfigured responses byte-identical. Inherited under the same
        wholesale-override semantics as the `may_*` knobs (a gate-level
        block replaces the workflow-level one; never merged).
      properties:
        strategy:
          type: string
          enum: [follow_plan_recommendation, explicit_defaults]
          description: |
            How the operator agent picks each stage's model.
            `follow_plan_recommendation` follows the plan artifact's
            per-stage recommendation; `explicit_defaults` applies the
            `defaults` map, falling back to the deployment default for
            any unset stage.
          example: explicit_defaults
        defaults:
          type: object
          description: |
            Per-stage model applied under the `explicit_defaults`
            strategy. Each field optional; an unset stage falls back to
            the deployment default.
          properties:
            plan:
              type: string
            implement:
              type: string
            review:
              type: string
        allowed:
          type: array
          items:
            type: string
          description: |
            The models the operator agent may select. Composes with —
            never widens — the deployment per-adapter allow-list.
          example: [claude-opus-4-8, claude-sonnet-4-6, gpt-5.5]

    RunDelegationAction:
      type: object
      description: One delegation knob's evaluation.
      required: [action, condition, met]
      properties:
        action:
          type: string
          enum: [approve, route_fixup, waive, retry, merge]
          description: The delegable operator verb the knob governs.
        condition:
          type: string
          enum:
            - clean_dual_approval
            - convergent_concerns
            - solo_low
            - infra_flake
            - gates_resolved_ci_green
          description: |
            The named backend-evaluable condition the knob delegates
            under (one per knob in v0, closed set per the workflow-v0
            schema).
        met:
          type: boolean
          description: |
            Whether current run state satisfies the condition. `met:
            true` here is advisory — the delegated action endpoints
            re-evaluate server-side at action time.
        unmet_reason:
          type: string
          description: |
            The exact failed predicate when `met` is false, prefixed
            with the condition name. Omitted when met.
          example: "clean_dual_approval: 1 of 2 reviewer verdicts received"

    Campaign:
      type: object
      description: |
        A campaign: the parent record of an epic-driven multi-issue run
        (ADR-047 / #1437). It owns an ordered set of campaign items, one per
        issue under the epic. State is a reduction of its items' states (see
        `backend/internal/campaign/transition.go`).
      required: [id, repo, epic_ref, state, pause_policy, created_at, updated_at]
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        repo:
          type: string
          example: kuhlman-labs/fishhawk
        epic_ref:
          type: string
          description: The epic the campaign decomposes, in `issue:N` form.
          example: "issue:1439"
        state:
          type: string
          enum: [pending, running, paused, succeeded, failed, cancelled]
          description: |
            `paused` is the E25.7 safety-boundary overlay: the auto-driver
            paused the campaign when a run gate was handed off to a human.
            It is non-terminal — `POST /resume` returns it to `running`.
        pause_policy:
          type: string
          enum: [pause_campaign, pause_item]
          description: |
            What the auto-driver pauses on a gate hand-off (E25.7).
            `pause_campaign` (the default) blocks the whole campaign;
            `pause_item` pauses only the affected item (continue-others).
            Always present and normalized on a persisted campaign.
        operator_agent:
          type: object
          additionalProperties: true
          description: |
            OPTIONAL campaign-level `operator_agent` delegation override
            (E25.12). The same block shape the workflow spec carries
            (`may_approve`, `may_route_fixup`, `may_waive`, `may_retry`,
            `may_merge`, `must_page_human`, `model_policy`). When present it
            wins WHOLESALE as the outermost rung of the resolution ladder —
            campaign > gate > workflow, never merged — so it is each
            issue-run's effective delegation contract. Omitted when the
            campaign carries no override: every issue-run then inherits its
            workflow's contract, byte-identical to pre-E25.12 behavior.
        idempotent:
          type: boolean
          description: |
            Present and `true` ONLY on an idempotent-replay response (E25.13):
            a `POST /v0/campaigns` whose `Idempotency-Key` resolved to an
            existing campaign, returned `200` instead of `201`. Omitted on a
            fresh create (201) and on GET/list/status, so those are
            byte-identical to pre-E25.13 output.
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CampaignItem:
      type: object
      description: |
        One issue within a campaign. `depends_on` holds the sibling issue
        refs this item waits on (the campaign DAG edges); `run_id` is the
        nullable link to the run executing the item, absent until a run is
        assigned.
      required: [id, issue_ref, depends_on, state, created_at, updated_at]
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        issue_ref:
          type: string
          example: "issue:1441"
        depends_on:
          type: array
          items: { type: string }
          description: Sibling issue refs this item depends on (possibly empty).
        run_id:
          $ref: '#/components/schemas/UUID'
          description: |
            The run executing this item. Omitted while the item is unlinked
            (the pre-dispatch default).
        state:
          type: string
          enum: [pending, blocked, running, paused, succeeded, failed, cancelled]
          description: |
            `paused` (E25.7) means the auto-driver handed this item's gate off
            to a human; it carries a `pause_reason` and re-engages on resume.
        pause_reason:
          type: object
          description: |
            Why a paused item was handed off to a human (E25.7). Present only
            while the item is — or was — paused.
          properties:
            page_event:
              type: string
              description: The audit category that triggered the page (e.g. `campaign_gate_paged`).
            run_id:
              $ref: '#/components/schemas/UUID'
              description: The run whose gate was handed off.
            stage_id:
              $ref: '#/components/schemas/UUID'
              description: The gate's stage, if any.
            gate:
              type: string
              description: The gate/decision the human must own.
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CampaignRollup:
      type: object
      description: |
        The engine's readiness partition over a campaign's items
        (`campaign.NextEligible`). Every slice holds issue refs; an item
        appears in exactly one slice. Each field is always an array (never
        null).
      required: [eligible, blocked, running, done, failed, cancelled, paused]
      properties:
        eligible:
          type: array
          items: { type: string }
          description: No run yet and every dependency succeeded — ready to dispatch.
        blocked:
          type: array
          items: { type: string }
          description: No run yet, but at least one dependency is not yet done.
        running:
          type: array
          items: { type: string }
          description: Linked to a run that has not reached a terminal item state.
        done:
          type: array
          items: { type: string }
        failed:
          type: array
          items: { type: string }
        cancelled:
          type: array
          items: { type: string }
        paused:
          type: array
          items: { type: string }
          description: Handed off to a human by the auto-driver (E25.7); resumes on `POST /resume`.

    CampaignNextAction:
      type: object
      description: |
        The single next step for the operator-agent, distilled from the
        rollup partition. PRECEDENCE is FAILED-wins and strict: a failed item
        yields `attention` REGARDLESS of whether eligible items also exist;
        only with zero failed items does an eligible item yield `start_run`.
      required: [action]
      properties:
        action:
          type: string
          enum: [attention, resume, start_run, wait, complete]
          description: |
            `attention` — a failed item needs operator intervention
            (retry/abandon); takes precedence over everything else.
            `resume` — a paused item was handed off to a human at a run gate
            (E25.7); handle the gate then `POST /resume`. Ranked above
            `start_run` so a hand-off is surfaced before new dispatch.
            `start_run` — the next eligible item is ready to dispatch.
            `wait` — items are running or blocked; nothing to do yet.
            `complete` — every item reached a terminal state.
        issue_ref:
          type: string
          description: |
            The item the action refers to — the first failed item for
            `attention`, the first paused item for `resume`, the first eligible
            item for `start_run`. Omitted for `wait` / `complete`.
        detail:
          type: string
          description: Human-readable explanation of the action.

    CampaignStatus:
      type: object
      description: |
        The campaign rollup surface: the campaign, its items, the engine's
        readiness partition, and the distilled next action. This is the
        surface the operator-agent polls to drive a campaign.
      required: [campaign, items, rollup, next_action]
      properties:
        campaign: { $ref: '#/components/schemas/Campaign' }
        items:
          type: array
          items: { $ref: '#/components/schemas/CampaignItem' }
        rollup: { $ref: '#/components/schemas/CampaignRollup' }
        next_action: { $ref: '#/components/schemas/CampaignNextAction' }

    StartCampaignItemRunRequest:
      type: object
      description: |
        The POST /v0/campaigns/{campaign_id}/runs body (E26.2 / #1481): start a
        run for one eligible campaign item. There is deliberately NO
        idempotency_key — the backend does not dedup this create-link-transition
        sequence, and the DAG eligibility gate already refuses a re-start
        against an already-running item.
      required: [issue_ref, workflow_id]
      properties:
        issue_ref:
          type: string
          description: The campaign item's issue ref to start (must be a campaign item and currently eligible per the DAG).
        workflow_id:
          type: string
          description: The workflow id to run for this issue (e.g. `feature_change`).
        workflow_ref:
          type: string
          description: OPTIONAL git ref to fetch the workflow spec at; omit for the repo's default branch.
        runner_kind:
          type: string
          enum: [github_actions, local]
          description: OPTIONAL execution backend; defaults to `github_actions`. Pass `local` for the local dogfood loop.

    StartCampaignItemRunResult:
      type: object
      description: |
        The 201 body of POST /v0/campaigns/{campaign_id}/runs: the minted run
        plus the linked campaign item (now `running`, with `run_id` set).
      required: [run, item]
      properties:
        run: { $ref: '#/components/schemas/Run' }
        item: { $ref: '#/components/schemas/CampaignItem' }

    WaivedConcern:
      type: object
      description: |
        The updated concern row returned by
        `POST /v0/concerns/{concern_id}/waive` (#984): the full concern
        including the note text and the operator's waive reason as
        `state_reason`.
      required: [id, run_id, stage_id, stage_kind, severity, category, note, state, state_reason]
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        run_id:
          $ref: '#/components/schemas/UUID'
        stage_id:
          $ref: '#/components/schemas/UUID'
        stage_kind:
          type: string
          enum: [plan, implement]
        severity:
          type: string
        category:
          type: string
        note:
          type: string
          description: The reviewer's original concern note.
        state:
          type: string
          description: Always `waived` on a successful waive.
        state_reason:
          type: string
          description: The operator's audited waive reason.

    DeferredConcernResult:
      type: object
      description: |
        The result returned by `POST /v0/concerns/{concern_id}/defer`
        (#1202): the filed follow-up work `issue` plus the now-deferred
        `concern` row.
      required: [concern, issue]
      properties:
        concern:
          type: object
          description: |
            The updated concern row, now in the terminal `deferred`
            state with `state_reason` naming the filed follow-up issue.
          required: [id, run_id, stage_id, stage_kind, severity, category, note, state, state_reason]
          properties:
            id:
              $ref: '#/components/schemas/UUID'
            run_id:
              $ref: '#/components/schemas/UUID'
            stage_id:
              $ref: '#/components/schemas/UUID'
            stage_kind:
              type: string
              enum: [plan, implement]
            severity:
              type: string
            category:
              type: string
            note:
              type: string
              description: The reviewer's original concern note.
            state:
              type: string
              description: Always `deferred` on a successful defer.
            state_reason:
              type: string
              description: |
                The audited reason, of the form
                `deferred to #<n>: <note>`, naming the filed issue.
        issue:
          type: object
          description: The filed follow-up work item.
          required: [type, title, number, url, provider]
          properties:
            type:
              type: string
              description: The work-item type (bug for a defect category, else chore).
            title:
              type: string
            number:
              type: integer
            url:
              type: string
              format: uri
            provider:
              type: string
            applied_labels:
              type: array
              items: { type: string }

    IssueContext:
      type: object
      description: |
        Cached GitHub issue payload — title, body, url, number, and
        comments — fetched by the operator's `gh issue view` at
        run-create time so the backend's prompt builder doesn't
        need an installation_id to look up the issue (#415). The
        optional `comments` array carries the issue's comments so the
        plan agent sees refinements/decisions posted as comments, not
        just the title+body snapshot (#618).
      required: [title, body, url, number]
      properties:
        title:
          type: string
        body:
          type: string
        url:
          type: string
          format: uri
        number:
          type: integer
          minimum: 1
        comments:
          type: array
          description: |
            Issue comments captured at run-create time, oldest first.
            Optional and additive — runs whose issue_context predates
            #618 omit the field.
          items:
            type: object
            required: [author, body, created_at]
            properties:
              author:
                type: string
                description: Commenter's GitHub login.
              body:
                type: string
              created_at:
                type: string
                format: date-time

    Stage:
      type: object
      required:
        [id, run_id, sequence, type, executor, state, created_at,
         updated_at]
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        run_id: { $ref: '#/components/schemas/UUID' }
        sequence:
          type: integer
          minimum: 0
        type:
          type: string
          enum: [plan, implement, review, deploy]
        executor:
          type: object
          description: Exactly one of agent or human.
          properties:
            kind:
              type: string
              enum: [agent, human]
            ref:
              type: string
              example: claude-code
        state:
          type: string
          enum:
            [pending, dispatched, running, awaiting_approval, succeeded,
             failed, cancelled]
        started_at:
          type: [string, "null"]
          format: date-time
        ended_at:
          type: [string, "null"]
          format: date-time
        failure_category:
          type: [string, "null"]
          enum: [A, B, C, D, null]
          description: |
            Set on failed transitions per MVP_SPEC §6.
            A: agent failure, B: constraint/policy, C: infrastructure,
            D: approval timeout.
        failure_reason:
          type: [string, "null"]
        gate:
          oneOf:
            - type: "null"
            - $ref: '#/components/schemas/StageGate'
          description: |
            The persisted shape of the stage's workflow-spec gate.
            Null/omitted when the stage has no gate. Per migration
            0014 / #213 — the review-stage UI reads this to decide
            whether to surface the approval panel. Pre-#254 the
            shape carried a `blocking_checks` array; v0.2 dropped
            that field (ADR-017 / #249) — required CI checks now
            live in branch protection, snapshotted onto the run
            row's `required_checks_snapshot` (#251).
        resolved_model:
          type: string
          description: |
            The model id the approval gate resolved for this stage's
            agent spawn (#1416), surfaced from the per-stage
            `model_resolved` audit entry keyed by this stage's id.
            Empty string when no resolution was recorded for the stage
            — the adapter-default spawn, and every stage of a run
            approved before per-stage model selection landed.
          example: claude-opus-4-8
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    StageGate:
      type: object
      description: |
        Workflow-spec gate snapshot stored on the stage row. Mirrors
        spec.Gate — `type` distinguishes approval-vs-check, approvers
        is set only for approval gates. The pre-#254 `blocking_checks`
        array was removed in v0.2 (ADR-017 / #249); required CI
        checks now live in branch protection, exposed via the run's
        `required_checks_snapshot` (#251) and the per-stage
        `/v0/stages/{id}/checks` endpoint.
      required: [type]
      properties:
        type:
          type: string
          enum: [approval, check]
        approvers:
          oneOf:
            - type: "null"
            - type: object
              description: |
                Roles whose members can satisfy the gate. Exactly
                one of any_of / all_of is set when populated.
              properties:
                any_of:
                  type: array
                  items: { type: string }
                all_of:
                  type: array
                  items: { type: string }

    PullRequestArtifactBody:
      type: object
      description: |
        Wire shape the runner POSTs to /v0/runs/{run_id}/pull-request.
        Stored verbatim as the artifact's content; v0 doesn't carry a
        schema_version because the field shape isn't yet schema-stable.

        Has four variants (#742, #771, #794):

        - **Success** (default): `outcome` is absent. The PR fields
          (`pr_number`, `pr_url`, `branch`, `head_sha`, `base_sha`,
          `title`, `files_changed_count`) are required. The handler
          stores the PR artifact, backfills `run.pull_request_url`, and —
          when the implement stage was left in `running` by the trace
          handler's push-and-open-pr gate — drives its terminal
          transition (→ awaiting_approval / succeeded).
        - **Failure** (`outcome: failed`): the runner's commit/push/PR-open
          step failed, so no PR was opened. `category` (`B` re-scope, `C`
          retryable infra) and `reason` are required; the PR fields are
          absent. The handler fails the implement stage instead of
          creating an artifact, so the run never strands at
          review:awaiting_approval with a null PR.
        - **Child push** (`outcome: pushed`, #771): a decomposed child
          committed + pushed onto the shared parent branch but opened no PR
          (the parent run opens one consolidated PR after all children
          settle). `branch`, `head_sha`, and `base_sha` are required;
          `pr_number`/`pr_url`/`title` are absent. The handler drives the
          child stage's terminal transition its push_to_shared_branch trace
          gate left in `running`, without creating a PR artifact — so a child
          whose push failed (reported via `outcome: failed`) never reaches
          terminal succeeded with no code on the shared branch.
        - **Fix-up push** (`outcome: fixup_pushed`, #794): a fix-up
          re-dispatch committed + pushed onto the EXISTING PR branch but
          opened no new PR (the open PR already tracks the branch). `branch`,
          `head_sha`, and `base_sha` are required; `pr_number`/`pr_url`/`title`
          are absent. The handler drives the fix-up stage's terminal transition
          its push_fixup trace gate left in `running`, without creating a PR
          artifact — so a fix-up whose push/compile-gate step failed (reported
          via `outcome: failed`) never reaches terminal succeeded with the
          implement re-review approving an unlanded diff. The optional
          `apply_path` field (#1165/#1213) records whether the fix-up collapsed
          to a deterministic git-apply of the routed concerns' suggested
          patches or fell back to the agent.
      required: [pr_number, pr_url, branch, head_sha, base_sha, title, files_changed_count]
      properties:
        pr_number:
          type: integer
          minimum: 1
          example: 42
        pr_url:
          type: string
          format: uri
          example: https://github.com/kuhlman-labs/fishhawk/pull/42
        branch:
          type: string
          example: fishhawk/run-aaa/stage-bbb
        head_sha:
          type: string
          example: 1111111111111111111111111111111111111111
        base_sha:
          type: string
          example: 2222222222222222222222222222222222222222
        title:
          type: string
          example: "Fishhawk: implement stage 22222222"
        body:
          type: string
          description: Optional PR body (markdown).
        files_changed_count:
          type: integer
          minimum: 0
          example: 3
        outcome:
          type: string
          enum: [failed, pushed, fixup_pushed, fixup_no_changes, scope_park]
          description: |
            Present only on the non-success variants. `failed` (#742)
            reports a commit/push/PR-open failure (PR fields absent;
            `category` + `reason` required). `pushed` (#771) reports a
            decomposed child's successful push onto the shared parent branch
            (no PR opened; `branch` + `head_sha` + `base_sha` required,
            `pr_number`/`pr_url`/`title` absent). `fixup_pushed` (#794) reports
            a fix-up re-dispatch's successful push onto the EXISTING PR branch
            (no new PR; `branch` + `head_sha` + `base_sha` required,
            `pr_number`/`pr_url`/`title` absent). `fixup_no_changes` (#856)
            reports a fix-up re-dispatch that produced NO changes (no new commit
            landed; `branch` + `base_sha` required, `head_sha` omitted because
            the branch tip is unchanged, `pr_number`/`pr_url`/`title` absent).
            `scope_park` (#1231) reports a missing-declared-scope-file-ONLY gate
            outcome: the runner pushed its verified commit to the run branch and
            parks the implement stage in `awaiting_scope_decision` (no PR;
            `branch` + `head_sha` + `base_sha` + `verified_tree_sha` +
            non-empty `missing_paths` required, `pr_number`/`pr_url`/`title`
            absent).
        category:
          type: string
          enum: [B, C]
          description: |
            Failure category for the failure variant (#742). `B` parks the
            run for re-scope/re-plan (invalid PR shape / compile gate);
            `C` is retryable infra (network, git, GitHub API).
        reason:
          type: string
          description: Human-readable failure reason (failure variant only).
        verified_tree_sha:
          type: string
          description: |
            Present only on the `scope_park` variant (#1231). The tree object
            the committed-tree verify gate passed on; recorded so the exempt
            resolution can assert the opened PR head reflects the identical tree.
        missing_paths:
          type: array
          items: { type: string }
          description: |
            Present only on the `scope_park` variant (#1231). The declared
            `scope.files` the agent never touched — the sole gate shortfall that
            triggered the park. Repo-relative; must be non-empty.
        apply_path:
          type: string
          enum: [applied, agent, apply_failed_fellback, apply_failed_reset_failed]
          description: |
            Present only on the `fixup_pushed` variant (#1165/#1213). Records
            whether the near-deterministic fix-up apply path resolved the
            fix-up or it fell back to the agent: `applied` (every routed
            concern's suggested patch git-applied cleanly and the committed-tree
            verify gate passed, no agent), `agent` (no apply-list served / the
            agent re-derived), `apply_failed_fellback` (an apply-list was served
            but the apply or its verify gate failed, the worktree reset cleanly,
            and the agent re-derived), `apply_failed_reset_failed` (an apply
            failed AND the post-failure reset also failed). Persisted onto the
            fixup_pushed audit entry.
        supplemental_scope_exemptions:
          type: array
          items:
            type: object
            required: [path, reason]
            properties:
              path:
                type: string
                description: A declared `scope.files` path left unchanged.
              reason:
                type: string
                description: Why the path correctly needs no change.
          description: |
            Present only on a success ship that followed a base-rebase
            re-invoke (#1218). The re-invoke exemption delta: the scope
            self-exemptions the final scope-completeness gate honored that the
            already-sealed trace bundle's `scope_files_exempted` gate_evidence
            event did NOT carry (the bundle ships at push time, before the
            re-invoke reloads the re-invoked agent's exemptions, under #742
            forward gating). The backend re-emits these as a supplemental
            `scope_files_exempted` audit entry (origin `base_rebase_reinvoke`)
            so the re-invoke exemptions are queryable via the audit endpoint.
            Omitted on the first ship and every non-re-invoke ship.

    PullRequestUploadResponse:
      type: object
      description: |
        Echoed by `POST /v0/runs/{run_id}/pull-request`. `idempotent`
        is true when the upload matched an existing artifact.
      required: [id, stage_id, content_hash, pr_number, pr_url, head_sha, idempotent]
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        stage_id: { $ref: '#/components/schemas/UUID' }
        content_hash:
          type: string
          description: Hex sha256 of the canonical bytes shipped.
        pr_number: { type: integer }
        pr_url: { type: string, format: uri }
        head_sha: { type: string }
        idempotent: { type: boolean }

    PullRequestFailureResponse:
      type: object
      description: |
        Echoed by `POST /v0/runs/{run_id}/pull-request` for the failure
        variant (`outcome: failed`, #742): the runner-reported
        commit/push/PR-open failure was recorded and the implement stage
        transitioned to `failed`.
      required: [stage_id, outcome, category]
      properties:
        stage_id: { $ref: '#/components/schemas/UUID' }
        outcome: { type: string, enum: [failed] }
        category: { type: string, enum: [B, C] }

    PullRequestChildPushResponse:
      type: object
      description: |
        Echoed by `POST /v0/runs/{run_id}/pull-request` for the child-push
        variant (`outcome: pushed`, #771): a decomposed child pushed onto the
        shared parent branch and the child implement stage transitioned
        terminally. No PR artifact is created.
      required: [stage_id, outcome, branch, head_sha]
      properties:
        stage_id: { $ref: '#/components/schemas/UUID' }
        outcome: { type: string, enum: [pushed] }
        branch: { type: string }
        head_sha: { type: string }

    PullRequestFixupPushResponse:
      type: object
      description: |
        Echoed by `POST /v0/runs/{run_id}/pull-request` for the fix-up push
        variant (`outcome: fixup_pushed`, #794): a fix-up re-dispatch pushed
        onto the EXISTING PR branch and the fix-up implement stage transitioned
        terminally. No PR artifact is created.
      required: [stage_id, outcome, branch, head_sha]
      properties:
        stage_id: { $ref: '#/components/schemas/UUID' }
        outcome: { type: string, enum: [fixup_pushed] }
        branch: { type: string }
        head_sha: { type: string }

    PullRequestFixupNoChangesResponse:
      type: object
      description: |
        Echoed by `POST /v0/runs/{run_id}/pull-request` for the fix-up
        no-changes variant (`outcome: fixup_no_changes`, #856): a fix-up
        re-dispatch produced no changes (no new commit landed on the EXISTING PR
        branch) and the fix-up implement stage transitioned terminally,
        re-parking the review gate. No PR artifact is created and no `head_sha`
        is echoed — the branch tip is unchanged.
      required: [stage_id, outcome, branch]
      properties:
        stage_id: { $ref: '#/components/schemas/UUID' }
        outcome: { type: string, enum: [fixup_no_changes] }
        branch: { type: string }

    PullRequestScopeParkResponse:
      type: object
      description: |
        Echoed by `POST /v0/runs/{run_id}/pull-request` for the
        scope-completeness park variant (`outcome: scope_park`, #1231): the
        implement stage's ONLY committed-tree gate failure was the
        missing-declared-scope-file check, so the runner pushed its verified
        commit to the run branch (no PR) and the stage parked in
        `awaiting_scope_decision` for an operator exempt-or-fail decision.
        `head_sha` echoes the held commit.
      required: [stage_id, outcome, branch, head_sha]
      properties:
        stage_id: { $ref: '#/components/schemas/UUID' }
        outcome: { type: string, enum: [scope_park] }
        branch: { type: string }
        head_sha: { type: string }

    DeploymentArtifactBody:
      type: object
      description: |
        Wire shape posted to /v0/runs/{run_id}/deployment (E23.5 / #1385).
        ADR-038's signed deployment record. Stored verbatim as the
        artifact's content; v0 carries no schema_version because the field
        shape isn't yet schema-stable. Fishhawk is delegating-only — the
        external pipeline runs the deploy and this body reports its outcome.
      required: [environment, ref, external_run_url, outcome]
      properties:
        environment:
          type: string
          description: |
            The deploy target (gated pre-execution by the deploy stage's
            allowed_environments constraint).
          example: production
        ref:
          type: string
          description: The git ref or sha that was deployed (ADR-038's "ref/sha").
          example: "1111111111111111111111111111111111111111"
        external_run_url:
          type: string
          format: uri
          description: |
            The external pipeline run Fishhawk delegated to (delegating mode —
            Fishhawk holds no deploy logic).
          example: https://github.com/kuhlman-labs/fishhawk/actions/runs/42
        outcome:
          type: string
          enum: [succeeded, failed, partial, rolled_back]
          description: |
            The terminal deploy disposition (ADR-038 / #1384). `partial` and
            `rolled_back` are non-idempotent dispositions that are never
            blindly re-run.
        rollback_handle:
          type: string
          description: |
            Opaque handle the external pipeline returns for reverting this
            deploy, when one exists. Optional.
        rollback_action:
          type: string
          enum: [initiated, completed]
          description: |
            Present when the body reports an explicit rollback sub-action
            against a prior deploy. `initiated` writes a
            `deployment_rollback_initiated` audit entry, `completed` writes a
            `deployment_rollback_completed` entry — in ADDITION to the
            always-written `deployment_outcome_recorded` entry.

    DeploymentUploadResponse:
      type: object
      description: |
        Echoed by `POST /v0/runs/{run_id}/deployment`. `idempotent` is true
        when the upload matched an existing artifact for the stage.
      required: [id, stage_id, content_hash, environment, outcome, idempotent]
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        stage_id: { $ref: '#/components/schemas/UUID' }
        content_hash:
          type: string
          description: Hex sha256 of the canonical deployment bytes shipped.
        environment: { type: string }
        outcome: { type: string, enum: [succeeded, failed, partial, rolled_back] }
        idempotent: { type: boolean }

    PlanUploadResponse:
      type: object
      description: |
        Echoed by `POST /v0/runs/{run_id}/plan`. `idempotent` is true
        when the upload matched an existing artifact for the stage and
        no new row was inserted.
      required: [id, stage_id, content_hash, schema_version, idempotent]
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        stage_id: { $ref: '#/components/schemas/UUID' }
        content_hash:
          type: string
          description: Hex sha256 of the canonical plan bytes.
        schema_version:
          type: string
          example: standard_v1
        idempotent:
          type: boolean

    Artifact:
      type: object
      required: [id, stage_id, kind, content_hash, created_at]
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        stage_id: { $ref: '#/components/schemas/UUID' }
        kind:
          type: string
          enum: [plan, pull_request, deployment]
        schema_version:
          type: [string, "null"]
          example: standard_v1
        content_hash:
          type: string
          description: Hex sha256 of canonical content bytes.
        content:
          description: |
            JSON content of the artifact. For kind=plan validated
            against the standard_v1 schema in
            docs/spec/plan-standard-v1.schema.json. For
            kind=pull_request the content carries the
            PullRequestArtifactBody shape; for kind=deployment it
            carries the DeploymentArtifactBody shape.
        created_at:
          type: string
          format: date-time

    AuditEntry:
      type: object
      description: |
        One line in the append-only audit log. Entries form a per-run
        chain via prev_hash → entry_hash; see backend/internal/audit
        and verifier/internal/audit for the canonical algorithm.
      required:
        [id, sequence, run_id, ts, category, payload, entry_hash]
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        sequence:
          type: integer
          format: int64
          minimum: 1
        run_id: { $ref: '#/components/schemas/UUID' }
        stage_id:
          oneOf:
            - $ref: '#/components/schemas/UUID'
            - type: "null"
        ts:
          type: string
          format: date-time
        category:
          type: string
          example: plan_generated
        actor_kind:
          type: [string, "null"]
          enum: [agent, user, system, null]
        actor_subject:
          type: [string, "null"]
        payload:
          description: Event-specific JSON object.
        prev_hash:
          type: [string, "null"]
          description: Hex sha256 of the prior entry's entry_hash; null on the first entry of a run.
        entry_hash:
          type: string
          description: Hex sha256 of the canonical hash inputs.

    StatusCommentResponse:
      type: object
      description: |
        Rendered sticky-comment body plus the GitHub comment ID stored
        in the most recent `status_comment_posted` audit entry (0 when
        no comment has been posted yet). Used by the CLI to drive
        edit-in-place updates on the issue thread.
      required: [body, issue_number, repo, github_comment_id]
      properties:
        body:
          type: string
          description: Rendered Markdown body for the issue comment.
        issue_number:
          type: integer
          description: GitHub issue number the comment belongs to.
        repo:
          type: string
          description: "GitHub repo in owner/name form."
        github_comment_id:
          type: integer
          format: int64
          description: |
            GitHub comment ID from the last `status_comment_posted` audit entry.
            Zero when no comment has been posted yet (create-path).

    DiagnosticBundle:
      type: object
      description: |
        Product-facts-only diagnostic summary for a run (#1006). Every
        field is a structured fact safe to leave the operator's boundary
        without redaction; the bundle never carries diffs, paths, prompts,
        free text, or audit payload bodies.
      required: [run_id, workflow_id, workflow_spec_hash, runner_kind, run_state, stages, versions]
      properties:
        run_id:
          $ref: '#/components/schemas/UUID'
        workflow_id:
          type: string
          description: Workflow key the run executed (e.g. feature_change).
        workflow_spec_hash:
          type: string
          description: Git SHA of .fishhawk/workflows.yaml at run-create time.
        runner_kind:
          type: string
          description: "Execution backend tag (github_actions | local)."
        run_state:
          type: string
          description: "Run lifecycle state (pending|running|succeeded|failed|cancelled)."
        stages:
          type: array
          description: Ordered stage facts, by sequence ascending.
          items:
            type: object
            required: [sequence, type, state]
            properties:
              sequence: { type: integer }
              type: { type: string, description: "plan | implement | review" }
              state: { type: string, description: "Stage lifecycle state." }
        failing_stage:
          type: object
          description: |
            The failed stage's structured facts. Absent when no stage
            failed. Carries the single-letter failure category and the
            audit category of the most-recent entry scoped to the stage
            (the failing surface) — never the free-text failure reason.
          required: [sequence, type, failure_category]
          properties:
            sequence: { type: integer }
            type: { type: string }
            failure_category:
              type: string
              description: "MVP_SPEC §6 class: A | B | C | D."
            failure_surface:
              type: string
              description: Audit category of the most-recent entry scoped to the failing stage.
        audit_sequence_range:
          type: object
          description: "[min,max] of the run's audit-entry sequence numbers. Absent when the run has no audit entries."
          required: [min, max]
          properties:
            min: { type: integer, format: int64 }
            max: { type: integer, format: int64 }
        versions:
          type: object
          description: Build identity the backend authoritatively knows.
          required: [fishhawkd, min_runner_version]
          properties:
            fishhawkd:
              type: object
              required: [version, git_sha]
              properties:
                version: { type: string, description: "fishhawkd build version ('dev' when unstamped)." }
                git_sha: { type: string, description: "fishhawkd build git SHA ('unknown' when unstamped)." }
            min_runner_version:
              type: string
              description: Minimum fishhawk-runner version this backend requires.

    ProductReportRequest:
      type: object
      description: |
        Body for POST /v0/runs/{run_id}/product-reports (#1006). Slice 2
        (the egress path) carries product facts ONLY — `kind` selects the
        report flavor and nothing else crosses. An empty body is valid
        (kind defaults to bug).
      properties:
        kind:
          type: string
          enum: [bug, feature]
          default: bug
          description: Report flavor — bug (default) or feature request.

    ProductReportResponse:
      type: object
      description: What left the boundary — echoed so the caller can render the outcome.
      required: [fingerprint, action, number, url, destination]
      properties:
        fingerprint:
          type: string
          description: Stable dedup fingerprint over (failure category, audit surface, version family).
        action:
          type: string
          enum: [created, occurrence]
          description: "created — a new fingerprint-marked report; occurrence — a comment on the existing report (nothing created)."
        number:
          type: integer
          description: Upstream issue number that was created or appended to.
        url:
          type: string
          description: Upstream issue URL.
        destination:
          type: string
          description: The fixed upstream product repo the report landed in (owner/name).

    RunBudgetStatus:
      type: object
      description: |
        Current calendar-period status of a workflow's periodic budget
        (#693 / ADR-030). **Display-only** — never gates or blocks a run.

        When the workflow declares no budget the endpoint returns an
        **empty object** (none of the fields below present); clients
        detect "no budget" by the absence of `period`. The fields below
        are present only when a budget is configured.
      properties:
        period:
          type: string
          enum: [weekly, monthly]
          description: Budget reset cadence.
        period_start:
          type: string
          format: date-time
          description: |
            RFC3339 inclusive start of the current calendar period, in
            the server's configured budget timezone.
        limit_usd:
          type: number
          description: |
            Effective spend ceiling in US dollars for the period. This is
            the operator's `FISHHAWKD_BUDGET_LIMIT_OVERRIDE_USD` calibration
            override when configured (> 0), else the spec budget's
            `limit_usd` (#1371).
        spent_usd:
          type: number
          description: Cross-run workflow spend so far in the current period.
        fraction:
          type: number
          description: |
            `spent_usd / limit_usd` against the effective limit. May exceed
            1 when over the ceiling. Zero when the limit is non-positive (no
            usable ceiling).
        warn_at:
          type: [number, "null"]
          description: |
            Optional warn threshold as a fraction in (0,1]. Omitted when
            the budget configures no warn threshold.
        tier:
          type: string
          enum: [ok, warn, over, ack_required, page]
          description: |
            Escalating ladder rung (#1371): `over` when `fraction >= 1`;
            `warn` when the configured `warn_at` is crossed but not yet
            over; otherwise `ok`. Past the ceiling the signal escalates by
            configured multiples of the effective limit —
            `ack_required` at the ack multiple (default 2x) and `page` at
            the page multiple (default 3x) — instead of saturating at
            `over`.
        ack_required:
          type: boolean
          description: |
            True when `tier` has reached the acknowledgment rung
            (`ack_required` or `page`): plan approval for the run now
            requires an explicit `--ack-budget` acknowledgment (#1371).
            Omitted (absent) when false.
        enforcement:
          type: string
          enum: [advisory, blocking]
          description: |
            Budget enforcement mode. A spec budget with no enforcement
            value defaults to (and surfaces as) `advisory`.

    RunCacheEfficiency:
      type: object
      description: |
        Per-run prompt-cache efficiency derived from the run's
        `cost_recorded` ledger (ADR-044 / #1352). **Display-only** — never
        gates or blocks a run.

        When the run has no cost data the endpoint returns an **empty
        object** (none of the fields below present); clients detect "no
        data" by the absence of a field. The fields below are present only
        when the run has cost data.
      properties:
        fresh_input_tokens:
          type: integer
          description: Total cache-exclusive (fresh) input tokens across the run.
        cache_read_tokens:
          type: integer
          description: Total cache-served (read) input tokens across the run.
        cache_write_tokens:
          type: integer
          description: Total cache-creation (write) input tokens across the run.
        output_tokens:
          type: integer
          description: Total output tokens across the run.
        cache_read_ratio:
          type: number
          description: |
            `cache_read / (cache_read + fresh_input)` — the share of input
            served from cache. `0` when the denominator is `0`.
        reuse_factor:
          type: number
          description: |
            `cache_read / max(cache_write, 1)` — how many times each
            cache-creation token was re-read.
        gross_read_savings_usd:
          type: number
          description: |
            US dollars saved by serving `cache_read` tokens at the family
            cache-read discount instead of the fresh-input rate.
        write_penalty_usd:
          type: number
          description: |
            Extra US dollars paid to write `cache_write` tokens at the
            family cache-write premium over the fresh-input rate.
        net_savings_usd:
          type: number
          description: '`gross_read_savings_usd − write_penalty_usd`.'
        stages:
          type: array
          description: |
            Per-source breakdown (`plan_review` / `implement_review` /
            `agent`, sorted by source), each carrying the same token totals,
            ratios, and savings as the run-level figures.
          items:
            type: object
            properties:
              source:
                type: string
                description: 'Stage bucket: `plan_review`, `implement_review`, or `agent` (the runner stage-agent path, which carries no `source`).'
              fresh_input_tokens: { type: integer }
              cache_read_tokens: { type: integer }
              cache_write_tokens: { type: integer }
              output_tokens: { type: integer }
              cache_read_ratio: { type: number }
              reuse_factor: { type: number }
              gross_read_savings_usd: { type: number }
              write_penalty_usd: { type: number }
              net_savings_usd: { type: number }

    RunCost:
      type: object
      description: |
        Per-run estimated cost derived from the run's `cost_recorded`
        ledger (#1372). **Display-only** — never gates or blocks a run.

        When the run has no cost data the endpoint returns an **empty
        object** (none of the fields below present); clients detect "no
        data" by the absence of a field. The fields below are present only
        when the run has cost data.
      properties:
        total_cost_usd:
          type: number
          description: |
            The run's rolled estimated US-dollar cost (the run record's
            `cost_usd_total`), reconstructed per-stage from the ledger.
        stages:
          type: array
          description: |
            Per-source cost breakdown (`agent` / `plan_review` /
            `implement_review`, sorted by source), each carrying the summed
            US dollars attributed to that stage bucket.
          items:
            type: object
            properties:
              source:
                type: string
                description: 'Stage bucket: `plan_review`, `implement_review`, or `agent` (the runner stage-agent path, which carries no `source`).'
              cost_usd:
                type: number
                description: Summed estimated US dollars for this stage bucket.
        merged_pr:
          type: object
          description: |
            Cost-per-merged-PR rollup, present **only** when the run
            resolved to a merged PR (a `pr_merged` audit row exists AND the
            run carries a pull-request URL). Omitted otherwise.
          properties:
            pull_request_url:
              type: string
              description: The merged pull-request URL the rollup is summed over.
            cost_per_merged_pr_usd:
              type: number
              description: |
                Sum of `cost_usd_total` across every run sharing this PR URL
                (the original run plus any fixup/follow-up runs) — the total
                estimated cost to land the PR.
            run_count:
              type: integer
              description: Number of runs contributing to the rollup.

    CalibrationResult:
      type: object
      description: |
        Aggregated runtime calibration statistics derived from
        `runtime_observed` audit entries. Zero `samples` is normal on
        a fresh installation.
      required: [samples, predicted_p50_minutes, actual_p50_minutes, actual_p95_minutes, calibration_ratio, confidence_band_accuracy]
      properties:
        workflow_id:
          type: string
          description: Workflow ID filter applied, if any.
        stage_type:
          type: string
          example: implement
        samples:
          type: integer
          description: Number of implement stages included in this result set.
        predicted_p50_minutes:
          type: number
          format: double
          description: Median predicted runtime in minutes across the sample.
        actual_p50_minutes:
          type: number
          format: double
          description: Median actual runtime in minutes across the sample.
        actual_p95_minutes:
          type: number
          format: double
          description: 95th-percentile actual runtime in minutes.
        calibration_ratio:
          type: number
          format: double
          description: |
            `actual_p50 / predicted_p50`. Multiply raw estimates by this value
            to calibrate toward historical actuals. Zero when predicted_p50 is 0.
        confidence_band_accuracy:
          type: object
          description: |
            Per-confidence-level hit rates. Keys are confidence levels (low,
            medium, high); each value is an object with `samples` (int) and
            `within_1.5x` (int) counts. A low `within_1.5x / samples` ratio
            signals over-confidence in that band.
          additionalProperties:
            type: object
            properties:
              samples: { type: integer }
              within_1.5x: { type: integer }

    User:
      type: object
      required: [id, github_login, name]
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        github_login:
          type: string
          example: kuhlman-labs
        name:
          type: string
          example: Brett Kuhlman
        email:
          type: [string, "null"]

    OnboardingReadiness:
      type: object
      description: |
        Aggregated first-run readiness for a repository (E29.4), consumed by
        `fishhawk doctor` (E29.5). The four checks cascade: a not-installed
        repo yields an unavailable spec and no reviewers, each with an
        explanatory note. Read-only; performs no writes.
      required: [repo, app, spec, reviewers, scopes]
      properties:
        repo:
          type: string
          example: kuhlman-labs/fishhawk
        app:
          type: object
          description: GitHub App installation status for the target repo.
          required: [installed]
          properties:
            installed:
              type: boolean
            installation_id:
              type: integer
              format: int64
              description: Present only when installed.
            reason:
              type: string
              description: Why the App is not installed (or could not be resolved).
        spec:
          type: object
          description: The committed workflow spec's fetch + parse + validate state.
          required: [source, valid]
          properties:
            source:
              type: string
              enum: [fetched, unavailable]
            valid:
              type: boolean
              description: Meaningful only when source is "fetched".
            error:
              type: string
              description: Parse or validation failure detail.
            note:
              type: string
              description: Why the spec is unavailable (not installed, not found, fetch error).
        reviewers:
          type: array
          description: |
            Per-reviewer availability for each reviewer declared in the
            repo's spec, resolved against this deployment's configured
            backends. Empty when the spec is unavailable or invalid.
          items:
            type: object
            required: [provider, available]
            properties:
              provider:
                type: string
                example: anthropic
              model:
                type: string
              reasoning_effort:
                type: string
              available:
                type: boolean
              missing_hint:
                type: string
                description: How to enable the provider when unavailable (names the env knob).
        scopes:
          type: object
          description: |
            Whether the caller's token holds the run-driving scope subset.
            Cookie-session (OAuth) callers bypass scope enforcement and are
            adequate by construction.
          required: [adequate, required, missing]
          properties:
            adequate:
              type: boolean
            required:
              type: array
              items:
                type: string
            missing:
              type: array
              items:
                type: string
            note:
              type: string

    ApiToken:
      type: object
      required: [id, scopes, created_at]
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        scopes:
          type: array
          items:
            type: string
        last_used_at:
          type: [string, "null"]
          format: date-time
        created_at:
          type: string
          format: date-time
        revoked_at:
          type: [string, "null"]
          format: date-time

  responses:
    BadRequest:
      description: Request body or query parameters were invalid.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: |
        Authentication missing or invalid (`error: unauthenticated`).
        Note: a credential that fails to validate because the database
        was unreachable surfaces as `503 service_unavailable` at the
        auth boundary, NOT as 401 — a 401 here means the credential is
        absent or genuinely bad on a healthy database (#764).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    ServiceUnavailable:
      description: |
        A dependency required to serve the request was unavailable.
        At the auth boundary (`error: service_unavailable`, message
        `database unavailable; retry shortly`) this means the database
        could not be reached to validate the presented credential —
        distinct from a bad credential (401) on a healthy database
        (#764). Transient; retry with backoff.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: |
        Authenticated identity lacks permission for the operation
        (`error: forbidden`), or — on state-changing methods from a
        session-cookie identity — the `X-CSRF-Token` header didn't
        match the `__Host-csrf` cookie (`error: csrf_required`).
        Bearer-token clients bypass the CSRF check.
        Bearer tokens that authenticate successfully but lack a required
        write scope receive `error: insufficient_scope` with HTTP 403.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Referenced resource does not exist.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Conflict:
      description: Request conflicts with current resource state.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

# ---------------------------------------------------------------------------
# Default security: cookie OR bearer for all UI/CLI endpoints. Runner-
# facing and webhook endpoints override this individually.
# ---------------------------------------------------------------------------
security:
  - sessionCookie: []
  - bearerToken: []

paths:
  # ---------------------------------------------------------------------
  # Liveness — public, unversioned
  # ---------------------------------------------------------------------
  /healthz:
    get:
      operationId: getHealthz
      summary: Liveness probe
      description: |
        Lightweight check used by load balancers, ECS health checks, and
        local smoke tests. Returns build version so operators can confirm
        a deploy reached the instance. Implemented in
        `backend/internal/server/handlers.go`.
      security: []
      tags: [diagnostics]
      responses:
        '200':
          description: Process is up.
          content:
            application/json:
              schema:
                type: object
                required: [status, version, git_sha, min_runner_version, schemas]
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: dev
                  git_sha:
                    type: string
                    description: |
                      Git commit SHA the binary was built from. scripts/dev
                      stamps the short HEAD SHA into dev builds, with a
                      "-dirty" suffix when the tree had uncommitted changes at
                      build time. "unknown" only for unstamped builds (built
                      outside scripts/dev without -ldflags). Operators use
                      this to confirm a deploy matches the expected commit.
                    example: abc1234
                  min_runner_version:
                    type: string
                    description: |
                      Minimum fishhawk-runner version required to interoperate
                      with this backend. "dev" signals no enforcement (local dev).
                      Runners older than this value should exit rather than proceed.
                    example: dev
                  schemas:
                    type: object
                    description: |
                      Map of schema name to hex-encoded SHA-256 of the backend's
                      embedded canonical schema bytes. Keys: "plan-standard-v1",
                      "workflow-v0". Callers compare against their own embedded
                      hashes to detect schema drift.
                    additionalProperties:
                      type: string
                    example:
                      plan-standard-v1: "abc123..."
                      workflow-v0: "def456..."
                  start_nonce:
                    type: string
                    description: |
                      Per-start opaque identity token, echoed verbatim from the
                      operator-supplied FISHHAWKD_START_NONCE env var /
                      --start-nonce flag. Present only when the operator set
                      one; omitted otherwise. scripts/dev generates a nonce per
                      spawn and requires it to round-trip here, proving the
                      listener on the port is the daemon it started even
                      across OS pid reuse.
                    example: "9f86d081884c7d65"
        '503':
          description: Process is shutting down or otherwise not ready.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ---------------------------------------------------------------------
  # Auth — sign in via GitHub OAuth, manage scoped tokens
  # ---------------------------------------------------------------------
  /v0/auth/github/login:
    get:
      operationId: githubLogin
      summary: Begin GitHub OAuth sign-in
      description: |
        Redirects the browser to GitHub's OAuth authorize endpoint with a
        backend-generated state value. The state is bound to the browser
        via a temporary cookie and verified on callback.
      security: []
      tags: [auth]
      responses:
        '302':
          description: Redirect to GitHub's OAuth authorize URL.
        '500':
          description: OAuth state could not be issued.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/auth/github/callback:
    get:
      operationId: githubCallback
      summary: GitHub OAuth callback
      description: |
        Verifies the state, exchanges the code for a GitHub access token,
        looks up or creates the user, and sets the `fishhawk_session`
        cookie. Redirects to the SPA on success.
      security: []
      tags: [auth]
      parameters:
        - name: code
          in: query
          required: true
          schema: { type: string }
        - name: state
          in: query
          required: true
          schema: { type: string }
      responses:
        '302':
          description: Redirect to the SPA root with session cookie set.
        '400': { $ref: '#/components/responses/BadRequest' }

  /v0/auth/github/manifest-flow-start:
    get:
      operationId: githubManifestFlowStart
      summary: Begin GitHub App manifest registration
      description: |
        Mints a manifest-flow state value, sets it in a short-lived
        cookie, and renders an HTML page with a self-submitting form
        that POSTs the App manifest to GitHub. After the operator
        confirms the App's name on GitHub's side, GitHub redirects
        back to `/v0/auth/github/manifest-callback` with a one-shot
        `code`.

        Designed to be opened directly in a browser; the response is
        HTML, not JSON.
      security: []
      tags: [auth]
      parameters:
        - name: backend_url
          in: query
          required: true
          description: Absolute base URL of fishhawkd (e.g. `http://localhost:8080`).
          schema: { type: string, format: uri }
        - name: webhook_url
          in: query
          required: true
          description: |
            Destination GitHub will deliver webhooks to. For local dev
            this is typically a smee.io forwarding URL since GitHub
            cannot reach `localhost`.
          schema: { type: string, format: uri }
        - name: owner
          in: query
          description: |
            GitHub user or org login. When set, the form posts to
            `https://github.com/organizations/<owner>/settings/apps/new`
            instead of the operator's personal account.
          schema: { type: string }
        - name: name
          in: query
          description: App name override. Defaults to "Fishhawk".
          schema: { type: string }
      responses:
        '200':
          description: HTML form that auto-submits to GitHub.
          content:
            text/html:
              schema: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '503':
          description: Manifest flow not configured on this backend.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/auth/github/manifest-callback:
    get:
      operationId: githubManifestCallback
      summary: Receive GitHub App manifest-flow callback
      description: |
        Verifies the manifest-flow state, exchanges the one-shot
        `code` with `https://api.github.com/app-manifests/{code}/conversions`,
        and renders an HTML success page that displays the freshly
        minted App ID, OAuth client ID + secret, webhook secret, and
        PEM private key once. The backend does not persist these —
        the operator copies them out into `.env` (local dev) or the
        configured secrets backend (hosted, deferred).

        The conversion code is single-use and good for ten minutes;
        on `502` the operator must restart from
        `/v0/auth/github/manifest-flow-start`.
      security: []
      tags: [auth]
      parameters:
        - name: code
          in: query
          required: true
          schema: { type: string }
        - name: state
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: HTML success page with one-time-visible credentials.
          content:
            text/html:
              schema: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '502':
          description: GitHub rejected the conversion code (expired, reused, or invalid).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: Manifest flow not configured on this backend.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/auth/me:
    get:
      operationId: getMe
      summary: Current user
      description: Returns the authenticated user, or 401 if unauthenticated.
      tags: [auth]
      responses:
        '200':
          description: The authenticated user.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v0/auth/logout:
    post:
      operationId: logout
      summary: Sign out
      description: Invalidates the current session.
      tags: [auth]
      responses:
        '204':
          description: Session destroyed.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /v0/onboarding/readiness:
    get:
      operationId: getOnboardingReadiness
      summary: First-run readiness for a repository
      description: |
        Aggregates the four server-side-only checks a repo's first run needs
        (E29.4), consumed by `fishhawk doctor` (E29.5): GitHub App
        installation, the committed workflow spec's parse/validate state,
        per-reviewer availability on this deployment, and the caller token's
        scope adequacy against the run-driving scope subset. Read-only.

        Gates on authentication only (401 for anonymous) — NOT a write scope,
        because scope adequacy is itself a reported field: a write-scope gate
        would lock out exactly the callers who need to discover their gap.
        Mirrors `GET /v0/auth/me`.
      tags: [onboarding]
      parameters:
        - name: repo
          in: query
          required: true
          description: Target repository in owner/name form.
          schema:
            type: string
          example: kuhlman-labs/fishhawk
      responses:
        '200':
          description: Aggregated readiness for the repository.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OnboardingReadiness' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v0/tokens:
    get:
      operationId: listTokens
      summary: List API tokens for the current user
      tags: [auth]
      responses:
        '200':
          description: Active tokens. Token strings are NOT returned.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Pagination'
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/ApiToken' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      operationId: createToken
      summary: Mint a new scoped API token
      description: |
        Returns the freshly-minted token string ONCE in the response body.
        The token is not retrievable later; if lost, revoke and re-issue.
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [scopes]
              properties:
                scopes:
                  type: array
                  items: { type: string }
      responses:
        '201':
          description: Token created. The plaintext value is in the response.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiToken'
                  - type: object
                    required: [token]
                    properties:
                      token:
                        type: string
                        description: |
                          The bearer token. Store immediately — not
                          retrievable later.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /v0/tokens/{token_id}:
    delete:
      operationId: revokeToken
      summary: Revoke an API token
      tags: [auth]
      parameters:
        - { name: token_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '204':
          description: Token revoked.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ---------------------------------------------------------------------
  # Runs
  # ---------------------------------------------------------------------
  /v0/runs:
    get:
      operationId: listRuns
      summary: List workflow runs
      description: |
        Cursor-paginated list ordered by `created_at` descending. Filter
        parameters are additive; multiple query values AND together.
      tags: [runs]
      parameters:
        - { name: repo, in: query, schema: { type: string } }
        - { name: workflow_id, in: query, schema: { type: string } }
        - { name: state, in: query, schema: { type: string, enum: [pending, running, succeeded, failed, cancelled] } }
        - name: pull_request_url
          in: query
          description: |
            Equality filter on `run.pull_request_url` (#216). Used by
            the threaded-runs view to render every run on a PR.
          schema: { type: string }
        - name: trigger_ref
          in: query
          description: |
            Equality filter on `run.trigger_ref` (e.g. `issue:42`).
            Used by the threaded-runs view to render every run on the
            same trigger when no PR has landed yet.
          schema: { type: string }
        - name: runner_kind
          in: query
          description: |
            Equality filter on `run.runner_kind` (ADR-022 / #388).
            Used by compliance consumers to project to
            `github_actions` only (or to scope to local-runner
            dev-loop runs).
          schema: { type: string, enum: [github_actions, local] }
        - { name: limit, in: query, schema: { type: integer, default: 50, maximum: 200 } }
        - { name: cursor, in: query, schema: { type: string } }
      responses:
        '200':
          description: Page of runs.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Pagination'
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/Run' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
    post:
      operationId: createRun
      summary: Create a workflow run
      description: |
        Creates a `runs` row in the `pending` state and dispatches a
        `workflow_dispatch` event to the customer's repo. The runner
        action picks it up and proceeds through the configured stages.

        Pass `Idempotency-Key: <opaque-string>` to make the call
        retriable. If a run with the same `(repo, key)` exists, it's
        returned with a 200 instead of creating a fresh one. The
        scope is `(repo, key)` so two callers picking the same key
        for different repos don't collide.
      tags: [runs]
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
            description: |
              Opaque caller-chosen string. Same key + same repo =
              the existing run is returned (200). Different key OR
              different repo = a fresh run is created (201). No
              header = always create.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [repo, workflow_id, workflow_sha, trigger_source]
              properties:
                repo:
                  type: string
                  example: kuhlman-labs/fishhawk
                workflow_id:
                  type: string
                  example: feature_change
                workflow_sha:
                  type: string
                trigger_source:
                  type: string
                  enum: [github_issue, cli, ui]
                trigger_ref:
                  type: [string, "null"]
                runner_kind:
                  type: string
                  enum: [github_actions, local]
                  description: |
                    Optional. Execution backend the run will use
                    (ADR-022 / #388). Defaults to `github_actions`
                    when omitted. The local-runner CLI (Phase C of
                    E22 / #389) passes `local` to mint a run that
                    runs on the operator's workstation instead of
                    GitHub Actions.
                workflow_spec:
                  type: string
                  description: |
                    Optional. YAML body of `.fishhawk/workflows.yaml`
                    at `workflow_sha`, sent inline so the backend can
                    create one Stage row per stage definition for
                    API-minted runs (#411). When omitted AND the
                    backend has a GitHub client configured, the
                    handler resolves the App's installation for
                    `repo` and fetches the spec at `workflow_sha`
                    via the GitHub Contents API (#413) — used by
                    MCP-driven runs and cross-repo CLI flows that
                    can't easily ship the spec inline. When
                    omitted AND no GitHub client is configured,
                    the run row is created with no stages (the
                    legacy shape, kept for integration test
                    seeding). The `fishhawk run start` CLI always
                    sends this field, populated either via
                    auto-discovery of the local checkout or the
                    `--spec-file` flag. A malformed or
                    unrecognised-workflow_id body returns 400
                    before the run row is created; an App that's
                    not installed on the target repo returns 422
                    `repo_not_installed`; a missing spec at the
                    requested `workflow_sha` returns 422
                    `spec_not_found`.
                issue_context:
                  $ref: '#/components/schemas/IssueContext'
                  description: |
                    Optional. Cached payload from the operator's
                    `gh issue view` (#415). Carries the triggering
                    GitHub issue's title, body, url, and number so
                    the backend's prompt builder reads from the row
                    instead of needing an installation_id to fetch
                    from GitHub. Only valid with
                    `trigger_source: github_issue` — a 400 fires
                    when shipped with any other trigger source.
                    Webhook-dispatched runs leave this empty and
                    the backend falls back to the existing
                    GitHub-fetch path.
                drive:
                  type: boolean
                  description: |
                    Optional. Per-run drive-mode override (#1023 /
                    #996 theme 1). When present, wins over the
                    workflow spec's `drive` default; when omitted,
                    the run inherits the spec value (false when the
                    spec doesn't set one or no spec is resolved).
                    The resolved flag is snapshotted on the run row
                    at create time and echoed back as `drive` on the
                    Run resource.
                budget_override:
                  type: boolean
                  description: |
                    Optional. Operator force-past for a blocking
                    periodic cost budget (#688 / ADR-030). When the
                    resolved workflow declares an
                    `enforcement: blocking` budget whose current
                    calendar-period spend has reached `limit_usd`, a
                    new run is normally refused with `402
                    budget_exhausted`. Setting this `true` admits the
                    run anyway and records a
                    `run_admitted_budget_override` audit entry.
                    Ignored when no blocking budget is over — it only
                    matters at the moment a budget would block. There
                    is no override on the webhook-dispatch path
                    (webhook triggers can't carry one).
                upstream_run_id:
                  type: [string, "null"]
                  format: uuid
                  description: |
                    Optional. The upstream `feature_change` run whose
                    `ci_green` / `review_merged` a standalone
                    deploy-only `release` run's `required_upstream`
                    pre-flight gate should evaluate (E23.11 / #1417). A
                    deploy-only run has no implement/review stage of its
                    own; set this so the gate evaluates the referenced
                    upstream instead. Omitted (the appended-deploy /
                    non-deploy default) leaves the gate evaluating the
                    current run. DISTINCT from `parent_run_id` (#216) —
                    a deploy-gate safety reference, not a follow-up /
                    lineage link. Because it controls a safety-critical
                    deploy gate, the gate validates the reference's
                    provenance at evaluation time: the upstream must be a
                    `feature_change` run in the SAME REPO as the deploy
                    run; a cross-repo or non-`feature_change` reference is
                    treated as unresolved and fails the gate closed.
                    Persisted on the run row and echoed
                    back as `upstream_run_id` on the Run resource.
      responses:
        '200':
          description: Idempotent replay — existing run returned unchanged.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Run' }
        '201':
          description: Run created and dispatched.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Run' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '402':
          description: |
            `budget_exhausted` — the resolved workflow declares an
            `enforcement: blocking` periodic cost budget whose
            current calendar-period spend has reached `limit_usd`
            (#688 / ADR-030). No run row is created. Clear it by
            raising `limit_usd`, switching the budget to
            `enforcement: advisory`, or retrying with
            `budget_override: true`. In-flight runs and CI-retry /
            decomposition-child continuations are never gated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422':
          description: |
            Returned when the GitHub-fetch fallback can't resolve
            the spec (#413). `repo_not_installed` when the App is
            absent from the target repo; `spec_not_found` when the
            file doesn't exist at the requested `workflow_sha`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }

  /v0/runs/{run_id}:
    get:
      operationId: getRun
      summary: Get a run
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: Run details.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Run' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v0/runs/{run_id}/cancel:
    post:
      operationId: cancelRun
      summary: Cancel a run
      description: |
        Transitions the run and any non-terminal stages to `cancelled`.
        Idempotent — calling on an already-cancelled or already-terminal
        run returns 409 unless `state` already equals `cancelled`.
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: Run cancelled.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Run' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /v0/runs/{run_id}/consolidate:
    post:
      operationId: consolidateRun
      summary: Run the decomposed-parent fan-in (E24.2) on demand
      description: |
        Operator-drivable, error-SURFACING fan-in trigger (E24.2 / ADR-041 /
        #1238) for a decomposed PARENT run parked in `awaiting_children`. The
        60s child-completion sweeper is the automatic backstop that normally
        runs the fan-in, but it is OFF by default in the local dev `fishhawkd`
        ("dev-loop posture"), so on the local runner a parent whose children
        have all settled stays parked with no consolidated branch/PR. This
        endpoint runs the same fan-in on demand AND surfaces why it failed:
        where the event-driven path WARN-swallows a non-conflict
        `IntegrateSlices` error (leaving a silent stuck parent), this returns
        it (502 `slice_integration_error`).

        Mechanism: composes the existing orchestrator primitives
        (`IntegrateSlices` → `TransitionStage` → `Advance`), mirroring the
        sweeper's `resolveParent`, WITHOUT touching the hot event-driven /
        sweeper paths. On a clean integration the parent implement stage
        resolves `succeeded`, a `children_settled` audit entry is appended
        (payload byte-identical to the sweeper's), the consolidated PR opens,
        and the parent review gate dispatches. On a slice merge conflict the
        parent implement stage fails recoverable (category `B`) and a
        `slice_integration_conflict` audit entry records the conflicting slice
        — the E24.2 contract, preserved.

        **Preconditions** (each a refusal): the run is a decomposed parent
        (`decomposed_from` null AND it has ≥1 decomposed child, else 400
        `not_a_decomposed_parent`); its implement stage is parked in
        `awaiting_children` (else 409 `not_awaiting_children` — already
        resolved or not a decomposition); EVERY child is terminal (else 409
        `children_in_flight`) AND every terminal child `succeeded` (else 409
        `children_failed` — resolve/re-drive the failed child rather than
        consolidating a partial set).

        Idempotent-friendly: a second call after a successful consolidate (or
        after the sweeper won the race) finds no `awaiting_children` stage and
        returns 409 `not_awaiting_children`; `IntegrateSlices`' own merges are
        idempotent no-ops, so a retry after a surfaced error re-enters cleanly.

        **Authorization.** Requires `write:runs`. A run-bound MCP token
        (subject `mcp:run:<uuid>`) is refused 403 (`agent_token_forbidden`) —
        consolidation is an operator action, not one the implement agent
        self-drives.
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: |
            Fan-in ran. `outcome` is `integrated` (every slice merged; parent
            implement `succeeded`; `consolidated_branch` + `pull_request_url`
            set) or `slice_conflict` (a slice failed to merge; parent implement
            failed recoverable category `B`; `conflicting_slice_index` +
            `conflicting_child_run_id` set).
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id: { $ref: '#/components/schemas/UUID' }
                  outcome:
                    type: string
                    enum: [integrated, slice_conflict]
                    description: 'integrated = clean fan-in; slice_conflict = a slice failed to merge (parent failed recoverable).'
                  resolved_to_state:
                    type: string
                    description: 'The parent implement stage state after the fan-in: succeeded (integrated) or failed (slice_conflict).'
                  consolidated_branch: { type: string, description: 'The consolidated branch name; set on the integrated outcome.' }
                  pull_request_url: { type: string, description: 'The consolidated PR URL; set on the integrated outcome.' }
                  conflicting_slice_index: { type: integer, description: 'The slice index that failed to merge; set on the slice_conflict outcome.' }
                  conflicting_child_run_id: { type: string, description: 'The child run id owning the conflicting slice; set on the slice_conflict outcome.' }
                  detail: { type: string, description: 'Human-readable conflict detail; set on the slice_conflict outcome.' }
        '400':
          description: |
            The run is not a decomposed parent (a child, or has no children).
            Body's `error` is `not_a_decomposed_parent`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: |
            One of two cases: (1) bearer token lacks `write:runs` scope — body
            `error` is `insufficient_scope`; (2) a run-bound MCP token attempted
            the fan-in — body `error` is `agent_token_forbidden`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: |
            Fan-in not runnable. One of: `not_awaiting_children` (no implement
            stage parked in awaiting_children), `children_in_flight` (a child is
            still non-terminal; `details.non_terminal_child_run_ids` names
            them), or `children_failed` (a child failed;
            `details.failed_child_run_ids` names them).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '502':
          description: |
            The slice integration failed with a non-conflict error (e.g. a base
            ref or branch-create failure). Body's `error` is
            `slice_integration_error` and `details.error` carries the cause. The
            parent implement stage is left `awaiting_children` for retry.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/runs/{run_id}/integrate-wave:
    post:
      operationId: integrateWave
      summary: Non-settling per-wave fan-in of a decomposed parent (E24.X / #1278)
      description: |
        The NON-settling per-wave fan-in (#1278 slice B / ADR-041) the
        topological-wave `fishhawk_run_children` dispatch calls BETWEEN waves.
        It merges the slices SUCCEEDED SO FAR onto the consolidated branch so a
        later wave's dependent slices cut their branch from a tree that already
        contains the predecessors' merged symbols.

        Mechanism: reuses the EXACT same exported `IntegrateSlices` primitive
        `POST /consolidate` uses — no new git-merge code — which filters to
        succeeded slices ascending and is idempotent (already-merged 204 /
        branch-exists 422 no-ops).

        **How it DIFFERS from `/consolidate` (the terminal fan-in).** Unlike
        `/consolidate`, integrate-wave is intermediate and deliberately does
        NOT settle the parent:
        - it does NOT require all children terminal (it merges whatever has
          succeeded so far);
        - it does NOT transition the parent implement stage (the stage state is
          identical before and after — on BOTH the integrated and the
          slice_conflict outcome; the driver decides what to do on a conflict);
        - it does NOT advance the run or open the consolidated PR.
        The final terminal fan-in (stage resolution + consolidated PR) stays
        driven by `/consolidate` after the LAST wave's children settle.

        **Preconditions** (each a refusal): the run is a decomposed parent
        (`decomposed_from` null AND it has ≥1 decomposed child, else 400
        `not_a_decomposed_parent`). There is intentionally NO
        terminal-children / awaiting_children precondition — that is the whole
        point of the per-wave fan-in.

        **Authorization.** Requires `write:runs`. A run-bound MCP token
        (subject `mcp:run:<uuid>`) is refused 403 (`agent_token_forbidden`) —
        the fan-in is an operator action.
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: |
            The per-wave fan-in ran. `outcome` is `integrated` (the succeeded
            slices so far merged; `consolidated_branch` set) or `slice_conflict`
            (a slice failed to merge; `conflicting_slice_index` +
            `conflicting_child_run_id` set). The parent stage is UNCHANGED on
            both outcomes — there is no `resolved_to_state`.
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id: { $ref: '#/components/schemas/UUID' }
                  outcome:
                    type: string
                    enum: [integrated, slice_conflict]
                    description: 'integrated = the succeeded slices merged onto the consolidated branch; slice_conflict = a slice failed to merge (parent stage left unchanged).'
                  consolidated_branch: { type: string, description: 'The consolidated branch name; set on the integrated outcome.' }
                  conflicting_slice_index: { type: integer, description: 'The slice index that failed to merge; set on the slice_conflict outcome.' }
                  conflicting_child_run_id: { type: string, description: 'The child run id owning the conflicting slice; set on the slice_conflict outcome.' }
                  detail: { type: string, description: 'Human-readable conflict detail; set on the slice_conflict outcome.' }
        '400':
          description: |
            The run is not a decomposed parent (a child, or has no children).
            Body's `error` is `not_a_decomposed_parent`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: |
            One of two cases: (1) bearer token lacks `write:runs` scope — body
            `error` is `insufficient_scope`; (2) a run-bound MCP token attempted
            the fan-in — body `error` is `agent_token_forbidden`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '502':
          description: |
            The slice integration failed with a non-conflict error (e.g. a base
            ref or branch-create failure). Body's `error` is
            `slice_integration_error` and `details.error` carries the cause. The
            parent stage is left unchanged for retry.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/runs/{run_id}/recover:
    post:
      operationId: recoverRun
      summary: Recover a category-B-failed run against its approved plan
      description: |
        Operator-initiated category-B recovery (#978). The target shape
        — top-level run vs. decomposition child — is auto-detected from
        the run's `decomposed_from`:

        **Top-level target.** Mints a NEW plan-stage-less child run that
        re-executes against the parent run's approved plan — the same
        inheritance shape as the CI-failure auto-retry, but
        operator-triggered and exempt from the `on_ci_failure` cap: the
        child carries the parent's `retry_attempt` UNCHANGED, with
        `parent_run_id` as provenance. Responds 201 with the new run.

        **Decomposition-child target (#1081).** When the target run is
        itself a decomposition child (`decomposed_from` set), recovery
        re-drives THAT child IN PLACE — the same run id, NOT a freshly
        minted run — on the shared parent branch, so the parent fan-out
        parked in `awaiting_children` can still consolidate. An in-place
        re-drive (rather than a new child sharing `decomposed_from`) is
        deliberate: a second child row would double-count in the
        parent's consolidation counters. The child's failed implement
        stage is re-opened (`failed` → `pending`) and the run
        un-terminal-ed (`failed` → `running`), then handed to the
        orchestrator to dispatch; its plan resolves via the existing
        `parent_run_id` walk. Responds 201 with the re-opened child.

        **Eligibility.** A top-level target requires the parent's plan
        stage `succeeded` AND its implement stage `failed` category `B`
        (scope/constraint violation). A decomposition-child target
        requires the CHILD's own implement stage `failed` category `B`
        AND a plan resolvable via the `parent_run_id` walk. Anything
        else is refused 409 `recovery_not_eligible` with `details`
        naming `{plan_state, implement_state, failure_category,
        plan_resolved}`. The stage-level retry endpoint keeps refusing
        category B — recovery is broader than a retry, not a retry of
        the terminal stage.

        **Scope amendments.** Optional `add_scope_files` paths land as
        a PRE-APPROVED #961 scope-amendment row on the implement stage
        — the newly minted one for a top-level target, the EXISTING
        re-opened one for a decomposition child (its stage id is
        preserved across the re-drive, so the fold by run + stage id
        still sees it) (visible via the scope-amendments list, folded
        by the prompt fetch and the runner's pre-commit refresh).
        `operation: create` entries flow into the net-new-file gates
        like any approved amendment. Note the fold deliberately no-ops
        when the reused plan declares an empty `scope.files` (the
        `git add -A` guard) — category-B failures presuppose a
        declared scope, so this is a documented edge, not a refusal.

        **Scope exemptions.** Optional `exempt_scope_files` is the
        inverse of `add_scope_files` (#1229): each `{path, reason}` marks
        a DECLARED `scope.files` path operator-justified-unchanged so the
        runner's `MissingScopeFiles` shortfall gate subtracts it — a
        category-B run that failed SOLELY on a declared-but-unchanged file
        recovers in one call with no replan. Unlike `add_scope_files`, an
        exemption does NOT mint a scope-amendment row (it subtracts from
        the gate, it does not widen scope). Each path must be clean
        repo-relative AND carry a non-empty reason; either failure is
        refused 400 `validation_failed` with `field=exempt_scope_files`.
        Exemptions are recorded as `exempted_paths` on the
        `plan_reused_from` provenance and delivered to the runner via the
        implement prompt's `scope_exemptions` field.

        **Provenance.** A `plan_reused_from` audit entry is appended
        on the child with
        `{parent_run_id, parent_failure_category, added_paths,
        exempted_paths, source, reason}`; `source` is `operator_recovery`
        for a top-level target and `decomposition_child_recovery` for an
        in-place child re-drive. The approved amendment row is the second
        surface. The `reason` is additionally injected into the recovery
        agent's binding conditions (Part D, #1229).

        No `workflow_dispatch` is fired — identical to `POST /v0/runs`:
        local-runner runs sit pending for the local loop to drive. The
        implement stage's prompt resolves the parent's plan via the
        existing `parent_run_id` walk; the parent's binding approval
        conditions and approval-time `add_scope_files` are inherited.

        `Idempotency-Key` shares the `(repo, key)` keyspace with
        `POST /v0/runs`: a replay returns the existing run with 200.
        Replay is honored BEFORE the budget gate — a network retry of
        a successful recovery returns the existing run even when the
        blocking budget tripped between the two calls (replay is not
        new spend).

        **Authorization.** Requires `write:runs` (same as
        `POST /v0/runs`). A decomposition-child target ADDITIONALLY
        rejects agent (MCP subject-bound, `mcp:run:<uuid>`) tokens with
        403 `agent_token_forbidden`: that path re-opens a terminal run
        via the same `run.RedriveChild` action `POST /v0/runs/{id}/redrive`
        performs, which is operator-only — an agent may not re-drive any
        run, including its own (#698, #1081).
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
            description: |
              Opaque caller-chosen string, shared keyspace with
              `POST /v0/runs`. Same key + same repo = the existing
              run is returned (200).
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                add_scope_files:
                  type: array
                  description: |
                    Operator-named paths folded into the recovery run's
                    effective scope as a pre-approved scope amendment.
                    Repo-relative; absolute, empty, and `..`-containing
                    paths are refused 400.
                  items:
                    type: object
                    additionalProperties: false
                    required: [path]
                    properties:
                      path:
                        type: string
                        example: docs/companion.md
                      operation:
                        type: string
                        enum: [modify, create]
                        default: modify
                exempt_scope_files:
                  type: array
                  description: |
                    DECLARED `scope.files` paths to mark
                    operator-justified-unchanged so the runner's shortfall
                    gate subtracts them (#1229) — the inverse of
                    `add_scope_files`: it subtracts from the gate, it does
                    NOT widen scope (no amendment row). Each entry requires
                    a clean repo-relative `path` AND a non-empty `reason`;
                    either failure is refused 400 `validation_failed` with
                    `field=exempt_scope_files`.
                  items:
                    type: object
                    additionalProperties: false
                    required: [path, reason]
                    properties:
                      path:
                        type: string
                        example: backend/internal/server/handlers.go
                      reason:
                        type: string
                        example: the declared file needs no change on this slice
                reason:
                  type: string
                  description: |
                    Why the recovery (and each added path) is needed;
                    recorded on the amendment row and the
                    `plan_reused_from` audit entry, and injected into the
                    recovery agent's binding conditions (Part D).
                budget_override:
                  type: boolean
                  description: |
                    Force the recovery past a blocking periodic budget
                    that is over its limit (#688); ignored when no
                    blocking budget is over.
      responses:
        '201':
          description: |
            Recovery run created (top-level target) or decomposition
            child re-opened in place (same run id).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Run' }
        '200':
          description: Idempotent replay — existing run returned.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Run' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: |
            Missing `write:runs` scope (`insufficient_scope`), OR a
            decomposition-child target presented with an MCP/agent
            subject-bound token (subject `mcp:run:<uuid>`) — body `error`
            is `agent_token_forbidden`; that path re-drives a terminal run
            in place, an operator-only action (#698, #1081).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: |
            `recovery_not_eligible` — a top-level target whose plan
            stage is not `succeeded` and/or whose implement stage is not
            `failed` category-B, or a decomposition-child target whose
            own implement stage is not `failed` category-B and/or whose
            plan does not resolve via the `parent_run_id` walk.
            `details` carries `{plan_state, implement_state,
            failure_category, plan_resolved}`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422':
          description: |
            `recovery_unsupported` — the parent run has no cached
            workflow spec (legacy row), its cached spec no longer
            parses or defines the workflow, or the workflow has no
            non-plan stages. Start a fresh run instead.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }

  /v0/runs/{run_id}/redrive:
    post:
      operationId: redriveChild
      summary: Re-drive a failed decomposition child run
      description: |
        Operator recovery action for a decomposition parent parked in
        `awaiting_children` because every failed child was in a retryable
        failure category (A/C, or D-timeout) — see #698. Re-opens the
        failed child run (`failed` → `running`) and its failed implement
        stage (`failed` → `pending`), then hands off to the orchestrator
        to walk `pending` → `dispatched` and fire `workflow_dispatch`.
        Un-terminal-ing the run is what lets the orchestrator act —
        `Advance` no-ops on a terminal run. On the child's next terminal
        transition the parked parent reconciles through the normal
        parent-resolution path. Writes a `child_redriven` audit entry on
        success with the prior implement-stage failure category and
        reason in the payload.

        **Authorization.** Re-drive is an operator action. It requires
        the operator retry scope (`write:stages` or `write:retries`, the
        same shape as `POST /v0/stages/{stage_id}/retry`) AND rejects any
        MCP subject-bound (agent) token outright — an agent may not
        re-drive any run (not its own, not a sibling/child/parent),
        because re-opening a terminal run is not an agent-permitted
        action. Cookie-session operators are accepted unconditionally.
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: Child re-driven; refreshed Run row (state `running`) in body.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Run' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: |
            One of two cases: (1) the caller presented an MCP/agent
            subject-bound token (subject `mcp:run:<uuid>`) — body `error`
            is `agent_token_forbidden`; agent tokens may never re-drive a
            run. (2) a bearer token lacks both `write:stages` and
            `write:retries` scope — body `error` is `insufficient_scope`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422':
          description: |
            Re-drive not applicable: the run is not a decomposition child
            (`DecomposedFrom` is null), is not in the `failed` state, or
            has no failed implement stage to re-open. Body's `error` is
            `redrive_not_applicable` and `message` explains the reason.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/runs/{run_id}/reset-branch:
    post:
      operationId: resetRunBranch
      summary: Force-reset a run branch off a foreign on-top commit
      description: |
        Operator-gated, audited ADR-035 remediation (#867) for a foreign
        commit pushed **ON TOP** of a run's own commits on the open PR
        branch — the post-prevention (#861/#865) residual vector. Rewinds
        the run/PR branch back to its **last run-authored HEAD** (the newest
        commit attributable to this run's reported-head ledger), dropping
        the on-top foreign commit, then re-parks the review gate so CI + the
        merge reconciler re-evaluate the rewound head.

        Mechanism: resolves the PR base ref + live head from GitHub, builds
        the run's reported-head ledger (seeded `""` so the foreign tip is
        not self-whitelisted), runs the `base...head` compare, and computes
        the last run-authored HEAD. It then force-updates (`PATCH .../git/
        refs/heads/{branch}` with `force:true`) the PR head ref to that SHA,
        re-parks the run's review stage, writes a `branch_reset` audit entry,
        and refreshes the sticky status comment.

        **Destructive — safety invariants (all BINDING):**

        - **Operator-gated.** `confirm` MUST be `true`; a missing/false
          confirm is refused 400 (`confirmation_required`). Never silent/auto.
        - **On-top only.** Proceeds only when EVERY foreign commit sits
          strictly above the reset target. A foreign ancestor/interleaved
          commit cannot be dropped by a reset (the run's commits sit on it)
          and is refused 422 (`reset_out_of_scope`) — prevention owns it.
        - **Fail-closed.** Unlike the detect path (which fails open so a
          transient GitHub failure never blocks a clean run), the
          destructive action REFUSES on ANY uncertainty — unresolvable base
          ref, incomplete ledger, compare error, no identifiable
          run-authored HEAD — with 422 (`reset_not_determinable`), never a
          force-update.
        - **Lease re-check.** Immediately before the force-update the live
          PR head is re-read; if it changed since classification (concurrent
          push) the reset aborts 422 (`reset_not_determinable`). The REST
          refs API has no compare-and-swap, so this narrows but does not
          eliminate the TOCTOU window.

        The dropped commit stays recoverable from the remote reflog / the
        foreign pusher's own branch (recorded in the audit `recovery_note`).

        **Authorization.** Requires `write:runs`. A run-bound MCP token
        (subject `mcp:run:<uuid>`) may reset ONLY its own run's branch;
        another run's branch is refused 403 (`cross_run_reset`).
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      requestBody:
        required: true
        description: |
          Confirms the destructive force-rewind and carries an optional
          operator rationale.
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [confirm]
              properties:
                confirm:
                  type: boolean
                  description: |
                    MUST be `true` to proceed — the reset force-rewinds the
                    PR head ref and is destructive. A missing/false value is
                    refused 400 (`confirmation_required`).
                reason:
                  type: string
                  description: |
                    Optional operator rationale, recorded on the
                    `branch_reset` audit entry.
      responses:
        '200':
          description: Branch rewound; rewind summary in body.
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id: { $ref: '#/components/schemas/UUID' }
                  pr_number: { type: integer }
                  branch: { type: string }
                  dropped_offending_sha: { type: string, description: 'The foreign on-top commit that was dropped.' }
                  reset_to_sha: { type: string, description: 'The last run-authored HEAD the branch was rewound to.' }
                  prior_head_sha: { type: string, description: 'The branch tip before the rewind.' }
                  reparked_review_stage_id: { type: string, description: 'The re-parked review stage id; omitted on the commit-yourself shape.' }
                  recovery_note: { type: string }
        '400':
          description: |
            Malformed body or `confirm` not `true`. Body's `error` is
            `validation_failed` or `confirmation_required`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: |
            One of two cases: (1) bearer token lacks `write:runs` scope —
            body `error` is `insufficient_scope`; (2) an mcp run-bound token
            (subject `mcp:run:<uuid>`) targeting another run's branch — body
            `error` is `cross_run_reset`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422':
          description: |
            Reset refused. One of: `reset_out_of_scope` (the foreign commit
            is an ancestor/interleaved, not strictly on top — prevention
            owns it); `reset_not_applicable` (the tip is already the last
            run-authored HEAD; nothing on top to drop); or
            `reset_not_determinable` (fail-closed: the lineage could not be
            classified with certainty, or the lease re-check found a
            concurrent push). Body's `message` explains the specific reason.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '502':
          description: |
            The GitHub force-update of the PR head ref failed
            (`reset_force_update_failed`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/runs/{run_id}/vouch-commit:
    post:
      operationId: vouchCommit
      summary: Vouch a foreign commit as run-authored lineage
      description: |
        Operator-gated, audited ADR-035 provenance path (#1044) for a
        foreign commit on a run branch that no loop-native remediation can
        route — an operator's mechanical remediation commit (e.g. a
        `scripts/sync-schemas` output pushed onto a decomposition fan-out
        branch whose children are all terminal with zero open concerns). The
        operator DECLARES the commit run-authored lineage; the declaration
        records an `operator_commit_vouched` audit entry and unions the
        vouched SHA into the run's reported-head ledger (on the run's own
        chain AND its decomposition children), so the merge reconciler's
        ADR-035 re-check (`ReverifyBranchLineage`) attributes it cleanly and
        the run it fixed is no longer wedged.

        Distinct from `reset-branch`, which DROPS an on-top foreign commit:
        vouch KEEPS the operator commit and attributes it. Use vouch when
        the commit is a legitimate remediation to retain.

        **Fail-closed is preserved.** The handler records the declaration
        verbatim — it does NOT verify the SHA exists on the branch or in the
        compare set. Vouching a wrong/non-existent SHA simply adds an
        unreachable ledger entry and un-wedges nothing; an UN-vouched foreign
        commit still fails category-B at the report boundary and still blocks
        merge resolution.

        **Authorization.** Operator-token-only by design (ADR-035 sole-writer
        invariant). Requires `write:stages`. A run-bound MCP token (subject
        `mcp:run:<uuid>`) is REJECTED OUTRIGHT 403 (`run_token_forbidden`),
        even for its own run — an agent self-declaring lineage for a commit
        on its own branch would defeat the invariant the vouch must preserve.
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      requestBody:
        required: true
        description: |
          Names the commit to vouch and carries the operator's rationale.
          Both fields are required — the vouch is an audited operator
          declaration.
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [sha, reason]
              properties:
                sha:
                  type: string
                  description: |
                    The commit SHA on the run branch to declare as
                    run-authored lineage.
                reason:
                  type: string
                  description: |
                    Operator rationale — why this commit is legitimate
                    run-authored lineage. Recorded verbatim on the
                    `operator_commit_vouched` audit entry.
      responses:
        '200':
          description: Vouch recorded; the declaration is echoed in the body.
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id: { $ref: '#/components/schemas/UUID' }
                  vouched_sha: { type: string, description: 'The commit SHA recorded as run-authored lineage.' }
                  reason: { type: string }
        '400':
          description: |
            Malformed body or an empty `sha`/`reason`. Body's `error` is
            `validation_failed`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: |
            One of two cases: (1) the identity lacks `write:stages` scope —
            body `error` is `insufficient_scope` (enforced unconditionally:
            a cookie-session operator without the scope is rejected too, no
            bypass); (2) a run-bound MCP token
            (subject `mcp:run:<uuid>`) attempted the vouch — body `error` is
            `run_token_forbidden` (rejected outright, even for its own run).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503':
          description: |
            The run or audit repositories are not wired
            (`vouch_unconfigured`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/runs/{run_id}/stages:
    get:
      operationId: listRunStages
      summary: List stages for a run
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: Stages ordered by sequence ascending.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Stage' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v0/runs/{run_id}/stages/{stage_id}:
    get:
      operationId: getRunStage
      summary: Read one stage by its (run, stage) handle, with optional terminal-wait long-poll
      description: |
        Resolves a stage by the durable ADR-037 `(run_id, stage_id)`
        handle and returns the canonical `Stage` shape plus a small
        wait envelope (`state`, `terminal`, optional `next_action`). It
        is the SDK-independent REST analogue of the scope-amendment
        `?wait` long-poll (#1252), giving a detached operator-side
        watcher (a backgrounded shell poll) ONE authoritative signal
        for stage settledness. Companion to the `dispatch_stage`
        non-blocking dispatch work (#1232).

        **Auth** mirrors `GET /v0/runs/{run_id}/scope-amendments`:
        anonymous callers get 401; a run-bound `fhm_` bearer must carry
        `mcp:read` (else 403 `insufficient_scope`) AND match the path
        `run_id` (else 403 `cross_run_stage`); operator bearers/sessions
        (not run-bound) pass. The `(run_id, stage_id)` handle must be
        consistent — a stage whose `run_id` differs from the path is
        404 `stage_not_found` (it does not exist at this path).

        **`terminal`** is true when the stage has *settled*: a terminal
        state (`succeeded`, `failed`, `cancelled`) OR a parked state
        awaiting operator action (`awaiting_approval`,
        `awaiting_children`, `awaiting_input`, `awaiting_scope_decision`).
        The in-flight states (`pending`, `dispatched`, `running`) are
        not settled. This is wider than run/stage terminality — a
        detached watcher releases the moment the stage needs attention.

        **Optional `?wait=<seconds>` long-poll.** When `wait` is a
        positive integer and the stage is not yet settled, the server
        holds the connection — re-reading the stage internally — and
        returns the moment the stage settles, at the wait cap (returning
        the still-unsettled stage so the client re-issues), or on client
        disconnect. `wait` is clamped to `0..30`; `0`, absent, or a
        non-positive/non-integer value is the unchanged immediate read.
        An already-settled stage returns immediately regardless of
        `wait`. On a transient re-read error the server returns the
        last-good stage at 200 (never regressing the wait to a 500); no
        new error codes.

        **`next_action`** reuses the same `run_auto_advanced` drive
        distillation as `GET /v0/runs/{run_id}`: best-effort, omitted on
        non-drive runs, terminal runs, and any read failure — never
        fabricated.
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - { name: stage_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - name: wait
          in: query
          required: false
          description: |
            Optional server-side long-poll in seconds (#1252). `0` or
            absent = no wait (immediate read). When positive and the
            stage is not yet settled, holds until the stage settles
            (terminal OR parked) or the wait elapses; the client
            re-issues to extend. Clamped to `0..30`.
          schema:
            type: integer
            minimum: 0
            maximum: 30
            default: 0
      responses:
        '200':
          description: The stage, with the terminal-wait envelope.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Stage'
                  - type: object
                    required: [state, terminal]
                    properties:
                      state:
                        type: string
                        description: The stage state, echoed at the top level.
                      terminal:
                        type: boolean
                        description: |
                          True when the stage has settled — terminal OR
                          parked awaiting operator action.
                      next_action:
                        $ref: '#/components/schemas/RunNextAction'
                        description: |
                          Distilled operator next step, reusing the
                          `GET /v0/runs/{run_id}` drive distillation.
                          Omitted on non-drive runs, terminal runs, and
                          on any read failure.
        '400':
          description: run_id or stage_id is malformed (`validation_failed`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: No authenticated token.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: |
            `insufficient_scope` (run-bound token lacks `mcp:read`)
            or `cross_run_stage` (run-bound token reading another run's
            stage).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: |
            `stage_not_found` — no stage with that id, or the stage's
            `run_id` does not match the path `run_id` (inconsistent
            handle).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: Run repository not wired.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/runs/{run_id}/audit:
    get:
      operationId: listRunAudit
      summary: List audit entries for a run
      description: |
        Cursor-paginated, sequence-ascending. Used by the run-detail UI
        and (eventually) the compliance export.
      tags: [audit]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - { name: category, in: query, schema: { type: string } }
        - name: stage_id
          in: query
          schema: { $ref: '#/components/schemas/UUID' }
          description: |
            Optional. When set, the response is filtered to entries
            tagged with this stage id. Used by the implement-stage
            session view (#215) to render a per-stage activity feed.
        - name: since_sequence
          in: query
          schema: { type: integer, format: int64, minimum: 0 }
          description: |
            Optional. When set, the response is filtered to entries with
            `sequence` strictly greater than this value (applied before
            pagination). `0` is a no-op (sequences start at 1). This is
            the anchor for the sequence-anchored await primitive
            (`fishhawk_await_audit`, #962): a caller polling for "the
            next `<category>` entry after sequence N" never needs
            pagination or a tail-sized limit.
        - { name: limit, in: query, schema: { type: integer, default: 100, maximum: 500 } }
        - { name: cursor, in: query, schema: { type: string } }
      responses:
        '200':
          description: Page of audit entries.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Pagination'
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/AuditEntry' }
        '400':
          description: |
            `validation_failed` — `stage_id` not a UUID, `since_sequence`
            not a non-negative integer, or `limit` out of range.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v0/runs/{run_id}/budget:
    get:
      operationId: getRunBudget
      summary: Current periodic-budget status for a run's workflow
      description: |
        Returns the current calendar-period status of the workflow's
        periodic budget (#693 / ADR-030): spend vs limit, the fraction
        consumed, and the `ok`/`warn`/`over` tier. Reuses the same
        evaluation chain the advisory alert path runs (period range →
        cross-run cost sum → evaluate).

        **Display-only.** This endpoint never gates or blocks a run; it
        exists so the MCP loop can surface spend-vs-limit every stage
        instead of relying on the advisory issue comment.

        When the workflow declares no budget the response is **200 with
        an empty object** (`{}`) rather than a 404, so clients branch on
        the presence of `period`. A workflow with multiple budgets
        surfaces only the first.
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: |
            Periodic-budget status, or an empty object when the workflow
            declares no budget.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RunBudgetStatus' }
        '400':
          description: "`validation_failed` — `run_id` not a UUID."
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503': { description: Run repository unavailable. }

  /v0/runs/{run_id}/cache-efficiency:
    get:
      operationId: getRunCacheEfficiency
      summary: Per-run prompt-cache efficiency metric
      description: |
        Returns the run's prompt-cache efficiency, derived purely from the
        run's `cost_recorded` audit ledger (ADR-044 / #1352): the cache-read
        ratio (share of input served from cache), the reuse factor (re-reads
        per cache-write token), and the gross / penalty / net US-dollar
        effect of caching, plus a per-stage breakdown keyed on the entry's
        `source` (`plan_review` / `implement_review`, with the runner
        stage-agent path — entries that carry no `source` — bucketed as
        `agent`).

        **Display-only.** This endpoint never gates or blocks a run; it
        exists so the MCP loop can surface and maximize cache-hit usage. It
        has no write path and no migration — it reads existing audit data.

        When the run has no `cost_recorded` data the response is **200 with
        an empty object** (`{}`) rather than a 404, so clients branch on the
        presence of a field. An unknown / unpriced model contributes 0 to
        the savings figures while its tokens still count toward the ratios.
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: |
            Cache-efficiency metric, or an empty object when the run has no
            cost data.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RunCacheEfficiency' }
        '400':
          description: "`validation_failed` — `run_id` not a UUID."
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503': { description: Run repository unavailable. }

  /v0/runs/{run_id}/cost:
    get:
      operationId: getRunCost
      summary: Per-run estimated cost with per-stage and per-merged-PR rollup
      description: |
        Returns the run's estimated cost, derived purely from the run's
        `cost_recorded` audit ledger (#1372): the run's total estimated
        US-dollar cost, a per-stage breakdown keyed on the entry's `source`
        (`plan_review` / `implement_review`, with the runner stage-agent
        path — entries that carry no `source` — bucketed as `agent`), and —
        when the run resolved to a merged PR (a `pr_merged` audit row exists
        AND the run carries a pull-request URL) — a cost-per-merged-PR
        rollup summing `cost_usd_total` across every run sharing that PR URL
        plus the contributing run count.

        **Display-only.** This endpoint never gates or blocks a run; it
        exists so the MCP loop can surface the cost to land work. It has no
        write path and no migration — it reads existing audit and run data;
        merge state is read from the audit ledger, never the GitHub API.

        When the run has no `cost_recorded` data the response is **200 with
        an empty object** (`{}`) rather than a 404, so clients branch on the
        presence of a field.
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: |
            Cost summary, or an empty object when the run has no cost data.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RunCost' }
        '400':
          description: "`validation_failed` — `run_id` not a UUID."
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503': { description: Run repository unavailable. }

  /v0/runs/{run_id}/diagnostics:
    get:
      operationId: getRunDiagnostics
      summary: Product-facts-only diagnostic bundle for a run
      description: |
        Returns a redaction-safe diagnostic bundle for the run (#1006):
        the minimal, structured product facts an operator attaches to an
        upstream Fishhawk product report. The bundle carries the run id,
        ordered stage states, the failing stage's category + audit
        surface, the audit sequence range, this backend's build version +
        git SHA (and the minimum runner version it requires), the workflow
        spec hash, and the runner kind.

        **Pure read, no egress.** By construction the bundle carries NO
        diffs, paths, prompts, free text, or audit payload bodies — the
        failing stage's free-text reason is excluded. Backs the
        `fishhawk diagnose <run-id>` CLI verb and the foundation of the
        product-feedback egress path (later slices).
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: The product-facts diagnostic bundle.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DiagnosticBundle' }
        '400':
          description: "`validation_failed` — `run_id` not a UUID."
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503': { description: Run or audit repository unavailable. }

  /v0/runs/{run_id}/product-reports:
    post:
      operationId: fileProductReport
      summary: File a deduped, audited upstream product report for a run
      description: |
        The deduped, audited egress path for upstream Fishhawk product
        feedback (#1006). Collects the run's product-facts diagnostic
        bundle, fingerprints the failure over (failure category, audit
        surface, fishhawkd version family), searches the FIXED upstream
        product repo for an open report already carrying that fingerprint,
        and either appends an occurrence comment (dedup hit, nothing
        created) or files a new fingerprint-marked report (dedup miss).
        A source-side `product_report_filed` audit entry names what left
        the boundary (fingerprint, destination, created-vs-occurrence).

        **Egress is gated** by a mutually-exclusive entitlement switch
        (widened in #1274). The report may be filed by the run's own
        run-bound agent token, a non-run-bound operator/operator-agent
        bearer token holding `write:runs`, or a cookie-session operator.
        A run-bound token bound to a DIFFERENT run → 403 `run_not_entitled`;
        a non-run-bound bearer WITHOUT `write:runs` → 403
        `insufficient_scope`. An operator/operator-agent token may file for
        ANY run (operator scope = the deployment). A per-repo
        `product_feedback` kill-switch (`enabled: false`) → 403
        `product_feedback_disabled`, files nothing.
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductReportRequest' }
      responses:
        '201':
          description: The report was filed (created) or an occurrence was recorded.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductReportResponse' }
        '400':
          description: "`validation_failed` — `run_id` not a UUID or `kind` not bug/feature."
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: |
            `run_not_entitled` — a run-bound token may only file for its own
            run; `insufficient_scope` — a non-run-bound operator bearer is
            missing `write:runs`; `product_feedback_disabled` — the repo's
            kill-switch is off.
        '404': { $ref: '#/components/responses/NotFound' }
        '501':
          description: "`provider_unimplemented` — no feedback provider registered for the conventions' provider."
        '502':
          description: "`product_report_failed` — the dedup search or upstream filing failed."
        '503': { description: Run or audit repository unavailable. }

  /v0/runs/{run_id}/status-comment:
    get:
      operationId: getStatusComment
      summary: Get rendered sticky-comment body and stored GitHub comment ID
      description: |
        Returns the rendered Markdown body for the run's issue thread sticky
        comment (`RenderStatusBody`) plus the `github_comment_id` from the
        most recent `status_comment_posted` audit entry (0 when no comment
        has been posted yet). Used by the CLI to drive edit-in-place updates
        without re-rendering client-side (#428).
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: Rendered body and stored comment ID.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StatusCommentResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503': { description: Run repository unavailable. }
    post:
      operationId: recordStatusCommentID
      summary: Record the GitHub comment ID after posting the sticky comment
      description: |
        Called by the CLI after `gh api` creates or edits the issue comment.
        Appends a `status_comment_posted` audit entry with the returned
        `github_comment_id` so subsequent GET calls can return it for
        edit-in-place targeting. Idempotent: multiple POSTs are safe (#428).
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [github_comment_id]
              properties:
                github_comment_id:
                  type: integer
                  format: int64
                  minimum: 1
      responses:
        '201':
          description: Comment ID recorded.
        '400':
          description: "`validation_failed` — `github_comment_id` missing or ≤ 0."
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503': { description: Run repository unavailable. }

  /v0/audit:
    get:
      operationId: listGlobalAudit
      summary: Search the cross-chain audit log
      description: |
        Cross-chain feed for the audit-log search surface (#211): returns
        per-run rows AND global-chain rows (token issuance, OAuth sign-in,
        etc.) merged into one **time-descending** page. Same cursor +
        limit envelope as `/v0/runs/{run_id}/audit`. Optional `category`
        and `run_id` filters; combine for "show me approvals on this run."

        Distinct from `/v0/runs/{run_id}/audit` (sequence-ascending,
        scoped to one run, used by the run-detail audit list and the
        per-run verifier path). The global-chain partition specifically
        is the verifier's input — not exposed over HTTP for now.
      tags: [audit]
      parameters:
        - { name: category, in: query, schema: { type: string } }
        - { name: run_id, in: query, schema: { $ref: '#/components/schemas/UUID' } }
        - { name: limit, in: query, schema: { type: integer, default: 100, maximum: 500 } }
        - { name: cursor, in: query, schema: { type: string } }
      responses:
        '200':
          description: Page of audit entries, time-descending across both chains.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Pagination'
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/AuditEntry' }
        '400':
          description: |
            `validation_failed` — `limit` out of range or `run_id` not a UUID;
            `cursor_invalid` — opaque cursor failed to decode.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503':
          description: Audit repository not configured on this instance.

  # ---------------------------------------------------------------------
  # Campaigns (ADR-047 / #1437)
  # ---------------------------------------------------------------------
  /v0/campaigns:
    get:
      operationId: listCampaigns
      summary: List campaigns
      description: |
        Cursor-paginated list ordered by `created_at` descending. Optional
        `repo` and `state` filters AND together.
      tags: [campaigns]
      parameters:
        - { name: repo, in: query, schema: { type: string } }
        - { name: state, in: query, schema: { type: string, enum: [pending, running, succeeded, failed, cancelled] } }
        - { name: limit, in: query, schema: { type: integer, default: 50, maximum: 200 } }
        - { name: cursor, in: query, schema: { type: string } }
      responses:
        '200':
          description: Page of campaigns.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Pagination'
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/Campaign' }
        '400':
          description: |
            `validation_failed` — `limit` out of range or `state` not a known
            value; `cursor_invalid` — opaque cursor failed to decode.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503':
          description: "`campaign_repo_unconfigured` — no campaign repository wired."
    post:
      operationId: createCampaign
      summary: Create a campaign from an epic ref
      description: |
        Assembles a campaign from an epic: queries the epic's child issues
        and their `depends_on` edges via the work-management provider,
        wave-orders them with the campaign DAG engine, and persists the
        campaign + its items.

        This is a runless create with no run row, so it resolves the repo's
        GitHub App installation directly (`GET /repos/{owner}/{repo}/installation`)
        — the same path `POST /v0/runs` uses — which the GitHub provider needs
        to query the epic's children. A repo the App is not installed on fails
        closed with `422 repo_not_installed`.

        Pass `Idempotency-Key: <opaque-string>` to make the call retriable
        (E25.13). If a campaign with the same `(repo, key)` exists it is
        returned with a `200` carrying `idempotent: true` instead of minting a
        duplicate at `201`. The scope is `(repo, key)` so two callers picking
        the same key for different repos don't collide; no header = always
        create. Mirrors the `POST /v0/runs` idempotency contract.
      tags: [campaigns]
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
            description: |
              Opaque caller-chosen string. Same key + same repo = the existing
              campaign is returned (200, `idempotent: true`). Different key OR
              different repo = a fresh campaign is created (201). No header =
              always create.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [repo, epic_ref]
              properties:
                repo:
                  type: string
                  example: kuhlman-labs/fishhawk
                epic_ref:
                  type: string
                  description: The epic to decompose, in `issue:N` form.
                  example: "issue:1439"
                pause_policy:
                  type: string
                  enum: [pause_campaign, pause_item]
                  description: |
                    OPTIONAL pause behavior on an auto-driver gate hand-off
                    (E25.7). Omit to take the default `pause_campaign` (block
                    the whole campaign); `pause_item` pauses only the affected
                    item (continue-others).
                operator_agent:
                  type: object
                  additionalProperties: true
                  description: |
                    OPTIONAL campaign-level `operator_agent` delegation
                    override (E25.12) that tightens or relaxes the per-workflow
                    contract for ALL the campaign's issue-runs, winning
                    wholesale over the gate/workflow blocks. Same shape as the
                    workflow spec's `operator_agent` block; validated against it
                    (unknown fields rejected) at create. Omit (or send `null`)
                    for no override — each issue-run inherits its workflow's
                    contract.
      responses:
        '200':
          description: |
            Idempotent replay — a campaign with the same `(repo,
            Idempotency-Key)` already exists; it is returned unchanged with
            `idempotent: true` instead of a fresh create.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Campaign' }
        '201':
          description: Campaign created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Campaign' }
        '400':
          description: |
            `validation_failed` — `repo` not in owner/name form, `epic_ref`
            missing, `pause_policy` not a recognized value, `operator_agent`
            not a valid operator-agent block (malformed or an unknown knob),
            body malformed / unknown field, or a dependency cycle among the
            epic's children.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: "`insufficient_scope` — bearer token missing `write:campaigns`."
        '422':
          description: |
            `repo_not_installed` — the GitHub App is not installed on the
            target repo; `campaign_dangling_dependency` — a child's
            `depends_on` targets an issue that is not a fellow child of the
            epic (assembly fails closed rather than dropping the edge).
        '501':
          description: |
            `provider_unimplemented` — the conventions name an unregistered
            provider; `epic_children_unsupported` — the provider cannot query
            epic children.
        '502':
          description: |
            `installation_resolution_failed` — a transient failure resolving
            the App installation; `epic_children_query_failed` — the provider
            could not query the epic's children.
        '503':
          description: "`campaign_repo_unconfigured` — no campaign repository wired."

  /v0/campaigns/{campaign_id}:
    get:
      operationId: getCampaign
      summary: Get a campaign
      tags: [campaigns]
      parameters:
        - { name: campaign_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: The campaign.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Campaign' }
        '400':
          description: "`validation_failed` — `campaign_id` is not a valid UUID."
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404':
          description: "`campaign_not_found` — no campaign with that id."
        '503':
          description: "`campaign_repo_unconfigured` — no campaign repository wired."

  /v0/campaigns/{campaign_id}/items:
    get:
      operationId: listCampaignItems
      summary: List a campaign's items
      tags: [campaigns]
      parameters:
        - { name: campaign_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: The campaign's items, in insertion order.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/CampaignItem' }
        '400':
          description: "`validation_failed` — `campaign_id` is not a valid UUID."
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404':
          description: "`campaign_not_found` — no campaign with that id."
        '503':
          description: "`campaign_repo_unconfigured` — no campaign repository wired."

  /v0/campaigns/{campaign_id}/status:
    get:
      operationId: getCampaignStatus
      summary: Get a campaign's rollup status + next action
      description: |
        The campaign, its items, the engine's readiness rollup, and the
        distilled `next_action`. This is the surface the operator-agent polls
        to drive a campaign. `next_action` precedence is FAILED-wins: a failed
        item yields `attention` regardless of whether eligible items exist.

        Reconcile-on-read (E26.2 / #1481): this GET also settles any running
        item whose linked run reached a terminal state and re-derives the
        campaign — mirroring the auto-driver's advance pass — so the rollup +
        `next_action` advance in DAG order as the operator drives each run to
        merge, with no auto-driver and no GitHub Actions. Best-effort and
        idempotent: the reconcile never fails the read, and a re-poll over an
        already-settled item performs no further transition.
      tags: [campaigns]
      parameters:
        - { name: campaign_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: Campaign rollup status.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CampaignStatus' }
        '400':
          description: "`validation_failed` — `campaign_id` is not a valid UUID."
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404':
          description: "`campaign_not_found` — no campaign with that id."
        '503':
          description: "`campaign_repo_unconfigured` — no campaign repository wired."

  /v0/campaigns/{campaign_id}/runs:
    post:
      operationId: startCampaignItemRun
      summary: Start a run for an eligible campaign item
      description: |
        The operator-driven, campaign-aware run start (E26.2 / #1481): mint a
        run for one campaign item and link it to the campaign so the rollup +
        `next_action` track + DAG-gate it as the operator drives the run to
        merge — without the backend auto-driver and without GitHub Actions.

        For the `issue_ref` it refuses unless the item is **eligible** per the
        campaign engine (every dependency has succeeded), naming the blocking
        dependency on refusal. On an eligible item it mints the run via the
        same seam the auto-driver uses (carrying `runner_kind` so the local
        loop gets `local`), links it to the item, transitions the item
        `pending`/`blocked` → `running`, and advances a `pending` campaign to
        `running`.

        Pair this with `GET /v0/campaigns/{campaign_id}/status`, which is
        reconcile-on-read: it settles any running item whose linked run reached
        terminal and re-derives the campaign, so the rollup advances in DAG
        order as each run is driven to merge.
      tags: [campaigns]
      parameters:
        - { name: campaign_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/StartCampaignItemRunRequest' }
      responses:
        '201':
          description: The minted run and the linked campaign item.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StartCampaignItemRunResult' }
        '400':
          description: |
            `validation_failed` — `campaign_id` is not a valid UUID, `issue_ref`
            or `workflow_id` is empty, `runner_kind` is unrecognized, or the
            body carries unknown fields.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: "`insufficient_scope` — bearer token missing `write:campaigns`."
        '404':
          description: |
            `campaign_not_found` — no campaign with that id;
            `campaign_item_not_found` — no campaign item with that `issue_ref`.
        '409':
          description: |
            `campaign_not_startable` — the campaign is paused (resume it first)
            or terminal; `item_not_eligible` — the item is blocked on a
            dependency (the detail names it), already running, or terminal;
            `invalid_transition` — a concurrent change made the running
            transition illegal.
        '502':
          description: "`campaign_run_start_failed` — the installation or workflow spec could not be resolved."
        '503':
          description: "`campaign_repo_unconfigured` — no campaign repository wired."

  /v0/campaigns/{campaign_id}/resume:
    post:
      operationId: resumeCampaign
      summary: Resume a paused campaign
      description: |
        The operator's hand-back after the auto-driver paged a human at a run
        gate (E25.7 / ADR-047 Track C). Flips the campaign `paused` → `running`
        (when the campaign itself was paused under the `pause_campaign` policy)
        AND every paused item `paused` → `running`, so the next driver tick
        re-engages the campaign and the continuation proceeds.

        Serves both pause policies: under `pause_campaign` the campaign and the
        affected item are paused together; under `pause_item` only the item is
        paused while the campaign stays running. "Nothing to resume" — the
        campaign is not paused AND no item is paused — yields `409
        campaign_not_paused`.
      tags: [campaigns]
      parameters:
        - { name: campaign_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: The resumed campaign (now `running`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Campaign' }
        '400':
          description: "`validation_failed` — `campaign_id` is not a valid UUID."
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: "`insufficient_scope` — bearer token missing `write:campaigns`."
        '409':
          description: |
            `campaign_not_paused` — the campaign has no paused state to resume;
            `invalid_transition` — a concurrent change made the resume
            transition illegal.
        '503':
          description: "`campaign_repo_unconfigured` — no campaign repository wired."

  # ---------------------------------------------------------------------
  # Work-item filing
  # ---------------------------------------------------------------------
  /v0/work-items:
    post:
      operationId: fileWorkItem
      summary: File a work item via the repo's work-management conventions
      description: |
        Provider-agnostic work-item filing (#1005). Loads the repo's
        work-management conventions (the shipped default in v0; a per-repo
        `work_management` config in a follow-up), applies them to the
        caller's request — rendering the title from `title_format`,
        assembling the body from the type's skeleton + `sections`, merging
        `default_labels`, resolving board placement + complexity, allocating
        the sequential number for a numbered type (e.g. `adr`), and
        validating relations against the type's `epic_link` rule — then
        dispatches the resolved item to the configured provider
        (`github_projects`; `jira` is interface-only in v0) and returns the
        created item.

        `summary` is the mandatory one-liner: it fills the `{summary}`
        title placeholder and is the required Summary field. The same call
        shape works for any repo because only the conventions differ.

        **Epic auto-derivation.** For a child type whose `title_format`
        references `{epic}` (e.g. `[E{epic}.{n}]`), when `relations.parent_epic`
        is set and `title_vars` omits `epic`, the handler reads the parent epic
        issue's title server-side and parses its leading `[E<n>]` token into the
        `{epic}` placeholder — so the caller need only supply `{n}`. This fails
        closed: if no GitHub client/installation is available, the parent ref is
        unparseable, the issue fetch errors, or the parent title carries no
        `[E<n>]` token, `{epic}` is left unresolved and the `422` below is
        returned rather than a wrong title.

        **Sections fail loud.** When `body` is omitted, every `sections` key
        must match the type's `body_skeleton` exactly. An off-skeleton key
        returns `422 work_item_invalid` rather than silently dropping the
        content.

        When `run_id` names a run that is **in flight** (not terminal), a
        best-effort `work_item_filed` audit entry is appended to that run.
        Filing succeeds with no `run_id` (the operator-agent follow-up
        filing path, ADR-040) — `audited` is then `false`. An audit-append
        failure never fails the response: the item is already filed.

        On the run-absent path the handler resolves the App's installation
        for the target repo (`GET /repos/{owner}/{repo}/installation`) so
        GitHub filing works without a run; a repo the App is not installed
        on fails closed. The run-absent path is operator-only: a run-bound
        agent token must file run-scoped (supply its own `run_id`) and is
        rejected with `403 run_scoped_filing_required` if it omits `run_id`.

        An unregistered/unimplemented provider id fails closed with `501
        provider_unimplemented` naming the missing provider — never a panic.
      tags: [work-items]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WorkItemRequest' }
      responses:
        '201':
          description: Work item filed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkItemResponse' }
        '400':
          description: |
            `validation_failed` — `repo` not in owner/name form, or `type` /
            `summary` / `run_id` missing or malformed.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: |
            `run_not_entitled` — a `run_id` was supplied by a caller that is
            not that run's own run-bound agent token (`mcp:run:<uuid>`). Only
            the run's bound token may drive a `work_item_filed` audit entry
            onto its chain, so an arbitrary authenticated caller cannot inject
            an entry under their own actor_subject by knowing the run UUID.
            `run_repo_mismatch` — the entitled `run_id` belongs to a different
            repository than the filing target; a run_id is honoured only when
            its repo matches `repo`, so a run-bound token cannot borrow an
            unrelated repository's installation context.
        '404':
          description: "`run_not_found` — `run_id` supplied but no such run."
        '413':
          description: "`body_too_large` — request body exceeds the size cap."
        '422':
          description: |
            `work_item_invalid` — the request violates the conventions for
            its type (unknown type, missing complexity, unresolved title
            placeholder, an off-skeleton `sections` key, or an `epic_link`
            rule violation). Structured `details` accompany the relevant
            cases: `details.missing_placeholders` (the unresolved title
            placeholders, e.g. `["epic"]` when epic derivation failed closed)
            and `details.unknown_sections` / `details.expected_sections` (the
            off-skeleton key(s) and the type's skeleton section names).
        '501':
          description: |
            `provider_unimplemented` — the conventions name a provider that
            is not registered (e.g. `jira`); `details.provider` names it and
            `details.registered` lists the available providers.
        '502':
          description: "`work_item_filing_failed` — the provider rejected the filing."
        '503':
          description: "`run_lookup_unconfigured` — `run_id` supplied but no run repository is wired."

  /v0/calibration:
    get:
      operationId: getCalibration
      summary: Get runtime calibration statistics
      description: |
        Returns aggregated actual-vs-predicted runtime statistics derived
        from `runtime_observed` audit entries. Agents call this before writing
        a plan to self-correct `predicted_runtime_minutes` using
        `calibration_ratio` and `confidence_band_accuracy`.

        All parameters are optional. Omit them to get all-time stats across
        all implement stages.

        Zero `samples` is a valid response on a fresh installation.
      tags: [calibration]
      parameters:
        - name: workflow_id
          in: query
          description: Scope results to a specific workflow ID.
          schema: { type: string }
        - name: stage_type
          in: query
          description: Stage type to aggregate (default `implement`).
          schema: { type: string, default: implement }
        - name: since
          in: query
          description: RFC 3339 lower bound; omit for all-time stats.
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: Calibration statistics (samples may be 0).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CalibrationResult' }
        '400':
          description: "`bad_since` — `since` is not a valid RFC 3339 timestamp."
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503':
          description: Audit repository not configured on this instance.

  # ---------------------------------------------------------------------
  # Stages, artifacts, approvals
  # ---------------------------------------------------------------------
  /v0/stages/{stage_id}:
    get:
      operationId: getStage
      summary: Get a stage
      tags: [stages]
      parameters:
        - { name: stage_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: Stage details.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Stage' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v0/stages/{stage_id}/artifacts:
    get:
      operationId: listStageArtifacts
      summary: List artifacts for a stage
      tags: [stages]
      parameters:
        - { name: stage_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: Artifacts, ordered by created_at ascending.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Artifact' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v0/stages/{stage_id}/prompt:
    get:
      operationId: getStagePrompt
      summary: Fetch the constructed prompt for a stage
      description: |
        Returns the agent-facing prompt the runner should write to
        a temp file and pass to the executing agent's `--prompt-file`
        argument. Construction is server-side and deterministic so
        that two replays of the same stage produce byte-identical
        prompts and the audit log records exactly what the agent
        was asked to do (see MVP_SPEC §4.4).

        Auth is the same per-run signing-key scheme used by the
        trace upload endpoint. The runner signs
        `sha256("prompt:" + stage_id)` with the private half issued
        at signing-key time and sends the hex signature in
        `X-Fishhawk-Signature`.

        Returns 501 when no prompt template is implemented yet for
        the stage's type — caller should treat the stage as
        unsupported and fail rather than guess.
      tags: [stages]
      parameters:
        - { name: stage_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - in: header
          name: X-Fishhawk-Signature
          required: true
          schema:
            type: string
            description: Hex-encoded Ed25519 signature of `sha256("prompt:" + stage_id)`.
      responses:
        '200':
          description: Constructed prompt for the stage.
          content:
            application/json:
              schema:
                type: object
                required: [stage_id, stage_type, prompt, prompt_hash]
                properties:
                  stage_id: { $ref: '#/components/schemas/UUID' }
                  stage_type:
                    type: string
                    description: Stage type from the workflow spec (e.g. `implement`, `plan`).
                  prompt:
                    type: string
                    description: Plain-text prompt for the agent.
                  prompt_hash:
                    type: string
                    description: Hex-encoded sha256 of the prompt bytes.
                  agent_timeout_seconds:
                    type: integer
                    description: 'Wall-clock kill cap in seconds; 0 means the runner should apply its own fallback. For implement stages the value is dynamically widened above the spec budget to max(spec budget, approved-plan predicted_runtime_minutes x 2, implement-stage calibration p95 x 1.5), capped at 2x the spec budget; other stages return the spec-resolved value unchanged.'
                  decomposed_from_run_id:
                    type: string
                    format: uuid
                    description: Parent run ID when this run is a decomposed child. Absent for standalone runs. Runners use this with slice_index to route the child onto its own sole-writer slice branch fishhawk/run-<parent>/slice-<n> (ADR-041).
                  slice_index:
                    type: integer
                    description: Decomposed child's 0-based sub_plan position (ADR-041 / #1141), present only for decomposed children. The runner routes the child onto fishhawk/run-<shortID(decomposed_from_run_id)>/slice-<slice_index>. Omitted (treated as 0) for standalone runs and for slice 0.
                  verify_command:
                    type: string
                    description: Shell command for the verify gate; omitted when the spec declares none.
                  verify_timeout_seconds:
                    type: integer
                    description: Wall-clock cap for the verify command in seconds; 0 or absent means the runner applies its 10-minute fallback.
                  verify_max_iterations:
                    type: integer
                    description: Verify-fix loop budget from executor.verify.max_iterations; 0 or absent preserves the single-shot demote-on-failure gate, >0 caps the total verify-fix agent invocations across the stage.
                  min_runner_version:
                    type: string
                    description: Minimum runner version the backend requires; absent when the backend has no constraint. Runners older than this value must exit with code 3 (version_skew) rather than invoking the agent.
                  scope_files:
                    type: array
                    description: |
                      The approved plan's `scope.files`, echoed on implement
                      stages so the runner can bound the commit to exactly
                      these declared paths instead of `git add -A` (#581).
                      Absent when no approved plan is available
                      (`plan_missing_for_implement`) — the runner falls back
                      to staging every change. Dirty-but-undeclared paths are
                      excluded from the commit and flagged as scope drift
                      (non-blocking).
                    items:
                      type: object
                      required: [path, operation]
                      properties:
                        path:
                          type: string
                          description: Repo-relative path the agent declared it would touch.
                        operation:
                          type: string
                          enum: [create, modify, delete]
                          description: Per-file intent from the standard_v1 plan scope.files entry.
                  scope_exemptions:
                    type: array
                    description: |
                      Operator `exempt_scope_files` for a recovery run
                      (#1229), echoed on the implement stage so the runner's
                      `MissingScopeFiles` shortfall gate subtracts each
                      operator-justified-unchanged declared path — the inverse
                      of `add_scope_files` (it subtracts from the gate, it does
                      not widen scope). Resolved from the run's own
                      `plan_reused_from` provenance; absent on every
                      non-recovery run.
                    items:
                      type: object
                      required: [path, reason]
                      properties:
                        path:
                          type: string
                          description: Repo-relative declared scope.files path marked operator-justified-unchanged.
                        reason:
                          type: string
                          description: Operator justification for leaving the declared path unchanged.
                  implement_model:
                    type: string
                    description: |
                      The backend-resolved implement model id (#1013), echoed
                      on implement stages so the runner pins the agent spawn to
                      it (`--model <implement_model>`). Resolved through the
                      implement-model ladder: operator gate decision < plan
                      `model_recommendation.implement_model` < spec
                      `executor.model` < deployment default. Absent when no rung
                      supplied a model — the runner leaves the model unset and
                      the agent spawns on the adapter's built-in default,
                      byte-identical to today.
                  commit_author_name:
                    type: string
                    description: |
                      The GitHub App bot account's git author name
                      (`<app-slug>[bot]`), resolved backend-side from the App
                      so App-backed commits attribute to the App's bot account
                      (#722). Absent when the backend can't resolve it (no App
                      JWT, dev/CLI) — the runner falls back to its default bot
                      identity.
                  commit_author_email:
                    type: string
                    description: |
                      The GitHub App bot account's git author email
                      (`<bot-user-id>+<app-slug>[bot]@users.noreply.github.com`),
                      paired with `commit_author_name` (#722). Absent under the
                      same conditions; the runner falls back to its default.
                  fixup:
                    type: boolean
                    description: |
                      True when this implement stage is an operator-triggered
                      implement-review fix-up pass (#762/#784): an unconsumed
                      `stage_fixup_triggered` audit entry routed review concerns
                      back to this stage. The runner takes its same-branch
                      `RebaseFromRemote` path (fetch + checkout + pull --rebase
                      on `fixup_branch`) and updates the open PR rather than
                      opening a new one. Absent on a normal implement dispatch —
                      branch routing falls through to the per-stage branch.
                  fixup_branch:
                    type: string
                    description: |
                      The existing PR branch a fix-up pass commits onto. Present
                      only when `fixup` is true. Derived to match the runner's
                      branch formula exactly: non-decomposed
                      `fishhawk/run-<shortID(run_id)>/stage-<shortID(stage_id)>`,
                      decomposed `fishhawk/run-<shortID(decomposed_from_run_id)>`
                      (shortID = first 8 chars of the UUID). A divergence would
                      re-create the `checkout -b <existing branch>` failure
                      (#784).
                  fixup_expected_head_sha:
                    type: string
                    description: |
                      The run's recorded head SHA — the newest `head_sha`
                      across the run's reported-head ledger entries
                      (`pull_request_opened` / `child_pushed` /
                      `fixup_pushed`), the same audit source the ADR-035
                      branch-lineage verifier treats as the run's legitimate
                      tips. Present only when `fixup` is true and resolution
                      succeeded. Before invoking the agent the runner fetches
                      + checks out `fixup_branch` and fails fast when the
                      fetched tip differs from this value (#967). Absent
                      (older backend, or backend-side resolution failure)
                      means the runner proceeds with checkout only, skipping
                      the comparison.
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Stage is not in a runnable state (awaiting_approval, awaiting_children, succeeded, failed, or cancelled).
          content:
            application/json:
              schema:
                allOf:
                  - { $ref: '#/components/schemas/Error' }
                  - description: |
                      `error.code` is `stage_not_runnable`.
                      `error.details.current_state` holds the stage's current state string.
                      `error.details.stage_id` holds the stage UUID.
        '501':
          description: Prompt construction not implemented for this stage type.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: Backend wiring incomplete (run, signing, or GitHub repo unconfigured).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/stages/{stage_id}/prompt-render:
    get:
      operationId: getStagePromptRender
      summary: Fetch the constructed prompt for a stage (SPA-readable)
      description: |
        SPA-side counterpart of `getStagePrompt` (#215). Returns the
        same body shape, built by the same deterministic
        `prompt.Build` pipeline, without requiring
        `X-Fishhawk-Signature`. Read access tracks the existing
        stage / audit reads.

        The two endpoints exist as siblings rather than one with a
        toggle so the runner contract on the signature-authed path
        stays unchanged when the SPA-side surface evolves.
      tags: [stages]
      parameters:
        - { name: stage_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: Constructed prompt for the stage.
          content:
            application/json:
              schema:
                type: object
                required: [stage_id, stage_type, prompt, prompt_hash]
                properties:
                  stage_id: { $ref: '#/components/schemas/UUID' }
                  stage_type: { type: string }
                  prompt: { type: string }
                  prompt_hash: { type: string }
                  agent_timeout_seconds:
                    type: integer
                    description: 'Wall-clock kill cap in seconds; 0 means the runner should apply its own fallback. For implement stages the value is dynamically widened above the spec budget to max(spec budget, approved-plan predicted_runtime_minutes x 2, implement-stage calibration p95 x 1.5), capped at 2x the spec budget; other stages return the spec-resolved value unchanged.'
                  decomposed_from_run_id:
                    type: string
                    format: uuid
                    description: Parent run ID when this run is a decomposed child. Absent for standalone runs.
                  slice_index:
                    type: integer
                    description: Decomposed child's 0-based sub_plan position (ADR-041 / #1141), present only for decomposed children. The runner routes the child onto fishhawk/run-<shortID(decomposed_from_run_id)>/slice-<slice_index>. Omitted (treated as 0) for standalone runs and for slice 0.
                  verify_command:
                    type: string
                    description: Shell command for the verify gate; omitted when the spec declares none.
                  verify_timeout_seconds:
                    type: integer
                    description: Wall-clock cap for the verify command in seconds; 0 or absent means the runner applies its 10-minute fallback.
                  verify_max_iterations:
                    type: integer
                    description: Verify-fix loop budget from executor.verify.max_iterations; 0 or absent preserves the single-shot demote-on-failure gate, >0 caps the total verify-fix agent invocations across the stage.
                  min_runner_version:
                    type: string
                    description: Minimum runner version the backend requires; absent when the backend has no constraint.
                  scope_files:
                    type: array
                    description: |
                      The approved plan's `scope.files`, echoed on implement
                      stages so the runner can bound the commit to exactly
                      these declared paths instead of `git add -A` (#581).
                      Absent when no approved plan is available.
                    items:
                      type: object
                      required: [path, operation]
                      properties:
                        path:
                          type: string
                          description: Repo-relative path the agent declared it would touch.
                        operation:
                          type: string
                          enum: [create, modify, delete]
                          description: Per-file intent from the standard_v1 plan scope.files entry.
                  scope_exemptions:
                    type: array
                    description: |
                      Operator `exempt_scope_files` for a recovery run
                      (#1229), echoed on the implement stage so the runner's
                      `MissingScopeFiles` shortfall gate subtracts each
                      operator-justified-unchanged declared path — the inverse
                      of `add_scope_files` (it subtracts from the gate, it does
                      not widen scope). Resolved from the run's own
                      `plan_reused_from` provenance; absent on every
                      non-recovery run.
                    items:
                      type: object
                      required: [path, reason]
                      properties:
                        path:
                          type: string
                          description: Repo-relative declared scope.files path marked operator-justified-unchanged.
                        reason:
                          type: string
                          description: Operator justification for leaving the declared path unchanged.
                  implement_model:
                    type: string
                    description: Backend-resolved implement model id (#1013), echoed on implement stages so the runner pins the agent spawn to it (`--model <implement_model>`). Resolved through the implement-model ladder (operator gate decision < plan `model_recommendation.implement_model` < spec `executor.model` < deployment default). Absent when no rung supplied a model — the runner leaves the model unset and the agent spawns on the adapter's built-in default, byte-identical to today.
                  commit_author_name:
                    type: string
                    description: GitHub App bot account's git author name (`<app-slug>[bot]`), resolved backend-side (#722). Absent when unresolvable; the runner falls back to its default.
                  commit_author_email:
                    type: string
                    description: GitHub App bot account's git author email (`<bot-user-id>+<app-slug>[bot]@users.noreply.github.com`), paired with commit_author_name (#722).
                  fixup:
                    type: boolean
                    description: True when this implement stage is an operator-triggered implement-review fix-up pass (#762/#784); the runner commits onto `fixup_branch` via its same-branch RebaseFromRemote path and updates the open PR instead of opening a new one. Absent on a normal implement dispatch.
                  fixup_branch:
                    type: string
                    description: Existing PR branch a fix-up pass commits onto; present only when `fixup` is true. Matches the runner's branch formula — non-decomposed `fishhawk/run-<shortID(run_id)>/stage-<shortID(stage_id)>`, decomposed `fishhawk/run-<shortID(decomposed_from_run_id)>` (#784).
                  fixup_expected_head_sha:
                    type: string
                    description: The run's recorded head SHA — the newest `head_sha` across the run's reported-head ledger entries (`pull_request_opened` / `child_pushed` / `fixup_pushed`), the ADR-035 lineage source. Present only when `fixup` is true and resolution succeeded; the runner verifies the fetched `fixup_branch` tip against it before invoking the agent (#967).
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Stage is not in a runnable state (awaiting_approval, awaiting_children, succeeded, failed, or cancelled).
          content:
            application/json:
              schema:
                allOf:
                  - { $ref: '#/components/schemas/Error' }
                  - description: |
                      `error.code` is `stage_not_runnable`.
                      `error.details.current_state` holds the stage's current state string.
                      `error.details.stage_id` holds the stage UUID.
        '501':
          description: Prompt construction not implemented for this stage type.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: Backend wiring incomplete (run repo or GitHub unconfigured).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/stages/{stage_id}/trace:
    get:
      operationId: getStageTrace
      summary: Stream the redacted trace bundle for a stage
      description: |
        Streams the most-recent **redacted** trace bundle the runner
        shipped for this stage. The body is gzipped JSON Lines; the
        SPA gunzips client-side (or the browser auto-decompresses
        when `Accept-Encoding: gzip` is honored) and parses
        line-by-line to render the agent transcript (#218).

        The bundle's first line is the manifest (agent, model,
        agent_failed flag); middle lines are one captured agent
        event each; last line is the trailer with event count + a
        sha256 of the preceding lines (truncation detector). Schema
        is ADR-007 (#71).

        Raw variant access is not exposed here. The raw bundle can
        carry secrets in agent output and lives behind S3 Object
        Lock for compliance reasons; surfacing it is a separate
        decision.
      tags: [stages]
      parameters:
        - { name: stage_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: |
            Gzipped JSON Lines bundle bytes. `X-Fishhawk-Content-Hash`
            carries the bundle's hex sha256 so callers can cross-
            reference the audit log's `trace_uploaded` payload.
          headers:
            X-Fishhawk-Content-Hash:
              schema: { type: string }
              description: Hex sha256 of the gzipped bundle bytes.
            Content-Encoding:
              schema: { type: string, enum: [gzip] }
          content:
            application/x-ndjson:
              schema:
                type: string
                format: binary
        '400': { $ref: '#/components/responses/BadRequest' }
        '404':
          description: |
            `stage_not_found` — no stage with that id;
            `trace_not_found` — stage exists but no redacted bundle
            has been uploaded yet.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '410':
          description: |
            `trace_storage_missing` — the audit log references a
            bundle that's no longer in storage (lifecycle expiry,
            manual deletion, or a storage outage). The audit chain
            is the canonical record; the storage gap needs human /
            verifier intervention.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: Backend wiring incomplete (run, audit, or tracestore unconfigured).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/stages/{stage_id}/checks:
    get:
      operationId: listStageChecks
      summary: Latest state per blocking check on a stage
      description: |
        Returns the most-recent observed state for each required
        check on the stage's run (#228). `declared` is the run's
        required-checks snapshot from GitHub branch protection
        (#251 / ADR-017) — pre-#254 it sourced from the spec-level
        `gate.blocking_checks` field, which has been dropped. `items`
        is the latest observed state per check name. Declared-but-
        not-observed checks appear in `declared` but not `items` —
        the SPA fills them with `not_tracked`.

        State values per check are the SPA-facing rollup of GitHub's
        `status` + `conclusion` pair, or the backend's self-derived
        equivalent for `fishhawk_audit_complete` (#229): `pass`,
        `fail`, `pending`, or `not_tracked`.

        For `fishhawk_audit_complete` the response item additionally
        carries a `missing` array naming what's incomplete (plan
        artifact, raw or redacted trace bundle, pull-request
        artifact, or audit-chain mismatch) so the SPA can render
        the failure reason without a secondary call. The check is
        computed on read from artifact + audit-log presence; no row
        for it lands in `stage_checks`. The audit-complete row is
        injected only for review stages.
      tags: [stages]
      parameters:
        - { name: stage_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: Declared required checks + latest observed state per check.
          content:
            application/json:
              schema:
                type: object
                required: [declared, sources, items]
                properties:
                  declared:
                    type: array
                    items: { type: string }
                    description: |
                      Required-status-check context names from the
                      run's branch-protection snapshot (#251). Empty
                      when the run pre-dates the snapshot wiring or
                      skipped protection lookup (CLI / UI).
                  sources:
                    type: array
                    items: { type: string }
                    description: |
                      Surfaces that contributed to `declared`. Each
                      entry is `branch_protection` or `ruleset:<id>`.
                      The SPA renders this as a "Required by branch
                      protection" sub-label so reviewers know where
                      the list comes from (#256).
                  items:
                    type: array
                    items:
                      type: object
                      required: [name, state]
                      properties:
                        name: { type: string }
                        state:
                          type: string
                          enum: [pass, fail, pending, not_tracked]
                        status:
                          type: string
                          description: Verbatim GitHub `check_run.status` (queued / in_progress / completed).
                        conclusion:
                          type: [string, "null"]
                          description: Verbatim GitHub `check_run.conclusion`; null while not completed.
                        head_sha:
                          type: string
                        github_check_run_id:
                          type: [integer, "null"]
                          format: int64
                        ts:
                          type: string
                          format: date-time
                        missing:
                          type: array
                          description: |
                            Populated only on the `fishhawk_audit_complete`
                            row when the derivation found gaps. Each entry
                            names a category of incompleteness; consumers
                            branch on `kind`. Absent / empty when the check
                            passes or for externally-fed checks like
                            `ci_pass`.
                          items:
                            type: object
                            required: [kind, detail]
                            properties:
                              kind:
                                type: string
                                enum:
                                  - plan_missing
                                  - trace_missing
                                  - pr_missing
                                  - chain_invalid
                                  - chain_unrecoverable
                                  - foreign_commit
                                  - head_fetch_failed
                                  - review_pending
                              detail:
                                type: string
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503':
          description: Backend wiring incomplete (run repo or stage-check repo unconfigured).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/stages/{stage_id}/approvals:
    post:
      operationId: submitApproval
      summary: Approve or reject the gate on a stage
      description: |
        The authenticated user must resolve to a role listed in the
        gate's `approvers` block. Submitting an `approve` decision
        transitions the gate to passed; `reject` fails the stage as
        category D.

        Requires `write:approvals` scope. A **deploy-stage** approve
        additionally requires `write:deploy` (ADR-038 / #1390): the deploy
        gate's `approve` is the pre-execution authorization for a real release,
        so an operator bearer holding `write:approvals` but missing
        `write:deploy` is refused 403 `insufficient_scope`
        (`required_scope: write:deploy`) before the deploy pre-flight runs. The
        `write:deploy` requirement applies to the deploy `approve` path ONLY —
        a deploy `reject` (the reviewer judgment that always pages the human)
        and every plan/implement/review approval are unaffected. Deploy
        approvers are enforced through the same `approvers` block; an `all_of`
        deploy gate requires the subject to belong to EVERY named role.
      tags: [approvals]
      parameters:
        - { name: stage_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision:
                  type: string
                  enum: [approve, reject]
                comment:
                  type: string
                  description: |
                    Optional free-text rationale. On `approve` it is
                    recorded as the #558 binding approval conditions and
                    injected verbatim into the implement (and
                    implement-review) prompt as instructions the agent
                    must follow. It is NOT parsed for scope: repo-relative
                    paths written in the comment are NO LONGER folded into
                    the implement stage's `scope.files` (#1225 removed the
                    #730 prose fold). Use `add_scope_files` to add scope —
                    naming a path here to explain it (e.g. "no edit to
                    `backend/go.mod` is needed") will not mutate scope.
                approver_github_login:
                  type: string
                  description: |
                    Optional resolved GitHub login of the acting
                    operator, threaded through by the MCP
                    approve/reject tools (#751). Used only for
                    issue-thread `@`-mention rendering in the
                    plan-status footer; the audit `approver` field
                    keeps the token subject as the acting identity
                    (provenance). SPA/CLI callers omit it and are
                    unaffected. `decision` remains the only required
                    field.
                add_scope_files:
                  type: array
                  items:
                    type: string
                  description: |
                    Optional, authoritative list of repo-relative
                    paths to fold into the implement stage's
                    `scope.files` on approve (#824). This is now the SOLE
                    source of approve-time `scope.files` additions: the
                    #730 free-text `comment` prose fold was removed
                    (#1225), so repo-relative paths written in `comment`
                    no longer mutate scope. The structured, lossless
                    form succeeds where a regex scrape failed — it stages
                    directories, extensionless or repo-root files (e.g.
                    `go.work`), and described-but-not-spelled paths. A
                    trailing slash marks a directory whose created files
                    all stage under it (e.g. `pkg/testdata/corpus/`).
                    Recorded on the approval audit payload and consumed by
                    the prompt builder. No-op when the plan declares an
                    empty scope (preserves the runner's `git add -A`
                    fallback). Does NOT weaken the policy gate: a folded
                    path matching `forbidden_paths` still fails category-B
                    against the produced diff. Honored only on `approve`;
                    ignored on `reject`.
                binding_assertions:
                  type: array
                  items:
                    type: object
                    required: [type, path, literal]
                    properties:
                      type:
                        type: string
                        enum: [file_contains, test_asserts]
                        description: |
                          The assertion type. `file_contains` checks the
                          literal appears in the committed file at `path`;
                          `test_asserts` is the identical substring check but
                          `path` must name a Go test file. Open enum — an
                          unknown type is rejected `400 validation_failed`.
                      path:
                        type: string
                        description: |
                          Repo-relative path of the committed file the
                          literal must appear in. For `test_asserts` it must
                          end in `_test.go`.
                      literal:
                        type: string
                        description: |
                          The non-empty substring that must be present in the
                          committed content of `path` (deterministic match).
                  description: |
                    Optional list of operator-declared, deterministic
                    binding-assertion checks (#1171) — the machine-checkable
                    half of an approval condition. Each typed substring
                    assertion is recorded on the approval audit payload
                    alongside `add_scope_files`, echoed on the implement
                    prompt-response, and evaluated by the runner
                    post-implement against the committed scope-only tree; any
                    unsatisfied assertion fails the implement stage
                    category-B. Substring matching only — never parses prose.
                    A malformed declaration (unknown `type`, empty `literal`,
                    a `test_asserts` `path` not ending in `_test.go`) is
                    rejected `400 validation_failed` before any approval row
                    is recorded. Honored only on `approve`; ignored on
                    `reject`. Omitting the field is byte-identical to today.
                implement_model:
                  type: string
                  description: |
                    Optional operator override for the implement-stage model
                    (#1013) — the top rung of the resolution ladder
                    (deployment default < spec `executor.model` < plan
                    `model_recommendation` < this override). On a plan-stage
                    approve the gate resolves the full ladder with this as the
                    operator rung, validates the RESOLVED non-empty value
                    against the deployment's per-adapter allow-list, and emits a
                    `model_resolved` audit entry (`{model, model_source}`) the
                    runner spawn routes to the agent `--model`. An unknown
                    resolved model — from ANY rung, not just this field — is
                    rejected `422 plan_invalid_model` (details carry `model`,
                    `model_source`, `adapter`) PRE-Submit, so a retry with an
                    allowed model flows normally. An empty/unconfigured
                    allow-list fails OPEN (any model accepted, byte-identical to
                    today). Honored only on `approve`; ignored on `reject`.
                    Omitting the field leaves the model to the lower rungs; an
                    empty resolution still records `model_resolved` and spawns
                    with no `--model`, exactly as today.
                plan_model:
                  type: string
                  description: |
                    Optional operator override for the PLAN-stage model (#1416)
                    — the top rung of the plan-model ladder (deployment default
                    < spec `executor.model` on the plan stage < this override).
                    On a plan-stage approve the gate resolves the plan ladder
                    with this as the operator rung and emits the plan stage's
                    `model_resolved` audit entry (`{model, model_source,
                    stage_type: plan}`); a re-dispatched plan stage then spawns
                    under the resolved value. Honored only on `approve`; ignored
                    on `reject`. Omitting the field leaves the plan model to the
                    lower rungs, byte-identical to today.
                review_model:
                  type: string
                  description: |
                    Optional operator override for the REVIEW-stage model
                    (#1416) — the top rung of the review-model ladder
                    (deployment default < spec `executor.model` on the review
                    stage < this override). On a plan-stage approve the gate
                    resolves the review ladder with this as the operator rung and
                    emits the review stage's `model_resolved` audit entry
                    (`{model, model_source, stage_type: review}`); the
                    post-plan-gate implement review (and any post-gate
                    re-review) then invokes each heterogeneous reviewer under the
                    resolved value. It governs the implement review, NOT the
                    already-completed plan review. Honored only on `approve`;
                    ignored on `reject`. Omitting the field leaves each reviewer
                    on its spec model, byte-identical to today.
                delegated:
                  type: boolean
                  default: false
                  description: |
                    Opts the submission into the ADR-040 delegated-action
                    path (#1026): the caller (the operator agent) asserts
                    it acts under the workflow's
                    `operator_agent.may_approve` knob. The server NEVER
                    trusts the assertion — it re-evaluates the knob's
                    condition (`clean_dual_approval`) against current run
                    state at action time. Refusals are 403:
                    `delegation_not_configured` when no effective
                    `operator_agent` block delegates the approve action
                    (fail-closed — including legacy runs with no cached
                    spec), `delegation_condition_unmet` with the named
                    failed predicate in `details.unmet_reason` otherwise.
                    A refusal inserts no approval row, so a later retry
                    flows normally. When met, the approval proceeds and
                    its `approval_submitted` audit payload records
                    `delegated: "clean_dual_approval"`. Only valid with
                    `decision: approve` — a delegated reject is 400
                    (rejection is a human judgment; `reviewer_reject`
                    pages the human). Omitted → behavior byte-identical
                    to a human submission.
      responses:
        '200':
          description: |
            Two distinct outcomes share this status (#986):

            - **Approval recorded; stage state advanced.** The body is
              the bare `Stage` shape; the three duplicate fields are
              omitted.
            - **Duplicate submission** — the same authenticated subject
              already submitted a decision for this stage. The prior
              decision stands, the stage state is unchanged, NO gates
              (budget/scope-cap/review-settled) re-run, and no audit
              entries are emitted. The body carries
              `duplicate_submission: true` plus `prior_decision` and
              `prior_submitted_at` from the EXISTING approval row
              (authentic provenance, not echoes of the new request).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Stage'
                  - type: object
                    properties:
                      duplicate_submission:
                        type: boolean
                        description: |
                          Present (true) only when this submission was a
                          no-op duplicate of an existing decision by the
                          same subject. Omitted on a first submission.
                      prior_decision:
                        type: string
                        enum: [approve, reject]
                        description: |
                          The existing approval row's decision. Only
                          present alongside `duplicate_submission`.
                      prior_submitted_at:
                        type: string
                        format: date-time
                        description: |
                          When the existing approval row was submitted.
                          Only present alongside `duplicate_submission`.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: |
            Possible error codes:

            - `approver_not_authorized` — a RoleResolver is configured
              and the subject is not in the gate's approvers list. For an
              `all_of` deploy gate this fires unless the subject belongs to
              EVERY named role.
            - `insufficient_scope` — a **deploy-stage** `approve` from an
              operator bearer that holds `write:approvals` but is missing
              `write:deploy` (ADR-038 / #1390). `details.required_scope` is
              `write:deploy`. Applies to the deploy `approve` path only.
            - `delegation_not_configured` — the request carried
              `delegated: true` but no effective `operator_agent` block
              delegates the approve action (ADR-040 / #1026,
              fail-closed): the spec declares no block, the block has no
              `may_approve` knob, or the run has no cached workflow
              spec.
            - `delegation_condition_unmet` — `delegated: true` and the
              `may_approve` knob is configured, but its condition is not
              satisfied by current run state. `details` carries
              `action`, `condition`, and `unmet_reason` naming the exact
              failed predicate (e.g. `clean_dual_approval: 1 of 2
              reviewer verdicts received`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: |
            Possible error codes:

            - `invalid_state_transition` — stage isn't in
              awaiting_approval. (Pre-#253 the handler also returned
              409 with `blocking_checks_not_passed` when any declared
              blocking check wasn't `pass`. ADR-017 / #249 moved that
              gate to GitHub branch protection; the approval API no
              longer reads stage_check state.)
            - `review_stage_managed_by_github` — the target stage is
              a review stage. ADR-018 / #311 moved review-stage
              approval onto GitHub: the `pull_request.closed`
              webhook with `merged=true` transitions the stage;
              `pull_request_review.submitted` events feed the audit
              log. Branch protection's required-reviewers is the
              approver-list mechanism. Response body's `details`
              includes the run's `pull_request_url` when stamped so
              the caller knows where the merge gate lives. Plan-
              stage approvals continue to use this endpoint.
            - `agent_review_pending` — ADR-036 / #875: the target is
              a plan stage whose workflow declares `reviewers.agent`
              > 0, a plan review was dispatched
              (`plan_review_started` present), and fewer than the
              configured agent count of TERMINAL review verdicts
              (`plan_reviewed` / `plan_review_failed` /
              `plan_review_skipped`) have landed. The approval is
              refused before any row is recorded — poll until the
              review reaches a terminal state, then retry; the retry
              is idempotent. `details` includes `stage_id`,
              `configured_agents`, and `landed_terminal`. A hard
              backstop (`ReviewBudget.Cap` × configured agents,
              measured from the earliest `plan_review_started`)
              allows the approval once elapsed even if no terminal
              verdict landed, recording a
              `plan_review_backstop_elapsed` audit entry — so a
              reviewer that dies emitting nothing can never strand
              the gate.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422':
          description: |
            Possible error codes:

            - `plan_violates_budget` — the plan's
              `predicted_runtime_minutes` exceeds the resolved
              implement-stage budget and neither a
              `decomposition.sub_plans` block nor an
              `--override-budget` marker in the comment is present.
              The budget is the spec-resolved implement-stage timeout
              widened to the calibration p95 × 1.5 when implement
              runtime data exists, clamped to spec × 2 (#994) — the
              same base the dynamic implement kill cap builds on, so
              gate and runtime cannot disagree. `details` includes
              `predicted_minutes`, `budget_minutes` (the RESOLVED
              budget), `budget_source` (`spec`, `p95`, or `ceiling` —
              which term won the resolution), `spec_budget_minutes`
              (the raw spec-resolved floor), and `timeout_source`
              (`stage_executor_timeout`,
              `workflow_policy_max_stage_runtime`, or
              `backend_default` — the spec value's provenance).
              Refused BEFORE any approval row is recorded (#986), so
              the same subject's retry with the override flows
              normally rather than dead-ending as an idempotent
              duplicate. To unblock: either re-plan with a
              decomposition block, or re-submit the approval with
              `--override-budget` in the comment.
            - `plan_violates_scope_cap` — #983: the effective scope —
              the plan's `scope.files` unioned with the request's
              `add_scope_files`, prior approve-time folds, and
              already-approved scope amendments, deduped by exact
              path — exceeds the implement stage's resolved
              `max_files_changed` and the comment lacks an
              `--override-scope-cap` marker. Refused BEFORE any
              approval row is recorded, so a retry after re-scoping
              (or carrying the override) flows normally. `details`
              includes `scoped_files`, `max_files_changed`, and
              `add_scope_files_count`; the refusal appends a
              `plan_violates_scope_cap` audit entry, the override a
              `plan_scope_cap_override_acknowledged` entry. Declared
              scope is an upper bound on the eventual diff, so the
              override exists for legitimately-forced cases (e.g. the
              cap itself is about to change).
            - `plan_invalid_model` — #1013: the RESOLVED implement model
              (the ladder of deployment default < spec `executor.model` <
              plan `model_recommendation` < the `implement_model` override)
              is non-empty and not in the deployment's per-adapter
              allow-list for the run's implement adapter. Validated regardless
              of which rung supplied the value, so an unknown plan- or
              spec-recommended model — not just an operator override — is
              caught here rather than at runner spawn. `details` includes
              `model`, `model_source` (`default`|`spec`|`plan`|`operator`),
              and `adapter`. Refused BEFORE any approval row is recorded, so a
              retry with an allowed `implement_model` (or after widening the
              allow-list) flows normally. An empty/unconfigured allow-list
              fails OPEN — any model is accepted, byte-identical to today.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/stages/{stage_id}/clarification:
    post:
      operationId: answerClarification
      summary: Answer a plan stage parked at awaiting_input
      description: |
        Closes the #1057 answer-and-resume seam (#1088). A plan stage the
        planner parked at `awaiting_input` with a `clarification_request`
        (#1080) is stranded until the operator answers: nothing populates the
        answers or re-opens the stage. This endpoint validates the operator's
        answers against the questions the planner actually parked, persists
        them as a DEDICATED `clarification_answered` audit entry, transitions
        the stage `awaiting_input` → `pending`, and hands off to the
        orchestrator so a drive run re-dispatches the plan stage (a local run
        re-runs via the operator's next `fishhawk_run_stage plan`). The resumed
        plan prompt injects the answers in its binding "Clarification answers"
        section.

        The `clarification_answered` channel is intentionally isolated from the
        approval (`approval_submitted` / `decision=approve`) channel: a parked
        plan stage is NOT yet approved, and the implement prompt's approval-
        conditions loader matches only `decision=='approve'`, so the two never
        collide.

        Requires `write:approvals` scope — the #558 binding-conditions /
        gate-answer family.
      tags: [approvals]
      parameters:
        - { name: stage_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [answers]
              properties:
                answers:
                  type: array
                  minItems: 1
                  description: |
                    The operator's answers, each keyed by a parked question
                    `id`. Every id must match a question in the newest
                    `clarification_requested` entry, every parked question must
                    be answered, and ids must not repeat.
                  items:
                    type: object
                    required: [id, answer]
                    properties:
                      id:
                        type: string
                        description: The parked question's stable id.
                      answer:
                        type: string
                        description: The operator's answer to that question.
                comment:
                  type: string
                  description: |
                    Optional free-text note appended after the rendered answers
                    in the binding-conditions blob the resume prompt injects.
      responses:
        '200':
          description: |
            Answers recorded; the plan stage transitioned
            `awaiting_input` → `pending`. The body is the bare `Stage` shape.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Stage' }
        '400':
          description: |
            Possible error codes:

            - `validation_failed` — the body is not valid JSON, carries
              unknown fields, or `answers` is empty.
            - `clarification_answer_invalid` — an answer id does not match any
              parked question, a parked question was left unanswered, or an id
              was repeated. The answers are keyed to real parked questions, so
              an ambiguous or incomplete set is refused before anything is
              recorded.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: |
            `invalid_state_transition` — the target is not a plan stage parked
            at `awaiting_input` (the only state with parked questions to
            answer), or the `awaiting_input` → `pending` transition was
            rejected by the state machine. `details` carries `stage_id`,
            `stage_type`, and `stage_state`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/stages/{stage_id}/revise:
    post:
      operationId: revisePlan
      summary: Re-plan a plan stage in place against a binding operator constraint
      description: |
        The plan-gate `revise` verdict (#1099) — the third option alongside
        approve and reject. A `revise` re-plans IN PLACE in the same run: it
        re-opens the plan stage parked at `awaiting_approval` back to
        `pending`, re-dispatches the plan stage ONCE with the operator's
        binding design `constraint` injected into the plan prompt (a DEDICATED
        "Revision constraint" section — the #558 binding-conditions channel)
        and the prior plan carried as the revision base, then re-enters the
        normal plan review → approve gate. It is the plan-stage analogue of
        `POST /v0/stages/{stage_id}/fixup` (a bounded, operator-gated re-open
        of a HEALTHY gate).

        Use `revise` when the plan's direction is sound but a design
        constraint must change first — cheaper than rejecting the plan to a
        fresh-run replan, because only the constrained parts change.

        Bounded + operator-gated: the NORMAL bound defaults to ONE revise pass
        per stage, enforced server-side by counting prior `plan_revised` audit
        entries (no dedicated column — exactly as fix-up counts
        `stage_fixup_triggered`). Once spent, an operator may grant ONE more
        pass with `force_additional_pass: true`, hard-capped at 3 TOTAL passes
        per stage; at the ceiling the endpoint refuses with the DISTINCT
        `revise_ceiling_reached`. A run-bound MCP token may revise only stages
        within its own run.

        Requires `write:approvals` scope — the #558 binding-conditions /
        gate-answer family.
      tags: [approvals]
      parameters:
        - { name: stage_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [constraint]
              properties:
                constraint:
                  type: string
                  description: |
                    The binding design constraint the planner must revise the
                    prior plan to satisfy. Injected into the re-dispatched plan
                    prompt as a dedicated, binding "Revision constraint"
                    section (MANDATORY, wins on conflict), with the prior plan
                    as the revision base. Empty/whitespace-only is rejected.
                force_additional_pass:
                  type: boolean
                  default: false
                  description: |
                    Bounded operator override: grant ONE revise pass beyond the
                    normal budget (default 1) when it is already spent, hard-
                    capped at 3 total passes per stage. The forced pass is
                    audited on the `plan_revised` entry (`forced: true`).
      responses:
        '200':
          description: |
            The plan stage was re-opened `awaiting_approval` → `pending` and
            the orchestrator re-dispatches it. The body is the re-opened
            `Stage` shape (pending, or dispatched once the orchestrator
            advances it before the response returns).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Stage' }
        '400':
          description: |
            `validation_failed` — the `stage_id` is not a valid UUID, the body
            is not valid JSON, or `constraint` is empty/whitespace-only.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: |
            Possible error codes:

            - `insufficient_scope` — the token lacks `write:approvals`.
            - `cross_run_revise` — a run-bound MCP token tried to revise a
              stage outside its own run.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: |
            Possible error codes:

            - `revise_not_applicable` — the target is not a plan stage parked
              at `awaiting_approval`. `details` carries `stage_type` and
              `stage_state`.
            - `revise_budget_exhausted` — the NORMAL bounded pass count is
              spent; one more pass is available via `force_additional_pass`.
              `details` carries `max_passes` and `used`.
            - `revise_ceiling_reached` — the hard ceiling of 3 total passes is
              reached; the override cannot push past it (reject → fresh-run
              replan). `details` carries `ceiling` and `used`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /v0/stages/{stage_id}/retry:
    post:
      operationId: retryStage
      summary: Retry a failed stage
      description: |
        Re-opens a failed stage when the failure category supports it.
        Per MVP_SPEC §6:

        - **D, sla_timeout**: transitions failed → awaiting_approval,
          clears failure metadata, restarts the SLA clock implicitly
          via the `updated_at` trigger. Returns 200 with the updated stage.
        - **A** / **C**: transitions failed → pending, then the
          orchestrator walks pending → dispatched and fires
          workflow_dispatch. Returns 200 with the post-orchestrator
          stage (typically `dispatched`). Orchestrator failures are
          logged but don't fail the request — the stage stays at
          pending and an operator can re-fire Advance manually.
        - **D, gate-rejected**: 422 (`retry_not_applicable`) — the
          approver said no; create a fresh run instead.
        - **B**: 422 (`retry_not_applicable`) — the workflow or spec
          needs to change before a retry would behave differently,
          UNLESS the request carries `{override: true, reason: "..."}`
          (see request body below).

        The optional request body enables an **audited category-B
        override** (#698). With `{override: true}` and a non-empty
        `reason`, a genuine category-B failure is admitted onto the same
        failed → pending re-open path as A/C: the stage RE-RUNS and the
        policy gate RE-EVALUATES the new diff. The override does NOT
        accept the B-violating diff or bypass the gate — it only lets the
        stage run again. `reason` is mandatory when `override` is true
        (400 `validation_failed` otherwise). A successful override writes
        a distinct `stage_override_retried` audit entry (actor + reason +
        prior category B), kept separate from the ordinary `stage_retried`
        receipt. Without an override the body may be omitted entirely and
        default per-category semantics apply, writing `stage_retried`.
      tags: [stages]
      parameters:
        - { name: stage_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      requestBody:
        required: false
        description: |
          Optional. Omit for a default per-category retry. Supply
          `{override: true, reason: "..."}` to invoke the audited
          category-B override.
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                override:
                  type: boolean
                  default: false
                  description: |
                    Admit a category-B failure onto the failed → pending
                    re-open path. The stage re-runs and the policy gate
                    re-evaluates; the gate is not bypassed.
                reason:
                  type: string
                  description: |
                    Operator justification, recorded in the
                    `stage_override_retried` audit entry. Required when
                    `override` is true.
                delegated:
                  type: boolean
                  default: false
                  description: |
                    Opts the retry into the ADR-040 delegated-action path
                    (#1026). The server re-evaluates the
                    `operator_agent.may_retry` condition (`infra_flake`)
                    against current run state at action time: 403
                    `delegation_not_configured` when no effective block
                    delegates the retry action (fail-closed), 403
                    `delegation_condition_unmet` with the named failed
                    predicate when the latest failure is not a
                    category-A infra flake. When met, the retry proceeds
                    and the `stage_retried` payload records
                    `delegated: "infra_flake"`. Omitted → behavior
                    byte-identical to today.
      responses:
        '200':
          description: Stage re-opened; refreshed Stage row in body.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Stage' }
        '400':
          description: |
            Malformed request body, or `override: true` without a
            non-empty `reason`. Body's `error` is `validation_failed`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: |
            Possible error codes: (1) bearer token lacks both `write:stages`
            and `write:retries` scope — body `error` is `insufficient_scope`;
            (2) caller is an mcp token whose run scope does not match the
            target stage's `run_id` — body `error` is `cross_run_retry`.
            MCP tokens (subject `mcp:run:<uuid>`) may only retry stages
            within their own run. (3) `delegated: true` refusals
            (ADR-040 / #1026): `delegation_not_configured` when no
            effective `operator_agent` block delegates the retry action
            (fail-closed), `delegation_condition_unmet` when the
            `infra_flake` condition is not satisfied — `details` names
            the exact failed predicate in `unmet_reason`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422':
          description: |
            Retry not applicable for the stage's current state /
            failure category. Body's `error` is `retry_not_applicable`
            and `message` explains the specific reason.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/stages/{stage_id}/fixup:
    post:
      operationId: fixupStage
      summary: Route advisory implement-review concerns back to the agent
      description: |
        Re-opens an implement stage held at the implement-review gate so
        the agent can make a bounded, operator-gated fix-up pass against one
        or more advisory implement-review concerns (E22.X / #762, #780),
        instead of the operator hand-editing the PR branch.

        Preconditions:

        - the stage must be an **implement** stage (plan/review stages are
          not eligible). Otherwise 422 (`fixup_not_applicable`).
        - the run must not already be terminal
          (`succeeded`/`failed`/`cancelled`, #968): a completed run has no
          live gate to flow the fix-up back into, so its stages are never
          re-opened. Otherwise 422 (`fixup_not_applicable`).
        - the implement stage must be re-openable, in one of two flows.
          Otherwise 422 (`fixup_not_applicable`):
          - **commit-yourself**: the implement stage is its own gate, parked
            at `awaiting_approval`; or
          - **push_and_open_pr** (#780): the implement stage has
            `succeeded` (it committed and opened the PR) and the run's
            SEPARATE **review** stage is still parked at `awaiting_approval`
            (the PR is open, not merged). Refused once the review stage has
            merged/resolved, or when the run has no review stage.
        - on the deprecated positional path, the stage must carry a
          recorded **`approve_with_concerns`** implement-review verdict
          (the concern set the `concerns` indices address). With no
          recorded concerns, 422 (`fixup_not_applicable`). The
          `concern_ids` path resolves against the durable concern store
          instead (#964); an unknown, foreign, plan-stage, or non-open ID
          is 400 (`validation_failed`).

        On success the implement stage transitions to `pending`
        (`awaiting_approval → pending`, or `succeeded → pending` on the
        push_and_open_pr flow); on the push_and_open_pr flow the review
        stage is also re-parked `awaiting_approval → pending` so the
        re-dispatched implement flows back into a fresh review (the
        re-parked review stage id is recorded on the audit entry as
        `reparked_review_stage_id`). The orchestrator then walks
        `pending → dispatched` and fires `workflow_dispatch`, and a
        `stage_fixup_triggered` audit entry is written carrying the routed
        stable concern IDs (`concern_ids`, #964) or the deprecated selected
        indices, the resolved concern objects (read back by the
        prompt renderer to deliver them as binding instructions — the #558
        condition-delivery framing), and the bounded-pass receipt
        (`pass_ordinal`, `max_passes`, `remaining_budget`). On the
        `concern_ids` path the routed concerns are additionally marked
        `addressed_pending` in the durable concern store (best-effort,
        with `reason` as the `state_reason`). Returns 200 with
        the post-orchestrator stage (typically `dispatched`). Orchestrator
        failures are logged but don't fail the request — the stage stays at
        `pending` and an operator can re-fire Advance manually.

        **Distinct from `POST /v0/stages/{stage_id}/retry`:** retry re-opens
        a *failed* stage and regenerates a fresh diff; fix-up re-opens a
        *healthy* review gate, commits onto the SAME PR branch (the runner's
        rebase-from-remote shared-branch path), and UPDATES the existing PR
        rather than opening a new one.

        **Bounded + operator-gated.** The NORMAL bound defaults to ONE pass
        per stage, enforced server-side by counting prior
        `stage_fixup_triggered` audit entries (there is no dedicated column).
        Once that budget is spent a further attempt returns 422
        (`fixup_budget_exhausted`) — but the operator may grant ONE additional
        pass by setting `force_additional_pass: true`, hard-capped at **3
        total passes** per stage (#860). A forced pass is audited (a `forced`
        flag plus the operator `reason` on the `stage_fixup_triggered` entry).
        Once the hard ceiling is reached, even a forced attempt returns the
        DISTINCT 422 (`fixup_ceiling_reached`), whose `details` carries a
        `remediation` pointer: for a late CI/SAST finding, commit the fix on the
        run branch then `fishhawk_vouch_commit` it (operator/operator-agent
        token, NOT the run-bound `fhm_` token, which is rejected
        `run_token_forbidden`) so the operator commit clears the run's
        sole-writer lineage gate without breaking ADR-035 (#1068/#1044).
        Otherwise merge with a follow-up, or start a fresh run. The operator
        still owns the merge.
      tags: [stages]
      parameters:
        - { name: stage_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      requestBody:
        required: true
        description: |
          Selects what to route back to the agent: recorded implement-review
          concerns by stable concern ID (`concern_ids`, the primary scheme,
          #964) or by deprecated positional index (`concerns`), and/or a
          free-text `operator_concern` that needs no pre-existing review
          concern (#1311). `concern_ids` and `concerns` are mutually exclusive
          — supplying both is 400 (`validation_failed`). At least one of
          `concern_ids`, `concerns`, or `operator_concern` must be supplied —
          none at all is 400 (`validation_failed`).
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                concern_ids:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    format: uuid
                  description: |
                    PRIMARY addressing (#964): stable concern UUIDs to route
                    back to the agent (at least one), as surfaced by
                    `GET /v0/runs/{run_id}`'s `concerns.items[].id`. Each ID
                    must name an OPEN (`raised`/`addressed_pending`/
                    `reopened`) implement-stage concern of THIS stage — an
                    unknown, duplicate, foreign-run/-stage, plan-stage, or
                    already-resolved ID is rejected (400
                    `validation_failed`), so a plan-stage concern can never
                    route into an implement fix-up. Requires the concern
                    store (503 `fixup_unconfigured` otherwise).
                concerns:
                  type: array
                  minItems: 1
                  items:
                    type: integer
                    minimum: 0
                  deprecated: true
                  description: |
                    DEPRECATED positional fallback: indices of the recorded
                    implement-review concerns to route back to the agent (at
                    least one). The indices address the concern set in the
                    stage's `implement_reviewed` audit entry, in append order
                    flattened across reviewers — ambiguous once multiple
                    heterogeneous review entries exist per stage (#964);
                    prefer `concern_ids`. Only valid when `concern_ids` is
                    absent. An out-of-range or duplicate index is rejected
                    (400 `validation_failed`).
                reason:
                  type: string
                  description: |
                    Optional operator rationale, recorded on the
                    `stage_fixup_triggered` audit entry (and as the routed
                    concerns' `state_reason` on the `concern_ids` path).
                allow_create:
                  type: array
                  items:
                    type: string
                  description: |
                    Optional repo-relative paths this fix-up will CREATE
                    (#823). Each declared path is folded into the implement
                    stage's effective `scope.files` for THIS fix-up pass only
                    (never the persisted plan scope) so the runner stages the
                    net-new file instead of failing the created-out-of-scope
                    gate (category-B, #818). Any created file NOT declared here
                    still fails category-B — declaring a path widens the
                    legitimate set without reopening the silent-strip hole.
                    Entries must be repo-relative: an absolute path or one
                    containing `..` is rejected (400 `validation_failed`,
                    `field: allow_create`).
                force_additional_pass:
                  type: boolean
                  default: false
                  description: |
                    Bounded operator override (#860). When the NORMAL fix-up
                    budget is already spent (`fixup_budget_exhausted`) but a
                    concern still needs the agent, set this `true` to grant ONE
                    pass beyond the budget. Hard-capped at **3 total passes**
                    per stage; the forced pass is audited (a `forced` flag plus
                    `reason` on the `stage_fixup_triggered` entry). At the hard
                    ceiling even a forced attempt returns 422
                    (`fixup_ceiling_reached`). Default `false` preserves the
                    prior single-pass behaviour.
                delegated:
                  type: boolean
                  default: false
                  description: |
                    Opts the fix-up into the ADR-040 delegated-action
                    path (#1026). The server re-evaluates the
                    `operator_agent.may_route_fixup` condition
                    (`convergent_concerns`) against current run state at
                    action time: 403 `delegation_not_configured` when no
                    effective block delegates the route_fixup action
                    (fail-closed), 403 `delegation_condition_unmet` with
                    the named failed predicate when the implement-review
                    round is unsettled, a reviewer rejected, or no
                    concern is open. When met, the fix-up proceeds and
                    the `stage_fixup_triggered` payload records
                    `delegated: "convergent_concerns"`. Omitted →
                    behavior byte-identical to today.
                implement_model:
                  type: string
                  description: |
                    Optional operator/driver model override for THIS fix-up
                    pass (#1164). Empty (omitted) inherits the run's
                    already-resolved implement model — byte-identical to
                    today. A non-empty value is validated against the
                    deployment's per-adapter allowed-model set exactly as the
                    plan gate validates it: a model outside the run adapter's
                    configured allow-list is rejected (422
                    `fixup_invalid_model`); an empty/unconfigured allow-list
                    fails open (any model accepted). The effective model —
                    override or inherited — is pinned on the
                    `stage_fixup_triggered` audit entry at trigger time
                    (`fixup_model` / `fixup_model_source`) and read back when
                    the runner fetches the fix-up prompt, and is surfaced on
                    the run's `fixup_model` status field.
                operator_concern:
                  type: string
                  description: |
                    Optional free-text operator instruction routed back to the
                    agent with NO pre-existing review concern (#1311). It is the
                    sanctioned escape hatch for a REQUIRED external-check failure
                    that has no Fishhawk review concern — a CodeQL/SAST alert on
                    a clean approve-with-zero-concerns diff — or any operator
                    steer that is not an implement-review concern. When supplied
                    it is converted server-side into a synthetic
                    `[high/operator]` concern folded into the routed set, so it
                    rides the same budget / applicability / audit / prompt-render
                    path and reaches the agent as a binding instruction (#558
                    framing) on the run branch — keeping lineage sole-writer (no
                    foreign hand-commit that would trip ADR-035). It needs NO
                    recorded `approve_with_concerns` verdict: `operator_concern`
                    ALONE is admitted on a zero-concern gate-open stage (it does
                    NOT raise `fixup_not_applicable`). At least one of
                    `concern_ids`, `concerns`, or `operator_concern` is required.
                    A whitespace-only value, or one whose byte length exceeds
                    4000 (the renderer's per-section cap), is rejected (400
                    `validation_failed`, `field: operator_concern`) rather than
                    silently dropped or truncated. The raw text is recorded on
                    the `stage_fixup_triggered` audit entry as `operator_concern`.
      responses:
        '200':
          description: Stage re-opened for the fix-up pass; refreshed Stage row in body.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Stage' }
        '400':
          description: |
            Malformed body, no selection at all (none of `concern_ids` /
            `concerns` / `operator_concern`), both `concern_ids` and
            `concerns` supplied, an out-of-range / duplicate concern index,
            an unknown / foreign / plan-stage / non-open `concern_id`, or a
            whitespace-only or over-length (>4000 bytes) `operator_concern`.
            Body's `error` is `validation_failed`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: |
            Possible error codes: (1) bearer token lacks both `write:stages`
            and `write:fixups` scope — body `error` is `insufficient_scope`;
            (2) caller is an mcp token (subject `mcp:run:<uuid>`) whose run
            scope does not match the target stage's `run_id` — body `error`
            is `cross_run_fixup`. MCP tokens may only fix up stages within
            their own run. (3) `delegated: true` refusals (ADR-040 /
            #1026): `delegation_not_configured` when no effective
            `operator_agent` block delegates the route_fixup action
            (fail-closed), `delegation_condition_unmet` when the
            `convergent_concerns` condition is not satisfied — `details`
            names the exact failed predicate in `unmet_reason`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422':
          description: |
            Fix-up not applicable. One of: the stage is the wrong type/state
            or carries no recorded `approve_with_concerns` concerns
            (`fixup_not_applicable`); the NORMAL bounded pass count is already
            spent and no override was requested (`fixup_budget_exhausted` —
            one more pass is available via `force_additional_pass: true`); or
            the hard ceiling of 3 total passes is reached and the override can
            no longer help (`fixup_ceiling_reached`, distinct from
            `fixup_budget_exhausted`; its `details` carry a `remediation`
            pointer to the operator commit-and-`fishhawk_vouch_commit` path for
            a late CI/SAST finding, #1068/#1044); or the resolved `implement_model`
            override is not in the deployment's per-adapter allow-list
            (`fixup_invalid_model`, #1164 — `details` carry the resolved
            `model`, `model_source`, and `adapter`). Body's `message` explains
            the specific reason.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/concerns/{concern_id}/waive:
    post:
      operationId: waiveConcern
      summary: Waive an open review concern with an audited reason
      description: |
        Transitions one OPEN review concern (`raised`,
        `addressed_pending`, or `reopened`) to the terminal `waived`
        state (E22.X / #984) — the operator judgment that the concern
        does not warrant a change (false positive, accepted trade-off,
        deliberate deferral), as distinct from routing it back to the
        agent via `POST /v0/stages/{stage_id}/fixup`.

        The `reason` is REQUIRED and audited. **Audit-before-mutation
        ordering:** the handler appends a `concern_waived` audit entry
        on the concern's run/stage FIRST (payload: `concern_id`,
        `prior_state`, `reason`, `stage_kind`, `severity`, `category`)
        and treats append failure as request failure (500
        `audit_append_failed`, no state change) — a waive mutation can
        never exist without a durable audit record. Only then is the
        state transition applied; if it fails after the append (a
        concurrent transition raced it), a corrective
        `concern_waive_failed` entry is appended (best-effort) naming
        the actual state and the request returns 422
        (`concern_waive_conflict`), keeping the chain truthful in every
        interleaving.

        Effects of a successful waive: the concern stops appearing in
        `GET /v0/runs/{run_id}`'s open-states-only `concerns` block, can
        no longer be selected by the fix-up endpoint's `concern_ids`,
        and is rendered in later implement-review prompts as
        not-re-litigable context carrying the operator's reason
        verbatim. The waive is terminal — there is no un-waive.

        Auth mirrors the fix-up endpoint: `write:stages` or
        `write:fixups` scope; an mcp run-bound token (subject
        `mcp:run:<uuid>`) may waive only its own run's concerns
        (403 `cross_run_waive` otherwise).
      tags: [stages]
      parameters:
        - { name: concern_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [reason]
              properties:
                reason:
                  type: string
                  minLength: 1
                  description: |
                    REQUIRED operator rationale. Recorded on the
                    `concern_waived` audit entry, stored as the concern's
                    `state_reason`, and shown verbatim to later
                    re-reviews as the waive context — make it
                    self-contained.
                delegated:
                  type: boolean
                  default: false
                  description: |
                    Opts the waive into the ADR-040 delegated-action
                    path (#1026). The server re-evaluates the
                    `operator_agent.may_waive` condition (`solo_low`)
                    against current run state at action time, BEFORE the
                    `concern_waived` intent entry is appended: 403
                    `delegation_not_configured` when no effective block
                    delegates the waive action (fail-closed), 403
                    `delegation_condition_unmet` with the named failed
                    predicate unless exactly one concern is open and its
                    severity is low. When met, the waive proceeds and
                    the `concern_waived` payload records
                    `delegated: "solo_low"`. Omitted → behavior
                    byte-identical to today.
      responses:
        '200':
          description: Concern waived; updated concern row in body.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WaivedConcern' }
        '400':
          description: |
            Malformed body, missing/empty `reason`, or a non-UUID
            `concern_id`. Body's `error` is `validation_failed`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: |
            Possible error codes: (1) bearer token lacks both `write:stages`
            and `write:fixups` scope — body `error` is
            `insufficient_scope`; (2) caller is an mcp token (subject
            `mcp:run:<uuid>`) whose run scope does not match the
            concern's `run_id` — body `error` is `cross_run_waive`.
            (3) `delegated: true` refusals (ADR-040 / #1026):
            `delegation_not_configured` when no effective
            `operator_agent` block delegates the waive action
            (fail-closed), `delegation_condition_unmet` when the
            `solo_low` condition is not satisfied — `details` names the
            exact failed predicate in `unmet_reason`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422':
          description: |
            The concern is not in an open state — already `waived`,
            `superseded`, or `addressed`. Body's `error` is
            `concern_waive_conflict`; `details` carries the rejected
            `from`/`to` pair. A corrective `concern_waive_failed` audit
            entry accompanies the already-appended intent entry.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: |
            Concern or audit store not configured on this deployment.
            Body's `error` is `concern_store_unconfigured`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/concerns/{concern_id}/defer:
    post:
      operationId: deferConcern
      summary: Defer an open review concern into a follow-up work item
      description: |
        Converts one OPEN review concern (`raised`, `addressed_pending`,
        or `reopened`) into a conventions-complete, boarded, epic-linked
        follow-up work item AND transitions the concern to the terminal
        `deferred` state in a single call (E22.X / #1202) — the operator
        verb that sits between routing the concern back to the agent
        (`POST /v0/stages/{stage_id}/fixup`) and resolving it with no
        follow-up (`POST /v0/concerns/{concern_id}/waive`). Deferring
        consumes NO fix-up budget.

        The follow-up body is fully AUTO-DRAFTED server-side from the
        persisted concern + its run (the concern note, severity,
        category, the reviewer model, the evidence run id, and the
        source PR link). The operator supplies only the non-derivable
        title coordinates — `parent_epic` (the epic the follow-up rolls
        up to) and `n` (the child number) — mirroring the work-item
        filing endpoint; `type` defaults to `bug` for a defect category
        else `chore`, and `labels` are merged on top of the type
        defaults.

        **Orphan-issue safety + audit-ordering:** a GitHub issue is a
        durable external side effect, so the handler (1) PRE-CHECKS the
        concern is open BEFORE any filing — the provider's File is never
        called for an already-resolved concern (422
        `concern_defer_conflict`, no issue created); (2) files the issue
        FIRST, then transitions the concern; a filing failure leaves the
        concern OPEN (no transition, no audit) so the operator can retry;
        (3) appends the success `concern_deferred` audit entry ONLY AFTER
        the transition succeeds (the entry is a fact, not an attempt). If
        the transition fails after a successful filing (a concurrent
        writer raced it), the ONLY audit entry is a corrective
        `concern_defer_failed` naming the actual state AND the orphaned
        issue url, and the request returns 422 — never a success
        `concern_deferred` entry for a transition that did not happen.

        Effects of a successful defer: the concern stops appearing in
        `GET /v0/runs/{run_id}`'s open-states-only `concerns` block, can
        no longer be selected by the fix-up endpoint's `concern_ids`, and
        its `state_reason` names the filed issue. The defer is terminal.

        Auth mirrors the waive endpoint: `write:stages` or `write:fixups`
        scope; an mcp run-bound token (subject `mcp:run:<uuid>`) may
        defer only its own run's concerns (403 `cross_run_defer`
        otherwise).
      tags: [stages]
      parameters:
        - { name: concern_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                parent_epic:
                  type: string
                  description: |
                    The epic the follow-up rolls up to (an issue
                    reference like `#1196`); its leading `[E<n>]` title
                    token is fetched to derive the `{epic}` title
                    placeholder. Operator judgment — not derivable from
                    the concern.
                n:
                  type: string
                  description: |
                    The child number for the `[E<epic>.<n>]` title.
                    Operator judgment, mirroring how the work-item filing
                    endpoint takes `{n}` as a caller title var.
                type:
                  type: string
                  description: |
                    Optional override of the auto-selected work-item type
                    (`bug` for a defect category, else `chore`).
                labels:
                  type: array
                  items: { type: string }
                  description: Optional labels merged on top of the type's default labels.
                note:
                  type: string
                  description: |
                    Optional operator addendum folded into the follow-up
                    body and the concern's `state_reason`.
      responses:
        '200':
          description: |
            Concern deferred; the filed follow-up issue + updated concern
            row in body.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DeferredConcernResult' }
        '400':
          description: |
            Malformed body or a non-UUID `concern_id`. Body's `error` is
            `validation_failed`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: |
            Possible error codes: (1) bearer token lacks both
            `write:stages` and `write:fixups` scope — body `error` is
            `insufficient_scope`; (2) caller is an mcp token (subject
            `mcp:run:<uuid>`) whose run scope does not match the
            concern's `run_id` — body `error` is `cross_run_defer`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422':
          description: |
            Either the concern is not in an open state — already
            `waived`, `superseded`, `deferred`, or `addressed` (the
            open-state pre-check; no issue filed) — or the issue was
            filed but the state transition then failed (a post-filing
            race; a corrective `concern_defer_failed` audit entry names
            the orphaned issue url). Body's `error` is
            `concern_defer_conflict`. The auto-drafted follow-up could
            also violate the type's conventions — body `error` is
            `work_item_invalid` with `details`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '501':
          description: |
            The configured work-item provider is not registered. Body's
            `error` is `provider_unimplemented`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '502':
          description: |
            The provider could not file the follow-up issue — the
            concern stays OPEN (no transition). Body's `error` is
            `work_item_filing_failed`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: |
            Concern, audit, or run store not configured on this
            deployment. Body's `error` is `concern_store_unconfigured`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/artifacts/{artifact_id}:
    get:
      operationId: getArtifact
      summary: Get an artifact
      tags: [artifacts]
      parameters:
        - { name: artifact_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: Artifact with content.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Artifact' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ---------------------------------------------------------------------
  # Runner-facing endpoints
  # ---------------------------------------------------------------------
  /v0/runs/{run_id}/signing-key:
    post:
      operationId: issueSigningKey
      summary: Issue a per-run Ed25519 signing key
      description: |
        Called by the runner at job start. The backend mints a fresh
        Ed25519 keypair, appends a new row in `signing_keys`, and
        returns the private half in the response body. The private key
        is never persisted server-side and never returned to anyone
        else. Auth is GitHub Actions OIDC token, verified per request.
        See ADR-008 (#72).

        Multi-call: each invocation appends a new row so each stage's
        fresh GitHub Actions runner process can issue its own key
        without coordinating with prior stages. `Verify` (used by the
        trace and plan upload endpoints) picks the latest unexpired
        key for the run; older rows remain so the standalone audit
        verifier can replay any signature that was valid at upload
        time. Migration 0012.

        TTL: the server sets `expires_at` to
        `max(30m, resolved_stage_budget + 5m)`, where
        `resolved_stage_budget` is the spec-governed timeout for the
        stage currently in `dispatched` or `running` state (sourced
        from `spec.ResolveStageTimeout`). This ensures a stage that
        runs its full budget still holds a valid key when it uploads
        its trace. Runs without a workflow spec, or with no active
        stage, default to 30m.
      tags: [runner]
      security:
        - githubOIDC: []
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ttl_seconds:
                  type: integer
                  description: |
                    Optional override for the default TTL (1800s).
                    Backend may cap to a maximum.
                  minimum: 60
                  maximum: 3600
      responses:
        '201':
          description: Keypair issued.
          content:
            application/json:
              schema:
                type: object
                required: [run_id, public_key, private_key, issued_at, expires_at]
                properties:
                  run_id: { $ref: '#/components/schemas/UUID' }
                  public_key:
                    type: string
                    description: Base64-encoded 32-byte Ed25519 public key.
                  private_key:
                    type: string
                    description: |
                      Base64-encoded 64-byte Ed25519 private key. The
                      runner stores this in process memory only and
                      discards it after trace upload.
                  issued_at:
                    type: string
                    format: date-time
                  expires_at:
                    type: string
                    format: date-time
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404':
          description: Run does not exist.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/runs/{run_id}/trace:
    post:
      operationId: shipTrace
      summary: Upload a signed trace bundle
      description: |
        Called by the runner after a stage completes. The bundle bytes
        (`application/gzip`, JSON Lines) are uploaded as the request body;
        the signature comes via the `X-Fishhawk-Signature` header. The
        backend verifies the signature against the run's stored public
        key, stores the bundle in S3 (per ADR-003 #67), and writes the
        corresponding audit entry. Auth is the signature itself; no
        Bearer or cookie required.
      tags: [runner]
      security: []
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - { name: stage_id, in: query, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - name: variant
          in: query
          required: true
          schema:
            type: string
            enum: [raw, redacted]
        - name: X-Fishhawk-Signature
          in: header
          required: true
          schema:
            type: string
            description: |
              Hex-encoded 64-byte Ed25519 signature over
              sha256(raw_bundle_bytes).
      requestBody:
        required: true
        content:
          application/gzip:
            schema:
              type: string
              format: binary
      responses:
        '202':
          description: Bundle accepted, signature verified.
          content:
            application/json:
              schema:
                type: object
                required: [run_id, stage_id, variant, content_hash]
                properties:
                  run_id: { $ref: '#/components/schemas/UUID' }
                  stage_id: { $ref: '#/components/schemas/UUID' }
                  variant: { type: string, enum: [raw, redacted] }
                  content_hash:
                    type: string
                    description: Hex sha256 of the uploaded bundle bytes.
        '400': { $ref: '#/components/responses/BadRequest' }
        '401':
          description: Signature invalid or no signing key for this run.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v0/runs/{run_id}/plan:
    post:
      operationId: shipPlan
      summary: Upload a standard_v1 plan artifact
      description: |
        Called by the runner after a successful plan-stage agent
        invocation. The body is the agent-produced JSON validated
        against `docs/spec/plan-standard-v1.schema.json`. Auth is the
        per-run Ed25519 signature in `X-Fishhawk-Signature` (same
        scheme as `/v0/runs/{run_id}/trace`).

        Idempotent on (stage_id, content_hash): re-uploading the same
        plan bytes returns 200 with the existing artifact rather than
        inserting a duplicate row.
      tags: [runner]
      security: []
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - { name: stage_id, in: query, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - name: X-Fishhawk-Signature
          in: header
          required: true
          schema:
            type: string
            description: |
              Hex-encoded 64-byte Ed25519 signature over
              sha256(plan_bytes).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Validated against plan-standard-v1.schema.json.
      responses:
        '201':
          description: Plan accepted; new artifact row created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlanUploadResponse' }
        '200':
          description: |
            Plan with this content_hash already exists for the stage.
            The body returns the existing artifact unchanged (idempotent
            re-upload).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlanUploadResponse' }
        '400':
          description: |
            Body did not validate against `standard_v1` (`code: plan_invalid`)
            or path/query parameters were malformed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: Signature invalid or no signing key for this run.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '413':
          description: Plan body exceeds the per-stage size cap (256 KiB).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/runs/{run_id}/pull-request:
    post:
      operationId: shipPullRequest
      summary: Upload a pull-request artifact for an implement stage
      description: |
        Called after an implement-stage run to report its commit/push/
        PR-open outcome. The body has three variants (#742, #771):

        - **Success**: a real GitHub PR was opened. The body carries
          `{ pr_number, pr_url, branch, head_sha, base_sha, title,
          body?, files_changed_count }`. The handler stores the artifact,
          backfills `run.pull_request_url`, and drives the implement
          stage's terminal transition when the trace handler's
          push-and-open-pr gate left it in `running`.
        - **Failure** (`{ outcome: "failed", category, reason }`): the
          commit/push/PR-open step failed, so no PR was opened. The
          handler fails the implement stage (category `C` is retryable,
          `B` parks for re-scope) instead of creating an artifact —
          closing the zombie-run hole where a commit/push failure
          stranded the run at review with a null PR.
        - **Child push** (`{ outcome: "pushed", branch, head_sha,
          base_sha, files_changed_count }`, #771): a decomposed child
          pushed onto the shared parent branch without opening a PR. The
          handler drives the child stage's terminal transition its
          push_to_shared_branch trace gate left in `running`, without
          creating a PR artifact — the decomposition-child analogue of the
          #742 zombie fix.

        Two auth paths are accepted:

        - **Ed25519 signature** (canonical runner path): supply
          `X-Fishhawk-Signature` — the hex-encoded 64-byte Ed25519
          signature over sha256(body), using the per-run ephemeral
          key issued at `/v0/runs/{run_id}/signing-key`. Same scheme
          as `/v0/runs/{run_id}/trace` and `/v0/runs/{run_id}/plan`.

        - **Bearer token** (local-runner CLI path): supply
          `Authorization: Bearer <token>` with `write:runs` scope.
          Used by the CLI wrapper (`autoOpenPR`) when the per-run
          Ed25519 signing key is unavailable — the key is consumed
          by the trace and plan uploads inside the runner subprocess
          and is not accessible to the outer CLI process.

        When both are present the signature path wins. The audit
        payload's `auth_method` field records `ed25519` or `bearer`
        to identify which path was taken.

        Returns 401 `signature_or_bearer_required` when neither is
        present.

        Idempotent on (stage_id, content_hash): re-running a runner
        job that pushed the same commits returns the existing
        artifact unchanged rather than inserting a duplicate.

        v0 has no formal JSON Schema for the body — required-field
        checks happen in the handler. v1+ may graduate this to a
        versioned `pull_request_v1` schema.
      tags: [runner]
      security: []
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - { name: stage_id, in: query, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - name: X-Fishhawk-Signature
          in: header
          required: false
          schema:
            type: string
            description: Hex-encoded 64-byte Ed25519 signature over sha256(body).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PullRequestArtifactBody' }
      responses:
        '201':
          description: Pull-request accepted; new artifact row created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PullRequestUploadResponse' }
        '200':
          description: |
            Either:
            - A pull-request artifact with this content_hash already
              exists for the stage (idempotent re-upload returns the
              existing artifact unchanged), or
            - the failure variant (`outcome: failed`) was accepted and
              the implement stage was transitioned to `failed` (#742), or
            - the child-push variant (`outcome: pushed`) was accepted and
              the decomposed-child implement stage was transitioned
              terminally (#771), or
            - the fix-up push variant (`outcome: fixup_pushed`) was accepted
              and the fix-up implement stage was transitioned terminally
              (#794), or
            - the fix-up no-changes variant (`outcome: fixup_no_changes`) was
              accepted and the fix-up implement stage was transitioned
              terminally, re-parking the review gate (#856), or
            - the scope-completeness park variant (`outcome: scope_park`) was
              accepted and the implement stage was parked in
              `awaiting_scope_decision` for an operator exempt-or-fail
              decision (#1231).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PullRequestUploadResponse'
                  - $ref: '#/components/schemas/PullRequestFailureResponse'
                  - $ref: '#/components/schemas/PullRequestChildPushResponse'
                  - $ref: '#/components/schemas/PullRequestFixupPushResponse'
                  - $ref: '#/components/schemas/PullRequestFixupNoChangesResponse'
                  - $ref: '#/components/schemas/PullRequestScopeParkResponse'
        '400':
          description: |
            Body missing required fields (`code: pull_request_invalid`)
            — for the failure variant, an unknown `category` or missing
            `reason` — or path/query parameters were malformed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: |
            Auth failed. Possible codes:
            - `signature_invalid` — `X-Fishhawk-Signature` did not verify against the run's public key, or no signing key exists for this run.
            - `signature_or_bearer_required` — request included neither `X-Fishhawk-Signature` nor an authenticated bearer token with `write:runs` scope.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '413':
          description: Pull-request body exceeds the per-stage size cap (32 KiB).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/runs/{run_id}/deployment:
    post:
      operationId: shipDeployment
      summary: Record a deployment artifact for a deploy stage
      description: |
        Records ADR-038's signed `deployment` artifact (E23.5 / #1385) —
        the governance record of a delegated release. Modeled on
        `POST /v0/runs/{run_id}/pull-request`: Fishhawk holds no deploy
        logic or credentials, so the external pipeline runs the deploy and
        the body reports its settled outcome.

        The body carries `{ environment, ref, external_run_url, outcome,
        rollback_handle? }`. `outcome` is one of `succeeded` / `failed` /
        `partial` / `rolled_back` (the ADR-038 deploy dispositions). The
        handler stores the artifact (`artifact.kind = deployment`) and
        writes a `deployment_outcome_recorded` chained audit entry. When the
        body additionally carries `rollback_action` (`initiated` /
        `completed`) it writes the matching
        `deployment_rollback_initiated` / `deployment_rollback_completed`
        entry as well. The deploy outcome surfaces on the run's living-anchor
        issue timeline.

        Two auth paths are accepted, mirroring the pull-request upload:

        - **Ed25519 signature** (canonical deploy-executor path): supply
          `X-Fishhawk-Signature` — the hex-encoded 64-byte Ed25519
          signature over sha256(body), using the per-run ephemeral key. The
          signature path is NOT scope-gated.
        - **Bearer token** (operator path): supply `Authorization: Bearer
          <token>` with BOTH `write:runs` AND `write:deploy` scope (ADR-038 /
          #1390 — the deploy ship is a governance write specific to the deploy
          gate). A token holding `write:runs` but missing `write:deploy` is
          rejected 403 `insufficient_scope` (`required_scope: write:deploy`).

        When both are present the signature path wins. The audit payload's
        `auth_method` field records `ed25519` or `bearer`.

        Returns 401 `signature_or_bearer_required` when neither is present.

        Idempotent on (stage_id, content_hash): a re-delivery of the same
        deployment record returns the existing artifact unchanged rather
        than inserting a duplicate or writing a second audit entry.

        v0 has no formal JSON Schema for the body — required-field checks
        happen in the handler.
      tags: [runner]
      security: []
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - { name: stage_id, in: query, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - name: X-Fishhawk-Signature
          in: header
          required: false
          schema:
            type: string
            description: Hex-encoded 64-byte Ed25519 signature over sha256(body).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DeploymentArtifactBody' }
      responses:
        '201':
          description: Deployment accepted; new artifact row created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DeploymentUploadResponse' }
        '200':
          description: |
            A deployment artifact with this content_hash already exists for
            the stage (idempotent re-upload returns the existing artifact
            unchanged).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DeploymentUploadResponse' }
        '400':
          description: |
            Body missing required fields or malformed
            (`code: deployment_invalid`) — for example an absent
            `environment`/`ref`/`external_run_url`, a non-http
            `external_run_url`, an `outcome` outside the closed set, or an
            unrecognized `rollback_action` — or path/query parameters were
            malformed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: |
            Auth failed. Possible codes:
            - `signature_invalid` — `X-Fishhawk-Signature` did not verify against the run's public key, or no signing key exists for this run.
            - `signature_or_bearer_required` — request included neither `X-Fishhawk-Signature` nor an authenticated bearer token with `write:runs` scope.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: |
            Bearer token holds `write:runs` but is missing the deploy-specific
            `write:deploy` scope (`code: insufficient_scope`,
            `required_scope: write:deploy`, ADR-038 / #1390).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '413':
          description: Deployment body exceeds the per-stage size cap (32 KiB).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/runs/{run_id}/deployment/rollback:
    post:
      operationId: rollbackDeployment
      summary: Re-dispatch a delegating deploy's rollback path
      description: |
        Operator-triggered rollback sub-action for a delegating deploy
        (E23.6 / #1386, ADR-038's `rolled_back` disposition). Fishhawk holds
        no prod credentials, so a rollback is just another delegating
        trigger: it re-dispatches the SAME external pipeline down its
        rollback path and records the rollback run handle.

        The endpoint owns only the **initiate** side. It reads the run's
        deploy stage's `executor.delegate` config from the cached workflow
        spec and, by target:

        - **github_actions** — fires a `workflow_dispatch` of the SAME
          `workflow_ref` carrying the Fishhawk correlation
          (`fishhawk_run_id` / `fishhawk_stage_id`) plus
          `fishhawk_rollback=true` as inputs, then best-effort resolves the
          rollback run id (the dispatch endpoint returns 204 with no body).
          Re-dispatching the same `workflow_ref` with a rollback input (rather
          than a separately configured `rollback_workflow_ref`) avoids a
          `workflow-v*` schema bump; a distinct rollback ref stays a deferred
          additive spec field.
        - **webhook** — POSTs a rollback payload (`fishhawk_rollback: true`)
          to the delegate URL.

        On a successful dispatch it writes a `deployment_rollback_initiated`
        chained audit entry carrying the rollback run handle — **distinct**
        from the initial deploy's `deployment_dispatched` handle — and
        refreshes the run's living-anchor issue comment.

        **Terminal completion is NOT recorded here.** Setting the
        `rolled_back` outcome and writing `deployment_rollback_completed`
        happen ONLY when the rollback run reaches terminal: the external
        rollback pipeline reports it by calling back into
        `POST /v0/runs/{run_id}/deployment` with
        `{ outcome: "rolled_back", rollback_action: "completed" }`, which
        persists the `rolled_back` deployment artifact (the durable carrier
        of the deploy outcome) and chains `deployment_rollback_completed`.
        This is the rollback terminal callback path and is uniform across
        both targets.

        **Preconditions.** The run must have a deploy stage in a terminal
        state (`succeeded` or `failed`); an in-flight stage has nothing to
        revert (refused 409 `deploy_not_settled`).

        **Authorization.** Operator-only — an authenticated bearer with BOTH
        `write:runs` AND `write:deploy` scope (ADR-038 / #1390; a rollback is
        never runner-initiated, so there is no Ed25519 signature path). A token
        holding `write:runs` but missing `write:deploy` is refused 403
        `insufficient_scope` (`required_scope: write:deploy`). A run-bound MCP
        token (subject `mcp:run:<uuid>`) is EXEMPT from the `write:deploy`
        requirement and may roll back ONLY its own run's deploy; another run is
        refused 403 (`cross_run_rollback`).
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '202':
          description: |
            Rollback re-dispatched; the rollback run handle is echoed back.
            Terminal completion (the `rolled_back` outcome +
            `deployment_rollback_completed`) is recorded later via the
            deployment callback.
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id: { $ref: '#/components/schemas/UUID' }
                  stage_id: { $ref: '#/components/schemas/UUID' }
                  target: { type: string, enum: [github_actions, webhook], description: 'The delegate target the rollback was re-dispatched against.' }
                  gha_run_id: { type: integer, format: int64, description: 'Resolved GitHub Actions rollback run id; omitted/0 when not yet resolvable.' }
                  external_run_url: { type: string, description: 'URL of the external rollback run (GHA run html_url, or the webhook delegate URL).' }
                  message: { type: string }
        '400':
          description: '`run_id` is not a valid UUID (`validation_failed`).'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: |
            One of: (1) bearer token lacks `write:runs` scope —
            `insufficient_scope`; (2) an operator bearer holds `write:runs` but
            lacks the deploy-specific `write:deploy` scope —
            `insufficient_scope` (`required_scope: write:deploy`, ADR-038 /
            #1390; mcp run-bound tokens are exempt); (3) an mcp run-bound token
            targeting another run — `cross_run_rollback`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: |
            No run with that id (`run_not_found`), or the run has no deploy
            stage to roll back (`deploy_stage_not_found`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: |
            The deploy stage has not reached a terminal outcome; nothing to
            roll back (`deploy_not_settled`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422':
          description: |
            The rollback could not be dispatched from config
            (`rollback_unconfigured`): the cached spec carries no delegating
            deploy stage, the github_actions delegate is missing a
            `workflow_ref`, the run has no `installation_id`, the webhook
            delegate is missing a `url`, or the repo ref is malformed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '502':
          description: |
            The external rollback trigger failed (`rollback_dispatch_failed`):
            the `workflow_dispatch` returned non-204, or the webhook POST
            errored / returned a non-2xx status.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: |
            Rollback unavailable (`rollback_unconfigured`): the backend has no
            run/audit repositories, or a github_actions rollback was requested
            against a backend with no configured GitHub client.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/runs/{run_id}/installation-token:
    post:
      operationId: issueInstallationToken
      summary: Mint a GitHub App installation token for the run's repo
      description: |
        Returns the Fishhawk App's installation token for the
        repository the run is operating on. Lets the runner do its
        implement-stage `git push` and PR creation under the App's
        identity rather than the workflow's `GITHUB_TOKEN` — which
        means customers don't need to enable "Allow Actions to create
        and approve pull requests" in their repo settings, and the PR
        is correctly attributed to the App.

        Dual auth (#201):
        - **OIDC (canonical)** — `Authorization: Bearer <github-actions-oidc-jwt>`.
          Verified against the run row's repository + workflow
          claims via `cfg.OIDCVerifier`. Used by the auth pre-step
          before `actions/checkout` so the App token is what
          authenticates the initial clone too.
        - **Ed25519 (fallback)** — `X-Fishhawk-Signature: <hex>`
          over sha256 of the request body. Used by the runner's
          runtime fallback path when no auth pre-step ran (local
          dev, non-Actions environments).

        OIDC wins when both are present. Audit payload's
        `auth_method` field records which path was taken. Backend
        reads the run row's `installation_id` and calls the cached
        `githubapp.TokenProvider`; tokens are GitHub-default
        ~1 hour. Issuance is audited (`installation_token_issued`)
        with a sha256 of the token, never the token itself.
      tags: [runner]
      security: []
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - { name: stage_id, in: query, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - name: Authorization
          in: header
          required: false
          schema:
            type: string
            description: |
              `Bearer <github-actions-oidc-jwt>`. Required for the
              OIDC auth path. Mutually exclusive with
              X-Fishhawk-Signature; OIDC wins when both are sent.
        - name: X-Fishhawk-Signature
          in: header
          required: false
          schema:
            type: string
            description: |
              Hex-encoded 64-byte Ed25519 signature over sha256 of
              the request body (typically empty). Required for the
              Ed25519 auth path. Mutually exclusive with
              Authorization.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              description: Empty in v0; reserved for future fields.
      responses:
        '201':
          description: Installation token issued.
          content:
            application/json:
              schema:
                type: object
                required: [token]
                properties:
                  token:
                    type: string
                    description: |
                      Opaque GitHub installation token. Use as
                      `x-access-token:<token>` for HTTPS git push,
                      or `Authorization: Bearer <token>` for REST
                      API calls. ~1-hour TTL; runner discards
                      after stage completes.
        '400':
          description: |
            run_id / stage_id malformed, stage doesn't belong to
            run, or the run has no `installation_id` (was created
            without a webhook-attributed installation).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: Signature invalid or no signing key for this run.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '502':
          description: |
            Backend's App JWT was rejected, or the installation no
            longer exists. Runner should abort the implement stage
            and report category-C.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/runs/{run_id}/mcp-token:
    post:
      operationId: issueMCPToken
      summary: Mint a short-lived MCP bearer token for the run
      description: |
        Per ADR-021 / #322 (resolved E19.1) the runner-side Claude
        Code agent gets a per-run, read-only bearer token to call
        the Fishhawk MCP server (`backend/cmd/fishhawk-mcp/`)
        mid-execution. This endpoint mints that token (E19.8 /
        #348).

        Token shape:
        - `fhm_` prefix + 32 random bytes URL-safe base64. Distinct
          from the operator-facing `fhk_` API tokens so the bearer-
          auth middleware can route to the right authenticator.
        - TTL: 60 minutes (load-bearing protection per ADR-021;
          per-endpoint scope enforcement lands as a separate
          ticket if needed).
        - Stored as sha256 in `mcp_tokens`; plaintext is shown
          exactly once on issue. Subject of `mcp:run:<run_id>` is
          stamped on requests authenticated with the token.

        Auth: Ed25519 signing-key path. The runner proves
        possession by signing the (empty) request body with the
        per-run private key it received from `signing-key`. Same
        Ed25519 shape `installation-token` uses; no OIDC fallback
        because this endpoint is runner-only (operators issue
        interactive MCP tokens via the `/v0/tokens` flow).

        Issuance is audited (`mcp_token_issued`). Payload carries
        the token id, expiry, TTL, and the prefix — never the
        plaintext bearer string.
      tags: [runner]
      security: []
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - name: X-Fishhawk-Signature
          in: header
          required: true
          schema:
            type: string
            description: |
              Hex-encoded 64-byte Ed25519 signature over sha256 of
              the request body (typically empty).
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              description: Empty in v0; reserved for future fields.
      responses:
        '201':
          description: MCP token issued.
          content:
            application/json:
              schema:
                type: object
                required: [token, token_id, run_id, expires_at]
                properties:
                  token:
                    type: string
                    description: |
                      Plaintext bearer token. The runner stores this
                      in the agent's environment as
                      `FISHHAWK_API_TOKEN` and discards it. Shown
                      exactly once; no read path returns it.
                  token_id:
                    $ref: '#/components/schemas/UUID'
                  run_id:
                    $ref: '#/components/schemas/UUID'
                  expires_at:
                    type: string
                    format: date-time
        '400':
          description: |
            run_id is malformed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: |
            X-Fishhawk-Signature missing, malformed, or didn't
            verify against the run's stored public key.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503':
          description: |
            The backend doesn't have the MCP token / run / signing
            repositories wired (dev backends running without the
            full set).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/runs/{run_id}/scope-amendments:
    post:
      operationId: requestScopeAmendment
      summary: Request a mid-stage scope amendment (implement agent)
      description: |
        Files an operator-gated request to fold specific file paths
        into the executing implement stage's effective `scope.files`
        (E22.X / #961). The agent uses this instead of editing an
        undeclared file — the runner drops undeclared edits from the
        commit and fails category-B on undeclared created files
        (#818/#825).

        **Auth: run-bound `fhm_` bearer ONLY**, carrying the
        `write:scope-amendments` scope (granted unconditionally to
        implement-stage MCP tokens at issue). The path `run_id` must
        equal the token's run — a cross-run request is 403
        (`cross_run_scope_amendment`). Operator tokens/sessions are
        rejected (403 `agent_token_required`): operators decide,
        they don't request. The run's resolved active stage — the
        currently dispatched/running stage, or when none exists
        (e.g. an implement-only decomposition child whose stage is
        still `pending` under a local runner, #1030) the run's first
        non-terminal stage in sequence order — must be an implement
        stage (409 `stage_not_implement` otherwise).

        Budget: at most **2 requests per stage**, counted on rows so
        a denied request still consumes budget (the cap bounds
        operator interruptions, not approvals). Over budget → 422
        `amendment_budget_exhausted` with `{max, used}` details.

        The request lands as a `scope_amendment_requested` audit
        entry on the stage (`{amendment_id, paths, reason,
        remaining_budget}`) — the operator's `fishhawk_await_audit`
        anchor. Delivery is poll-based: the agent polls the GET
        until the status leaves `pending` (bounded ~5 minutes).
      tags: [runner]
      security: []
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [paths, reason]
              properties:
                paths:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [path, operation]
                    properties:
                      path: { type: string }
                      operation: { type: string, enum: [modify, create] }
                reason:
                  type: string
                  description: Why each path must change. Required, non-empty.
      responses:
        '201':
          description: Amendment request created (status `pending`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ScopeAmendment' }
        '400':
          description: |
            Malformed run_id, invalid paths (absolute / `..` /
            unknown operation / empty), or empty reason.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: No authenticated token.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: |
            `agent_token_required` (caller is not a run-bound token),
            `insufficient_scope` (token lacks
            `write:scope-amendments`), or
            `cross_run_scope_amendment` (token bound to a different
            run).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: |
            `stage_not_implement` — the run's resolved active stage
            (dispatched/running, else first non-terminal) is not an
            implement stage.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422':
          description: |
            `amendment_budget_exhausted` — the per-stage cap of 2 is
            spent. Details carry `{max, used}`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: Scope-amendment repositories not wired.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    get:
      operationId: listScopeAmendments
      summary: List a run's scope amendments
      description: |
        Returns every scope amendment for the run, oldest first
        (E22.X / #961).

        **Auth: EITHER** the run-bound `fhm_` bearer with `mcp:read`
        — the implement agent's poll loop and the runner's pre-commit
        refresh both reuse the token the runner fetched at stage
        start, with the same path-`run_id` == token-run binding as
        the POST (cross-run → 403 `cross_run_scope_amendment`) —
        **OR** an operator bearer/session (not run-bound). Anonymous
        callers get 401.

        **Optional `?wait=<seconds>` long-poll (#1035).** When `wait`
        is a positive integer and at least one amendment is currently
        `pending`, the server holds the connection — re-listing
        internally — and returns early the moment any amendment that
        was pending at request time leaves `pending` (the
        honored-decision path), so a mid-stage decision is reachable
        while `fishhawk_run_stage` blocks the driving session. If no
        such decision lands within `wait` seconds, it returns the
        still-pending list at the cap and the client re-issues to
        extend toward its own total budget. `wait` is clamped to
        `0..30`; `0`, absent, or a non-positive/non-integer value is
        the unchanged single-list behavior (no wait). A `wait` with
        nothing currently pending returns immediately. The response
        envelope is unchanged — only the return timing differs; no new
        error codes.
      tags: [runner, runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - name: wait
          in: query
          required: false
          description: |
            Optional server-side long-poll in seconds (#1035). `0` or
            absent = no wait (unchanged single-list response). When
            positive and an amendment is pending, holds until a
            snapshotted-pending amendment is decided or the wait
            elapses; the client re-issues to extend. Clamped to
            `0..30`.
          schema:
            type: integer
            minimum: 0
            maximum: 30
            default: 0
      responses:
        '200':
          description: The run's amendments, oldest first.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/ScopeAmendment' }
        '400':
          description: run_id is malformed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: No authenticated token.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: |
            `insufficient_scope` (run-bound token lacks `mcp:read`)
            or `cross_run_scope_amendment` (run-bound token reading
            another run's amendments).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: Scope-amendment repository not wired.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/runs/{run_id}/scope-amendments/{amendment_id}/decision:
    post:
      operationId: decideScopeAmendment
      summary: Approve or deny a scope amendment (operator)
      description: |
        Records the operator's decision on a pending scope amendment
        (E22.X / #961) and appends the `scope_amendment_decided`
        audit entry (`{amendment_id, decision, reason, decided_by}`).

        **Auth: operator bearer/session ONLY** — bearer tokens
        require `write:stages`. Run-bound `fhm_` tokens are rejected
        outright (403 `self_decision`): the requesting agent's token
        holds `write:scope-amendments` and must never decide its own
        request. Implement-stage tokens are never issued
        `write:stages`, so the run-bound rejection is defense in
        depth.

        On approve, the paths fold into the stage's effective
        `scope.files` at the next prompt fetch AND the runner's
        pre-commit refresh. Already-decided amendments return 409
        (`amendment_already_decided`) — decisions are immutable.
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - { name: amendment_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision:
                  type: string
                  enum: [approve, deny]
                reason:
                  type: string
                  description: |
                    Operator note; delivered to the agent verbatim on
                    deny (`decision_reason`), recorded on the audit
                    entry either way.
      responses:
        '200':
          description: The decided amendment.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ScopeAmendment' }
        '400':
          description: Malformed UUIDs or decision not approve/deny.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: No authenticated token.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: |
            `self_decision` (run-bound agent token) or
            `insufficient_scope` (token lacks `write:stages`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: |
            `amendment_not_found` — unknown amendment id, or the
            amendment belongs to a different run than the path names.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: |
            `amendment_already_decided` — decisions are immutable.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: Scope-amendment repositories not wired.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/runs/{run_id}/scope-completeness/decision:
    post:
      operationId: decideScopeCompleteness
      summary: Exempt or fail a parked scope-completeness shortfall (operator)
      description: |
        Records the operator's exempt-or-fail decision on an implement
        stage parked in `awaiting_scope_decision` (#1231): the stage's
        ONLY committed-tree gate failure was the scope-completeness
        "missing declared scope file(s)" check, and the runner already
        pushed its gate-verified commit to the run branch (no PR).

        **Auth: operator bearer/session ONLY** — bearer tokens require
        `write:stages`. Run-bound `fhm_` tokens are rejected outright
        (403 `self_decision`): the implement agent that produced the
        parked commit must never decide its own exemption.

        On `exempt` the stage resumes `running` so the held commit's PR
        is opened with NO agent re-run (a `push_and_open_pr` dispatch
        opens the PR from the held commit), and a
        `scope_completeness_exempted` audit entry is appended. On `fail`
        the stage fails category-B (today's restore path) and a
        `scope_completeness_failed` entry is appended. A stage not
        currently parked returns 409 (`stage_not_parked`).
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision, reason]
              properties:
                decision:
                  type: string
                  enum: [exempt, fail]
                reason:
                  type: string
                  description: |
                    Operator note explaining the exemption or failure;
                    recorded on the audit entry. Required and non-empty.
      responses:
        '200':
          description: |
            The resolved decision. On `exempt`, `held_commit_sha` /
            `run_branch` name the commit the PR is opened from.
          content:
            application/json:
              schema:
                type: object
                required: [stage_id, decision, state]
                properties:
                  stage_id: { $ref: '#/components/schemas/UUID' }
                  decision:
                    type: string
                    enum: [exempt, fail]
                  state:
                    type: string
                    description: The implement stage's resulting state.
                  held_commit_sha:
                    type: string
                    description: Present on `exempt` — the held commit the PR opens from.
                  run_branch:
                    type: string
                    description: Present on `exempt` — the run branch the held commit sits on.
        '400':
          description: Malformed run_id, decision not exempt/fail, or empty reason.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: No authenticated token.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: |
            `self_decision` (run-bound agent token) or
            `insufficient_scope` (token lacks `write:stages`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: '`run_not_found` — unknown run id.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: |
            `stage_not_parked` — the implement stage is not parked
            awaiting a scope-completeness decision.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: Run/audit repositories not wired.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ---------------------------------------------------------------------
  # Webhook ingestion (unversioned; GitHub controls request shape)
  # ---------------------------------------------------------------------
  /webhooks/github:
    post:
      operationId: receiveGithubWebhook
      summary: GitHub App webhook receiver
      description: |
        Inbound from the customer's GitHub App installation. Events
        include issues, pull requests, check runs, push, and the
        Marketplace billing events. The backend signature-verifies via
        the GitHub App webhook secret, deduplicates by delivery ID,
        and translates relevant events into workflow run dispatches.
        See E3.7 (#47).
      tags: [webhooks]
      security: []
      parameters:
        - name: X-GitHub-Event
          in: header
          required: true
          schema: { type: string }
        - name: X-GitHub-Delivery
          in: header
          required: true
          schema: { type: string }
        - name: X-Hub-Signature-256
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '202':
          description: Event accepted.
        '401':
          description: Webhook signature invalid.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '400':
          description: Malformed event.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

tags:
