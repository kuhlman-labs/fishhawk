  /v0/stages/{stage_id}/trace:
    get:
      operationId: getStageTrace
      summary: Stream the redacted trace bundle for a stage
      description: |
        Streams the most-recent **redacted** trace bundle the runner
        shipped for this stage. The body is gzipped JSON Lines; the
        SPA gunzips client-side (or the browser auto-decompresses
        when `Accept-Encoding: gzip` is honored) and parses
        line-by-line to render the agent transcript (#218).

        The bundle's first line is the manifest (agent, model,
        agent_failed flag); middle lines are one captured agent
        event each; last line is the trailer with event count + a
        sha256 of the preceding lines (truncation detector). Schema
        is ADR-007 (#71).

        Raw variant access is not exposed here. The raw bundle can
        carry secrets in agent output and lives behind S3 Object
        Lock for compliance reasons; surfacing it is a separate
        decision.
      tags: [stages]
      parameters:
        - { name: stage_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: |
            Gzipped JSON Lines bundle bytes. `X-Fishhawk-Content-Hash`
            carries the bundle's hex sha256 so callers can cross-
            reference the audit log's `trace_uploaded` payload.
          headers:
            X-Fishhawk-Content-Hash:
              schema: { type: string }
              description: Hex sha256 of the gzipped bundle bytes.
            Content-Encoding:
              schema: { type: string, enum: [gzip] }
          content:
            application/x-ndjson:
              schema:
                type: string
                format: binary
        '400': { $ref: '#/components/responses/BadRequest' }
        '404':
          description: |
            `stage_not_found` ‚Äî no stage with that id;
            `trace_not_found` ‚Äî stage exists but no redacted bundle
            has been uploaded yet.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '410':
          description: |
            `trace_storage_missing` ‚Äî the audit log references a
            bundle that's no longer in storage (lifecycle expiry,
            manual deletion, or a storage outage). The audit chain
            is the canonical record; the storage gap needs human /
            verifier intervention.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: Backend wiring incomplete (run, audit, or tracestore unconfigured).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/stages/{stage_id}/checks:
    get:
      operationId: listStageChecks
      summary: Latest state per blocking check on a stage
      description: |
        Returns the most-recent observed state for each required
        check on the stage's run (#228). `declared` is the run's
        required-checks snapshot from GitHub branch protection
        (#251 / ADR-017) ‚Äî pre-#254 it sourced from the spec-level
        `gate.blocking_checks` field, which has been dropped. `items`
        is the latest observed state per check name. Declared-but-
        not-observed checks appear in `declared` but not `items` ‚Äî
        the SPA fills them with `not_tracked`.

        State values per check are the SPA-facing rollup of GitHub's
        `status` + `conclusion` pair, or the backend's self-derived
        equivalent for `fishhawk_audit_complete` (#229): `pass`,
        `fail`, `pending`, or `not_tracked`.

        For `fishhawk_audit_complete` the response item additionally
        carries a `missing` array naming what's incomplete (plan
        artifact, raw or redacted trace bundle, pull-request
        artifact, or audit-chain mismatch) so the SPA can render
        the failure reason without a secondary call. The check is
        computed on read from artifact + audit-log presence; no row
        for it lands in `stage_checks`. The audit-complete row is
        injected only for review stages.
      tags: [stages]
      parameters:
        - { name: stage_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: Declared required checks + latest observed state per check.
          content:
            application/json:
              schema:
                type: object
                required: [declared, sources, items]
                properties:
                  declared:
                    type: array
                    items: { type: string }
                    description: |
                      Required-status-check context names from the
                      run's branch-protection snapshot (#251). Empty
                      when the run pre-dates the snapshot wiring or
                      skipped protection lookup (CLI / UI).
                  sources:
                    type: array
                    items: { type: string }
                    description: |
                      Surfaces that contributed to `declared`. Each
                      entry is `branch_protection` or `ruleset:<id>`.
                      The SPA renders this as a "Required by branch
                      protection" sub-label so reviewers know where
                      the list comes from (#256).
                  items:
                    type: array
                    items:
                      type: object
                      required: [name, state]
                      properties:
                        name: { type: string }
                        state:
                          type: string
                          enum: [pass, fail, pending, not_tracked]
                        status:
                          type: string
                          description: Verbatim GitHub `check_run.status` (queued / in_progress / completed).
                        conclusion:
                          type: [string, "null"]
                          description: Verbatim GitHub `check_run.conclusion`; null while not completed.
                        head_sha:
                          type: string
                        github_check_run_id:
                          type: [integer, "null"]
                          format: int64
                        ts:
                          type: string
                          format: date-time
                        missing:
                          type: array
                          description: |
                            Populated only on the `fishhawk_audit_complete`
                            row when the derivation found gaps. Each entry
                            names a category of incompleteness; consumers
                            branch on `kind`. Absent / empty when the check
                            passes or for externally-fed checks like
                            `ci_pass`.
                          items:
                            type: object
                            required: [kind, detail]
                            properties:
                              kind:
                                type: string
                                enum:
                                  - plan_missing
                                  - trace_missing
                                  - pr_missing
                                  - chain_invalid
                                  - chain_unrecoverable
                                  - foreign_commit
                                  - head_fetch_failed
                                  - review_pending
                              detail:
                                type: string
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503':
          description: Backend wiring incomplete (run repo or stage-check repo unconfigured).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/stages/{stage_id}/approvals:
    post:
      operationId: submitApproval
      summary: Approve or reject the gate on a stage
      description: |
        The authenticated user must resolve to a role listed in the
        gate's `approvers` block. Submitting an `approve` decision
        transitions the gate to passed; `reject` fails the stage as
        category D.

        Requires `write:approvals` scope. A **deploy-stage** approve
        additionally requires `write:deploy` (ADR-038 / #1390): the deploy
        gate's `approve` is the pre-execution authorization for a real release,
        so an operator bearer holding `write:approvals` but missing
        `write:deploy` is refused 403 `insufficient_scope`
        (`required_scope: write:deploy`) before the deploy pre-flight runs. The
        `write:deploy` requirement applies to the deploy `approve` path ONLY ‚Äî
        a deploy `reject` (the reviewer judgment that always pages the human)
        and every plan/implement/review approval are unaffected. Deploy
        approvers are enforced through the same `approvers` block; an `all_of`
        deploy gate requires the subject to belong to EVERY named role.
      tags: [approvals]
      parameters:
        - { name: stage_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision:
                  type: string
                  enum: [approve, reject]
                comment:
                  type: string
                  description: |
                    Optional free-text rationale. On `approve` it is
                    recorded as the #558 binding approval conditions and
                    injected verbatim into the implement (and
                    implement-review) prompt as instructions the agent
                    must follow. It is NOT parsed for scope: repo-relative
                    paths written in the comment are NO LONGER folded into
                    the implement stage's `scope.files` (#1225 removed the
                    #730 prose fold). Use `add_scope_files` to add scope ‚Äî
                    naming a path here to explain it (e.g. "no edit to
                    `backend/go.mod` is needed") will not mutate scope.
                approver_github_login:
                  type: string
                  description: |
                    Optional resolved GitHub login of the acting
                    operator, threaded through by the MCP
                    approve/reject tools (#751). Used only for
                    issue-thread `@`-mention rendering in the
                    plan-status footer; the audit `approver` field
                    keeps the token subject as the acting identity
                    (provenance). SPA/CLI callers omit it and are
                    unaffected. `decision` remains the only required
                    field.
                add_scope_files:
                  type: array
                  items:
                    type: string
                  description: |
                    Optional, authoritative list of repo-relative
                    paths to fold into the implement stage's
                    `scope.files` on approve (#824). This is now the SOLE
                    source of approve-time `scope.files` additions: the
                    #730 free-text `comment` prose fold was removed
                    (#1225), so repo-relative paths written in `comment`
                    no longer mutate scope. The structured, lossless
                    form succeeds where a regex scrape failed ‚Äî it stages
                    directories, extensionless or repo-root files (e.g.
                    `go.work`), and described-but-not-spelled paths. A
                    trailing slash marks a directory whose created files
                    all stage under it (e.g. `pkg/testdata/corpus/`).
                    Recorded on the approval audit payload and consumed by
                    the prompt builder. No-op when the plan declares an
                    empty scope (preserves the runner's `git add -A`
                    fallback). Does NOT weaken the policy gate: a folded
                    path matching `forbidden_paths` still fails category-B
                    against the produced diff. Honored only on `approve`;
                    ignored on `reject`.
                remove_scope_files:
                  type: array
                  items:
                    type: string
                  description: |
                    Optional, authoritative list of repo-relative paths to
                    REMOVE from the implement stage's `scope.files` on approve
                    (#1726) ‚Äî the inverse of `add_scope_files`. Combined with
                    `add_scope_files` in the SAME approve call it expresses a
                    scope REPLACE (remove old + add new) at the plan gate with
                    zero planner invocations; there is no separate replace
                    field. The removal is subtracted from the effective scope
                    the prompt builder hands the runner, so every runner gate
                    (created-out-of-scope, commit-in-scope, category-B) and the
                    scope-cap gate honor it, and it applies to per-slice scope on
                    decomposed plans via the same fan-out fallback
                    `add_scope_files` uses. Recorded on the `approval_submitted`
                    audit payload alongside `remove_scope_files`,
                    `scope_files_before`, and `scope_files_after` (the deduped
                    effective-scope file lists). Each path is refused
                    `400 validation_failed` (field `remove_scope_files`) when it
                    is not repo-relative (leading `/` or `..`), is absent from
                    the current effective scope, or would empty a non-empty
                    scope (an empty scope re-enables the runner's `git add -A`
                    fallback and disables scope enforcement). Refused BEFORE any
                    approval row is recorded, so a corrected retry flows
                    normally. Honored only on `approve`; ignored on `reject`.
                    Omitting the field is byte-identical to today.
                binding_assertions:
                  type: array
                  items:
                    type: object
                    required: [type, path, literal]
                    properties:
                      type:
                        type: string
                        enum: [file_contains, test_asserts]
                        description: |
                          The assertion type. `file_contains` checks the
                          literal appears in the committed file at `path`;
                          `test_asserts` is the identical substring check but
                          `path` must name a Go test file. Open enum ‚Äî an
                          unknown type is rejected `400 validation_failed`.
                      path:
                        type: string
                        description: |
                          Repo-relative path of the committed file the
                          literal must appear in. For `test_asserts` it must
                          end in `_test.go`.
                      literal:
                        type: string
                        description: |
                          The non-empty substring that must be present in the
                          committed content of `path` (deterministic match).
                  description: |
                    Optional list of operator-declared, deterministic
                    binding-assertion checks (#1171) ‚Äî the machine-checkable
                    half of an approval condition. Each typed substring
                    assertion is recorded on the approval audit payload
                    alongside `add_scope_files`, echoed on the implement
                    prompt-response, and evaluated by the runner
                    post-implement against the committed scope-only tree; any
                    unsatisfied assertion fails the implement stage
                    category-B. Substring matching only ‚Äî never parses prose.
                    A malformed declaration (unknown `type`, empty `literal`,
                    a `test_asserts` `path` not ending in `_test.go`) is
                    rejected `400 validation_failed` before any approval row
                    is recorded. Honored only on `approve`; ignored on
                    `reject`. Omitting the field is byte-identical to today.
                claims_concern_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: |
                    Optional list of plan-stage concern ids (UUIDs) this
                    approval's binding condition answers (#1956) ‚Äî the
                    operator-confirmed, explicit lineage link (no NLP/heuristic
                    matching). Each claimed concern auto-resolves to the terminal
                    `addressed_by_condition` state once ONE implement review
                    returns a confirming (non-reject) verdict: the operator's
                    condition is the authority, the reviewer the witness (a
                    heterogeneous co-reviewer's reject in the same round does not
                    block the resolution). The resolution appends a
                    `concern_addressed_by_condition` audit entry (carrying the
                    concern id, prior state, claiming approval sequence +
                    approver, and confirming review sequence + reviewer model)
                    BEFORE transitioning the row, so the concern ‚Üí condition ‚Üí
                    confirming-review lineage is durable, and the resolved concern
                    lands in the `GET /v0/runs/{run_id}/gate-view` settled ledger
                    instead of demanding a hand waive at the merge gate. Recorded
                    on the `approval_submitted` audit payload alongside
                    `binding_assertions`. Validated pre-Submit: approve-only,
                    plan-stage-only, and each id must be an OPEN plan-stage concern
                    of the SAME run ‚Äî a malformed claim is refused `400
                    validation_failed` (a non-plan stage, or `503
                    concern_store_unconfigured` when no concern store is wired)
                    before any approval row is recorded. Honored only on
                    `approve`; ignored on `reject`. Omitting the field is
                    byte-identical to today.
                implement_model:
                  type: string
                  description: |
                    Optional operator override for the implement-stage model
                    (#1013) ‚Äî the top rung of the resolution ladder
                    (deployment default < spec `executor.model` < plan
                    `model_recommendation` < this override). On a plan-stage
                    approve the gate resolves the full ladder with this as the
                    operator rung, validates the RESOLVED non-empty value
                    against the deployment's per-adapter allow-list, and emits a
                    `model_resolved` audit entry (`{model, model_source}`) the
                    runner spawn routes to the agent `--model`. An unknown
                    resolved model ‚Äî from ANY rung, not just this field ‚Äî is
                    rejected `422 plan_invalid_model` (details carry `model`,
                    `model_source`, `adapter`) PRE-Submit, so a retry with an
                    allowed model flows normally. An empty/unconfigured
                    allow-list fails OPEN (any model accepted, byte-identical to
                    today). Honored only on `approve`; ignored on `reject`.
                    Omitting the field leaves the model to the lower rungs; an
                    empty resolution still records `model_resolved` and spawns
                    with no `--model`, exactly as today.
                plan_model:
                  type: string
                  description: |
                    Optional operator override for the PLAN-stage model (#1416)
                    ‚Äî the top rung of the plan-model ladder (deployment default
                    < spec `executor.model` on the plan stage < this override).
                    On a plan-stage approve the gate resolves the plan ladder
                    with this as the operator rung and emits the plan stage's
                    `model_resolved` audit entry (`{model, model_source,
                    stage_type: plan}`); a re-dispatched plan stage then spawns
                    under the resolved value. Honored only on `approve`; ignored
                    on `reject`. Omitting the field leaves the plan model to the
                    lower rungs, byte-identical to today.
                review_model:
                  type: string
                  description: |
                    Optional operator override for the REVIEW-stage model
                    (#1416) ‚Äî the top rung of the review-model ladder
                    (deployment default < spec `executor.model` on the review
                    stage < this override). On a plan-stage approve the gate
                    resolves the review ladder with this as the operator rung and
                    emits the review stage's `model_resolved` audit entry
                    (`{model, model_source, stage_type: review}`); the
                    post-plan-gate implement review (and any post-gate
                    re-review) then invokes each heterogeneous reviewer under the
                    resolved value. It governs the implement review, NOT the
                    already-completed plan review. Honored only on `approve`;
                    ignored on `reject`. Omitting the field leaves each reviewer
                    on its spec model, byte-identical to today.
                delegated:
                  type: boolean
                  default: false
                  description: |
                    Opts the submission into the ADR-040 delegated-action
                    path (#1026): the caller (the operator agent) asserts
                    it acts under the workflow's
                    `operator_agent.may_approve` knob. The server NEVER
                    trusts the assertion ‚Äî it re-evaluates the knob's
                    condition (`clean_dual_approval`) against current run
                    state at action time. Refusals are 403:
                    `delegation_not_configured` when no effective
                    `operator_agent` block delegates the approve action
                    (fail-closed ‚Äî including legacy runs with no cached
                    spec), `delegation_condition_unmet` with the named
                    failed predicate in `details.unmet_reason` otherwise.
                    A refusal inserts no approval row, so a later retry
                    flows normally. When met, the approval proceeds and
                    its `approval_submitted` audit payload records
                    `delegated: "clean_dual_approval"`. Only valid with
                    `decision: approve` ‚Äî a delegated reject is 400
                    (rejection is a human judgment; `reviewer_reject`
                    pages the human). Omitted ‚Üí behavior byte-identical
                    to a human submission.
      responses:
        '200':
          description: |
            Three distinct outcomes share this status (#986, #1709):

            - **Approval recorded; stage state advanced.** The body is
              the bare `Stage` shape; the three duplicate fields are
              omitted.
            - **Approval recorded; quorum pending** (E39.4 / #1709) ‚Äî
              when the stage's gate declares a forge-neutral `approvals`
              block, an `approve` transitions the stage only once
              `approvals.count` DISTINCT eligible approvers have voted.
              An eligible `approve` below that threshold is recorded but
              the returned `Stage` is still `awaiting_approval`; a
              delegated/agent-kind `approve` is recorded (audit
              `channel: delegated`) and NEVER counts toward the quorum.
              Every `approval_submitted` audit row on such a gate carries
              a `predicate_snapshot` (the evaluation inputs + outcome);
              gates with no `approvals` block omit it.
            - **Duplicate submission** ‚Äî the same authenticated subject
              already submitted a decision for this stage. The prior
              decision stands, the stage state is unchanged, NO gates
              (budget/scope-cap/review-settled) re-run, and no audit
              entries are emitted. The body carries
              `duplicate_submission: true` plus `prior_decision` and
              `prior_submitted_at` from the EXISTING approval row
              (authentic provenance, not echoes of the new request).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Stage'
                  - type: object
                    properties:
                      duplicate_submission:
                        type: boolean
                        description: |
                          Present (true) only when this submission was a
                          no-op duplicate of an existing decision by the
                          same subject. Omitted on a first submission.
                      prior_decision:
                        type: string
                        enum: [approve, reject]
                        description: |
                          The existing approval row's decision. Only
                          present alongside `duplicate_submission`.
                      prior_submitted_at:
                        type: string
                        format: date-time
                        description: |
                          When the existing approval row was submitted.
                          Only present alongside `duplicate_submission`.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: |
            Possible error codes:

            - `approver_not_authorized` ‚Äî a RoleResolver is configured
              and the subject is not in the gate's approvers list. For an
              `all_of` deploy gate this fires unless the subject belongs to
              EVERY named role.
            - `approver_is_change_author` ‚Äî E39.4 / #1709: the stage's
              gate declares a forge-neutral `approvals` block and the
              submitting subject is the change author (the run's earliest
              user-kind actor). Author separation-of-duties is enforced
              PRE-Submit, so no approval row is recorded and the quorum
              count is not incremented. Runs with no recorded human actor
              skip this check (author-SoD is unenforceable) while the
              agent-SoD and distinct-count quorum still apply.
            - `insufficient_scope` ‚Äî a **deploy-stage** `approve` from an
              operator bearer that holds `write:approvals` but is missing
              `write:deploy` (ADR-038 / #1390). `details.required_scope` is
              `write:deploy`. Applies to the deploy `approve` path only.
            - `delegation_not_configured` ‚Äî the request carried
              `delegated: true` but no effective `operator_agent` block
              delegates the approve action (ADR-040 / #1026,
              fail-closed): the spec declares no block, the block has no
              `may_approve` knob, or the run has no cached workflow
              spec.
            - `delegation_condition_unmet` ‚Äî `delegated: true` and the
              `may_approve` knob is configured, but its condition is not
              satisfied by current run state. `details` carries
              `action`, `condition`, and `unmet_reason` naming the exact
              failed predicate (e.g. `clean_dual_approval: 1 of 2
              reviewer verdicts received`).
            - `approver_predicate_unmet` ‚Äî E39.5 / #1710: the stage's
              gate declares an `approvals` block with `min_permission`
              and/or `member_of`, and the submitter's forge-resolved
              permission tier is below the required tier OR the
              submitter is not a member of the required group. Resolved
              PRE-Submit against the forge, so no approval row is
              recorded. `details` carries `required_permission`,
              `resolved_permission`, `member_of`, `member_resolved`, and
              `result` (`rejected`). `agent` / delegated submissions are
              recorded-but-never-counted and skip this check.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: |
            Possible error codes:

            - `invalid_state_transition` ‚Äî stage isn't in
              awaiting_approval. (Pre-#253 the handler also returned
              409 with `blocking_checks_not_passed` when any declared
              blocking check wasn't `pass`. ADR-017 / #249 moved that
              gate to GitHub branch protection; the approval API no
              longer reads stage_check state.)
            - `review_stage_managed_by_github` ‚Äî the target stage is
              a review stage. ADR-018 / #311 moved review-stage
              approval onto GitHub: the `pull_request.closed`
              webhook with `merged=true` transitions the stage;
              `pull_request_review.submitted` events feed the audit
              log. Branch protection's required-reviewers is the
              approver-list mechanism. Response body's `details`
              includes the run's `pull_request_url` when stamped so
              the caller knows where the merge gate lives. Plan-
              stage approvals continue to use this endpoint.
            - `agent_review_pending` ‚Äî ADR-036 / #875: the target is
              a plan stage whose workflow declares `reviewers.agent`
              > 0, a plan review was dispatched
              (`plan_review_started` present), and fewer than the
              configured agent count of TERMINAL review verdicts
              (`plan_reviewed` / `plan_review_failed` /
              `plan_review_skipped`) have landed. The approval is
              refused before any row is recorded ‚Äî poll until the
              review reaches a terminal state, then retry; the retry
              is idempotent. `details` includes `stage_id`,
              `configured_agents`, and `landed_terminal`. A hard
              backstop (`ReviewBudget.Cap` √ó configured agents,
              measured from the earliest `plan_review_started`)
              allows the approval once elapsed even if no terminal
              verdict landed, recording a
              `plan_review_backstop_elapsed` audit entry ‚Äî so a
              reviewer that dies emitting nothing can never strand
              the gate.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422':
          description: |
            Possible error codes:

            - `plan_violates_budget` ‚Äî the plan's
              `predicted_runtime_minutes` exceeds the resolved
              implement-stage budget and neither a
              `decomposition.sub_plans` block nor an
              `--override-budget` marker in the comment is present.
              The budget is the spec-resolved implement-stage timeout
              widened to the calibration p95 √ó 1.5 when implement
              runtime data exists, clamped to spec √ó 2 (#994) ‚Äî the
              same base the dynamic implement kill cap builds on, so
              gate and runtime cannot disagree. `details` includes
              `predicted_minutes`, `budget_minutes` (the RESOLVED
              budget), `budget_source` (`spec`, `p95`, or `ceiling` ‚Äî
              which term won the resolution), `spec_budget_minutes`
              (the raw spec-resolved floor), and `timeout_source`
              (`stage_executor_timeout`,
              `workflow_policy_max_stage_runtime`, or
              `backend_default` ‚Äî the spec value's provenance).
              Refused BEFORE any approval row is recorded (#986), so
              the same subject's retry with the override flows
              normally rather than dead-ending as an idempotent
              duplicate. To unblock: either re-plan with a
              decomposition block, or re-submit the approval with
              `--override-budget` in the comment.
            - `plan_violates_scope_cap` ‚Äî #983: the effective scope ‚Äî
              the plan's `scope.files` unioned with the request's
              `add_scope_files`, prior approve-time folds, and
              already-approved scope amendments, MINUS the request's
              `remove_scope_files` (#1726), deduped by exact
              path ‚Äî exceeds the implement stage's resolved
              `max_files_changed` and the comment lacks an
              `--override-scope-cap` marker. Because removals are
              subtracted before the count, an over-cap plan can be
              reconciled entirely at the gate by removing (or
              replacing) paths. Refused BEFORE any
              approval row is recorded, so a retry after re-scoping
              (or carrying the override) flows normally. `details`
              includes `scoped_files`, `max_files_changed`,
              `add_scope_files_count`, and `remove_scope_files_count`;
              the refusal appends a
              `plan_violates_scope_cap` audit entry, the override a
              `plan_scope_cap_override_acknowledged` entry. Declared
              scope is an upper bound on the eventual diff, so the
              override exists for legitimately-forced cases (e.g. the
              cap itself is about to change).
            - `plan_invalid_model` ‚Äî #1013: the RESOLVED implement model
              (the ladder of deployment default < spec `executor.model` <
              plan `model_recommendation` < the `implement_model` override)
              is non-empty and not in the deployment's per-adapter
              allow-list for the run's implement adapter. Validated regardless
              of which rung supplied the value, so an unknown plan- or
              spec-recommended model ‚Äî not just an operator override ‚Äî is
              caught here rather than at runner spawn. `details` includes
              `model`, `model_source` (`default`|`spec`|`plan`|`operator`),
              and `adapter`. Refused BEFORE any approval row is recorded, so a
              retry with an allowed `implement_model` (or after widening the
              allow-list) flows normally. An empty/unconfigured allow-list
              fails OPEN ‚Äî any model is accepted, byte-identical to today.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: |
            Possible error codes:

            - `forge_unavailable` ‚Äî E39.5 / #1710: the stage's gate
              declares an `approvals` block with `min_permission` and/or
              `member_of`, but the forge permission/membership API could
              not be resolved (an error / rate-limit / timeout, or an
              ad-hoc run with no repository to resolve against). The gate
              **fails closed**: no approval row is inserted and the gate
              does not transition. `details` carries `retryable: true`,
              `predicate` (`min_permission` | `member_of`), `ref` (the
              `member_of` group when set), and a human-readable
              `next_actions` array instructing the caller to retry once
              the forge is reachable.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/stages/{stage_id}/clarification:
    post:
      operationId: answerClarification
      summary: Answer a plan stage parked at awaiting_input
      description: |
        Closes the #1057 answer-and-resume seam (#1088). A plan stage the
        planner parked at `awaiting_input` with a `clarification_request`
        (#1080) is stranded until the operator answers: nothing populates the
        answers or re-opens the stage. This endpoint validates the operator's
        answers against the questions the planner actually parked, persists
        them as a DEDICATED `clarification_answered` audit entry, transitions
        the stage `awaiting_input` ‚Üí `pending`, and hands off to the
        orchestrator so a drive run re-dispatches the plan stage (a local run
        re-runs via the operator's next `fishhawk_run_stage plan`). The resumed
        plan prompt injects the answers in its binding "Clarification answers"
        section.

        The `clarification_answered` channel is intentionally isolated from the
        approval (`approval_submitted` / `decision=approve`) channel: a parked
        plan stage is NOT yet approved, and the implement prompt's approval-
        conditions loader matches only `decision=='approve'`, so the two never
        collide.

        Requires `write:approvals` scope ‚Äî the #558 binding-conditions /
        gate-answer family.
      tags: [approvals]
      parameters:
        - { name: stage_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [answers]
              properties:
                answers:
                  type: array
                  minItems: 1
                  description: |
                    The operator's answers, each keyed by a parked question
                    `id`. Every id must match a question in the newest
                    `clarification_requested` entry, every parked question must
                    be answered, and ids must not repeat.
                  items:
                    type: object
                    required: [id, answer]
                    properties:
                      id:
                        type: string
                        description: The parked question's stable id.
                      answer:
                        type: string
                        description: The operator's answer to that question.
                comment:
                  type: string
                  description: |
                    Optional free-text note appended after the rendered answers
                    in the binding-conditions blob the resume prompt injects.
      responses:
        '200':
          description: |
            Answers recorded; the plan stage transitioned
            `awaiting_input` ‚Üí `pending`. The body is the bare `Stage` shape.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Stage' }
        '400':
          description: |
            Possible error codes:

            - `validation_failed` ‚Äî the body is not valid JSON, carries
              unknown fields, or `answers` is empty.
            - `clarification_answer_invalid` ‚Äî an answer id does not match any
              parked question, a parked question was left unanswered, or an id
              was repeated. The answers are keyed to real parked questions, so
              an ambiguous or incomplete set is refused before anything is
              recorded.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: |
            `invalid_state_transition` ‚Äî the target is not a plan stage parked
            at `awaiting_input` (the only state with parked questions to
            answer), or the `awaiting_input` ‚Üí `pending` transition was
            rejected by the state machine. `details` carries `stage_id`,
            `stage_type`, and `stage_state`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/stages/{stage_id}/revise:
    post:
      operationId: revisePlan
      summary: Re-plan a plan stage in place against a binding operator constraint
      description: |
        The plan-gate `revise` verdict (#1099) ‚Äî the third option alongside
        approve and reject. A `revise` re-plans IN PLACE in the same run: it
        re-opens the plan stage parked at `awaiting_approval` back to
        `pending`, re-dispatches the plan stage ONCE with the operator's
        binding design `constraint` injected into the plan prompt (a DEDICATED
        "Revision constraint" section ‚Äî the #558 binding-conditions channel)
        and the prior plan carried as the revision base, then re-enters the
        normal plan review ‚Üí approve gate. It is the plan-stage analogue of
        `POST /v0/stages/{stage_id}/fixup` (a bounded, operator-gated re-open
        of a HEALTHY gate).

        Use `revise` when the plan's direction is sound but a design
        constraint must change first ‚Äî cheaper than rejecting the plan to a
        fresh-run replan, because only the constrained parts change.

        Bounded + operator-gated: the NORMAL bound defaults to ONE revise pass
        per stage, enforced server-side by counting prior `plan_revised` audit
        entries (no dedicated column ‚Äî exactly as fix-up counts
        `stage_fixup_triggered`). Once spent, an operator may grant ONE more
        pass with `force_additional_pass: true`, hard-capped at 3 TOTAL passes
        per stage; at the ceiling the endpoint refuses with the DISTINCT
        `revise_ceiling_reached`. A run-bound MCP token may revise only stages
        within its own run.

        Requires `write:approvals` scope ‚Äî the #558 binding-conditions /
        gate-answer family.
      tags: [approvals]
      parameters:
        - { name: stage_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [constraint]
              properties:
                constraint:
                  type: string
                  description: |
                    The binding design constraint the planner must revise the
                    prior plan to satisfy. Injected into the re-dispatched plan
                    prompt as a dedicated, binding "Revision constraint"
                    section (MANDATORY, wins on conflict), with the prior plan
                    as the revision base. Empty/whitespace-only is rejected.
                force_additional_pass:
                  type: boolean
                  default: false
                  description: |
                    Bounded operator override: grant ONE revise pass beyond the
                    normal budget (default 1) when it is already spent, hard-
                    capped at 3 total passes per stage. The forced pass is
                    audited on the `plan_revised` entry (`forced: true`).
      responses:
        '200':
          description: |
            The plan stage was re-opened `awaiting_approval` ‚Üí `pending` and
            the orchestrator re-dispatches it. The body is the re-opened
            `Stage` shape (pending, or dispatched once the orchestrator
            advances it before the response returns).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Stage' }
        '400':
          description: |
            `validation_failed` ‚Äî the `stage_id` is not a valid UUID, the body
            is not valid JSON, or `constraint` is empty/whitespace-only.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: |
            Possible error codes:

            - `insufficient_scope` ‚Äî the token lacks `write:approvals`.
            - `cross_run_revise` ‚Äî a run-bound MCP token tried to revise a
              stage outside its own run.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: |
            Possible error codes:

            - `revise_not_applicable` ‚Äî the target is not a plan stage parked
              at `awaiting_approval`. `details` carries `stage_type` and
              `stage_state`.
            - `revise_budget_exhausted` ‚Äî the NORMAL bounded pass count is
              spent; one more pass is available via `force_additional_pass`.
              `details` carries `max_passes` and `used`.
            - `revise_ceiling_reached` ‚Äî the hard ceiling of 3 total passes is
              reached; the override cannot push past it (reject ‚Üí fresh-run
              replan). `details` carries `ceiling` and `used`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /v0/stages/{stage_id}/retry:
    post:
      operationId: retryStage
      summary: Retry a failed stage
      description: |
        Re-opens a failed stage when the failure category supports it.
        Per MVP_SPEC ¬ß6:

        - **D, sla_timeout**: transitions failed ‚Üí awaiting_approval,
          clears failure metadata, restarts the SLA clock implicitly
          via the `updated_at` trigger. Returns 200 with the updated stage.
        - **A** / **C**: transitions failed ‚Üí pending, then the
          orchestrator walks pending ‚Üí dispatched and fires
          workflow_dispatch. Returns 200 with the post-orchestrator
          stage (typically `dispatched`). Orchestrator failures are
          logged but don't fail the request ‚Äî the stage stays at
          pending and an operator can re-fire Advance manually.
        - **A** / **C on a decomposed PARENT** (#1891): when the retried
          stage is an implement stage whose run is a decomposition parent
          (it has children), the target is `awaiting_children` instead of
          `pending` ‚Äî restoring the fan-in park so the childcompletion
          sweeper and `POST /v0/runs/{run_id}/consolidate` re-engage,
          rather than spawning a doomed runner. NO orchestrator dispatch
          handoff fires (that is gated on the pending re-open); the run is
          still un-terminalled (failed ‚Üí running) so the sweeper's later
          advance is effective. Returns 200 with the stage in
          `awaiting_children`.
        - **D, gate-rejected**: 422 (`retry_not_applicable`) ‚Äî the
          approver said no; create a fresh run instead.
        - **B**: 422 (`retry_not_applicable`) ‚Äî the workflow or spec
          needs to change before a retry would behave differently,
          UNLESS the request carries `{override: true, reason: "..."}`
          (see request body below).

        The optional request body enables an **audited category-B
        override** (#698). With `{override: true}` and a non-empty
        `reason`, a genuine category-B failure is admitted onto the same
        failed ‚Üí pending re-open path as A/C: the stage RE-RUNS and the
        policy gate RE-EVALUATES the new diff. The override does NOT
        accept the B-violating diff or bypass the gate ‚Äî it only lets the
        stage run again. `reason` is mandatory when `override` is true
        (400 `validation_failed` otherwise). A successful override writes
        a distinct `stage_override_retried` audit entry (actor + reason +
        prior category B), kept separate from the ordinary `stage_retried`
        receipt. Without an override the body may be omitted entirely and
        default per-category semantics apply, writing `stage_retried`.

        **Acceptance-reopen arm (E31.16 / #1567).** A failed acceptance
        VERDICT leaves the acceptance STAGE `succeeded` (E31.7), so a
        `succeeded` acceptance stage that recorded NO
        `acceptance_outcome_recorded` verdict (the agent shipped a
        non-schema field and the verdict failed closed) has no other
        re-run verb. Posting to this endpoint for such a stage re-opens it
        `succeeded ‚Üí pending` via the E31.8 class-2 mechanic and writes an
        `acceptance_reopened` audit entry. This arm is **operator-token
        only** ‚Äî an agent (`mcp:run:*`) token is refused 403
        (`agent_token_forbidden`) ‚Äî and 422s (`retry_not_applicable`) when
        a verdict IS recorded (verdict-ful routing belongs to the
        deterministic triage) or when the re-open is otherwise
        inapplicable (terminal run). An audit read error fails closed 500.
      tags: [stages]
      parameters:
        - { name: stage_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      requestBody:
        required: false
        description: |
          Optional. Omit for a default per-category retry. Supply
          `{override: true, reason: "..."}` to invoke the audited
          category-B override.
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                override:
                  type: boolean
                  default: false
                  description: |
                    Admit a category-B failure onto the failed ‚Üí pending
                    re-open path. The stage re-runs and the policy gate
                    re-evaluates; the gate is not bypassed.
                reason:
                  type: string
                  description: |
                    Operator justification, recorded in the
                    `stage_override_retried` audit entry. Required when
                    `override` is true.
                delegated:
                  type: boolean
                  default: false
                  description: |
                    Opts the retry into the ADR-040 delegated-action path
                    (#1026). The server re-evaluates the
                    `operator_agent.may_retry` condition (`infra_flake`)
                    against current run state at action time: 403
                    `delegation_not_configured` when no effective block
                    delegates the retry action (fail-closed), 403
                    `delegation_condition_unmet` with the named failed
                    predicate when the latest failure is not a
                    category-A infra flake. When met, the retry proceeds
                    and the `stage_retried` payload records
                    `delegated: "infra_flake"`. Omitted ‚Üí behavior
                    byte-identical to today.
      responses:
        '200':
          description: Stage re-opened; refreshed Stage row in body.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Stage' }
        '400':
          description: |
            Malformed request body, or `override: true` without a
            non-empty `reason`. Body's `error` is `validation_failed`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: |
            Possible error codes: (1) bearer token lacks both `write:stages`
            and `write:retries` scope ‚Äî body `error` is `insufficient_scope`;
            (2) caller is an mcp token whose run scope does not match the
            target stage's `run_id` ‚Äî body `error` is `cross_run_retry`.
            MCP tokens (subject `mcp:run:<uuid>`) may only retry stages
            within their own run. (3) `delegated: true` refusals
            (ADR-040 / #1026): `delegation_not_configured` when no
            effective `operator_agent` block delegates the retry action
            (fail-closed), `delegation_condition_unmet` when the
            `infra_flake` condition is not satisfied ‚Äî `details` names
            the exact failed predicate in `unmet_reason`. (4) the
            acceptance-reopen arm (#1567) invoked by an agent
            (`mcp:run:*`) token ‚Äî body `error` is `agent_token_forbidden`
            (operator-only verb).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422':
          description: |
            Retry not applicable for the stage's current state /
            failure category. Body's `error` is `retry_not_applicable`
            and `message` explains the specific reason. Also returned by
            the acceptance-reopen arm (#1567) when a verdict IS already
            recorded for the stage, or the re-open is otherwise
            inapplicable (terminal run).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/stages/{stage_id}/acceptance-admission:
    post:
      operationId: acceptanceDispatchAdmission
      summary: Pre-spawn acceptance short-circuit admission
      description: |
        Pre-spawn admission step (#1928) a local host dispatch
        (`fishhawk_dispatch_stage` / `fishhawk_run_stage` /
        `fishhawk_drive_run`) calls for an **acceptance** stage BEFORE it
        spawns a runner. The server evaluates the approved plan's three
        disjoint acceptance short-circuit predicates ‚Äî out-of-scope skip
        (verification.out_of_scope with zero acceptance_criteria),
        empty-criteria (zero acceptance_criteria and zero out_of_scope),
        and all-skip-with-basis (every acceptance criterion is
        `skip_expected` with a non-empty `expectation_basis`) ‚Äî the same
        arm `orchestrator.Advance` runs on the retry path.

        On a hit the acceptance stage is walked straight to `succeeded`
        (a passed verdict / skip marker recorded, NO runner dispatched)
        and the run rolls forward, so the caller returns without spawning
        a runner that would only fail category-C
        `acceptance_target_unreachable`. The response is
        `short_circuited: true` plus the fired predicate and the refreshed
        stage.

        The admissible stage states are `pending` and
        `awaiting_host_dispatch`. A `dispatched` acceptance stage is NOT
        admissible (#1936): it means the host-dispatch spawn marker already
        stamped a spawn attempt, so short-circuiting it under a live runner
        would double-drive the stage ‚Äî the response is
        `short_circuited: false` and the caller proceeds on its normal spawn
        path. An admission that BEGINS its state walk always runs to
        completion (settle + verdict audit + advance) independent of the
        client connection: a client disconnect or request timeout can no
        longer abort the walk mid-flight, so the outcome is binary ‚Äî nothing
        changed, or the stage fully settled.

        **Fail-open by design.** A non-admissible stage state (already
        settled, a `dispatched` stage, mixed criteria, an unconfigured
        orchestrator) returns `short_circuited: false` ‚Äî the normal no-op
        path; the caller records spawn evidence and spawns a runner exactly
        as today. Admission is an evaluate-and-maybe-settle pre-step, so a
        degraded server never blocks a legitimate dispatch. The endpoint
        reuses the `write:stages` scope and adds no new scope or audit kind.

        **needs_target augmentation (E48.6 / #1953).** On the
        `short_circuited: false` path, when the approved plan requires LIVE
        validation (no short-circuit predicate matched ‚Äî at least one
        acceptance criterion needs a live target) AND the acceptance stage's
        workflow spec declares egress `target_hosts`, the response adds
        `needs_target: true` plus `target_hosts` (verbatim spec-declared
        hosts) and `expected_head_sha` (the resolved merge-candidate head
        SHA; may be empty when the ledger resolution fails). The dispatch verb
        reads this to probe the first target host FROM THE DISPATCH HOST (the
        same network position the local runner would probe from) using the
        runner's `/healthz` `git_sha` identity semantics, and REFUSES to spawn
        a runner doomed to fail category-C `acceptance_target_unreachable`
        when the target is unreachable or stale ‚Äî leaving the stage parked for
        a clean re-dispatch. The endpoint only REPORTS what is needed; it
        never probes (its network position differs from the operator host
        under a k8s deployment). All three fields are additive and omitted
        when the plan short-circuits, the stage is non-admissible, or the spec
        declares no egress hosts (mixed old/new versions degrade to current
        behavior).
      tags: [stages]
      parameters:
        - { name: stage_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: |
            Admission evaluated. `short_circuited: true` means the stage
            settled server-side (the fired predicate + refreshed stage are
            included); `short_circuited: false` is the no-op path (proceed
            to spawn as today).
          content:
            application/json:
              schema:
                type: object
                required: [short_circuited]
                properties:
                  short_circuited:
                    type: boolean
                    description: |
                      True when the acceptance stage was settled server-side
                      with no runner; false is the normal no-op path.
                  kind:
                    type: string
                    description: |
                      The fired predicate on a hit: `out_of_scope_skip`,
                      `empty_criteria`, or `all_skip_with_basis`.
                  basis:
                    type: string
                    description: |
                      The `acceptance_outcome_recorded` basis for the two
                      verdict-recording predicates (`empty-criteria` /
                      `all-skip-with-basis`); empty for the out-of-scope
                      skip, which records a marker rather than a verdict.
                  criteria_total:
                    type: integer
                    description: The acceptance-criteria count carried into the verdict.
                  stage:
                    allOf: [{ $ref: '#/components/schemas/Stage' }]
                    description: The refreshed (now terminal) stage, present on a hit.
                  needs_target:
                    type: boolean
                    description: |
                      (E48.6 / #1953) True on the `short_circuited: false` path
                      when the approved plan needs LIVE validation against a
                      declared acceptance target, so the dispatch verb must
                      probe the target before spawning. Omitted (false) on a
                      short-circuit hit, a non-admissible stage, or a spec with
                      no declared egress hosts.
                  target_hosts:
                    type: array
                    items: { type: string }
                    description: |
                      The verbatim spec-declared egress target hosts
                      (host[:port], no scheme) the verb probes. Present only
                      with `needs_target: true`.
                  expected_head_sha:
                    type: string
                    description: |
                      The resolved merge-candidate head SHA the target's
                      `/healthz` `git_sha` must match. Present with
                      `needs_target: true`; may be empty when the backend could
                      not resolve it (the verb then proceeds with a warning).
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: |
            (1) bearer token lacks `write:stages` scope ‚Äî body `error` is
            `insufficient_scope`; (2) caller is an mcp token
            (`mcp:run:<uuid>`) whose run does not match the target stage's
            `run_id` ‚Äî body `error` is `cross_run_admission`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422':
          description: |
            The target is not an acceptance-typed stage. Body's `error`
            is `validation_failed`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/stages/{stage_id}/fixup:
    post:
      operationId: fixupStage
      summary: Route advisory implement-review concerns back to the agent
      description: |
        Re-opens an implement stage held at the implement-review gate so
        the agent can make a bounded, operator-gated fix-up pass against one
        or more advisory implement-review concerns (E22.X / #762, #780),
        instead of the operator hand-editing the PR branch.

        Preconditions:

        - the stage must be an **implement** stage (plan/review stages are
          not eligible). Otherwise 422 (`fixup_not_applicable`).
        - the run must not already be terminal
          (`succeeded`/`failed`/`cancelled`, #968): a completed run has no
          live gate to flow the fix-up back into, so its stages are never
          re-opened. Otherwise 422 (`fixup_not_applicable`).
        - the implement stage must be re-openable, in one of two flows.
          Otherwise 422 (`fixup_not_applicable`):
          - **commit-yourself**: the implement stage is its own gate, parked
            at `awaiting_approval`; or
          - **push_and_open_pr** (#780): the implement stage has
            `succeeded` (it committed and opened the PR) and the run's
            SEPARATE **review** stage is still parked at `awaiting_approval`
            (the PR is open, not merged). Refused once the review stage has
            merged/resolved, or when the run has no review stage.
        - on the deprecated positional path, the stage must carry a
          recorded **`approve_with_concerns`** implement-review verdict
          (the concern set the `concerns` indices address). With no
          recorded concerns, 422 (`fixup_not_applicable`). The
          `concern_ids` path resolves against the durable concern store
          instead (#964); an unknown, foreign, plan-stage, or non-open ID
          is 400 (`validation_failed`).

        On success the implement stage transitions to `pending`
        (`awaiting_approval ‚Üí pending`, or `succeeded ‚Üí pending` on the
        push_and_open_pr flow); on the push_and_open_pr flow the review
        stage is also re-parked `awaiting_approval ‚Üí pending` so the
        re-dispatched implement flows back into a fresh review (the
        re-parked review stage id is recorded on the audit entry as
        `reparked_review_stage_id`). The orchestrator then walks
        `pending ‚Üí dispatched` and fires `workflow_dispatch`, and a
        `stage_fixup_triggered` audit entry is written carrying the routed
        stable concern IDs (`concern_ids`, #964) or the deprecated selected
        indices, the resolved concern objects (read back by the
        prompt renderer to deliver them as binding instructions ‚Äî the #558
        condition-delivery framing), and the bounded-pass receipt
        (`pass_ordinal`, `max_passes`, `remaining_budget`). On the
        `concern_ids` path the routed concerns are additionally marked
        `addressed_pending` in the durable concern store (best-effort,
        with `reason` as the `state_reason`). Returns 200 with
        the post-orchestrator stage (typically `dispatched`). Orchestrator
        failures are logged but don't fail the request ‚Äî the stage stays at
        `pending` and an operator can re-fire Advance manually.

        **Distinct from `POST /v0/stages/{stage_id}/retry`:** retry re-opens
        a *failed* stage and regenerates a fresh diff; fix-up re-opens a
        *healthy* review gate, commits onto the SAME PR branch (the runner's
        rebase-from-remote shared-branch path), and UPDATES the existing PR
        rather than opening a new one.

        **Bounded + operator-gated.** The NORMAL bound defaults to ONE pass
        per stage, enforced server-side by counting prior
        `stage_fixup_triggered` audit entries (there is no dedicated column).
        Once that budget is spent a further attempt returns 422
        (`fixup_budget_exhausted`) ‚Äî but the operator may grant ONE additional
        pass by setting `force_additional_pass: true`, hard-capped at **3
        total passes** per stage (#860). A forced pass is audited (a `forced`
        flag plus the operator `reason` on the `stage_fixup_triggered` entry).
        Once the hard ceiling is reached, even a forced attempt returns the
        DISTINCT 422 (`fixup_ceiling_reached`), whose `details` carries a
        `remediation` pointer: for a late CI/SAST finding, commit the fix on the
        run branch then `fishhawk_vouch_commit` it (operator/operator-agent
        token, NOT the run-bound `fhm_` token, which is rejected
        `run_token_forbidden`) so the operator commit clears the run's
        sole-writer lineage gate without breaking ADR-035 (#1068/#1044).
        Otherwise merge with a follow-up, or start a fresh run. The operator
        still owns the merge.
      tags: [stages]
      parameters:
        - { name: stage_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      requestBody:
        required: true
        description: |
          Selects what to route back to the agent: recorded implement-review
          concerns by stable concern ID (`concern_ids`, the primary scheme,
          #964) or by deprecated positional index (`concerns`), and/or a
          free-text `operator_concern` that needs no pre-existing review
          concern (#1311). `concern_ids` and `concerns` are mutually exclusive
          ‚Äî supplying both is 400 (`validation_failed`). At least one of
          `concern_ids`, `concerns`, or `operator_concern` must be supplied ‚Äî
          none at all is 400 (`validation_failed`).
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                concern_ids:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    format: uuid
                  description: |
                    PRIMARY addressing (#964): stable concern UUIDs to route
                    back to the agent (at least one), as surfaced by
                    `GET /v0/runs/{run_id}`'s `concerns.items[].id`. Each ID
                    must name an OPEN (`raised`/`addressed_pending`/
                    `reopened`) implement-stage concern of THIS stage ‚Äî an
                    unknown, duplicate, foreign-run/-stage, plan-stage, or
                    already-resolved ID is rejected (400
                    `validation_failed`), so a plan-stage concern can never
                    route into an implement fix-up. Requires the concern
                    store (503 `fixup_unconfigured` otherwise).
                concerns:
                  type: array
                  minItems: 1
                  items:
                    type: integer
                    minimum: 0
                  deprecated: true
                  description: |
                    DEPRECATED positional fallback: indices of the recorded
                    implement-review concerns to route back to the agent (at
                    least one). The indices address the concern set in the
                    stage's `implement_reviewed` audit entry, in append order
                    flattened across reviewers ‚Äî ambiguous once multiple
                    heterogeneous review entries exist per stage (#964);
                    prefer `concern_ids`. Only valid when `concern_ids` is
                    absent. An out-of-range or duplicate index is rejected
                    (400 `validation_failed`).
                reason:
                  type: string
                  description: |
                    Optional operator rationale, recorded on the
                    `stage_fixup_triggered` audit entry (and as the routed
                    concerns' `state_reason` on the `concern_ids` path).
                allow_create:
                  type: array
                  items:
                    type: string
                  description: |
                    Optional repo-relative paths this fix-up will CREATE
                    (#823). Each declared path is folded into the implement
                    stage's effective `scope.files` for THIS fix-up pass only
                    (never the persisted plan scope) so the runner stages the
                    net-new file instead of failing the created-out-of-scope
                    gate (category-B, #818). Any created file NOT declared here
                    still fails category-B ‚Äî declaring a path widens the
                    legitimate set without reopening the silent-strip hole.
                    Entries must be repo-relative: an absolute path or one
                    containing `..` is rejected (400 `validation_failed`,
                    `field: allow_create`).
                force_additional_pass:
                  type: boolean
                  default: false
                  description: |
                    Bounded operator override (#860). When the NORMAL fix-up
                    budget is already spent (`fixup_budget_exhausted`) but a
                    concern still needs the agent, set this `true` to grant ONE
                    pass beyond the budget. Hard-capped at **3 total passes**
                    per stage; the forced pass is audited (a `forced` flag plus
                    `reason` on the `stage_fixup_triggered` entry). At the hard
                    ceiling even a forced attempt returns 422
                    (`fixup_ceiling_reached`). Default `false` preserves the
                    prior single-pass behaviour.
                delegated:
                  type: boolean
                  default: false
                  description: |
                    Opts the fix-up into the ADR-040 delegated-action
                    path (#1026). The server re-evaluates the
                    `operator_agent.may_route_fixup` condition
                    (`convergent_concerns`) against current run state at
                    action time: 403 `delegation_not_configured` when no
                    effective block delegates the route_fixup action
                    (fail-closed), 403 `delegation_condition_unmet` with
                    the named failed predicate when the implement-review
                    round is unsettled, a gating-authority reviewer
                    rejected, no concern is open, or ‚Äî when every verdict
                    is approve-class ‚Äî every open concern is below the
                    effective `route_fixup_min_severity` threshold
                    (default `medium`; a reject verdict bypasses the
                    threshold), #1964. When met, the fix-up proceeds and
                    the `stage_fixup_triggered` payload records
                    `delegated: "convergent_concerns"`. Omitted ‚Üí
                    behavior byte-identical to today.
                implement_model:
                  type: string
                  description: |
                    Optional operator/driver model override for THIS fix-up
                    pass (#1164). Empty (omitted) inherits the run's
                    already-resolved implement model ‚Äî byte-identical to
                    today. A non-empty value is validated against the
                    deployment's per-adapter allowed-model set exactly as the
                    plan gate validates it: a model outside the run adapter's
                    configured allow-list is rejected (422
                    `fixup_invalid_model`); an empty/unconfigured allow-list
                    fails open (any model accepted). The effective model ‚Äî
                    override or inherited ‚Äî is pinned on the
                    `stage_fixup_triggered` audit entry at trigger time
                    (`fixup_model` / `fixup_model_source`) and read back when
                    the runner fetches the fix-up prompt, and is surfaced on
                    the run's `fixup_model` status field.
                operator_concern:
                  type: string
                  description: |
                    Optional free-text operator instruction routed back to the
                    agent with NO pre-existing review concern (#1311). It is the
                    sanctioned escape hatch for a REQUIRED external-check failure
                    that has no Fishhawk review concern ‚Äî a CodeQL/SAST alert on
                    a clean approve-with-zero-concerns diff ‚Äî or any operator
                    steer that is not an implement-review concern. When supplied
                    it is converted server-side into a synthetic
                    `[high/operator]` concern folded into the routed set, so it
                    rides the same budget / applicability / audit / prompt-render
                    path and reaches the agent as a binding instruction (#558
                    framing) on the run branch ‚Äî keeping lineage sole-writer (no
                    foreign hand-commit that would trip ADR-035). It needs NO
                    recorded `approve_with_concerns` verdict: `operator_concern`
                    ALONE is admitted on a zero-concern gate-open stage (it does
                    NOT raise `fixup_not_applicable`). At least one of
                    `concern_ids`, `concerns`, or `operator_concern` is required.
                    A whitespace-only value, or one whose byte length exceeds
                    4000 (the renderer's per-section cap), is rejected (400
                    `validation_failed`, `field: operator_concern`) rather than
                    silently dropped or truncated. The raw text is recorded on
                    the `stage_fixup_triggered` audit entry as `operator_concern`.
      responses:
        '200':
          description: Stage re-opened for the fix-up pass; refreshed Stage row in body.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Stage' }
        '400':
          description: |
            Malformed body, no selection at all (none of `concern_ids` /
            `concerns` / `operator_concern`), both `concern_ids` and
            `concerns` supplied, an out-of-range / duplicate concern index,
            an unknown / foreign / plan-stage / non-open `concern_id`, or a
            whitespace-only or over-length (>4000 bytes) `operator_concern`.
            Body's `error` is `validation_failed`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: |
            Possible error codes: (1) bearer token lacks both `write:stages`
            and `write:fixups` scope ‚Äî body `error` is `insufficient_scope`;
            (2) caller is an mcp token (subject `mcp:run:<uuid>`) whose run
            scope does not match the target stage's `run_id` ‚Äî body `error`
            is `cross_run_fixup`. MCP tokens may only fix up stages within
            their own run. (3) `delegated: true` refusals (ADR-040 /
            #1026): `delegation_not_configured` when no effective
            `operator_agent` block delegates the route_fixup action
            (fail-closed), `delegation_condition_unmet` when the
            `convergent_concerns` condition is not satisfied ‚Äî including
            an all-approve round whose open concerns are all below the
            effective `route_fixup_min_severity` threshold (default
            `medium`, #1964) ‚Äî `details` names the exact failed predicate
            in `unmet_reason`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422':
          description: |
            Fix-up not applicable. One of: the stage is the wrong type/state
            or carries no recorded `approve_with_concerns` concerns
            (`fixup_not_applicable`); the NORMAL bounded pass count is already
            spent and no override was requested (`fixup_budget_exhausted` ‚Äî
            one more pass is available via `force_additional_pass: true`); or
            the hard ceiling of 3 total passes is reached and the override can
            no longer help (`fixup_ceiling_reached`, distinct from
            `fixup_budget_exhausted`; its `details` carry a `remediation`
            pointer to the operator commit-and-`fishhawk_vouch_commit` path for
            a late CI/SAST finding, #1068/#1044); or the resolved `implement_model`
            override is not in the deployment's per-adapter allow-list
            (`fixup_invalid_model`, #1164 ‚Äî `details` carry the resolved
            `model`, `model_source`, and `adapter`). Body's `message` explains
            the specific reason.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/concerns/{concern_id}/waive:
    post:
      operationId: waiveConcern
      summary: Waive an open review concern with an audited reason
      description: |
        Transitions one OPEN review concern (`raised`,
        `addressed_pending`, or `reopened`) to the terminal `waived`
        state (E22.X / #984) ‚Äî the operator judgment that the concern
        does not warrant a change (false positive, accepted trade-off,
        deliberate deferral), as distinct from routing it back to the
        agent via `POST /v0/stages/{stage_id}/fixup`.

        The `reason` is REQUIRED and audited. **Audit-before-mutation
        ordering:** the handler appends a `concern_waived` audit entry
        on the concern's run/stage FIRST (payload: `concern_id`,
        `prior_state`, `reason`, `stage_kind`, `severity`, `category`)
        and treats append failure as request failure (500
        `audit_append_failed`, no state change) ‚Äî a waive mutation can
        never exist without a durable audit record. Only then is the
        state transition applied; if it fails after the append (a
        concurrent transition raced it), a corrective
        `concern_waive_failed` entry is appended (best-effort) naming
        the actual state and the request returns 422
        (`concern_waive_conflict`), keeping the chain truthful in every
        interleaving.

        Effects of a successful waive: the concern stops appearing in
        `GET /v0/runs/{run_id}`'s open-states-only `concerns` block, can
        no longer be selected by the fix-up endpoint's `concern_ids`,
        and is rendered in later implement-review prompts as
        not-re-litigable context carrying the operator's reason
        verbatim. The waive is terminal ‚Äî there is no un-waive.

        Auth mirrors the fix-up endpoint: `write:stages` or
        `write:fixups` scope; an mcp run-bound token (subject
        `mcp:run:<uuid>`) may waive only its own run's concerns
        (403 `cross_run_waive` otherwise).
      tags: [stages]
      parameters:
        - { name: concern_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [reason]
              properties:
                reason:
                  type: string
                  minLength: 1
                  description: |
                    REQUIRED operator rationale. Recorded on the
                    `concern_waived` audit entry, stored as the concern's
                    `state_reason`, and shown verbatim to later
                    re-reviews as the waive context ‚Äî make it
                    self-contained.
                delegated:
                  type: boolean
                  default: false
                  description: |
                    Opts the waive into the ADR-040 delegated-action
                    path (#1026). The server re-evaluates the
                    `operator_agent.may_waive` condition (`solo_low`)
                    against current run state at action time, BEFORE the
                    `concern_waived` intent entry is appended: 403
                    `delegation_not_configured` when no effective block
                    delegates the waive action (fail-closed), 403
                    `delegation_condition_unmet` with the named failed
                    predicate unless exactly one concern is open and its
                    severity is low. When met, the waive proceeds and
                    the `concern_waived` payload records
                    `delegated: "solo_low"`. Omitted ‚Üí behavior
                    byte-identical to today.
      responses:
        '200':
          description: Concern waived; updated concern row in body.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WaivedConcern' }
        '400':
          description: |
            Malformed body, missing/empty `reason`, or a non-UUID
            `concern_id`. Body's `error` is `validation_failed`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: |
            Possible error codes: (1) bearer token lacks both `write:stages`
            and `write:fixups` scope ‚Äî body `error` is
            `insufficient_scope`; (2) caller is an mcp token (subject
            `mcp:run:<uuid>`) whose run scope does not match the
            concern's `run_id` ‚Äî body `error` is `cross_run_waive`.
            (3) `delegated: true` refusals (ADR-040 / #1026):
            `delegation_not_configured` when no effective
            `operator_agent` block delegates the waive action
            (fail-closed), `delegation_condition_unmet` when the
            `solo_low` condition is not satisfied ‚Äî `details` names the
            exact failed predicate in `unmet_reason`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422':
          description: |
            The concern is not in an open state ‚Äî already `waived`,
            `superseded`, or `addressed`. Body's `error` is
            `concern_waive_conflict`; `details` carries the rejected
            `from`/`to` pair. A corrective `concern_waive_failed` audit
            entry accompanies the already-appended intent entry.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: |
            Concern or audit store not configured on this deployment.
            Body's `error` is `concern_store_unconfigured`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/concerns/{concern_id}/defer:
    post:
      operationId: deferConcern
      summary: Defer an open review concern into a follow-up work item
      description: |
        Converts one OPEN review concern (`raised`, `addressed_pending`,
        or `reopened`) into a conventions-complete, boarded, epic-linked
        follow-up work item AND transitions the concern to the terminal
        `deferred` state in a single call (E22.X / #1202) ‚Äî the operator
        verb that sits between routing the concern back to the agent
        (`POST /v0/stages/{stage_id}/fixup`) and resolving it with no
        follow-up (`POST /v0/concerns/{concern_id}/waive`). Deferring
        consumes NO fix-up budget.

        The follow-up body is fully AUTO-DRAFTED server-side from the
        persisted concern + its run (the concern note, severity,
        category, the reviewer model, the evidence run id, and the
        source PR link). The operator supplies only `parent_epic` (the
        epic the follow-up rolls up to); the `{n}` child number is
        discovered server-side (#1958) from the parent epic's existing
        children and the next one allocated, mirroring the work-item
        filing endpoint. `type` defaults to `bug` for a defect category
        else `chore`, and `labels` are merged on top of the type
        defaults.

        **Orphan-issue safety + audit-ordering:** a GitHub issue is a
        durable external side effect, so the handler (1) PRE-CHECKS the
        concern is open BEFORE any filing ‚Äî the provider's File is never
        called for an already-resolved concern (422
        `concern_defer_conflict`, no issue created); (2) files the issue
        FIRST, then transitions the concern; a filing failure leaves the
        concern OPEN (no transition, no audit) so the operator can retry;
        (3) appends the success `concern_deferred` audit entry ONLY AFTER
        the transition succeeds (the entry is a fact, not an attempt). If
        the transition fails after a successful filing (a concurrent
        writer raced it), the ONLY audit entry is a corrective
        `concern_defer_failed` naming the actual state AND the orphaned
        issue url, and the request returns 422 ‚Äî never a success
        `concern_deferred` entry for a transition that did not happen.

        Effects of a successful defer: the concern stops appearing in
        `GET /v0/runs/{run_id}`'s open-states-only `concerns` block, can
        no longer be selected by the fix-up endpoint's `concern_ids`, and
        its `state_reason` names the filed issue. The defer is terminal.

        Auth mirrors the waive endpoint: `write:stages` or `write:fixups`
        scope; an mcp run-bound token (subject `mcp:run:<uuid>`) may
        defer only its own run's concerns (403 `cross_run_defer`
        otherwise).
      tags: [stages]
      parameters:
        - { name: concern_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                parent_epic:
                  type: string
                  description: |
                    The epic the follow-up rolls up to (an issue
                    reference like `#1196`); its leading `[E<n>]` title
                    token is fetched to derive the `{epic}` title
                    placeholder. Operator judgment ‚Äî not derivable from
                    the concern.
                n:
                  type: string
                  description: |
                    OPTIONAL child number for the `[E<epic>.<n>]` title.
                    Discovered server-side (#1958) from the parent epic's
                    existing children (open and closed) and the next one
                    allocated, so the operator no longer has to guess it ‚Äî
                    supply `n` only to override that discovery. A failed
                    lookup fails the filing closed with 422
                    `work_item_invalid` (`details.n_discovery_failed`).
                type:
                  type: string
                  description: |
                    Optional override of the auto-selected work-item type
                    (`bug` for a defect category, else `chore`).
                labels:
                  type: array
                  items: { type: string }
                  description: Optional labels merged on top of the type's default labels.
                note:
                  type: string
                  description: |
                    Optional operator addendum folded into the follow-up
                    body and the concern's `state_reason`.
      responses:
        '200':
          description: |
            Concern deferred; the filed follow-up issue + updated concern
            row in body.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DeferredConcernResult' }
        '400':
          description: |
            Malformed body or a non-UUID `concern_id`. Body's `error` is
            `validation_failed`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: |
            Possible error codes: (1) bearer token lacks both
            `write:stages` and `write:fixups` scope ‚Äî body `error` is
            `insufficient_scope`; (2) caller is an mcp token (subject
            `mcp:run:<uuid>`) whose run scope does not match the
            concern's `run_id` ‚Äî body `error` is `cross_run_defer`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422':
          description: |
            Either the concern is not in an open state ‚Äî already
            `waived`, `superseded`, `deferred`, or `addressed` (the
            open-state pre-check; no issue filed) ‚Äî or the issue was
            filed but the state transition then failed (a post-filing
            race; a corrective `concern_defer_failed` audit entry names
            the orphaned issue url). Body's `error` is
            `concern_defer_conflict`. The auto-drafted follow-up could
            also violate the type's conventions ‚Äî body `error` is
            `work_item_invalid` with `details`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '501':
          description: |
            The configured work-item provider is not registered. Body's
            `error` is `provider_unimplemented`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '502':
          description: |
            The provider could not file the follow-up issue ‚Äî the
            concern stays OPEN (no transition). Body's `error` is
            `work_item_filing_failed`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: |
            Concern, audit, or run store not configured on this
            deployment. Body's `error` is `concern_store_unconfigured`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/artifacts/{artifact_id}:
    get:
      operationId: getArtifact
      summary: Get an artifact
      tags: [artifacts]
      parameters:
        - { name: artifact_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: Artifact with content.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Artifact' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ---------------------------------------------------------------------
  # Runner-facing endpoints
  # ---------------------------------------------------------------------
  /v0/runs/{run_id}/signing-key:
    post:
      operationId: issueSigningKey
      summary: Issue a per-run Ed25519 signing key
      description: |
        Called by the runner at job start. The backend mints a fresh
        Ed25519 keypair, appends a new row in `signing_keys`, and
        returns the private half in the response body. The private key
        is never persisted server-side and never returned to anyone
        else. Auth is GitHub Actions OIDC token, verified per request.
        See ADR-008 (#72).

        Multi-call: each invocation appends a new row so each stage's
        fresh GitHub Actions runner process can issue its own key
        without coordinating with prior stages. `Verify` (used by the
        trace, plan, and pull-request upload endpoints) accepts a
        signature from ANY unexpired key for the run (newest-first),
        so a sibling stage's key rotation does not invalidate an
        in-flight runner's still-open upload (#1872); older rows remain
        so the standalone audit verifier can replay any signature that
        was valid at upload time. Migration 0012.

        TTL: the server sets `expires_at` to
        `max(30m, resolved_stage_budget + 5m)`, where
        `resolved_stage_budget` is the spec-governed timeout for the
        stage currently in `dispatched` or `running` state (sourced
        from `spec.ResolveStageTimeout`). This ensures a stage that
        runs its full budget still holds a valid key when it uploads
        its trace. Runs without a workflow spec, or with no active
        stage, default to 30m.
      tags: [runner]
      security:
        - githubOIDC: []
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ttl_seconds:
                  type: integer
                  description: |
                    Optional override for the default TTL (1800s).
                    Backend may cap to a maximum.
                  minimum: 60
                  maximum: 3600
      responses:
        '201':
          description: Keypair issued.
          content:
            application/json:
              schema:
                type: object
                required: [run_id, public_key, private_key, issued_at, expires_at]
                properties:
                  run_id: { $ref: '#/components/schemas/UUID' }
                  public_key:
                    type: string
                    description: Base64-encoded 32-byte Ed25519 public key.
                  private_key:
                    type: string
                    description: |
                      Base64-encoded 64-byte Ed25519 private key. The
                      runner stores this in process memory only and
                      discards it after trace upload.
                  issued_at:
                    type: string
                    format: date-time
                  expires_at:
                    type: string
                    format: date-time
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404':
          description: Run does not exist.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/runs/{run_id}/trace:
    post:
      operationId: shipTrace
      summary: Upload a signed trace bundle
      description: |
        Called by the runner after a stage completes. The bundle bytes
        (`application/gzip`, JSON Lines) are uploaded as the request body;
        the signature comes via the `X-Fishhawk-Signature` header. The
        backend verifies the signature against the run's stored public
        key, stores the bundle in S3 (per ADR-003 #67), and writes the
        corresponding audit entry. Auth is the signature itself; no
        Bearer or cookie required.
      tags: [runner]
      security: []
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - { name: stage_id, in: query, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - name: variant
          in: query
          required: true
          schema:
            type: string
            enum: [raw, redacted]
        - name: X-Fishhawk-Signature
          in: header
          required: true
          schema:
            type: string
            description: |
              Hex-encoded 64-byte Ed25519 signature over
              sha256(raw_bundle_bytes).
      requestBody:
        required: true
        content:
          application/gzip:
            schema:
              type: string
              format: binary
      responses:
        '202':
          description: Bundle accepted, signature verified.
          content:
            application/json:
              schema:
                type: object
                required: [run_id, stage_id, variant, content_hash]
                properties:
                  run_id: { $ref: '#/components/schemas/UUID' }
                  stage_id: { $ref: '#/components/schemas/UUID' }
                  variant: { type: string, enum: [raw, redacted] }
                  content_hash:
                    type: string
                    description: Hex sha256 of the uploaded bundle bytes.
        '400': { $ref: '#/components/responses/BadRequest' }
        '401':
          description: Signature invalid or no signing key for this run.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v0/runs/{run_id}/plan:
    post:
      operationId: shipPlan
      summary: Upload a standard_v1 plan artifact
      description: |
        Called by the runner after a successful plan-stage agent
        invocation. The body is the agent-produced JSON validated
        against `docs/spec/plan-standard-v1.schema.json`. Auth is the
        per-run Ed25519 signature in `X-Fishhawk-Signature` (same
        scheme as `/v0/runs/{run_id}/trace`).

        Idempotent on (stage_id, content_hash): re-uploading the same
        plan bytes returns 200 with the existing artifact rather than
        inserting a duplicate row.
      tags: [runner]
      security: []
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - { name: stage_id, in: query, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - name: X-Fishhawk-Signature
          in: header
          required: true
          schema:
            type: string
            description: |
              Hex-encoded 64-byte Ed25519 signature over
              sha256(plan_bytes).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Validated against plan-standard-v1.schema.json.
      responses:
        '201':
          description: Plan accepted; new artifact row created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlanUploadResponse' }
        '200':
          description: |
            Plan with this content_hash already exists for the stage.
            The body returns the existing artifact unchanged (idempotent
            re-upload).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlanUploadResponse' }
        '400':
          description: |
            Body did not validate against `standard_v1` (`code: plan_invalid`)
            or path/query parameters were malformed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: Signature invalid or no signing key for this run.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '413':
          description: Plan body exceeds the per-stage size cap (256 KiB).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/runs/{run_id}/pull-request:
    post:
      operationId: shipPullRequest
      summary: Upload a pull-request artifact for an implement stage
      description: |
        Called after an implement-stage run to report its commit/push/
        PR-open outcome. The body has three variants (#742, #771):

        - **Success**: a real GitHub PR was opened. The body carries
          `{ pr_number, pr_url, branch, head_sha, base_sha, title,
          body?, files_changed_count }`. The handler stores the artifact,
          backfills `run.pull_request_url`, and drives the implement
          stage's terminal transition when the trace handler's
          push-and-open-pr gate left it in `running`.
        - **Failure** (`{ outcome: "failed", category, reason }`): the
          commit/push/PR-open step failed, so no PR was opened. The
          handler fails the implement stage (category `C` is retryable,
          `B` parks for re-scope) instead of creating an artifact ‚Äî
          closing the zombie-run hole where a commit/push failure
          stranded the run at review with a null PR.
        - **Child push** (`{ outcome: "pushed", branch, head_sha,
          base_sha, files_changed_count }`, #771): a decomposed child
          pushed onto the shared parent branch without opening a PR. The
          handler drives the child stage's terminal transition its
          push_to_shared_branch trace gate left in `running`, without
          creating a PR artifact ‚Äî the decomposition-child analogue of the
          #742 zombie fix.

        Two auth paths are accepted:

        - **Ed25519 signature** (canonical runner path): supply
          `X-Fishhawk-Signature` ‚Äî the hex-encoded 64-byte Ed25519
          signature over sha256(body), using the per-run ephemeral
          key issued at `/v0/runs/{run_id}/signing-key`. Same scheme
          as `/v0/runs/{run_id}/trace` and `/v0/runs/{run_id}/plan`.

        - **Bearer token** (local-runner CLI path): supply
          `Authorization: Bearer <token>` with `write:runs` scope.
          Used by the CLI wrapper (`autoOpenPR`) when the per-run
          Ed25519 signing key is unavailable ‚Äî the key is consumed
          by the trace and plan uploads inside the runner subprocess
          and is not accessible to the outer CLI process.

        When both are present the signature path wins. The audit
        payload's `auth_method` field records `ed25519` or `bearer`
        to identify which path was taken.

        Returns 401 `signature_or_bearer_required` when neither is
        present.

        Idempotent on (stage_id, content_hash): re-running a runner
        job that pushed the same commits returns the existing
        artifact unchanged rather than inserting a duplicate.

        v0 has no formal JSON Schema for the body ‚Äî required-field
        checks happen in the handler. v1+ may graduate this to a
        versioned `pull_request_v1` schema.
      tags: [runner]
      security: []
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - { name: stage_id, in: query, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - name: X-Fishhawk-Signature
          in: header
          required: false
          schema:
            type: string
            description: Hex-encoded 64-byte Ed25519 signature over sha256(body).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PullRequestArtifactBody' }
      responses:
        '201':
          description: Pull-request accepted; new artifact row created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PullRequestUploadResponse' }
        '200':
          description: |
            Either:
            - A pull-request artifact with this content_hash already
              exists for the stage (idempotent re-upload returns the
              existing artifact unchanged), or
            - the failure variant (`outcome: failed`) was accepted and
              the implement stage was transitioned to `failed` (#742), or
            - the child-push variant (`outcome: pushed`) was accepted and
              the decomposed-child implement stage was transitioned
              terminally (#771), or
            - the fix-up push variant (`outcome: fixup_pushed`) was accepted
              and the fix-up implement stage was transitioned terminally
              (#794), or
            - the fix-up no-changes variant (`outcome: fixup_no_changes`) was
              accepted and the fix-up implement stage was transitioned
              terminally, re-parking the review gate (#856), or
            - the scope-completeness park variant (`outcome: scope_park`) was
              accepted and the implement stage was parked in
              `awaiting_scope_decision` for an operator exempt-or-fail
              decision (#1231).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PullRequestUploadResponse'
                  - $ref: '#/components/schemas/PullRequestFailureResponse'
                  - $ref: '#/components/schemas/PullRequestChildPushResponse'
                  - $ref: '#/components/schemas/PullRequestFixupPushResponse'
                  - $ref: '#/components/schemas/PullRequestFixupNoChangesResponse'
                  - $ref: '#/components/schemas/PullRequestScopeParkResponse'
        '400':
          description: |
            Body missing required fields (`code: pull_request_invalid`)
            ‚Äî for the failure variant, an unknown `category` or missing
            `reason` ‚Äî or path/query parameters were malformed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: |
            Auth failed. Possible codes:
            - `signature_invalid` ‚Äî `X-Fishhawk-Signature` did not verify against the run's public key, or no signing key exists for this run.
            - `signature_or_bearer_required` ‚Äî request included neither `X-Fishhawk-Signature` nor an authenticated bearer token with `write:runs` scope.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '413':
          description: Pull-request body exceeds the per-stage size cap (32 KiB).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/runs/{run_id}/deployment:
    post:
      operationId: shipDeployment
      summary: Record a deployment artifact for a deploy stage
      description: |
        Records ADR-038's signed `deployment` artifact (E23.5 / #1385) ‚Äî
        the governance record of a delegated release. Modeled on
        `POST /v0/runs/{run_id}/pull-request`: Fishhawk holds no deploy
        logic or credentials, so the external pipeline runs the deploy and
        the body reports its settled outcome.

        The body carries `{ environment, ref, external_run_url, outcome,
        rollback_handle? }`. `outcome` is one of `succeeded` / `failed` /
        `partial` / `rolled_back` (the ADR-038 deploy dispositions). The
        handler stores the artifact (`artifact.kind = deployment`) and
        writes a `deployment_outcome_recorded` chained audit entry. When the
        body additionally carries `rollback_action` (`initiated` /
        `completed`) it writes the matching
        `deployment_rollback_initiated` / `deployment_rollback_completed`
        entry as well. The deploy outcome surfaces on the run's living-anchor
        issue timeline.

        Two auth paths are accepted, mirroring the pull-request upload:

        - **Ed25519 signature** (canonical deploy-executor path): supply
          `X-Fishhawk-Signature` ‚Äî the hex-encoded 64-byte Ed25519
          signature over sha256(body), using the per-run ephemeral key. The
          signature path is NOT scope-gated.
        - **Bearer token** (operator path): supply `Authorization: Bearer
          <token>` with BOTH `write:runs` AND `write:deploy` scope (ADR-038 /
          #1390 ‚Äî the deploy ship is a governance write specific to the deploy
          gate). A token holding `write:runs` but missing `write:deploy` is
          rejected 403 `insufficient_scope` (`required_scope: write:deploy`).

        When both are present the signature path wins. The audit payload's
        `auth_method` field records `ed25519` or `bearer`.

        Returns 401 `signature_or_bearer_required` when neither is present.

        Idempotent on (stage_id, content_hash): a re-delivery of the same
        deployment record returns the existing artifact unchanged rather
        than inserting a duplicate or writing a second audit entry.

        v0 has no formal JSON Schema for the body ‚Äî required-field checks
        happen in the handler.
      tags: [runner]
      security: []
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - { name: stage_id, in: query, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - name: X-Fishhawk-Signature
          in: header
          required: false
          schema:
            type: string
            description: Hex-encoded 64-byte Ed25519 signature over sha256(body).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DeploymentArtifactBody' }
      responses:
        '201':
          description: Deployment accepted; new artifact row created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DeploymentUploadResponse' }
        '200':
          description: |
            A deployment artifact with this content_hash already exists for
            the stage (idempotent re-upload returns the existing artifact
            unchanged).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DeploymentUploadResponse' }
        '400':
          description: |
            Body missing required fields or malformed
            (`code: deployment_invalid`) ‚Äî for example an absent
            `environment`/`ref`/`external_run_url`, a non-http
            `external_run_url`, an `outcome` outside the closed set, or an
            unrecognized `rollback_action` ‚Äî or path/query parameters were
            malformed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: |
            Auth failed. Possible codes:
            - `signature_invalid` ‚Äî `X-Fishhawk-Signature` did not verify against the run's public key, or no signing key exists for this run.
            - `signature_or_bearer_required` ‚Äî request included neither `X-Fishhawk-Signature` nor an authenticated bearer token with `write:runs` scope.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: |
            Bearer token holds `write:runs` but is missing the deploy-specific
            `write:deploy` scope (`code: insufficient_scope`,
            `required_scope: write:deploy`, ADR-038 / #1390).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '413':
          description: Deployment body exceeds the per-stage size cap (32 KiB).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/runs/{run_id}/acceptance:
    post:
      operationId: shipAcceptance
      summary: Record an acceptance-evidence artifact for an acceptance stage
      description: |
        Records ADR-049's signed `acceptance` artifact (E31.6 / #1534) ‚Äî the
        durable evidence an independent acceptance validator emits after
        driving the running target instance. Modeled on
        `POST /v0/runs/{run_id}/deployment`: the handler stores the artifact
        (`artifact.kind = acceptance`) and writes an
        `acceptance_outcome_recorded` chained audit entry carrying the
        `verdict` + `failure_mode` (the E31.8 error-vs-assertion_fail
        carry-through). The outcome surfaces on the run's living-anchor issue
        timeline. NO stage-state transition happens here ‚Äî the acceptance
        stage settles through the ordinary agent trace-bundle path.

        The body carries `{ verdict, failure_mode?, criteria?, target_url?,
        evidence_hashes? }`. `verdict` is `passed` / `failed`; `failure_mode`
        (`error` / `assertion_fail`) is required when `verdict` is `failed`
        and rejected on a pass. Evidence blobs stay customer-side ‚Äî only the
        structured verdict + `content_hash` references cross.

        Two auth paths are accepted, mirroring the deployment upload:

        - **Ed25519 signature** (canonical acceptance-validator path, ADR-050
          decision #2 ‚Äî the acceptance agent ships via signature auth with no
          MCP token): supply `X-Fishhawk-Signature` ‚Äî the hex-encoded 64-byte
          Ed25519 signature over sha256(body). NOT scope-gated.
        - **Bearer token** (operator path): supply `Authorization: Bearer
          <token>` with `write:runs` scope. Unlike deploy, acceptance adds NO
          dedicated scope ‚Äî the evidence write is advisory.

        When both are present the signature path wins. The audit payload's
        `auth_method` field records `ed25519` or `bearer`.

        Returns 401 `signature_or_bearer_required` when neither is present.

        Idempotent on (stage_id, content_hash): a re-delivery of the same
        acceptance record returns the existing artifact unchanged rather than
        inserting a duplicate or writing a second audit entry.

        v0 has no formal JSON Schema for the body ‚Äî required-field checks
        happen in the handler.
      tags: [runner]
      security: []
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - { name: stage_id, in: query, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - name: X-Fishhawk-Signature
          in: header
          required: false
          schema:
            type: string
            description: Hex-encoded 64-byte Ed25519 signature over sha256(body).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AcceptanceArtifactBody' }
      responses:
        '201':
          description: Acceptance evidence accepted; new artifact row created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AcceptanceUploadResponse' }
        '200':
          description: |
            An acceptance artifact with this content_hash already exists for
            the stage (idempotent re-upload returns the existing artifact
            unchanged).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AcceptanceUploadResponse' }
        '400':
          description: |
            Body missing required fields or malformed
            (`code: acceptance_invalid`) ‚Äî for example an absent/unknown
            `verdict`, a `failed` verdict missing `failure_mode`, a `passed`
            verdict carrying `failure_mode`, a criterion with an empty `id` or
            an invalid `result`, a non-http `target_url`, or an unknown JSON
            field ‚Äî or path/query parameters were malformed, or the stage is
            not an acceptance stage (`validation_failed`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: |
            Auth failed. Possible codes:
            - `signature_invalid` ‚Äî `X-Fishhawk-Signature` did not verify against the run's public key.
            - `signature_or_bearer_required` ‚Äî request included neither `X-Fishhawk-Signature` nor an authenticated bearer token with `write:runs` scope.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '413':
          description: Acceptance body exceeds the per-stage size cap (32 KiB).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/runs/{run_id}/deployment/rollback:
    post:
      operationId: rollbackDeployment
      summary: Re-dispatch a delegating deploy's rollback path
      description: |
        Operator-triggered rollback sub-action for a delegating deploy
        (E23.6 / #1386, ADR-038's `rolled_back` disposition). Fishhawk holds
        no prod credentials, so a rollback is just another delegating
        trigger: it re-dispatches the SAME external pipeline down its
        rollback path and records the rollback run handle.

        The endpoint owns only the **initiate** side. It reads the run's
        deploy stage's `executor.delegate` config from the cached workflow
        spec and, by target:

        - **github_actions** ‚Äî fires a `workflow_dispatch` of the SAME
          `workflow_ref` carrying the Fishhawk correlation
          (`fishhawk_run_id` / `fishhawk_stage_id`) plus
          `fishhawk_rollback=true` as inputs, then best-effort resolves the
          rollback run id (the dispatch endpoint returns 204 with no body).
          Re-dispatching the same `workflow_ref` with a rollback input (rather
          than a separately configured `rollback_workflow_ref`) avoids a
          `workflow-v*` schema bump; a distinct rollback ref stays a deferred
          additive spec field.
        - **webhook** ‚Äî POSTs a rollback payload (`fishhawk_rollback: true`)
          to the delegate URL.

        On a successful dispatch it writes a `deployment_rollback_initiated`
        chained audit entry carrying the rollback run handle ‚Äî **distinct**
        from the initial deploy's `deployment_dispatched` handle ‚Äî and
        refreshes the run's living-anchor issue comment.

        **Terminal completion is NOT recorded here.** Setting the
        `rolled_back` outcome and writing `deployment_rollback_completed`
        happen ONLY when the rollback run reaches terminal: the external
        rollback pipeline reports it by calling back into
        `POST /v0/runs/{run_id}/deployment` with
        `{ outcome: "rolled_back", rollback_action: "completed" }`, which
        persists the `rolled_back` deployment artifact (the durable carrier
        of the deploy outcome) and chains `deployment_rollback_completed`.
        This is the rollback terminal callback path and is uniform across
        both targets.

        **Preconditions.** The run must have a deploy stage in a terminal
        state (`succeeded` or `failed`); an in-flight stage has nothing to
        revert (refused 409 `deploy_not_settled`).

        **Authorization.** Operator-only ‚Äî an authenticated bearer with BOTH
        `write:runs` AND `write:deploy` scope (ADR-038 / #1390; a rollback is
        never runner-initiated, so there is no Ed25519 signature path). A token
        holding `write:runs` but missing `write:deploy` is refused 403
        `insufficient_scope` (`required_scope: write:deploy`). A run-bound MCP
        token (subject `mcp:run:<uuid>`) is EXEMPT from the `write:deploy`
        requirement and may roll back ONLY its own run's deploy; another run is
        refused 403 (`cross_run_rollback`).
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '202':
          description: |
            Rollback re-dispatched; the rollback run handle is echoed back.
            Terminal completion (the `rolled_back` outcome +
            `deployment_rollback_completed`) is recorded later via the
            deployment callback.
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id: { $ref: '#/components/schemas/UUID' }
                  stage_id: { $ref: '#/components/schemas/UUID' }
                  target: { type: string, enum: [github_actions, webhook], description: 'The delegate target the rollback was re-dispatched against.' }
                  gha_run_id: { type: integer, format: int64, description: 'Resolved GitHub Actions rollback run id; omitted/0 when not yet resolvable.' }
                  external_run_url: { type: string, description: 'URL of the external rollback run (GHA run html_url, or the webhook delegate URL).' }
                  message: { type: string }
        '400':
          description: '`run_id` is not a valid UUID (`validation_failed`).'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: |
            One of: (1) bearer token lacks `write:runs` scope ‚Äî
            `insufficient_scope`; (2) an operator bearer holds `write:runs` but
            lacks the deploy-specific `write:deploy` scope ‚Äî
            `insufficient_scope` (`required_scope: write:deploy`, ADR-038 /
            #1390; mcp run-bound tokens are exempt); (3) an mcp run-bound token
            targeting another run ‚Äî `cross_run_rollback`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: |
            No run with that id (`run_not_found`), or the run has no deploy
            stage to roll back (`deploy_stage_not_found`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: |
            The deploy stage has not reached a terminal outcome; nothing to
            roll back (`deploy_not_settled`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422':
          description: |
            The rollback could not be dispatched from config
            (`rollback_unconfigured`): the cached spec carries no delegating
            deploy stage, the github_actions delegate is missing a
            `workflow_ref`, the run has no `installation_id`, the webhook
            delegate is missing a `url`, or the repo ref is malformed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '502':
          description: |
            The external rollback trigger failed (`rollback_dispatch_failed`):
            the `workflow_dispatch` returned non-204, or the webhook POST
            errored / returned a non-2xx status.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: |
            Rollback unavailable (`rollback_unconfigured`): the backend has no
            run/audit repositories, or a github_actions rollback was requested
            against a backend with no configured GitHub client.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/runs/{run_id}/installation-token:
    post:
      operationId: issueInstallationToken
      summary: Mint a GitHub App installation token for the run's repo
      description: |
        Returns the Fishhawk App's installation token for the
        repository the run is operating on. Lets the runner do its
        implement-stage `git push` and PR creation under the App's
        identity rather than the workflow's `GITHUB_TOKEN` ‚Äî which
        means customers don't need to enable "Allow Actions to create
        and approve pull requests" in their repo settings, and the PR
        is correctly attributed to the App.

        Dual auth (#201):
        - **OIDC (canonical)** ‚Äî `Authorization: Bearer <github-actions-oidc-jwt>`.
          Verified against the run row's repository + workflow
          claims via `cfg.OIDCVerifier`. Used by the auth pre-step
          before `actions/checkout` so the App token is what
          authenticates the initial clone too.
        - **Ed25519 (fallback)** ‚Äî `X-Fishhawk-Signature: <hex>`
          over sha256 of the request body. Used by the runner's
          runtime fallback path when no auth pre-step ran (local
          dev, non-Actions environments).

        OIDC wins when both are present. Audit payload's
        `auth_method` field records which path was taken. Backend
        reads the run row's `installation_id` and calls the cached
        `githubapp.TokenProvider`; tokens are GitHub-default
        ~1 hour. Issuance is audited (`installation_token_issued`)
        with a sha256 of the token, never the token itself.
      tags: [runner]
      security: []
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - { name: stage_id, in: query, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - name: Authorization
          in: header
          required: false
          schema:
            type: string
            description: |
              `Bearer <github-actions-oidc-jwt>`. Required for the
              OIDC auth path. Mutually exclusive with
              X-Fishhawk-Signature; OIDC wins when both are sent.
        - name: X-Fishhawk-Signature
          in: header
          required: false
          schema:
            type: string
            description: |
              Hex-encoded 64-byte Ed25519 signature over sha256 of
              the request body (typically empty). Required for the
              Ed25519 auth path. Mutually exclusive with
              Authorization.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              description: Empty in v0; reserved for future fields.
      responses:
        '201':
          description: Installation token issued.
          content:
            application/json:
              schema:
                type: object
                required: [token]
                properties:
                  token:
                    type: string
                    description: |
                      Opaque GitHub installation token. Use as
                      `x-access-token:<token>` for HTTPS git push,
                      or `Authorization: Bearer <token>` for REST
                      API calls. ~1-hour TTL; runner discards
                      after stage completes.
        '400':
          description: |
            run_id / stage_id malformed, stage doesn't belong to
            run, or the run has no `installation_id` (was created
            without a webhook-attributed installation).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: Signature invalid or no signing key for this run.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '502':
          description: |
            Backend's App JWT was rejected, or the installation no
            longer exists. Runner should abort the implement stage
            and report category-C.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/runs/{run_id}/mcp-token:
    post:
      operationId: issueMCPToken
      summary: Mint a short-lived MCP bearer token for the run
      description: |
        Per ADR-021 / #322 (resolved E19.1) the runner-side Claude
        Code agent gets a per-run, read-only bearer token to call
        the Fishhawk MCP server (`backend/cmd/fishhawk-mcp/`)
        mid-execution. This endpoint mints that token (E19.8 /
        #348).

        Token shape:
        - `fhm_` prefix + 32 random bytes URL-safe base64. Distinct
          from the operator-facing `fhk_` API tokens so the bearer-
          auth middleware can route to the right authenticator.
        - TTL: 60 minutes (load-bearing protection per ADR-021;
          per-endpoint scope enforcement lands as a separate
          ticket if needed).
        - Stored as sha256 in `mcp_tokens`; plaintext is shown
          exactly once on issue. Subject of `mcp:run:<run_id>` is
          stamped on requests authenticated with the token.

        Auth: Ed25519 signing-key path. The runner proves
        possession by signing the (empty) request body with the
        per-run private key it received from `signing-key`. Same
        Ed25519 shape `installation-token` uses; no OIDC fallback
        because this endpoint is runner-only (operators issue
        interactive MCP tokens via the `/v0/tokens` flow).

        Issuance is audited (`mcp_token_issued`). Payload carries
        the token id, expiry, TTL, and the prefix ‚Äî never the
        plaintext bearer string.
      tags: [runner]
      security: []
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - name: X-Fishhawk-Signature
          in: header
          required: true
          schema:
            type: string
            description: |
              Hex-encoded 64-byte Ed25519 signature over sha256 of
              the request body (typically empty).
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              description: Empty in v0; reserved for future fields.
      responses:
        '201':
          description: MCP token issued.
          content:
            application/json:
              schema:
                type: object
                required: [token, token_id, run_id, expires_at]
                properties:
                  token:
                    type: string
                    description: |
                      Plaintext bearer token. The runner stores this
                      in the agent's environment as
                      `FISHHAWK_API_TOKEN` and discards it. Shown
                      exactly once; no read path returns it.
                  token_id:
                    $ref: '#/components/schemas/UUID'
                  run_id:
                    $ref: '#/components/schemas/UUID'
                  expires_at:
                    type: string
                    format: date-time
        '400':
          description: |
            run_id is malformed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: |
            X-Fishhawk-Signature missing, malformed, or didn't
            verify against the run's stored public key.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503':
          description: |
            The backend doesn't have the MCP token / run / signing
            repositories wired (dev backends running without the
            full set).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/runs/{run_id}/scope-amendments:
    post:
      operationId: requestScopeAmendment
      summary: Request a mid-stage scope amendment (implement agent)
      description: |
        Files an operator-gated request to fold specific file paths
        into the executing implement stage's effective `scope.files`
        (E22.X / #961). The agent uses this instead of editing an
        undeclared file ‚Äî the runner drops undeclared edits from the
        commit and fails category-B on undeclared created files
        (#818/#825).

        **Auth: run-bound `fhm_` bearer ONLY**, carrying the
        `write:scope-amendments` scope (granted unconditionally to
        implement-stage MCP tokens at issue). The path `run_id` must
        equal the token's run ‚Äî a cross-run request is 403
        (`cross_run_scope_amendment`). Operator tokens/sessions are
        rejected (403 `agent_token_required`): operators decide,
        they don't request. The run's resolved active stage ‚Äî the
        currently dispatched/running stage, or when none exists
        (e.g. an implement-only decomposition child whose stage is
        still `pending` under a local runner, #1030) the run's first
        non-terminal stage in sequence order ‚Äî must be an implement
        stage (409 `stage_not_implement` otherwise).

        Budget: at most **2 requests per stage**, counted on rows so
        a denied request still consumes budget (the cap bounds
        operator interruptions, not approvals). Over budget ‚Üí 422
        `amendment_budget_exhausted` with `{max, used}` details.

        The request lands as a `scope_amendment_requested` audit
        entry on the stage (`{amendment_id, paths, reason,
        remaining_budget}`) ‚Äî the operator's `fishhawk_await_audit`
        anchor. Delivery is poll-based: the agent polls the GET
        until the status leaves `pending` (bounded ~5 minutes).
      tags: [runner]
      security: []
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [paths, reason]
              properties:
                paths:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [path, operation]
                    properties:
                      path: { type: string }
                      operation: { type: string, enum: [modify, create] }
                reason:
                  type: string
                  description: Why each path must change. Required, non-empty.
      responses:
        '201':
          description: Amendment request created (status `pending`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ScopeAmendment' }
        '400':
          description: |
            Malformed run_id, invalid paths (absolute / `..` /
            unknown operation / empty), or empty reason.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: No authenticated token.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: |
            `agent_token_required` (caller is not a run-bound token),
            `insufficient_scope` (token lacks
            `write:scope-amendments`), or
            `cross_run_scope_amendment` (token bound to a different
            run).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: |
            `stage_not_implement` ‚Äî the run's resolved active stage
            (dispatched/running, else first non-terminal) is not an
            implement stage.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422':
          description: |
            `amendment_budget_exhausted` ‚Äî the per-stage cap of 2 is
            spent. Details carry `{max, used}`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: Scope-amendment repositories not wired.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    get:
      operationId: listScopeAmendments
      summary: List a run's scope amendments
      description: |
        Returns every scope amendment for the run, oldest first
        (E22.X / #961).

        **Auth: EITHER** the run-bound `fhm_` bearer with `mcp:read`
        ‚Äî the implement agent's poll loop and the runner's pre-commit
        refresh both reuse the token the runner fetched at stage
        start, with the same path-`run_id` == token-run binding as
        the POST (cross-run ‚Üí 403 `cross_run_scope_amendment`) ‚Äî
        **OR** an operator bearer/session (not run-bound). Anonymous
        callers get 401.

        **Optional `?wait=<seconds>` long-poll (#1035).** When `wait`
        is a positive integer and at least one amendment is currently
        `pending`, the server holds the connection ‚Äî re-listing
        internally ‚Äî and returns early the moment any amendment that
        was pending at request time leaves `pending` (the
        honored-decision path), so a mid-stage decision is reachable
        while `fishhawk_run_stage` blocks the driving session. If no
        such decision lands within `wait` seconds, it returns the
        still-pending list at the cap and the client re-issues to
        extend toward its own total budget. `wait` is clamped to
        `0..30`; `0`, absent, or a non-positive/non-integer value is
        the unchanged single-list behavior (no wait). A `wait` with
        nothing currently pending returns immediately. The response
        envelope is unchanged ‚Äî only the return timing differs; no new
        error codes.
      tags: [runner, runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - name: wait
          in: query
          required: false
          description: |
            Optional server-side long-poll in seconds (#1035). `0` or
            absent = no wait (unchanged single-list response). When
            positive and an amendment is pending, holds until a
            snapshotted-pending amendment is decided or the wait
            elapses; the client re-issues to extend. Clamped to
            `0..30`.
          schema:
            type: integer
            minimum: 0
            maximum: 30
            default: 0
      responses:
        '200':
          description: The run's amendments, oldest first.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/ScopeAmendment' }
        '400':
          description: run_id is malformed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: No authenticated token.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: |
            `insufficient_scope` (run-bound token lacks `mcp:read`)
            or `cross_run_scope_amendment` (run-bound token reading
            another run's amendments).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: Scope-amendment repository not wired.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/runs/{run_id}/scope-amendments/{amendment_id}/decision:
    post:
      operationId: decideScopeAmendment
      summary: Approve or deny a scope amendment (operator)
      description: |
        Records the operator's decision on a pending scope amendment
        (E22.X / #961) and appends the `scope_amendment_decided`
        audit entry (`{amendment_id, decision, reason, decided_by}`).

        **Auth: operator bearer/session ONLY** ‚Äî bearer tokens
        require `write:stages`. Run-bound `fhm_` tokens are rejected
        outright (403 `self_decision`): the requesting agent's token
        holds `write:scope-amendments` and must never decide its own
        request. Implement-stage tokens are never issued
        `write:stages`, so the run-bound rejection is defense in
        depth.

        On approve, the paths fold into the stage's effective
        `scope.files` at the next prompt fetch AND the runner's
        pre-commit refresh. Already-decided amendments return 409
        (`amendment_already_decided`) ‚Äî decisions are immutable.
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - { name: amendment_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision:
                  type: string
                  enum: [approve, deny]
                reason:
                  type: string
                  description: |
                    Operator note; delivered to the agent verbatim on
                    deny (`decision_reason`), recorded on the audit
                    entry either way.
      responses:
        '200':
          description: The decided amendment.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ScopeAmendment' }
        '400':
          description: Malformed UUIDs or decision not approve/deny.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: No authenticated token.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: |
            `self_decision` (run-bound agent token) or
            `insufficient_scope` (token lacks `write:stages`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: |
            `amendment_not_found` ‚Äî unknown amendment id, or the
            amendment belongs to a different run than the path names.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: |
            `amendment_already_decided` ‚Äî decisions are immutable.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: Scope-amendment repositories not wired.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/runs/{run_id}/scope-completeness/decision:
    post:
      operationId: decideScopeCompleteness
      summary: Exempt or fail a parked scope-completeness shortfall (operator)
      description: |
        Records the operator's exempt-or-fail decision on an implement
        stage parked in `awaiting_scope_decision` (#1231): the stage's
        ONLY committed-tree gate failure was the scope-completeness
        "missing declared scope file(s)" check, and the runner already
        pushed its gate-verified commit to the run branch (no PR).

        **Auth: operator bearer/session ONLY** ‚Äî bearer tokens require
        `write:stages`. Run-bound `fhm_` tokens are rejected outright
        (403 `self_decision`): the implement agent that produced the
        parked commit must never decide its own exemption.

        On `exempt` the stage resumes `running` so the held commit's PR
        is opened with NO agent re-run (a `push_and_open_pr` dispatch
        opens the PR from the held commit), and a
        `scope_completeness_exempted` audit entry is appended. On `fail`
        the stage fails category-B (today's restore path) and a
        `scope_completeness_failed` entry is appended. A stage not
        currently parked returns 409 (`stage_not_parked`).
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision, reason]
              properties:
                decision:
                  type: string
                  enum: [exempt, fail]
                reason:
                  type: string
                  description: |
                    Operator note explaining the exemption or failure;
                    recorded on the audit entry. Required and non-empty.
      responses:
        '200':
          description: |
            The resolved decision. On `exempt`, `held_commit_sha` /
            `run_branch` name the commit the PR is opened from.
          content:
            application/json:
              schema:
                type: object
                required: [stage_id, decision, state]
                properties:
                  stage_id: { $ref: '#/components/schemas/UUID' }
                  decision:
                    type: string
                    enum: [exempt, fail]
                  state:
                    type: string
                    description: The implement stage's resulting state.
                  held_commit_sha:
                    type: string
                    description: Present on `exempt` ‚Äî the held commit the PR opens from.
                  run_branch:
                    type: string
                    description: Present on `exempt` ‚Äî the run branch the held commit sits on.
        '400':
          description: Malformed run_id, decision not exempt/fail, or empty reason.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: No authenticated token.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: |
            `self_decision` (run-bound agent token) or
            `insufficient_scope` (token lacks `write:stages`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: '`run_not_found` ‚Äî unknown run id.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: |
            `stage_not_parked` ‚Äî the implement stage is not parked
            awaiting a scope-completeness decision.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: Run/audit repositories not wired.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ---------------------------------------------------------------------
  # Webhook ingestion (unversioned; GitHub controls request shape)
  # ---------------------------------------------------------------------
  /webhooks/github:
    post:
      operationId: receiveGithubWebhook
      summary: GitHub App webhook receiver
      description: |
        Inbound from the customer's GitHub App installation. Events
        include issues, pull requests, check runs, push, and the
        Marketplace billing events. The backend signature-verifies via
        the GitHub App webhook secret, deduplicates by delivery ID,
        and translates relevant events into workflow run dispatches.
        See E3.7 (#47).
      tags: [webhooks]
      security: []
      parameters:
        - name: X-GitHub-Event
          in: header
          required: true
          schema: { type: string }
        - name: X-GitHub-Delivery
          in: header
          required: true
          schema: { type: string }
        - name: X-Hub-Signature-256
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '202':
          description: Event accepted.
        '401':
          description: Webhook signature invalid.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '400':
          description: Malformed event.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /webhooks/gitlab:
    post:
      operationId: receiveGitlabWebhook
      summary: GitLab webhook receiver
      description: |
        Inbound from a customer's GitLab project/group webhook. Accepts
        merge request, note, issue, pipeline, and job events. Auth is the
        verbatim `X-Gitlab-Token` secret (GitLab sends the configured
        token, not an HMAC); deliveries dedup by `X-Gitlab-Event-UUID`
        (namespaced into the shared delivery store). Issue-label and note
        triggers route through the shared dispatcher; a merge/close drives
        the review-stage state machine. Actual run creation from GitLab
        triggers is the CI/dispatch phase's work (E45.8 / #1861). See
        E45.6 (#1860).
      tags: [webhooks]
      security: []
      parameters:
        - name: X-Gitlab-Event
          in: header
          required: true
          schema: { type: string }
        - name: X-Gitlab-Event-UUID
          in: header
          required: true
          schema: { type: string }
        - name: X-Gitlab-Token
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '202':
          description: Event accepted.
        '401':
          description: X-Gitlab-Token did not match the configured secret.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '400':
          description: Malformed event or missing required header.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '413':
          description: Body exceeds the 10 MiB cap.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: GitLab webhook secret or delivery store unconfigured.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

tags:
  - name: diagnostics
    description: Liveness, readiness, build info.
  - name: auth
    description: GitHub OAuth flow + scoped API tokens (ADR-005).
  - name: onboarding
    description: First-run readiness introspection for a repository (E29.4).
  - name: runs
    description: Workflow run lifecycle.
  - name: stages
    description: Stage details + artifacts.
  - name: approvals
    description: Human-in-the-loop gate decisions.
  - name: artifacts
    description: Plans and pull-request references emitted by stages.
  - name: audit
    description: Append-only audit log read paths.
  - name: work-items
    description: Provider-agnostic work-item filing via per-repo conventions.
  - name: refinement
    description: Draft preview + approval gate over natural-language briefs (E34.2).
  - name: campaigns
    description: Epic-driven multi-issue campaigns and their rollup status.
  - name: runner
    description: Endpoints called by the fishhawk/runner GitHub Action.
  - name: webhooks
    description: Inbound from GitHub App installations.
