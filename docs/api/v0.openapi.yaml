              description: "`attachment; filename=\"fishhawk-agent-changes-<UTC timestamp>.md\"` ‚Äî download semantics."
              schema: { type: string }
            X-Fishhawk-Export-Complete:
              description: "`true` when this is the final page; `false` when more runs remain."
              schema: { type: boolean }
            X-Fishhawk-Export-Next-Cursor:
