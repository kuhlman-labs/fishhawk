openapi: 3.1.0
info:
  title: Fishhawk Backend API
  version: 0.1.0
  description: |
    The HTTP surface that the Fishhawk backend (`fishhawkd`) exposes to its
    three classes of caller:

    1. **The Web UI and CLI** ‚Äî humans driving plan review, approval, audit
       search, and run management.
    2. **The runner** ‚Äî `kuhlman-labs/fishhawk/runner@vX.Y` running on the
       customer's CI, requesting per-run signing keys and shipping signed
       trace bundles.
    3. **GitHub webhooks** ‚Äî the customer's GitHub App installation pushing
       issue / PR / check events that drive workflow dispatch.

    Per ADR (#46) and `MVP_SPEC.md` ¬ß5.1.1, every customer-facing endpoint is
    prefixed with `/v0`. The `v0` prefix is **unstable** by design ‚Äî the
    surface is allowed to change before v1. Once the v1 surface is published
    (post-Day 21), `/v0` and `/v1` coexist for one minor version cycle to
    let clients migrate, and `/v0` is then retired.

    Webhook ingestion (`/webhooks/github`, `/webhooks/gitlab`) is
    unversioned because the forge controls the request shape; the backend
    adapts as the forge's webhook schema evolves.

  contact:
    name: Fishhawk
    url: https://github.com/kuhlman-labs/fishhawk
  license:
    name: Apache-2.0
    url: https://github.com/kuhlman-labs/fishhawk/blob/main/LICENSE

servers:
  - url: https://api.fishhawk.dev
    description: Production
  - url: http://localhost:8080
    description: Local dev (docker compose up)

# ---------------------------------------------------------------------------
# Security schemes ‚Äî three auth models for three caller classes (ADR-005).
# ---------------------------------------------------------------------------
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: fishhawk_session
      description: |
        HTTP-only `Secure; SameSite=Lax` session cookie set by the OAuth
        callback. Same-origin SPA requests are auto-included; CSRF
        protection on state-changing endpoints (POST/PUT/PATCH/DELETE)
        requires an `X-CSRF-Token` request header whose value matches
        the `__Host-csrf` cookie issued alongside the session cookie.
        Mismatched / missing token ‚Üí `403 csrf_required`. Bearer-token
        clients (see `bearerToken`) are immune to CSRF and bypass the
        header check.

    bearerToken:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: |
        Scoped server-issued token (NOT a JWT). Index into the
        `api_tokens` table; revocation is immediate. Used by the CLI
        and any programmatic caller.

    githubOIDC:
      type: http
      scheme: bearer
      bearerFormat: jwt
      description: |
        GitHub Actions OIDC token for runner authentication. Verified
        by the backend against GitHub's JWKS per request; no server-
        side state. Required by `POST /v0/runs/{run_id}/signing-key`.

  # -------------------------------------------------------------------------
  # Shared schemas. Detailed property schemas grow as endpoints are
  # implemented ‚Äî what's frozen here is the envelope shape and the
  # canonical types every endpoint returns.
  # -------------------------------------------------------------------------
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: |
                Stable, machine-readable code. Snake-case identifier;
                clients switch on this. New codes are additive; codes
                are never repurposed.
              example: run_not_found
            message:
              type: string
              description: |
                Human-readable description. May change between
                versions; clients should not parse it.
              example: "No run with id 11111111-‚Ä¶"
            details:
              type: object
              additionalProperties: true
              description: |
                Optional code-specific structured fields. The keys
                under `details` are part of the contract for that
                specific code.
      examples:
        - error:
            code: run_not_found
            message: No run with id 11111111-2222-3333-4444-555555555555

    WorkItemRequest:
      type: object
      required: [repo, type, summary]
      description: |
        Provider-neutral work-item filing (#1005). The conventions layer
        turns this into a filed item; only `repo`, `type`, and `summary`
        are required. Unknown properties are rejected.
      additionalProperties: false
      properties:
        repo:
          type: string
          description: Target repository in `owner/name` form.
          example: kuhlman-labs/fishhawk
        type:
          type: string
          description: Work-item type; must be a key in the repo's conventions (e.g. feature, bug, chore, adr).
          example: feature
        summary:
          type: string
          description: |
            Mandatory one-liner: fills the `{summary}` title placeholder
            and is the required Summary field.
          example: Add the widget endpoint
        body:
          type: string
          description: Verbatim body. When omitted, the body is assembled from the type's skeleton + `sections`.
        sections:
          type: object
          additionalProperties: { type: string }
          description: >-
            Per-skeleton-section content keyed by section name; used only when
            `body` is empty. Keys MUST match the type's body skeleton exactly ‚Äî
            an off-skeleton key fails the filing with `422 work_item_invalid`
            (the content is never silently dropped), and the unknown vs expected
            section names are reported in `details.unknown_sections` /
            `details.expected_sections`.
        title_vars:
          type: object
          additionalProperties: { type: string }
          description: >-
            Title placeholders beyond `{summary}`/`{number}` (e.g. `epic`, `n`).
            An unresolved placeholder fails the filing with `422
            work_item_invalid`, listing the still-missing names in
            `details.missing_placeholders`. For a child type whose
            `title_format` is `[E{epic}.{n}]`, BOTH `{epic}` AND the `{n}` child
            number are auto-derived from the `parent_epic` relation server-side
            (#1958): `{epic}` from the parent epic issue's leading `[E<n>]` title
            token, and `{n}` as the next number after the epic's existing
            children (open and closed), so `title_vars` can be omitted entirely
            ‚Äî supply `{n}` only to override the auto-derived child number. The
            allocated number is collision-free within one deployment (concurrent
            omitted-`n` filings against the same epic are serialized), not
            globally unique. Derivation fails closed: if the parent has no
            parseable `[E<n>]` token `{epic}` is left unresolved and the 422
            above is returned, and a failed child-number lookup returns the same
            422 with `details.n_discovery_failed` rather than a wrong title.
        labels:
          type: array
          items: { type: string }
          description: Labels merged on top of the type's `default_labels`.
        complexity:
          type: string
          description: Overrides the type's default complexity; must be a declared level.
          example: low
        status:
          type: string
          description: Overrides the type's default board status.
          example: Backlog
        relations:
          type: object
          additionalProperties: false
          properties:
            parent_epic: { type: string, description: "Epic this item rolls up to (e.g. `#1005`)." }
            supersedes: { type: array, items: { type: string } }
            companion_to: { type: array, items: { type: string } }
            evidence_runs: { type: array, items: { type: string } }
            depends_on:
              type: array
              items: { type: string }
              description: >-
                Issue references (`#N` or `N`) this item depends on, among the
                epic's children. Persisted as a `Depends on: #X, #Y` body
                marker (GitHub has no native depends_on relation) and read by
                the campaign epic-children query to assemble its wave DAG
                (ADR-047). File-time validation is format-only; cycle and
                existence checks are deferred to campaign-assembly time.
        existing_numbers:
          type: array
          items: { type: integer }
          description: >-
            Optional for a numbered type: the numbers already in use, so the next
            sequential number can be allocated. For the GitHub provider these are
            discovered server-side from the tracker when omitted (#1269); supply
            this list only to override/hint that discovery. A genuine discovery
            failure returns 422 `work_item_invalid` with a `discovery_failed`
            detail rather than allocating a wrong number.
        run_id:
          allOf: [ { $ref: '#/components/schemas/UUID' } ]
          description: Optional in-flight run; when set and non-terminal, a `work_item_filed` audit entry is appended to it.

    WorkItemResponse:
      type: object
      required: [type, title, number, url, provider, boarded, audited]
      description: The created item ‚Äî exactly what landed, so the caller renders the result without a second fetch.
      properties:
        type: { type: string }
        title: { type: string }
        number: { type: integer, description: Created item number (e.g. GitHub issue number). }
        url: { type: string, description: Created item URL. }
        provider: { type: string, description: Provider id that filed the item. }
        applied_labels: { type: array, items: { type: string } }
        complexity: { type: string }
        status: { type: string }
        board_column: { type: string }
        boarded:
          type: boolean
          description: >-
            Whether the created item was placed on the configured project board with its
            status set (#1107). Best-effort: board placement no longer fails the filing ‚Äî when
            it fails, the item is still created and this is `false` with the cause in
            `boarding_error` (also WARN-logged server-side). `false` with no `boarding_error`
            means no project board was configured (nothing to board).
        epic_linked:
          type: boolean
          description: >-
            Whether the parent epic was linked as a sub-issue (#1107). Best-effort like
            `boarded`: a link failure does not fail the filing ‚Äî this is `false` with the cause
            in `epic_link_error`. `false` with no `epic_link_error` means no parent epic was
            requested.
        boarding_error:
          type: string
          description: The cause when best-effort board placement failed (#1107); absent on success.
        epic_link_error:
          type: string
          description: The cause when best-effort epic linking failed (#1107); absent on success.
        audited:
          type: boolean
          description: True when a `work_item_filed` audit entry was written (a run was in flight).
        defaulted_labels:
          type: array
          items: { type: string }
          description: >-
            Every label the system added that the caller did not supply (#1616): per-namespace
            defaults from the type's `label_defaults` (e.g. `autonomy:medium`) plus any `area:*`
            label derived from the parent epic. Reported loudly so the operator sees exactly what
            filing-time completeness added. Absent/empty when nothing was defaulted.
        missing_label_namespaces:
          type: array
          items: { type: string }
          description: >-
            Required label namespaces (from the type's `required_label_namespaces`) still absent
            after merge, derivation, and defaulting (#1616). Reported loudly, NEVER a rejection ‚Äî
            a filing is never failed on labels alone. Absent/empty when every required namespace
            is present.

    EpicDraft:
      type: object
      additionalProperties: false
      required: [epic, children]
      description: >-
        The structured decomposition drafted from a brief (E34.1): the epic plus
        its children. It is the JSON contract the drafting agent emits, the value
        persisted per revision, and the shape a direct field edit supplies.
      properties:
        epic:
          type: object
          additionalProperties: false
          required: [summary, scope, out_of_scope]
          properties:
            summary: { type: string }
            scope: { type: string }
            out_of_scope: { type: string }
        children:
          type: array
          minItems: 1
          items:
            type: object
            additionalProperties: false
            required: [summary, proposal, done_means, acceptance_criteria, labels, depends_on]
            properties:
              summary: { type: string }
              proposal: { type: string }
              done_means: { type: string }
              acceptance_criteria: { type: array, items: { type: string } }
              labels: { type: array, items: { type: string } }
              depends_on:
                type: array
                items: { type: integer }
                description: 1-based sibling ordinals this child depends on (not issue numbers).

    AcceptanceFinding:
      type: object
      required: [rule, detail]
      description: >-
        One deterministic acceptance-criteria defect the pre-check flagged. rule
        is the machine-readable classifier; criterion_id names the offending
        criterion (its text at intake) and is absent for the presence-level
        no_blocking_criterion finding; detail is a short human-readable
        explanation.
      properties:
        rule:
          type: string
          enum: [no_blocking_criterion, missing_source_ref, missing_rationale, empty_id, duplicate_id]
        criterion_id: { type: string, description: The offending criterion; absent for the no_blocking_criterion presence finding. }
        detail: { type: string }

    ChildCriteriaCheck:
      type: object
      required: [ordinal, findings]
      description: >-
        One child's intake acceptance-criteria pre-check: the 1-based child
        ordinal, an advisory needs_attention marker (an unjustified missing
        blocking criterion), and its findings ([] when checked and clean).
      properties:
        ordinal: { type: integer, description: The 1-based child ordinal this check is for. }
        needs_attention:
          type: boolean
          description: >-
            True when this child has an unjustified no_blocking_criterion
            finding. Advisory ‚Äî approval remains legal. Absent when false.
        findings:
          type: array
          items: { $ref: '#/components/schemas/AcceptanceFinding' }

    CriteriaPrecheck:
      type: object
      required: [needs_attention, children]
      description: >-
        The E34.5 advisory acceptance-criteria pre-check over the latest draft's
        children (#1596): per-child findings plus a draft-level needs_attention
        marker. Advisory only ‚Äî a flagged draft can still be approved. Derived
        per response; nothing is persisted.
      properties:
        needs_attention:
          type: boolean
          description: True when any child has an unjustified no_blocking_criterion finding (advisory).
        children:
          type: array
          items: { $ref: '#/components/schemas/ChildCriteriaCheck' }

    RefinementDecision:
      type: object
      required: [decision, reason, draft_id, draft_content_hash, created_at]
      description: One append-only approve/reject verdict pinning a draft revision + its content hash.
      properties:
        decision: { type: string, enum: [approved, rejected] }
        reason: { type: string }
        draft_id: { type: string, format: uuid, description: The decided revision's id. }
        draft_content_hash: { type: string, description: sha256 of the decoded EpicDraft the decision pinned. }
        decided_by: { type: string, description: The deciding identity's subject; absent when unknown. }
        created_at: { type: string, format: date-time }

    RefinementSession:
      type: object
      required: [session_id, state, revision_count, latest_origin, latest_draft, preview, waves, criteria_precheck, decisions]
      description: >-
        The refinement gate's session view: derived approval state, revision
        count, the latest draft, the full filing preview, the wave DAG, the
        advisory acceptance-criteria pre-check, and the decision history. State
        is DERIVED from revisions + decisions, never stored ‚Äî an edit after
        approval re-gates the session.
      properties:
        session_id: { type: string, format: uuid }
        state:
          type: string
          enum: [awaiting_approval, approved, rejected]
        drifted:
          type: boolean
          description: >-
            True when the latest revision's decision pins a content hash that no
            longer matches the recomputed hash (fail-closed to awaiting_approval).
            Absent when false.
        revision_count: { type: integer, description: Number of draft revisions in the session. }
        latest_origin: { type: string, enum: [brief, amendment, edit], description: How the latest revision came to exist. }
        latest_draft: { $ref: '#/components/schemas/EpicDraft' }
        preview:
          type: array
          description: The full filing preview ‚Äî the epic then each child, rendered exactly as it would file.
          items: { type: object }
        waves:
          type: array
          description: The topological dispatch order as waves of 1-based child ordinals.
          items: { type: array, items: { type: integer } }
        criteria_precheck:
          allOf: [{ $ref: '#/components/schemas/CriteriaPrecheck' }]
          description: >-
            The advisory acceptance-criteria pre-check over the latest draft's
            children. needs_attention flags an unjustified missing blocking
            criterion ‚Äî approval remains legal (advisory). Always present.
        decisions:
          type: array
          items: { $ref: '#/components/schemas/RefinementDecision' }

    Pagination:
      type: object
      description: |
        Cursor-based pagination envelope wrapped around list endpoints.
        `next_cursor` is null when the caller has reached the end. The
        cursor is opaque; clients pass it back unmodified.
      required: [items]
      properties:
        items:
          type: array
          items: {}
        next_cursor:
          type: [string, "null"]

    UUID:
      type: string
      format: uuid

    ScopeAmendment:
      type: object
      description: |
        One mid-stage scope amendment request (E22.X / #961): the
        implement agent's ask to fold specific file paths into the
        stage's effective `scope.files` while the stage is running,
        plus the operator's decision once made. Approved paths fold
        into the prompt-fetch scope AND the runner's pre-commit scope
        refresh, so the verified-tree gates verify the same folded
        tree that is pushed (#960). Denied/pending paths confer
        nothing; any undeclared created file still fails category-B
        (#818/#825).
      required: [id, run_id, stage_id, paths, reason, status, requested_at]
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        run_id: { $ref: '#/components/schemas/UUID' }
        stage_id:
          allOf: [{ $ref: '#/components/schemas/UUID' }]
          description: The executing implement stage the request hangs off.
        paths:
          type: array
          minItems: 1
          items:
            type: object
            required: [path, operation]
            properties:
              path:
                type: string
                description: |
                  Repo-relative path. Absolute paths and `..` segments
                  are rejected (400 `validation_failed`).
              operation:
                type: string
                enum: [modify, create]
        reason:
          type: string
          description: The agent's rationale for needing the paths.
        status:
          type: string
          enum: [pending, approved, denied]
        decision_reason:
          type: string
          description: Operator note; delivered to the agent verbatim on deny.
        decided_by:
          type: string
          description: Operator subject (never a run-bound token).
        requested_at:
          type: string
          format: date-time
        decided_at:
          type: string
          format: date-time
        effective_scope_files_after_approval:
          type: integer
          description: |
            Scope-cap headroom (#983), warn-only: the run's effective
            scope file count (plan `scope.files` ‚à™ approve-time
            `add_scope_files` ‚à™ approved amendments ‚à™ this
            amendment's paths, deduped by exact path) if this
            amendment is approved. Compare against
            `max_files_changed` ‚Äî exceeding it means the
            post-implement gate may fail category-B as scoped, but
            the approve still succeeds (mid-stage amendments are
            often forced). Present on request/decision responses and
            on PENDING items in the list; absent when no cap is
            configured or the computation failed open.
        max_files_changed:
          type: integer
          description: |
            The implement stage's resolved `max_files_changed` cap
            (#983). Absent when no cap is configured or the
            computation failed open.

    Run:
      type: object
      description: |
        A workflow run record. State follows the explicit transition
        table in `backend/internal/run/transition.go`.
      required:
        [id, repo, workflow_id, workflow_sha, trigger_source, state,
         retry_attempt, max_retries_snapshot, runner_kind,
         runner_kind_resolved, drive, cost_usd_total, resolved_model,
         created_at, updated_at]
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        repo:
          type: string
          example: kuhlman-labs/fishhawk
        workflow_id:
          type: string
          example: feature_change
          description: Matches a top-level key in `.fishhawk/workflows.yaml`.
        workflow_sha:
          type: string
          description: Git SHA of `.fishhawk/workflows.yaml` at run time.
        trigger_source:
          type: string
          enum: [github_issue, cli, ui]
        trigger_ref:
          type: [string, "null"]
          example: "issue:1247"
        state:
          type: string
          enum: [pending, running, succeeded, failed, cancelled]
        parent_run_id:
          type: [string, "null"]
          format: uuid
          description: |
            Set by the dispatcher when a non-terminal run already
            existed for the same `(repo, trigger_ref)` at create
            time (#216). Lets the SPA render "follow-up to
            <short-id>" + a thread of related runs.
        decomposed_from:
          type: [string, "null"]
          format: uuid
          description: |
            Set when the orchestrator minted this run as a child of
            a decomposed parent plan (#455 / ADR-025 D4). Disambiguates
            "decomposition child" from `parent_run_id`'s CI-retry-chain
            semantic ‚Äî both can be non-nil on a child whose CI failed
            and re-dispatched. SPA breadcrumb: "decomposed sub-plan of
            <parent short id>".
        upstream_run_id:
          type: [string, "null"]
          format: uuid
          description: |
            The upstream `feature_change` run whose `ci_green` /
            `review_merged` a standalone deploy-only `release` run's
            `required_upstream` pre-flight gate evaluates (E23.11 /
            #1417). A deploy-only run has no implement/review stage of
            its own, so the gate evaluates the referenced upstream
            instead; null (the appended-deploy / non-deploy default)
            leaves the gate evaluating the current run. DISTINCT from
            `parent_run_id` (#216): a deploy-gate safety reference, NOT
            a follow-up/lineage link ‚Äî it carries none of the
            get_plan-resolution / resume-retry / decomposition
            provenance semantics `parent_run_id` does.
        pull_request_url:
          type: [string, "null"]
          description: |
            Set when the implement stage produces a `pull_request`
            artifact (#216). Denormalized so the threaded-runs view
            can group every run on a PR with a single equality
            filter on `GET /v0/runs?pull_request_url=‚Ä¶`.
          example: https://github.com/kuhlman-labs/fishhawk/pull/123
        retry_attempt:
          type: integer
          minimum: 0
          description: |
            Position in the CI-failure auto-retry chain (#279 /
            E16). 0 for the canonical first attempt; N for the Nth
            retry. Capped by `max_retries_snapshot` ‚Äî the
            dispatcher refuses to create a new child when
            `retry_attempt >= max_retries_snapshot` and emits a
            `ci_retry_exhausted` audit row.
          example: 0
        max_retries_snapshot:
          type: integer
          minimum: 0
          description: |
            The workflow's `on_ci_failure.max_retries` cap at
            run-create time (#280 / E16). Snapshotted alongside
            `required_checks_snapshot` so a spec edit during a
            long-running auto-retry chain doesn't shift the
            goalposts on what the SPA renders. Defaults to 1 when
            the workflow has no `on_ci_failure:` block.
          example: 1
        runner_kind:
          type: string
          enum: [github_actions, local]
          description: |
            Execution backend the run uses (ADR-022 / #388). Today's
            published runner (`fishhawk/runner@v1`) on GitHub Actions
            is `github_actions`; the operator-local dev-loop runner
            (Phase C of E22 / #389) is `local`. The backend assigns
            this at run-create time based on the dispatch path; the
            runner never self-declares. Compliance consumers can
            filter to `github_actions` to reproduce the
            pre-pluggable-backends view via
            `GET /v0/runs?runner_kind=github_actions`.
          example: github_actions
        runner_kind_resolved:
          type: boolean
          description: |
            Whether `runner_kind` has been LOCKED by the run's first
            signed runner self-report (#1346 / #1348). `false` for the
            un-resolved create-time hint and for legacy rows; `true`
            once the first dispatch's signed self-report fixed the
            execution channel. The host-dispatch mismatch guardrail
            (#1355) reads this so it engages only against an
            already-resolved conflicting kind ‚Äî an un-resolved run is
            always allowed to dispatch so first-dispatch auto-resolve
            still fires.
          example: false
        drive:
          type: boolean
          description: |
            Drive-mode opt-in (#1023 / #996 theme 1): when true,
            fishhawkd auto-advances the run's mechanical transitions
            and records a `run_auto_advanced` audit entry per advance;
            judgment points (gate approvals, concern routing, merge)
            always park. Resolved at run-create time ‚Äî the workflow
            spec's `drive` default overridden by the request's `drive`
            field ‚Äî and snapshotted on the row so a spec edit mid-run
            doesn't change an in-flight run's behavior. `false` for
            legacy rows (migration 0031). The recorded transitions
            surface on `GET /v0/runs/{run_id}` as `auto_advanced` +
            `next_action` + `derived_status`.
          example: false
        issue_context:
          $ref: '#/components/schemas/IssueContext'
          description: |
            Cached payload from the operator's `gh issue view`
            (#415). Populated for issue-triggered runs minted
            outside the webhook flow (CLI / MCP) so the prompt
            builder reads the title + body from the row instead
            of refetching from GitHub. Null on webhook-dispatched
            runs (which fetch fresh from GitHub at prompt-build
            time) and on non-issue triggers.
        cost_usd_total:
          type: number
          format: double
          minimum: 0
          description: |
            Rolled estimated US-dollar cost of the run's model usage
            (#649), accumulated from each stage bundle's signed manifest
            token counts via the shared pricing table. Recorded once per
            stage bundle (the raw trace variant only ‚Äî see #678). 0 for
            legacy rows that predate the rollup.
          example: 2.99
        resolved_model:
          type: string
          description: |
            Pinned agent model id the run executed under (#649), stamped
            from the trace manifest at cost-rollup time. Empty string for
            legacy/unstamped runs.
          example: claude-opus-4-8
        concerns:
          $ref: '#/components/schemas/RunConcerns'
          description: |
            Summary of the run's OPEN review concerns (#964): count,
            per-state breakdown, and the stable concern IDs the fix-up
            endpoint's `concern_ids` addressing consumes. Emitted by
            `GET /v0/runs/{run_id}` ONLY ‚Äî the list endpoint omits it
            (no per-row concern query) ‚Äî and omitted when the run has
            no open concerns.
        derived_status:
          type: string
          enum: [awaiting_merge, ci_failed]
          description: |
            Presentation-only drive-mode status (#1023):
            `awaiting_merge` while a non-terminal drive run with an
            open PR has `checks_green_awaiting_merge` as its latest
            recorded auto-advance ‚Äî every gate resolved, required
            checks green, merge (a judgment point) parked for the
            operator. `ci_failed` is its negative mirror (#1045): a
            non-terminal drive run with an open PR whose latest
            auto-advance is `ci_failed` ‚Äî the review evidence settled
            but a required PR check concluded red, parking the run for
            operator classification (fix-up, an operator commit +
            vouch, or a checks re-run). Never a persisted run state:
            `state` stays `running` while parked here, and the
            transition table in `backend/internal/run/transition.go` is
            unchanged. Emitted by `GET /v0/runs/{run_id}` ONLY
            (distilled from `run_auto_advanced` audit entries, same
            single-read posture as `concerns`); omitted on non-drive
            runs, terminal runs, and whenever a later transition
            superseded the parked status.
        next_action:
          $ref: '#/components/schemas/RunNextAction'
          description: |
            Distilled operator next step (#1023) from the run's most
            recent `run_auto_advanced` audit entry ‚Äî what (if
            anything) the drive run is waiting on the operator for.
            Emitted by `GET /v0/runs/{run_id}` ONLY; omitted on
            non-drive runs, terminal runs (the recorded step is
            history, not an instruction), when the latest
            auto-advance carries no next action, and when a
            host-dispatch action (`run_plan_stage` /
            `run_implement_stage`) has been outrun by its named stage ‚Äî
            suppressed once that stage advances past the host-spawnable
            states `{pending, awaiting_host_dispatch}`, so a parked
            entry no longer names a dispatch the operator already
            performed (#1961).
        auto_advanced:
          type: array
          items:
            $ref: '#/components/schemas/RunAutoAdvance'
          description: |
            The run's auto-advanced (or parked-with-next-action)
            transitions (#1023), distilled oldest-first from its
            `run_auto_advanced` audit entries so the operator sees
            which transitions advanced themselves. Emitted by
            `GET /v0/runs/{run_id}` ONLY ‚Äî the list endpoint omits it
            (no per-row audit query) ‚Äî and omitted when no drive
            transitions were recorded.
        delegation:
          $ref: '#/components/schemas/RunDelegation'
          description: |
            Evaluated `operator_agent` delegation surface (ADR-040 /
            #1026): one entry per configured `may_*` knob with whether
            current run state satisfies its named condition, plus the
            effective block's `must_page_human` list ‚Äî so the operator
            agent reads its envelope from the server instead of
            re-deriving conditions client-side. Emitted by
            `GET /v0/runs/{run_id}` ONLY (no per-row evaluation on the
            list endpoint); omitted entirely when the run's workflow
            spec resolves no effective `operator_agent` block
            (fail-closed: nothing is delegated), on terminal runs, on
            legacy rows with no cached spec, and best-effort on any
            evaluation failure. Advisory on this read ‚Äî the delegated
            action endpoints re-evaluate the condition server-side at
            action time and never trust a client-supplied verdict.
        lineage_complete:
          type: boolean
          description: |
            Lineage-completion signal (E22.X / #1137): true when the
            lineage-root run (a decomposed child's parent, else the run
            itself) is terminal AND every decomposed child of that root is
            terminal, derived from the existing `decomposed_from` child
            graph. The operator-local runner's per-run worktree sweep
            reads it to reclaim a terminal lineage's shared git worktree
            (keyed on the lineage root) at the next provision. Emitted by
            `GET /v0/runs/{run_id}` ONLY (a per-run child-graph query, same
            single-read posture as `concerns`); omitted on the list
            endpoint and whenever the graph can't be read (no run repo /
            read failure).
        fixup_model:
          $ref: '#/components/schemas/RunFixupModel'
          description: |
            The model the run's most-recent fix-up pass ran under (#1164),
            distilled from the newest `stage_fixup_triggered` audit entry's
            pinned model. Emitted by `GET /v0/runs/{run_id}` ONLY (a single
            audit read, same single-read posture as `concerns`); omitted on
            the list endpoint and when the run has had no fix-up (or the pin
            predates #1164).
        security_findings:
          type: array
          items:
            $ref: '#/components/schemas/SecurityFinding'
          description: |
            The run's unresolved high-severity code-scanning (CodeQL/SAST)
            findings on the implement diff (#1096), distilled from the newest
            `implement_security_findings` audit entry (the webhook ingest
            records ONE idempotent entry per scan, floored on the latest
            fix-up, so the newest entry reflects the current scan state). A
            SEPARATE signal from `concerns`: a finding here is held by its own
            merge gate (`security_findings_unresolved`) and routed to its own
            fix-up pass, never consuming a design-concern budget. Emitted by
            `GET /v0/runs/{run_id}` ONLY (a single audit read, same single-read
            posture as `concerns`); omitted on the list endpoint and when the
            run has no findings (no scan yet, a clean scan, or a clean re-scan
            after a fix-up cleared them).
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    RunFixupModel:
      type: object
      description: |
        The model a fix-up pass ran under (#1164): the source-tagged model
        plus the 1-based pass ordinal it was pinned on. Surfaced on
        `GET /v0/runs/{run_id}` only.
      required: [model, source, pass_ordinal]
      properties:
        model:
          type: string
          description: |
            The resolved fix-up model id. Empty string when the pass ran on
            the adapter's built-in default spawn (the empty-ladder pin).
        source:
          type: string
          description: |
            Which rung supplied the model: `operator` for an `implement_model`
            override, else the inherited source (`default` / `spec` / `plan`),
            or empty for the default spawn.
        pass_ordinal:
          type: integer
          minimum: 1
          description: The 1-based fix-up pass ordinal this model was pinned on.

    SecurityFinding:
      type: object
      description: |
        One high-severity GitHub code-scanning (CodeQL/SAST) finding on the
        implement diff (#1096): the subset a reviewer/operator needs to locate
        and open the alert. Surfaced on `GET /v0/runs/{run_id}` only.
      required: [number, rule_id, severity, path]
      properties:
        number:
          type: integer
          description: The alert's per-repo identifier.
        rule_id:
          type: string
          description: The analysis rule that fired (e.g. `go/sql-injection`).
        description:
          type: string
          description: Human-facing rule description.
        severity:
          type: string
          description: |
            Normalized security-severity level ‚Äî `critical` or `high` (the
            gating levels; medium/low/none never surface here).
        state:
          type: string
          description: 'Alert state: `open`, `fixed`, or `dismissed`.'
        path:
          type: string
          description: Repo-relative file the finding's most-recent instance points at.
        start_line:
          type: integer
          description: 1-based line of the finding; omitted/0 when GitHub omits a location.
        html_url:
          type: string
          description: Link to the alert on GitHub.

    RunConcerns:
      type: object
      description: |
        A run's OPEN review concerns (#964) ‚Äî states `raised`,
        `addressed_pending`, `reopened`. Every `plan_reviewed` /
        `implement_reviewed` verdict's concerns are persisted with
        server-minted stable UUIDs; this block surfaces what is still
        unresolved plus the IDs fix-up routing needs, in one read. Note
        text is intentionally elided (bounded payload) ‚Äî read the
        originating `*_reviewed` audit entry for the full note.
      required: [open, by_state, items]
      properties:
        open:
          type: integer
          minimum: 0
          description: Number of open concerns on the run.
        by_state:
          type: object
          additionalProperties:
            type: integer
          description: Open-concern count per lifecycle state.
          example: { raised: 2, addressed_pending: 1 }
        items:
          type: array
          items:
            $ref: '#/components/schemas/RunConcernItem'

    RunConcernItem:
      type: object
      description: One open review concern.
      required: [id, stage_kind, severity, category, state, has_suggested_patch]
      properties:
        id:
          $ref: '#/components/schemas/UUID'
          description: |
            Stable server-minted concern ID ‚Äî the primary addressing
            scheme for the fix-up endpoint's `concern_ids` (positional
            indices are deprecated).
        stage_kind:
          type: string
          enum: [plan, implement]
          description: |
            Stage the concern originated from. Only implement-stage
            concerns can be routed into an implement fix-up.
        severity:
          type: string
          description: |
            Reviewer-emitted severity, stored verbatim (tolerant
            decode ‚Äî typically high/medium/low).
        category:
          type: string
          example: scope
        state:
          type: string
          description: |
            Lifecycle state. Open states are raised, addressed_pending,
            reopened; the full enum adds addressed, waived, superseded,
            deferred, addressed_by_condition (closed states never appear in
            this block). `waived` is operator-reachable via
            `POST /v0/concerns/{concern_id}/waive` (#984);
            `addressed`/`reopened`/`superseded` are reached by reviewer
            `concern_resolutions` on a re-review; `addressed_by_condition`
            (#1956) is the condition-claim resolution of a plan-stage concern
            whose binding approval condition one implement review confirmed
            delivered (recorded on a `concern_addressed_by_condition` audit
            entry).
        has_suggested_patch:
          type: boolean
          description: |
            Whether the reviewer attached a mechanical `suggested_patch`
            (a unified diff) to this concern (#1165). Only the boolean is
            surfaced ‚Äî the diff text stays elided like the note. A routed
            fix-up whose concerns all carry a patch can be resolved by the
            near-deterministic apply path instead of a full agent loop.

    GateView:
      type: object
      description: |
        The gate-scoped decision view (#1960): every OPEN concern with its
        FULL note prose, the per-concern cross-round history reconstructed
        from the immutable audit payloads (fix-up routing claims + re-review
        confirmations), the settled ledger, and the run's suppressed
        relitigations ‚Äî one read that answers "what is still open at this
        gate and why". Unlike `RunConcerns`, the note text is NOT elided.
        History is reconstructed from audit payloads because
        `concern.state_reason` is overwritten on every transition; there is
        no stored per-round history. Degradation is visible, never silent:
        when the audit reads are unavailable the concerns are returned intact
        with `history_incomplete=true` and `history_gaps` naming each
        unreadable category.
      required: [run_id, open, settled, suppressed_relitigations, history_incomplete]
      properties:
        run_id:
          $ref: '#/components/schemas/UUID'
        stage_kind:
          type: string
          enum: [plan, implement]
          description: Echo of the optional `stage_kind` filter; absent for a whole-run view.
        open:
          type: array
          items: { $ref: '#/components/schemas/GateViewConcern' }
        settled:
          type: array
          items: { $ref: '#/components/schemas/GateViewSettledConcern' }
        suppressed_relitigations:
          type: array
          items: { $ref: '#/components/schemas/GateViewSuppressedRelitigation' }
        history_incomplete:
          type: boolean
          description: |
            True when one or more audit-derived history joins could not be
            built (audit repository unconfigured, or a per-category read
            error). The concerns themselves are always intact ‚Äî only the
            `fixups`/`resolutions`/`suppressed_relitigations` cross-
            references may be missing.
        history_gaps:
          type: array
          items: { type: string }
          description: The audit categories that failed to read, when `history_incomplete` is true.

    GateViewConcern:
      type: object
      description: One OPEN concern with its full decision context.
      required: [id, stage_kind, origin_review_sequence, severity, category, state, note, has_suggested_patch]
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        stage_kind:
          type: string
          enum: [plan, implement]
        round:
          type: integer
          description: |
            Round-of-origin for an implement concern: `1 +` the count of
            same-stage `stage_fixup_triggered` entries below the origin
            review sequence. Omitted for plan concerns (no fix-up rounds).
        origin_review_sequence:
          type: integer
          format: int64
        reviewer_model:
          type: string
        severity: { type: string }
        category: { type: string }
        state: { type: string }
        state_reason:
          type: string
          description: |
            The concern's current `state_reason` ‚Äî overwritten on every
            transition, so it reflects the LATEST resolution, not the
            original routing reason (which surfaces on `fixups[].reason`).
        note:
          type: string
          description: The FULL reviewer prose ‚Äî deliberately not elided.
        has_suggested_patch: { type: boolean }
        fixups:
          type: array
          items: { $ref: '#/components/schemas/GateViewFixup' }
        resolutions:
          type: array
          items: { $ref: '#/components/schemas/GateViewResolution' }

    GateViewFixup:
      type: object
      description: |
        One fix-up routing claim reconstructed from the
        `stage_fixup_triggered` entry that named this concern, joined to the
        outcome from the earliest following `fixup_pushed` / `fixup_no_changes`.
      required: [sequence, outcome]
      properties:
        sequence: { type: integer, format: int64 }
        reason:
          type: string
          description: The operator/driver routing reason recorded on the trigger.
        outcome:
          type: string
          enum: [pushed, no_changes, pending]
          description: |
            `pushed` ‚Äî a fix-up commit landed; `no_changes` ‚Äî the pass
            produced nothing; `pending` ‚Äî no following outcome entry yet.
        apply_path:
          type: string
          description: Fix-up apply provenance (`applied`/`agent`/‚Ä¶), present on a `pushed` outcome.
        head_sha:
          type: string
          description: The pushed commit, present on a `pushed` outcome.

    GateViewResolution:
      type: object
      description: |
        One re-review verdict on this concern, reconstructed from an
        `implement_reviewed` / `plan_reviewed` entry's `concern_resolutions`.
      required: [sequence, resolution]
      properties:
        sequence: { type: integer, format: int64 }
        round:
          type: integer
          description: Derived for an implement re-review; omitted for a plan re-review.
        resolution:
          type: string
          description: The reviewer verdict (`confirmed`/`reopened`/`superseded`).
        note:
          type: string

    GateViewSettledConcern:
      type: object
      description: |
        One settled-ledger row (#1913): a concern in a terminal state
        (addressed / waived / superseded / deferred / addressed_by_condition)
        with its state_reason. `addressed_by_condition` (#1956) is a plan-stage
        concern whose binding approval condition one implement review confirmed
        delivered; its state_reason names the claiming approval + confirming
        review.
      required: [id, stage_kind, state, severity, category, note]
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        stage_kind:
          type: string
          enum: [plan, implement]
        state: { type: string }
        severity: { type: string }
        category: { type: string }
        reviewer_model: { type: string }
        note:
          type: string
          description: The FULL reviewer prose ‚Äî not elided.
        state_reason: { type: string }

    GateViewSuppressedRelitigation:
      type: object
      description: |
        One suppressed relitigation (#1913): a re-raise of a settled concern
        the reviewer would have relitigated, suppressed and recorded.
      required: [settled_ref, settled_state, severity, category, note, origin_review_sequence]
      properties:
        settled_ref: { type: string }
        settled_state: { type: string }
        severity: { type: string }
        category: { type: string }
        note: { type: string }
        reviewer_model: { type: string }
        origin_review_sequence: { type: integer, format: int64 }

    RunNextAction:
      type: object
      description: |
        The distilled operator next step on a drive run (#1023),
        recorded by the drive engine alongside an auto-advance or a
        park. Mirrors the `next_action` payload inside
        `run_auto_advanced` audit entries.
      required: [action]
      properties:
        action:
          type: string
          description: |
            Machine-readable next step. Current values:
            `run_implement_stage` (runner_kind `local` ‚Äî dispatch the
            implement stage from the operator host), `run_plan_stage`
            (runner_kind `local` after a plan-gate revise re-opened the
            plan stage ‚Äî re-dispatch it from the operator host, #1256),
            and `merge_pr` (all gates resolved, required checks green).
            `run_implement_stage` / `run_plan_stage` are now ALSO produced
            by the `retry_stage` and `resume_run`/`recover` re-open paths
            on a `local` run (#1271), not only by plan-approve and revise;
            no new action value is introduced.
          example: merge_pr
        detail:
          type: string
          description: One-line elaboration of the action.
        pr_url:
          type: string
          description: The pull request the action refers to, when relevant.
          example: https://github.com/kuhlman-labs/fishhawk/pull/123

    RunAutoAdvance:
      type: object
      description: |
        One drive-engine transition (#1023), distilled from a
        `run_auto_advanced` audit entry: the named rule that fired and
        the from/to edge it stamps. Rule names are a closed set
        (`backend/internal/drive`): `plan_approved_dispatch`,
        `revise_replan` (a plan-gate revise re-opened the plan stage,
        #1256), `retry_reopen` (a failed stage was retried back into
        pending and re-dispatched, #1271), `recover_redispatch` (a failed
        decomposition child was re-driven in place, #1271),
        `reviews_settled_gate`, `fixup_rereview_repark`,
        `checks_green_awaiting_merge`, `ci_failed` (the negative mirror
        of `checks_green_awaiting_merge`: a required PR check concluded
        red).
      required: [rule, from, to, ts]
      properties:
        rule:
          type: string
          description: The named drive rule that fired.
          example: plan_approved_dispatch
        from:
          type: string
          description: The transition's from edge.
          example: "plan:approved"
        to:
          type: string
          description: The transition's to edge.
          example: "implement:dispatched"
        parked:
          type: boolean
          description: |
            True when the mechanical rule could not be
            backend-executed (the runner_kind `local` dispatch ‚Äî the
            runner is host-spawned per ADR-024) and the entry records
            a park-with-next-action instead of an executed advance.
            Absent/false for executed advances.
        ts:
          type: string
          format: date-time
          description: When the transition was recorded.

    RunDelegation:
      type: object
      description: |
        The run's evaluated `operator_agent` delegation envelope
        (ADR-040 / #1026). The effective block resolves per the spec's
        precedence ‚Äî the pending approval gate's block when one is
        declared, else the workflow-level block, never merged ‚Äî and
        each configured knob is evaluated against current run state by
        `backend/internal/delegation`.
      required: [actions]
      properties:
        actions:
          type: array
          items:
            $ref: '#/components/schemas/RunDelegationAction'
          description: |
            One entry per configured `may_*` knob, in knob order
            (approve, route_fixup, waive, retry, merge). Knobs the
            block leaves unset are absent ‚Äî fail-closed, those actions
            are not delegated.
        must_page_human:
          type: array
          items:
            type: string
          description: |
            The effective block's `must_page_human` event list ‚Äî
            events that always page the human regardless of the
            `may_*` knobs (closed set per the workflow-v0 schema, e.g.
            `reviewer_reject`, `gating_reviewer_reject`,
            `advisory_reviewer_reject`, `plan_rejection`). The explicit
            reviewer-reject classes (workflow-v0.7+, #1378) make the
            taxonomy self-documenting; the legacy bare `reviewer_reject`
            resolves to the gating sense.
          example: [reviewer_reject, budget_override]
        reviewer_reject_class:
          type: string
          enum: [gating_reviewer_reject, advisory_reviewer_reject]
          description: |
            The reviewer-reject page-event class the run currently
            resolves to (#1378), from the implement stage's ADR-027
            review authority: `gating_reviewer_reject` (agent-only
            review ‚Äî a reject pages the human) or
            `advisory_reviewer_reject` (agent + human ‚Äî a reject is
            arbitrable / auto-routed). Omitted when the implement stage
            is gateless (no agent reviewers). This only makes the
            authority-resolved class legible; it does not change the
            page/auto decision.
          example: gating_reviewer_reject
        model_policy:
          $ref: '#/components/schemas/RunDelegationModelPolicy'

    RunDelegationModelPolicy:
      type: object
      description: |
        The effective `operator_agent` block's scenario-A
        model-selection contract (#1421), passed through as static
        config for the operator agent to read and apply via the existing
        per-stage model override channels (#1416), bounded by ‚Äî never
        widening ‚Äî the deployment per-adapter allow-list. Declarative
        only: no backend resolution code reads it. Omitted entirely when
        the effective block declares no `model_policy`, keeping
        unconfigured responses byte-identical. Inherited under the same
        wholesale-override semantics as the `may_*` knobs (a gate-level
        block replaces the workflow-level one; never merged).
      properties:
        strategy:
          type: string
          enum: [follow_plan_recommendation, explicit_defaults]
          description: |
            How the operator agent picks each stage's model.
            `follow_plan_recommendation` follows the plan artifact's
            per-stage recommendation; `explicit_defaults` applies the
            `defaults` map, falling back to the deployment default for
            any unset stage.
          example: explicit_defaults
        defaults:
          type: object
          description: |
            Per-stage model applied under the `explicit_defaults`
            strategy. Each field optional; an unset stage falls back to
            the deployment default.
          properties:
            plan:
              type: string
            implement:
              type: string
            review:
              type: string
        allowed:
          type: array
          items:
            type: string
          description: |
            The models the operator agent may select. Composes with ‚Äî
            never widens ‚Äî the deployment per-adapter allow-list.
          example: [claude-opus-4-8, claude-sonnet-4-6, gpt-5.5]

    RunDelegationAction:
      type: object
      description: One delegation knob's evaluation.
      required: [action, condition, met]
      properties:
        action:
          type: string
          enum: [approve, route_fixup, waive, retry, merge]
          description: The delegable operator verb the knob governs.
        condition:
          type: string
          enum:
            - clean_dual_approval
            - convergent_concerns
            - solo_low
            - infra_flake
            - gates_resolved_ci_green
          description: |
            The named backend-evaluable condition the knob delegates
            under (one per knob in v0, closed set per the workflow-v0
            schema).
        met:
          type: boolean
          description: |
            Whether current run state satisfies the condition. `met:
            true` here is advisory ‚Äî the delegated action endpoints
            re-evaluate server-side at action time.
        unmet_reason:
          type: string
          description: |
            The exact failed predicate when `met` is false, prefixed
            with the condition name. Omitted when met.
          example: "clean_dual_approval: 1 of 2 reviewer verdicts received"

    Campaign:
      type: object
      description: |
        A campaign: the parent record of an epic-driven multi-issue run
        (ADR-047 / #1437). It owns an ordered set of campaign items, one per
        issue under the epic. State is a reduction of its items' states (see
        `backend/internal/campaign/transition.go`).
      required: [id, repo, epic_ref, state, pause_policy, created_at, updated_at]
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        repo:
          type: string
          example: kuhlman-labs/fishhawk
        epic_ref:
          type: string
          description: The epic the campaign decomposes, in `issue:N` form.
          example: "issue:1439"
        state:
          type: string
          enum: [pending, running, paused, succeeded, failed, cancelled]
          description: |
            `paused` is the E25.7 safety-boundary overlay: the auto-driver
            paused the campaign when a run gate was handed off to a human.
            It is non-terminal ‚Äî `POST /resume` returns it to `running`.
        pause_policy:
          type: string
          enum: [pause_campaign, pause_item]
          description: |
            What the auto-driver pauses on a gate hand-off (E25.7).
            `pause_campaign` (the default) blocks the whole campaign;
            `pause_item` pauses only the affected item (continue-others).
            Always present and normalized on a persisted campaign.
        operator_agent:
          type: object
          additionalProperties: true
          description: |
            OPTIONAL campaign-level `operator_agent` delegation override
            (E25.12). The same block shape the workflow spec carries
            (`may_approve`, `may_route_fixup`, `may_waive`, `may_retry`,
            `may_merge`, `must_page_human`, `model_policy`). When present it
            wins WHOLESALE as the outermost rung of the resolution ladder ‚Äî
            campaign > gate > workflow, never merged ‚Äî so it is each
            issue-run's effective delegation contract. Omitted when the
            campaign carries no override: every issue-run then inherits its
            workflow's contract, byte-identical to pre-E25.12 behavior.
        idempotent:
          type: boolean
          description: |
            Present and `true` ONLY on an idempotent-replay response (E25.13):
            a `POST /v0/campaigns` whose `Idempotency-Key` resolved to an
            existing campaign, returned `200` instead of `201`. Omitted on a
            fresh create (201) and on GET/list/status, so those are
            byte-identical to pre-E25.13 output.
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CampaignItem:
      type: object
      description: |
        One issue within a campaign. `depends_on` holds the sibling issue
        refs this item waits on (the campaign DAG edges); `run_id` is the
        nullable link to the run executing the item, absent until a run is
        assigned.
      required: [id, issue_ref, depends_on, state, created_at, updated_at]
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        issue_ref:
          type: string
          example: "issue:1441"
        depends_on:
          type: array
          items: { type: string }
          description: Sibling issue refs this item depends on (possibly empty).
        run_id:
          $ref: '#/components/schemas/UUID'
          description: |
            The run executing this item. Omitted while the item is unlinked
            (the pre-dispatch default).
        state:
          type: string
          enum: [pending, blocked, running, paused, succeeded, failed, cancelled]
          description: |
            `paused` (E25.7) means the auto-driver handed this item's gate off
            to a human; it carries a `pause_reason` and re-engages on resume.
        pause_reason:
          type: object
          description: |
            Why a paused item was handed off to a human (E25.7). Present only
            while the item is ‚Äî or was ‚Äî paused.
          properties:
            page_event:
              type: string
              description: The audit category that triggered the page (e.g. `campaign_gate_paged`).
            run_id:
              $ref: '#/components/schemas/UUID'
              description: The run whose gate was handed off.
            stage_id:
              $ref: '#/components/schemas/UUID'
              description: The gate's stage, if any.
            gate:
              type: string
              description: The gate/decision the human must own.
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CampaignRollup:
      type: object
      description: |
        The engine's readiness partition over a campaign's items
        (`campaign.NextEligible`). Every slice holds issue refs; an item
        appears in exactly one slice. Each field is always an array (never
        null).
      required: [eligible, human_led, blocked, running, done, failed, cancelled, paused]
      properties:
        eligible:
          type: array
          items: { type: string }
          description: No run yet and every dependency succeeded ‚Äî ready to dispatch autonomously.
        human_led:
          type: array
          items: { type: string }
          description: >-
            No run yet and every dependency succeeded (deps-satisfied, like
            `eligible`) but the item is `autonomy:low` ‚Äî human-led work diverted
            out of `eligible` so the auto-driver never dispatches it.
        blocked:
          type: array
          items: { type: string }
          description: No run yet, but at least one dependency is not yet done.
        running:
          type: array
          items: { type: string }
          description: Linked to a run that has not reached a terminal item state.
        done:
          type: array
          items: { type: string }
        failed:
          type: array
          items: { type: string }
        cancelled:
          type: array
          items: { type: string }
        paused:
          type: array
          items: { type: string }
          description: Handed off to a human by the auto-driver (E25.7); resumes on `POST /resume`.

    CampaignNextAction:
      type: object
      description: |
        The single next step for the operator-agent, distilled from the
        rollup partition. PRECEDENCE is FAILED-wins and strict: a failed item
        yields `attention` REGARDLESS of whether eligible items also exist;
        only with zero failed items does an eligible item yield `start_run`.
      required: [action]
      properties:
        action:
          type: string
          enum: [attention, resume, start_run, attend_human_led, wait, complete]
          description: |
            `attention` ‚Äî a failed item needs operator intervention
            (retry/abandon); takes precedence over everything else.
            `resume` ‚Äî a paused item was handed off to a human at a run gate
            (E25.7); handle the gate then `POST /resume`. Ranked above
            `start_run` so a hand-off is surfaced before new dispatch.
            `start_run` ‚Äî the next eligible (autonomous) item is ready to
            dispatch. Wins over `attend_human_led`: whenever ANY autonomous item
            is eligible it is surfaced first, so human-led items never stall
            DAG-independent autonomous work.
            `attend_human_led` ‚Äî the only deps-satisfied item(s) remaining are
            `autonomy:low` (human-led). Fires ONLY when `eligible` is empty and
            `human_led` is non-empty; a human must lead the item ‚Äî do NOT
            dispatch an agent run.
            `wait` ‚Äî items are running or blocked; nothing to do yet.
            `complete` ‚Äî every item reached a terminal state.
        issue_ref:
          type: string
          description: |
            The item the action refers to ‚Äî the first failed item for
            `attention`, the first paused item for `resume`, the first eligible
            item for `start_run`, the first human-led item for
            `attend_human_led`. Omitted for `wait` / `complete`.
        detail:
          type: string
          description: Human-readable explanation of the action.

    CampaignStatus:
      type: object
      description: |
        The campaign rollup surface: the campaign, its items, the engine's
        readiness partition, and the distilled next action. This is the
        surface the operator-agent polls to drive a campaign.
      required: [campaign, items, rollup, next_action]
      properties:
        campaign: { $ref: '#/components/schemas/Campaign' }
        items:
          type: array
          items: { $ref: '#/components/schemas/CampaignItem' }
        rollup: { $ref: '#/components/schemas/CampaignRollup' }
        next_action: { $ref: '#/components/schemas/CampaignNextAction' }

    StartCampaignItemRunRequest:
      type: object
      description: |
        The POST /v0/campaigns/{campaign_id}/runs body (E26.2 / #1481): start a
        run for one eligible campaign item. There is deliberately NO
        idempotency_key ‚Äî the backend does not dedup this create-link-transition
        sequence, and the DAG eligibility gate already refuses a re-start
        against an already-running item.
      required: [issue_ref, workflow_id]
      properties:
        issue_ref:
          type: string
          description: The campaign item's issue ref to start (must be a campaign item and currently eligible per the DAG).
        workflow_id:
          type: string
          description: The workflow id to run for this issue (e.g. `feature_change`).
        workflow_ref:
          type: string
          description: OPTIONAL git ref to fetch the workflow spec at; omit for the repo's default branch.
        runner_kind:
          type: string
          enum: [github_actions, local]
          description: OPTIONAL execution backend; defaults to `github_actions`. Pass `local` for the local dogfood loop.

    StartCampaignItemRunResult:
      type: object
      description: |
        The 201 body of POST /v0/campaigns/{campaign_id}/runs: the minted run
        plus the linked campaign item (now `running`, with `run_id` set).
      required: [run, item]
      properties:
        run: { $ref: '#/components/schemas/Run' }
        item: { $ref: '#/components/schemas/CampaignItem' }

    WaivedConcern:
      type: object
      description: |
        The updated concern row returned by
        `POST /v0/concerns/{concern_id}/waive` (#984): the full concern
        including the note text and the operator's waive reason as
        `state_reason`.
      required: [id, run_id, stage_id, stage_kind, severity, category, note, state, state_reason]
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        run_id:
          $ref: '#/components/schemas/UUID'
        stage_id:
          $ref: '#/components/schemas/UUID'
        stage_kind:
          type: string
          enum: [plan, implement]
        severity:
          type: string
        category:
          type: string
        note:
          type: string
          description: The reviewer's original concern note.
        state:
          type: string
          description: Always `waived` on a successful waive.
        state_reason:
          type: string
          description: The operator's audited waive reason.

    DeferredConcernResult:
      type: object
      description: |
        The result returned by `POST /v0/concerns/{concern_id}/defer`
        (#1202): the filed follow-up work `issue` plus the now-deferred
        `concern` row.
      required: [concern, issue]
      properties:
        concern:
          type: object
          description: |
            The updated concern row, now in the terminal `deferred`
            state with `state_reason` naming the filed follow-up issue.
          required: [id, run_id, stage_id, stage_kind, severity, category, note, state, state_reason]
          properties:
            id:
              $ref: '#/components/schemas/UUID'
            run_id:
              $ref: '#/components/schemas/UUID'
            stage_id:
              $ref: '#/components/schemas/UUID'
            stage_kind:
              type: string
              enum: [plan, implement]
            severity:
              type: string
            category:
              type: string
            note:
              type: string
              description: The reviewer's original concern note.
            state:
              type: string
              description: Always `deferred` on a successful defer.
            state_reason:
              type: string
              description: |
                The audited reason, of the form
                `deferred to #<n>: <note>`, naming the filed issue.
        issue:
          type: object
          description: The filed follow-up work item.
          required: [type, title, number, url, provider]
          properties:
            type:
              type: string
              description: The work-item type (bug for a defect category, else chore).
            title:
              type: string
            number:
              type: integer
            url:
              type: string
              format: uri
            provider:
              type: string
            applied_labels:
              type: array
              items: { type: string }
            defaulted_labels:
              type: array
              items: { type: string }
              description: >-
                Labels the system added that were not supplied (#1616), e.g. the `autonomy:medium`
                namespace default. The auto-drafted follow-up flows through the same filing core as
                POST /v0/work-items, so its label-completeness report is identical.
            missing_label_namespaces:
              type: array
              items: { type: string }
              description: >-
                Required label namespaces still absent after merge/derivation/defaulting (#1616);
                reported loudly, never a rejection.

    IssueContext:
      type: object
      description: |
        Cached GitHub issue payload ‚Äî title, body, url, number, and
        comments ‚Äî fetched by the operator's `gh issue view` at
        run-create time so the backend's prompt builder doesn't
        need an installation_id to look up the issue (#415). The
        optional `comments` array carries the issue's comments so the
        plan agent sees refinements/decisions posted as comments, not
        just the title+body snapshot (#618).
      required: [title, body, url, number]
      properties:
        title:
          type: string
        body:
          type: string
        url:
          type: string
          format: uri
        number:
          type: integer
          minimum: 1
        comments:
          type: array
          description: |
            Issue comments captured at run-create time, oldest first.
            Optional and additive ‚Äî runs whose issue_context predates
            #618 omit the field.
          items:
            type: object
            required: [author, body, created_at]
            properties:
              author:
                type: string
                description: Commenter's GitHub login.
              body:
                type: string
              created_at:
                type: string
                format: date-time

    Stage:
      type: object
      required:
        [id, run_id, sequence, type, executor, state, created_at,
         updated_at]
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        run_id: { $ref: '#/components/schemas/UUID' }
        sequence:
          type: integer
          minimum: 0
        type:
          type: string
          enum: [plan, implement, review, deploy]
        executor:
          type: object
          description: Exactly one of agent or human.
          properties:
            kind:
              type: string
              enum: [agent, human]
            ref:
              type: string
              example: claude-code
        state:
          type: string
          enum:
            [pending, awaiting_host_dispatch, dispatched, running,
             awaiting_approval, succeeded, failed, cancelled]
          description: |
            `awaiting_host_dispatch` is the parked-for-host-spawn state
            (#1912): a runner_kind-locked-`local` agent stage the backend wants
            executed but cannot spawn (ADR-024). It is cleared to `dispatched`
            by the host-dispatch marker (POST
            `/v0/runs/{run_id}/stages/{stage_id}/host-dispatch`). Post-#1912
            `dispatched` unambiguously means a spawn attempt exists.
        started_at:
          type: [string, "null"]
          format: date-time
        ended_at:
          type: [string, "null"]
          format: date-time
        failure_category:
          type: [string, "null"]
          enum: [A, B, C, D, null]
          description: |
            Set on failed transitions per MVP_SPEC ¬ß6.
            A: agent failure, B: constraint/policy, C: infrastructure,
            D: approval timeout.
        failure_reason:
          type: [string, "null"]
        gate:
          oneOf:
            - type: "null"
            - $ref: '#/components/schemas/StageGate'
          description: |
            The persisted shape of the stage's workflow-spec gate.
            Null/omitted when the stage has no gate. Per migration
            0014 / #213 ‚Äî the review-stage UI reads this to decide
            whether to surface the approval panel. Pre-#254 the
            shape carried a `blocking_checks` array; v0.2 dropped
            that field (ADR-017 / #249) ‚Äî required CI checks now
            live in branch protection, snapshotted onto the run
            row's `required_checks_snapshot` (#251).
        resolved_model:
          type: string
          description: |
            The model id the approval gate resolved for this stage's
            agent spawn (#1416), surfaced from the per-stage
            `model_resolved` audit entry keyed by this stage's id.
            Empty string when no resolution was recorded for the stage
            ‚Äî the adapter-default spawn, and every stage of a run
            approved before per-stage model selection landed.
          example: claude-opus-4-8
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    StageGate:
      type: object
      description: |
        Workflow-spec gate snapshot stored on the stage row. Mirrors
        spec.Gate ‚Äî `type` distinguishes approval-vs-check, approvers
        is set only for approval gates. The pre-#254 `blocking_checks`
        array was removed in v0.2 (ADR-017 / #249); required CI
        checks now live in branch protection, exposed via the run's
        `required_checks_snapshot` (#251) and the per-stage
        `/v0/stages/{id}/checks` endpoint.
      required: [type]
      properties:
        type:
          type: string
          enum: [approval, check]
        approvers:
          oneOf:
            - type: "null"
            - type: object
              description: |
                Roles whose members can satisfy the gate. Exactly
                one of any_of / all_of is set when populated.
              properties:
                any_of:
                  type: array
                  items: { type: string }
                all_of:
                  type: array
                  items: { type: string }

    PullRequestArtifactBody:
      type: object
      description: |
        Wire shape the runner POSTs to /v0/runs/{run_id}/pull-request.
        Stored verbatim as the artifact's content; v0 doesn't carry a
        schema_version because the field shape isn't yet schema-stable.

        Has four variants (#742, #771, #794):

        - **Success** (default): `outcome` is absent. The PR fields
          (`pr_number`, `pr_url`, `branch`, `head_sha`, `base_sha`,
          `title`, `files_changed_count`) are required. The handler
          stores the PR artifact, backfills `run.pull_request_url`, and ‚Äî
          when the implement stage was left in `running` by the trace
          handler's push-and-open-pr gate ‚Äî drives its terminal
          transition (‚Üí awaiting_approval / succeeded).
        - **Failure** (`outcome: failed`): the runner's commit/push/PR-open
          step failed, so no PR was opened. `category` (`B` re-scope, `C`
          retryable infra) and `reason` are required; the PR fields are
          absent. The handler fails the implement stage instead of
          creating an artifact, so the run never strands at
          review:awaiting_approval with a null PR.
        - **Child push** (`outcome: pushed`, #771): a decomposed child
          committed + pushed onto the shared parent branch but opened no PR
          (the parent run opens one consolidated PR after all children
          settle). `branch`, `head_sha`, and `base_sha` are required;
          `pr_number`/`pr_url`/`title` are absent. The handler drives the
          child stage's terminal transition its push_to_shared_branch trace
          gate left in `running`, without creating a PR artifact ‚Äî so a child
          whose push failed (reported via `outcome: failed`) never reaches
          terminal succeeded with no code on the shared branch.
        - **Fix-up push** (`outcome: fixup_pushed`, #794): a fix-up
          re-dispatch committed + pushed onto the EXISTING PR branch but
          opened no new PR (the open PR already tracks the branch). `branch`,
          `head_sha`, and `base_sha` are required; `pr_number`/`pr_url`/`title`
          are absent. The handler drives the fix-up stage's terminal transition
          its push_fixup trace gate left in `running`, without creating a PR
          artifact ‚Äî so a fix-up whose push/compile-gate step failed (reported
          via `outcome: failed`) never reaches terminal succeeded with the
          implement re-review approving an unlanded diff. The optional
          `apply_path` field (#1165/#1213) records whether the fix-up collapsed
          to a deterministic git-apply of the routed concerns' suggested
          patches or fell back to the agent.
      required: [pr_number, pr_url, branch, head_sha, base_sha, title, files_changed_count]
      properties:
        pr_number:
          type: integer
          minimum: 1
          example: 42
        pr_url:
          type: string
          format: uri
          example: https://github.com/kuhlman-labs/fishhawk/pull/42
        branch:
          type: string
          example: fishhawk/run-aaa/stage-bbb
        head_sha:
          type: string
          example: 1111111111111111111111111111111111111111
        base_sha:
          type: string
          example: 2222222222222222222222222222222222222222
        title:
          type: string
          example: "Fishhawk: implement stage 22222222"
        body:
          type: string
          description: Optional PR body (markdown).
        files_changed_count:
          type: integer
          minimum: 0
          example: 3
        outcome:
          type: string
          enum: [failed, pushed, fixup_pushed, fixup_no_changes, scope_park]
          description: |
            Present only on the non-success variants. `failed` (#742)
            reports a commit/push/PR-open failure (PR fields absent;
            `category` + `reason` required). `pushed` (#771) reports a
            decomposed child's successful push onto the shared parent branch
            (no PR opened; `branch` + `head_sha` + `base_sha` required,
            `pr_number`/`pr_url`/`title` absent). `fixup_pushed` (#794) reports
            a fix-up re-dispatch's successful push onto the EXISTING PR branch
            (no new PR; `branch` + `head_sha` + `base_sha` required,
            `pr_number`/`pr_url`/`title` absent). `fixup_no_changes` (#856)
            reports a fix-up re-dispatch that produced NO changes (no new commit
            landed; `branch` + `base_sha` required, `head_sha` omitted because
            the branch tip is unchanged, `pr_number`/`pr_url`/`title` absent).
            `scope_park` (#1231) reports a missing-declared-scope-file-ONLY gate
            outcome: the runner pushed its verified commit to the run branch and
            parks the implement stage in `awaiting_scope_decision` (no PR;
            `branch` + `head_sha` + `base_sha` + `verified_tree_sha` +
            non-empty `missing_paths` required, `pr_number`/`pr_url`/`title`
            absent).
        category:
          type: string
          enum: [B, C]
          description: |
            Failure category for the failure variant (#742). `B` parks the
            run for re-scope/re-plan (invalid PR shape / compile gate);
            `C` is retryable infra (network, git, GitHub API).
        reason:
          type: string
          description: Human-readable failure reason (failure variant only).
        verified_tree_sha:
          type: string
          description: |
            Present only on the `scope_park` variant (#1231). The tree object
            the committed-tree verify gate passed on; recorded so the exempt
            resolution can assert the opened PR head reflects the identical tree.
        missing_paths:
          type: array
          items: { type: string }
          description: |
            Present only on the `scope_park` variant (#1231). The declared
            `scope.files` the agent never touched ‚Äî the sole gate shortfall that
            triggered the park. Repo-relative; must be non-empty.
        apply_path:
          type: string
          enum: [applied, agent, apply_failed_fellback, apply_failed_reset_failed]
          description: |
            Present only on the `fixup_pushed` variant (#1165/#1213). Records
            whether the near-deterministic fix-up apply path resolved the
            fix-up or it fell back to the agent: `applied` (every routed
            concern's suggested patch git-applied cleanly and the committed-tree
            verify gate passed, no agent), `agent` (no apply-list served / the
            agent re-derived), `apply_failed_fellback` (an apply-list was served
            but the apply or its verify gate failed, the worktree reset cleanly,
            and the agent re-derived), `apply_failed_reset_failed` (an apply
            failed AND the post-failure reset also failed). Persisted onto the
            fixup_pushed audit entry.
        supplemental_scope_exemptions:
          type: array
          items:
            type: object
            required: [path, reason]
            properties:
              path:
                type: string
                description: A declared `scope.files` path left unchanged.
              reason:
                type: string
                description: Why the path correctly needs no change.
          description: |
            Present only on a success ship that followed a base-rebase
            re-invoke (#1218). The re-invoke exemption delta: the scope
            self-exemptions the final scope-completeness gate honored that the
            already-sealed trace bundle's `scope_files_exempted` gate_evidence
            event did NOT carry (the bundle ships at push time, before the
            re-invoke reloads the re-invoked agent's exemptions, under #742
            forward gating). The backend re-emits these as a supplemental
            `scope_files_exempted` audit entry (origin `base_rebase_reinvoke`)
            so the re-invoke exemptions are queryable via the audit endpoint.
            Omitted on the first ship and every non-re-invoke ship.

    PullRequestUploadResponse:
      type: object
      description: |
        Echoed by `POST /v0/runs/{run_id}/pull-request`. `idempotent`
        is true when the upload matched an existing artifact.
      required: [id, stage_id, content_hash, pr_number, pr_url, head_sha, idempotent]
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        stage_id: { $ref: '#/components/schemas/UUID' }
        content_hash:
          type: string
          description: Hex sha256 of the canonical bytes shipped.
        pr_number: { type: integer }
        pr_url: { type: string, format: uri }
        head_sha: { type: string }
        idempotent: { type: boolean }

    PullRequestFailureResponse:
      type: object
      description: |
        Echoed by `POST /v0/runs/{run_id}/pull-request` for the failure
        variant (`outcome: failed`, #742): the runner-reported
        commit/push/PR-open failure was recorded and the implement stage
        transitioned to `failed`.
      required: [stage_id, outcome, category]
      properties:
        stage_id: { $ref: '#/components/schemas/UUID' }
        outcome: { type: string, enum: [failed] }
        category: { type: string, enum: [B, C] }

    PullRequestChildPushResponse:
      type: object
      description: |
        Echoed by `POST /v0/runs/{run_id}/pull-request` for the child-push
        variant (`outcome: pushed`, #771): a decomposed child pushed onto the
        shared parent branch and the child implement stage transitioned
        terminally. No PR artifact is created.
      required: [stage_id, outcome, branch, head_sha]
      properties:
        stage_id: { $ref: '#/components/schemas/UUID' }
        outcome: { type: string, enum: [pushed] }
        branch: { type: string }
        head_sha: { type: string }

    PullRequestFixupPushResponse:
      type: object
      description: |
        Echoed by `POST /v0/runs/{run_id}/pull-request` for the fix-up push
        variant (`outcome: fixup_pushed`, #794): a fix-up re-dispatch pushed
        onto the EXISTING PR branch and the fix-up implement stage transitioned
        terminally. No PR artifact is created.
      required: [stage_id, outcome, branch, head_sha]
      properties:
        stage_id: { $ref: '#/components/schemas/UUID' }
        outcome: { type: string, enum: [fixup_pushed] }
        branch: { type: string }
        head_sha: { type: string }

    PullRequestFixupNoChangesResponse:
      type: object
      description: |
        Echoed by `POST /v0/runs/{run_id}/pull-request` for the fix-up
        no-changes variant (`outcome: fixup_no_changes`, #856): a fix-up
        re-dispatch produced no changes (no new commit landed on the EXISTING PR
        branch) and the fix-up implement stage transitioned terminally,
        re-parking the review gate. No PR artifact is created and no `head_sha`
        is echoed ‚Äî the branch tip is unchanged.
      required: [stage_id, outcome, branch]
      properties:
        stage_id: { $ref: '#/components/schemas/UUID' }
        outcome: { type: string, enum: [fixup_no_changes] }
        branch: { type: string }

    PullRequestScopeParkResponse:
      type: object
      description: |
        Echoed by `POST /v0/runs/{run_id}/pull-request` for the
        scope-completeness park variant (`outcome: scope_park`, #1231): the
        implement stage's ONLY committed-tree gate failure was the
        missing-declared-scope-file check, so the runner pushed its verified
        commit to the run branch (no PR) and the stage parked in
        `awaiting_scope_decision` for an operator exempt-or-fail decision.
        `head_sha` echoes the held commit.
      required: [stage_id, outcome, branch, head_sha]
      properties:
        stage_id: { $ref: '#/components/schemas/UUID' }
        outcome: { type: string, enum: [scope_park] }
        branch: { type: string }
        head_sha: { type: string }

    DeploymentArtifactBody:
      type: object
      description: |
        Wire shape posted to /v0/runs/{run_id}/deployment (E23.5 / #1385).
        ADR-038's signed deployment record. Stored verbatim as the
        artifact's content; v0 carries no schema_version because the field
        shape isn't yet schema-stable. Fishhawk is delegating-only ‚Äî the
        external pipeline runs the deploy and this body reports its outcome.
      required: [environment, ref, external_run_url, outcome]
      properties:
        environment:
          type: string
          description: |
            The deploy target (gated pre-execution by the deploy stage's
            allowed_environments constraint).
          example: production
        ref:
          type: string
          description: The git ref or sha that was deployed (ADR-038's "ref/sha").
          example: "1111111111111111111111111111111111111111"
        external_run_url:
          type: string
          format: uri
          description: |
            The external pipeline run Fishhawk delegated to (delegating mode ‚Äî
            Fishhawk holds no deploy logic).
          example: https://github.com/kuhlman-labs/fishhawk/actions/runs/42
        outcome:
          type: string
          enum: [succeeded, failed, partial, rolled_back]
          description: |
            The terminal deploy disposition (ADR-038 / #1384). `partial` and
            `rolled_back` are non-idempotent dispositions that are never
            blindly re-run.
        rollback_handle:
          type: string
          description: |
            Opaque handle the external pipeline returns for reverting this
            deploy, when one exists. Optional.
        rollback_action:
          type: string
          enum: [initiated, completed]
          description: |
            Present when the body reports an explicit rollback sub-action
            against a prior deploy. `initiated` writes a
            `deployment_rollback_initiated` audit entry, `completed` writes a
            `deployment_rollback_completed` entry ‚Äî in ADDITION to the
            always-written `deployment_outcome_recorded` entry.

    DeploymentUploadResponse:
      type: object
      description: |
        Echoed by `POST /v0/runs/{run_id}/deployment`. `idempotent` is true
        when the upload matched an existing artifact for the stage.
      required: [id, stage_id, content_hash, environment, outcome, idempotent]
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        stage_id: { $ref: '#/components/schemas/UUID' }
        content_hash:
          type: string
          description: Hex sha256 of the canonical deployment bytes shipped.
        environment: { type: string }
        outcome: { type: string, enum: [succeeded, failed, partial, rolled_back] }
        idempotent: { type: boolean }

    AcceptanceArtifactBody:
      type: object
      description: |
        Wire shape posted to /v0/runs/{run_id}/acceptance (E31.6 / #1534).
        ADR-049's signed acceptance-evidence record. Stored verbatim as the
        artifact's content; v0 carries no schema_version because the field
        shape isn't yet schema-stable. Evidence blobs stay customer-side
        (ADR-049 decision #5) ‚Äî only the structured verdict + per-criterion
        results + `content_hash` references cross to Fishhawk.
      required: [verdict]
      properties:
        verdict:
          type: string
          enum: [passed, failed]
          description: The settled acceptance disposition.
        failure_mode:
          type: string
          enum: [error, assertion_fail]
          description: |
            Splits a failure for E31.8 triage: `error` = the instance
            crashed / returned a 500 / threw an exception; `assertion_fail`
            = it behaved without erroring but produced an unexpected result.
            REQUIRED when `verdict` is `failed`; rejected when present on a
            pass.
        criteria:
          type: array
          description: |
            One result per plan acceptance criterion, keyed by the criterion
            `id` (the E31.1 plan-criterion join key). Optional ‚Äî a verdict can
            settle before per-criterion evidence is itemized.
          items:
            type: object
            required: [id, result]
            properties:
              id:
                type: string
                description: The plan acceptance-criterion id this result maps to.
              result:
                type: string
                enum: [passed, failed, skipped]
              observed: { type: string }
              expected: { type: string }
              steps_taken: { type: string }
              expectation_basis:
                type: string
                description: |
                  Where the expectation came from ‚Äî the criterion statement,
                  the issue text, a spec section ‚Äî so a failed assertion is
                  auditable against its source (E31.7 / #1535). Optional.
              repro_handle:
                type: string
                description: |
                  A re-run pointer for the observation ‚Äî the command, request,
                  or script the validator used ‚Äî so a human can reproduce the
                  evidence (E31.7 / #1535). Optional.
        target_url:
          type: string
          description: |
            The running instance the validator drove, when declared, as a full
            http(s) URL (for example `http://localhost:8090`). A schemeless
            host[:port] is coerced by prefixing `http://` (#1574); any other
            scheme (a value with `://` that is not exactly `http://` or
            `https://`) is rejected. Optional.
        evidence_hashes:
          description: |
            Content-hash references to the customer-side evidence blobs
            (ADR-049 #5 default residency customer-side). A flat array of hash
            strings; a string-valued object map is coerced to its sorted values
            (#1574), and any other shape (a scalar, or a map/array with a
            non-string value) is rejected. Optional.
          oneOf:
            - type: array
              items: { type: string }
            - type: object
              additionalProperties: { type: string }
        notes:
          type: string
          description: |
            A declared home for the acceptance agent's free-text overflow
            (E31.16 / #1567): a benign top-level remark that would otherwise
            fail closed against the strict-unknown-fields decode. Free text,
            stored verbatim. Optional.

    AcceptanceUploadResponse:
      type: object
      description: |
        Echoed by `POST /v0/runs/{run_id}/acceptance`. `idempotent` is true
        when the upload matched an existing artifact for the stage.
      required: [id, stage_id, content_hash, verdict, idempotent]
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        stage_id: { $ref: '#/components/schemas/UUID' }
        content_hash:
          type: string
          description: Hex sha256 of the canonical acceptance bytes shipped.
        verdict: { type: string, enum: [passed, failed] }
        failure_mode: { type: string, enum: [error, assertion_fail] }
        idempotent: { type: boolean }

    PlanUploadResponse:
      type: object
      description: |
        Echoed by `POST /v0/runs/{run_id}/plan`. `idempotent` is true
        when the upload matched an existing artifact for the stage and
        no new row was inserted.
      required: [id, stage_id, content_hash, schema_version, idempotent]
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        stage_id: { $ref: '#/components/schemas/UUID' }
        content_hash:
          type: string
          description: Hex sha256 of the canonical plan bytes.
        schema_version:
          type: string
          example: standard_v1
        idempotent:
          type: boolean

    Artifact:
      type: object
      required: [id, stage_id, kind, content_hash, created_at]
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        stage_id: { $ref: '#/components/schemas/UUID' }
        kind:
          type: string
          enum: [plan, pull_request, deployment]
        schema_version:
          type: [string, "null"]
          example: standard_v1
        content_hash:
          type: string
          description: Hex sha256 of canonical content bytes.
        content:
          description: |
            JSON content of the artifact. For kind=plan validated
            against the standard_v1 schema in
            docs/spec/plan-standard-v1.schema.json. For
            kind=pull_request the content carries the
            PullRequestArtifactBody shape; for kind=deployment it
            carries the DeploymentArtifactBody shape.
        created_at:
          type: string
          format: date-time

    AuditEntry:
      type: object
      description: |
        One line in the append-only audit log. Entries form a per-run
        chain via prev_hash ‚Üí entry_hash; see backend/internal/audit
        and verifier/internal/audit for the canonical algorithm.
      required:
        [id, sequence, run_id, ts, category, payload, entry_hash]
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        sequence:
          type: integer
          format: int64
          minimum: 1
        run_id: { $ref: '#/components/schemas/UUID' }
        stage_id:
          oneOf:
            - $ref: '#/components/schemas/UUID'
            - type: "null"
        ts:
          type: string
          format: date-time
        category:
          type: string
          example: plan_generated
        actor_kind:
          type: [string, "null"]
          enum: [agent, user, system, null]
        actor_subject:
          type: [string, "null"]
        payload:
          description: Event-specific JSON object.
        prev_hash:
          type: [string, "null"]
          description: Hex sha256 of the prior entry's entry_hash; null on the first entry of a run.
        entry_hash:
          type: string
          description: Hex sha256 of the canonical hash inputs.

    AuditExport:
      type: object
      description: |
        The verifier's `Export v1` wire contract (ADR-008 / ADR-054),
        produced by `GET /v0/audit/export`. The exact three-field body
        shape is BINDING: the verifier's `ParseExport` rejects any
        unknown field anywhere in the object, so continuation/partiality
        markers ride response headers, not the body. Mirrors
        `verifier/internal/audit/export.go`.
      required: [schema, exported_at, runs]
      additionalProperties: false
      properties:
        schema:
          type: string
          enum: [v1]
          description: Export format version. The verifier rejects anything but `v1`.
        exported_at:
          type: string
          format: date-time
          description: Server time (UTC) the export was assembled.
        runs:
          type: object
          description: |
            Map keyed by run UUID, plus the run-less chain partitions
            visible to the caller (ADR-057 / #1828, #2097): a tenant
            account's partition under its account-UUID key, the
            untenanted partition under the reserved nil-UUID key
            `00000000-0000-0000-0000-000000000000`. Run-less entries
            carry `run_id: null`; every key is an independently
            verifiable chain. The run-less partitions are scoped to the
            caller: a tenant caller (token bound to an account) sees
            ONLY its own account partition; the untenanted nil-UUID
            partition is operator-only. An operator / no-account caller
            keeps the full view (untenanted partition plus every tenant
            partition).
          additionalProperties: { $ref: '#/components/schemas/AuditExportRunData' }

    AuditExportRunData:
      type: object
      description: One run's portion of an export ‚Äî its signing key plus the full audit chain.
      required: [audit_entries]
      additionalProperties: false
      properties:
        signing_key:
          $ref: '#/components/schemas/AuditExportSigningKey'
          description: |
            The run's public signing key. Absent when the run never
            issued a key (e.g. local runs); the verifier's chain walk
            does not require it.
        audit_entries:
          type: array
          description: Sequence-ascending chain for the run (empty array when none).
          items: { $ref: '#/components/schemas/AuditEntry' }

    AuditExportSigningKey:
      type: object
      description: The persisted public-half signing record (ADR-008).
      required: [public_key, issued_at, expires_at]
      additionalProperties: false
      properties:
        public_key:
          type: string
          description: Base64-encoded Ed25519 public key (32 bytes).
        issued_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time

    AgentChangesReport:
      type: object
      description: |
        The E9.3 canned compliance report (#1606). A projection over the
        E9.1 shared export assembly: one page of agent-authored changes in
        the selected run range, the human-led changes in a separate
        reduced-evidence section, and page totals. UNLIKE the verifier's
        `Export v1` body, continuation markers (`complete`/`next_cursor`)
        ride the BODY as well as the response headers ‚Äî this endpoint is
        not verifier-strict-decoded.
      required: [schema, generated_at, filters, complete, agent_changes, human_led_changes, totals]
      properties:
        schema:
          type: string
          description: "Report format version, e.g. `agent-changes-report/v1`."
        generated_at:
          type: string
          format: date-time
          description: Server time (UTC) the report was assembled.
        filters:
          type: object
          description: Echo of the run-selection filters so a saved report is self-describing.
          properties:
            repo: { type: string }
            from: { type: string, format: date-time }
            to: { type: string, format: date-time }
        complete:
          type: boolean
          description: "`false` when more runs remain (report-only mirror of X-Fishhawk-Export-Complete)."
        next_cursor:
          type: string
          description: Opaque keyset cursor for the next page. Present only when the report is partial.
        agent_changes:
          type: array
          description: Agent-authored changes on this page, created_at-DESC.
          items: { $ref: '#/components/schemas/AgentChangeItem' }
        human_led_changes:
          type: array
          description: |
            Changes on runs whose `workflow_id` is `human_led_change`,
            with reduced evidence (`reviews`/`acceptance` omitted).
          items: { $ref: '#/components/schemas/AgentChangeItem' }
        totals:
          type: object
          description: Page totals. The three category counts partition `runs_in_range`.
          required: [runs_in_range, agent_changes, human_led_changes, runs_without_change]
          properties:
            runs_in_range: { type: integer }
            agent_changes: { type: integer }
            human_led_changes: { type: integer }
            runs_without_change:
              type: integer
              description: Runs that produced no PR ‚Äî excluded from both lists, counted here.

    AgentChangeItem:
      type: object
      description: |
        One selected run that produced a change. Human-led items reuse
        this shape with `reviews`/`acceptance` omitted (reduced evidence).
      required: [run_id, repo, workflow_id, pr, audit_chain, evidence_links]
      properties:
        run_id: { $ref: '#/components/schemas/UUID' }
        repo: { type: string }
        workflow_id: { type: string }
        trigger_ref: { type: string, description: "e.g. `issue:1606`." }
        pr:
          type: object
          description: What changed ‚Äî from the `pull_request_opened` audit entry.
          properties:
            url: { type: string }
            number: { type: integer, format: int64 }
            branch: { type: string }
            head_sha: { type: string }
        merge:
          type: object
          description: Merge status ‚Äî from `pr_merged`. Absent when the PR never merged.
          properties:
            merged: { type: boolean }
            merger: { type: string }
            head_sha: { type: string }
            base_sha: { type: string }
            merged_at: { type: string, format: date-time }
        approvals:
          type: array
          description: Who approved ‚Äî from `approval_submitted` + `pr_approved_on_github`.
          items:
            type: object
            properties:
              subject: { type: string }
              actor_kind: { type: string }
              decision: { type: string }
              surface: { type: string }
              timestamp: { type: string, format: date-time }
        reviews:
          type: array
          description: |
            What reviewed it ‚Äî from `plan_reviewed` + `implement_reviewed`.
            Omitted on human-led items (reduced evidence).
          items:
            type: object
            properties:
              stage: { type: string, enum: [plan, implement] }
              reviewer_kind: { type: string }
              reviewer_model: { type: string }
              verdict: { type: string }
              timestamp: { type: string, format: date-time }
        acceptance:
          type: object
          description: |
            What validated it ‚Äî from `acceptance_outcome_recorded`. Absent
            for runs predating the acceptance stage or that never ran it.
            Omitted on human-led items (reduced evidence).
          properties:
            verdict: { type: string }
            failure_mode: { type: string }
            evidence_hashes: { type: array, items: { type: string } }
            content_hash: { type: string }
            timestamp: { type: string, format: date-time }
        audit_chain:
          type: object
          description: The run's audit-chain span.
          required: [first_sequence, last_sequence, first_entry_hash, last_entry_hash, entry_count]
          properties:
            first_sequence: { type: integer, format: int64 }
            last_sequence: { type: integer, format: int64 }
            first_entry_hash: { type: string }
            last_entry_hash: { type: string }
            entry_count: { type: integer }
        evidence_links:
          type: object
          description: |
            Redacted-tier pointers into the run/audit/export/artifact API
            surfaces (ADR-054) ‚Äî never inlined trace bundles.
            ExternalURL-prefixed when configured, else relative `/v0/...`.
          required: [run, audit, export]
          properties:
            run: { type: string }
            audit: { type: string }
            export: { type: string }
            artifacts: { type: array, items: { type: string } }

    StatusCommentResponse:
      type: object
      description: |
        Rendered sticky-comment body plus the GitHub comment ID stored
        in the most recent `status_comment_posted` audit entry (0 when
        no comment has been posted yet). Used by the CLI to drive
        edit-in-place updates on the issue thread.
      required: [body, issue_number, repo, github_comment_id]
      properties:
        body:
          type: string
          description: Rendered Markdown body for the issue comment.
        issue_number:
          type: integer
          description: GitHub issue number the comment belongs to.
        repo:
          type: string
          description: "GitHub repo in owner/name form."
        github_comment_id:
          type: integer
          format: int64
          description: |
            GitHub comment ID from the last `status_comment_posted` audit entry.
            Zero when no comment has been posted yet (create-path).

    DiagnosticBundle:
      type: object
      description: |
        Product-facts-only diagnostic summary for a run (#1006). Every
        field is a structured fact safe to leave the operator's boundary
        without redaction; the bundle never carries diffs, paths, prompts,
        free text, or audit payload bodies.
      required: [run_id, workflow_id, workflow_spec_hash, runner_kind, run_state, stages, versions]
      properties:
        run_id:
          $ref: '#/components/schemas/UUID'
        workflow_id:
          type: string
          description: Workflow key the run executed (e.g. feature_change).
        workflow_spec_hash:
          type: string
          description: Git SHA of .fishhawk/workflows.yaml at run-create time.
        runner_kind:
          type: string
          description: "Execution backend tag (github_actions | local)."
        run_state:
          type: string
          description: "Run lifecycle state (pending|running|succeeded|failed|cancelled)."
        stages:
          type: array
          description: Ordered stage facts, by sequence ascending.
          items:
            type: object
            required: [sequence, type, state]
            properties:
              sequence: { type: integer }
              type: { type: string, description: "plan | implement | review" }
              state: { type: string, description: "Stage lifecycle state." }
        failing_stage:
          type: object
          description: |
            The failed stage's structured facts. Absent when no stage
            failed. Carries the single-letter failure category and the
            audit category of the most-recent entry scoped to the stage
            (the failing surface) ‚Äî never the free-text failure reason.
          required: [sequence, type, failure_category]
          properties:
            sequence: { type: integer }
            type: { type: string }
            failure_category:
              type: string
              description: "MVP_SPEC ¬ß6 class: A | B | C | D."
            failure_surface:
              type: string
              description: Audit category of the most-recent entry scoped to the failing stage.
            failure_detail_class:
              type: string
              description: >-
                Closed-enum normalization of the free-text failure reason
                (auth-401 | bad-object-ref | target-unreachable), or absent
                when unclassified. A table-owned enum literal DERIVED from
                the reason ‚Äî the raw reason text is never carried. Lets the
                dedup fingerprint distinguish distinct root causes that
                share a failing surface (#1962).
        audit_sequence_range:
          type: object
          description: "[min,max] of the run's audit-entry sequence numbers. Absent when the run has no audit entries."
          required: [min, max]
          properties:
            min: { type: integer, format: int64 }
            max: { type: integer, format: int64 }
        versions:
          type: object
          description: Build identity the backend authoritatively knows.
          required: [fishhawkd, min_runner_version]
          properties:
            fishhawkd:
              type: object
              required: [version, git_sha]
              properties:
                version: { type: string, description: "fishhawkd build version ('dev' when unstamped)." }
                git_sha: { type: string, description: "fishhawkd build git SHA ('unknown' when unstamped)." }
            min_runner_version:
              type: string
              description: Minimum fishhawk-runner version this backend requires.

    ProductReportRequest:
      type: object
      description: |
        Body for POST /v0/runs/{run_id}/product-reports (#1006). Slice 2
        (the egress path) carries product facts ONLY ‚Äî `kind` selects the
        report flavor and nothing else crosses. An empty body is valid
        (kind defaults to bug).
      properties:
        kind:
          type: string
          enum: [bug, feature]
          default: bug
          description: Report flavor ‚Äî bug (default) or feature request.

    ProductReportResponse:
      type: object
      description: What left the boundary ‚Äî echoed so the caller can render the outcome.
      required: [fingerprint, action, number, url, destination]
      properties:
        fingerprint:
          type: string
          description: >-
            Stable dedup fingerprint over (failure category, audit surface,
            failure detail class, version family). The detail class is
            included only when the failure reason classified; an
            unclassified failure keeps the 3-component fingerprint (#1962).
        action:
          type: string
          enum: [created, occurrence]
          description: "created ‚Äî a new fingerprint-marked report; occurrence ‚Äî a comment on the existing report (nothing created)."
        number:
          type: integer
          description: Upstream issue number that was created or appended to.
        url:
          type: string
          description: Upstream issue URL.
        destination:
          type: string
          description: The fixed upstream product repo the report landed in (owner/name).

    RunBudgetStatus:
      type: object
      description: |
        Current calendar-period status of a workflow's periodic budget
        (#693 / ADR-030). **Display-only** ‚Äî never gates or blocks a run.

        When the workflow declares no budget the endpoint returns an
        **empty object** (none of the fields below present); clients
        detect "no budget" by the absence of `period`. The fields below
        are present only when a budget is configured.
      properties:
        period:
          type: string
          enum: [weekly, monthly]
          description: Budget reset cadence.
        period_start:
          type: string
          format: date-time
          description: |
            RFC3339 inclusive start of the current calendar period, in
            the server's configured budget timezone.
        limit_usd:
          type: number
          description: |
            Effective spend ceiling in US dollars for the period. This is
            the operator's `FISHHAWKD_BUDGET_LIMIT_OVERRIDE_USD` calibration
            override when configured (> 0), else the spec budget's
            `limit_usd` (#1371).
        spent_usd:
          type: number
          description: Cross-run workflow spend so far in the current period.
        fraction:
          type: number
          description: |
            `spent_usd / limit_usd` against the effective limit. May exceed
            1 when over the ceiling. Zero when the limit is non-positive (no
            usable ceiling).
        warn_at:
          type: [number, "null"]
          description: |
            Optional warn threshold as a fraction in (0,1]. Omitted when
            the budget configures no warn threshold.
        tier:
          type: string
          enum: [ok, warn, over, ack_required, page]
          description: |
            Escalating ladder rung (#1371): `over` when `fraction >= 1`;
            `warn` when the configured `warn_at` is crossed but not yet
            over; otherwise `ok`. Past the ceiling the signal escalates by
            configured multiples of the effective limit ‚Äî
            `ack_required` at the ack multiple (default 2x) and `page` at
            the page multiple (default 3x) ‚Äî instead of saturating at
            `over`.
        ack_required:
          type: boolean
          description: |
            True when `tier` has reached the acknowledgment rung
            (`ack_required` or `page`): plan approval for the run now
            requires an explicit `--ack-budget` acknowledgment (#1371).
            Omitted (absent) when false.
        enforcement:
          type: string
          enum: [advisory, blocking]
          description: |
            Budget enforcement mode. A spec budget with no enforcement
            value defaults to (and surfaces as) `advisory`.

    RunCacheEfficiency:
      type: object
      description: |
        Per-run prompt-cache efficiency derived from the run's
        `cost_recorded` ledger (ADR-044 / #1352). **Display-only** ‚Äî never
        gates or blocks a run.

        When the run has no cost data the endpoint returns an **empty
        object** (none of the fields below present); clients detect "no
        data" by the absence of a field. The fields below are present only
        when the run has cost data.
      properties:
        fresh_input_tokens:
          type: integer
          description: Total cache-exclusive (fresh) input tokens across the run.
        cache_read_tokens:
          type: integer
          description: Total cache-served (read) input tokens across the run.
        cache_write_tokens:
          type: integer
          description: Total cache-creation (write) input tokens across the run.
        output_tokens:
          type: integer
          description: Total output tokens across the run.
        cache_read_ratio:
          type: number
          description: |
            `cache_read / (cache_read + fresh_input)` ‚Äî the share of input
            served from cache. `0` when the denominator is `0`.
        reuse_factor:
          type: number
          description: |
            `cache_read / max(cache_write, 1)` ‚Äî how many times each
            cache-creation token was re-read.
        gross_read_savings_usd:
          type: number
          description: |
            US dollars saved by serving `cache_read` tokens at the family
            cache-read discount instead of the fresh-input rate.
        write_penalty_usd:
          type: number
          description: |
            Extra US dollars paid to write `cache_write` tokens at the
            family cache-write premium over the fresh-input rate.
        net_savings_usd:
          type: number
          description: '`gross_read_savings_usd ‚àí write_penalty_usd`.'
        stages:
          type: array
          description: |
            Per-source breakdown (`plan_review` / `implement_review` /
            `agent`, sorted by source), each carrying the same token totals,
            ratios, and savings as the run-level figures.
          items:
            type: object
            properties:
              source:
                type: string
                description: 'Stage bucket: `plan_review`, `implement_review`, or `agent` (the runner stage-agent path, which carries no `source`).'
              fresh_input_tokens: { type: integer }
              cache_read_tokens: { type: integer }
              cache_write_tokens: { type: integer }
              output_tokens: { type: integer }
              cache_read_ratio: { type: number }
              reuse_factor: { type: number }
              gross_read_savings_usd: { type: number }
              write_penalty_usd: { type: number }
              net_savings_usd: { type: number }

    RunCost:
      type: object
      description: |
        Per-run estimated cost derived from the run's `cost_recorded`
        ledger (#1372). **Display-only** ‚Äî never gates or blocks a run.

        When the run has no cost data the endpoint returns an **empty
        object** (none of the fields below present); clients detect "no
        data" by the absence of a field. The fields below are present only
        when the run has cost data.
      properties:
        total_cost_usd:
          type: number
          description: |
            The run's rolled estimated US-dollar cost (the run record's
            `cost_usd_total`), reconstructed per-stage from the ledger.
        stages:
          type: array
          description: |
            Per-source cost breakdown (`agent` / `plan_review` /
            `implement_review`, sorted by source), each carrying the summed
            US dollars attributed to that stage bucket.
          items:
            type: object
            properties:
              source:
                type: string
                description: 'Stage bucket: `plan_review`, `implement_review`, or `agent` (the runner stage-agent path, which carries no `source`).'
              cost_usd:
                type: number
                description: Summed estimated US dollars for this stage bucket.
        merged_pr:
          type: object
          description: |
            Cost-per-merged-PR rollup, present **only** when the run
            resolved to a merged PR (a `pr_merged` audit row exists AND the
            run carries a pull-request URL). Omitted otherwise.
          properties:
            pull_request_url:
              type: string
              description: The merged pull-request URL the rollup is summed over.
            cost_per_merged_pr_usd:
              type: number
              description: |
                Sum of `cost_usd_total` across every run sharing this PR URL
                (the original run plus any fixup/follow-up runs) ‚Äî the total
                estimated cost to land the PR.
            run_count:
              type: integer
              description: Number of runs contributing to the rollup.

    RunLatency:
      type: object
      description: |
        Per-run gate-latency (wait-on-human) rollup derived at read time from
        the run's audit-chain timestamps (#1702). **Display-only** ‚Äî never
        gates or blocks a run.

        When no gate interval has resolved (a run that hasn't reached its
        first gate) the endpoint returns an **empty object** (none of the
        fields below present); clients detect "no data" by the absence of a
        field. The fields below are present only when at least one gate
        resolved.
      properties:
        gates:
          type: array
          description: |
            Per-gate wait breakdown, in a fixed order (`plan_approval`,
            `implement_review_to_dispatch`, `checks_green_to_merge`). A gate
            whose opening OR closing audit marker is absent is omitted
            (partial rollup); a present pair whose closing timestamp precedes
            its opening timestamp reports a `wait_seconds` of `0` (clamped,
            never negative).
          items:
            type: object
            properties:
              gate:
                type: string
                description: |
                  Gate name: `plan_approval` (first `plan_generated` ‚Üí the
                  first following `approval_submitted`),
                  `implement_review_to_dispatch` (the latest
                  `implement_reviewed` ‚Üí the first following
                  `acceptance_dispatched`, falling back to `pr_merged` when the
                  workflow has no acceptance stage), or `checks_green_to_merge`
                  (the latest checks-green auto-advance ‚Üí `pr_merged`).
              opened_at:
                type: string
                format: date-time
                description: Timestamp of the gate's opening audit marker.
              closed_at:
                type: string
                format: date-time
                description: Timestamp of the gate's closing audit marker.
              wait_seconds:
                type: number
                description: '`closed_at ‚àí opened_at` in seconds, clamped to `0`.'
        total_wait_on_human_seconds:
          type: number
          description: Sum of `wait_seconds` across the present gates.
        wall_clock_seconds:
          type: number
          description: |
            The run's end-to-end wall clock in seconds ‚Äî the run's creation
            time to its newest terminal audit marker (`pr_merged` /
            `post_merge_observed`), clamped to `0`.

    CalibrationResult:
      type: object
      description: |
        Aggregated runtime calibration statistics derived from
        `runtime_observed` audit entries. Zero `samples` is normal on
        a fresh installation.
      required: [samples, predicted_p50_minutes, actual_p50_minutes, actual_p95_minutes, calibration_ratio, confidence_band_accuracy]
      properties:
        workflow_id:
          type: string
          description: Workflow ID filter applied, if any.
        stage_type:
          type: string
          example: implement
        samples:
          type: integer
          description: Number of implement stages included in this result set.
        predicted_p50_minutes:
          type: number
          format: double
          description: Median predicted runtime in minutes across the sample.
        actual_p50_minutes:
          type: number
          format: double
          description: Median actual runtime in minutes across the sample.
        actual_p95_minutes:
          type: number
          format: double
          description: 95th-percentile actual runtime in minutes.
        calibration_ratio:
          type: number
          format: double
          description: |
            `actual_p50 / predicted_p50`. Multiply raw estimates by this value
            to calibrate toward historical actuals. Zero when predicted_p50 is 0.
        confidence_band_accuracy:
          type: object
          description: |
            Per-confidence-level hit rates. Keys are confidence levels (low,
            medium, high); each value is an object with `samples` (int) and
            `within_1.5x` (int) counts. A low `within_1.5x / samples` ratio
            signals over-confidence in that band.
          additionalProperties:
            type: object
            properties:
              samples: { type: integer }
              within_1.5x: { type: integer }

    AcceptanceTriageStats:
      type: object
      description: |
        Aggregated acceptance-triage statistics derived from
        `acceptance_triage_decided` audit entries (E31.11 / ADR-049
        decision #4). Zero `samples` is normal before any acceptance
        failure has been triaged.
      required: [samples, class_counts, disposition_counts, plan_review_misses, plan_review_miss_rate]
      properties:
        workflow_id:
          type: string
          description: Workflow ID filter applied, if any.
        samples:
          type: integer
          description: |
            Number of triage decisions included ‚Äî per DECISION, not per
            run. Entries whose payload fails to decode still count (under
            class `""`), so the denominator never silently shrinks.
        class_counts:
          type: object
          description: |
            Per-class decision counts. Keys are the E31.8 triage classes
            (`1`‚Äì`4`; `""` for an undecodable payload).
          additionalProperties: { type: integer }
        disposition_counts:
          type: object
          description: |
            Per-disposition decision counts (the E31.8 disposition
            vocabulary: `fixup_dispatched`, `retry_dispatched`, `paged`,
            the paged degradation variants; `""` for an undecodable
            payload).
          additionalProperties: { type: integer }
        plan_review_misses:
          type: integer
          description: |
            Count of class-3 decisions ‚Äî plan-review-miss events (a failed
            criterion that was inferred-source or unresolvable against the
            approved plan).
        plan_review_miss_rate:
          type: number
          format: double
          description: |
            `plan_review_misses / samples`. 0 when `samples` is 0 (never
            NaN). Per triage decision ‚Äî a run re-triaged after a re-run
            counts each decision.

    User:
      type: object
      required: [id, github_login, name]
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        github_login:
          type: string
          example: kuhlman-labs
        name:
          type: string
          example: Brett Kuhlman
        email:
          type: [string, "null"]
        account_id:
          type: [string, "null"]
          format: uuid
          description: |
            The workspace account the session's membership gate resolved at
            sign-in (E44.3 / ADR-057 Amendment A2). The SPA scopes its rendering
            to this account. `null` for bearer-token identities (their account
            enforcement is E44.5); a cookie session with no resolvable account
            is refused with 403 `account_unresolved` instead of returning null.

    OnboardingStart:
      type: object
      description: |
        The cell entry point's answer for a directory-routed caller (ADR-062,
        E44.7). `cell_region` is what THIS cell serves; `home_region` is the
        account's recorded region, equal to `cell_region` once a handoff has
        been honored.
      required: [provider, account_key, cell_region, home_region, pinned, readiness_path]
      properties:
        provider:
          type: string
          example: github
        account_key:
          type: string
          example: kuhlman-labs
        cell_region:
          type: string
          description: |
            The region this cell serves. Empty on a single-cell deployment with
            no configured region.
          example: us
        home_region:
          type: string
          description: |
            The account's home region as recorded by this request's handoff.
            Empty on a pass-through (handoff-less) request.
          example: us
        pinned:
          type: boolean
          description: |
            Whether this request carried a VERIFIED handoff that stamped the
            account. False on a pass-through request.
        readiness_path:
          type: string
          description: Where the caller continues the onboarding walk.
          example: /v0/onboarding/readiness

    OnboardingReadiness:
      type: object
      description: |
        Aggregated first-run readiness for a repository (E29.4), consumed by
        `fishhawk doctor` (E29.5). The four checks cascade: a not-installed
        repo yields an unavailable spec and no reviewers, each with an
        explanatory note. Read-only; performs no writes.
      required: [repo, app, spec, reviewers, scopes]
      properties:
        repo:
          type: string
          example: kuhlman-labs/fishhawk
        app:
          type: object
          description: GitHub App installation status for the target repo.
          required: [installed]
          properties:
            installed:
              type: boolean
            installation_id:
              type: integer
              format: int64
              description: Present only when installed.
            reason:
              type: string
              description: Why the App is not installed (or could not be resolved).
        spec:
          type: object
          description: The committed workflow spec's fetch + parse + validate state.
          required: [source, valid]
          properties:
            source:
              type: string
              enum: [fetched, unavailable]
            valid:
              type: boolean
              description: Meaningful only when source is "fetched".
            error:
              type: string
              description: Parse or validation failure detail.
            note:
              type: string
              description: Why the spec is unavailable (not installed, not found, fetch error).
        reviewers:
          type: array
          description: |
            Per-reviewer availability for each reviewer declared in the
            repo's spec, resolved against this deployment's configured
            backends. Empty when the spec is unavailable or invalid.
          items:
            type: object
            required: [provider, available]
            properties:
              provider:
                type: string
                example: anthropic
              model:
                type: string
              reasoning_effort:
                type: string
              available:
                type: boolean
              missing_hint:
                type: string
                description: How to enable the provider when unavailable (names the env knob).
        scopes:
          type: object
          description: |
            Whether the caller's token holds the run-driving scope subset.
            Cookie-session (OAuth) callers bypass scope enforcement and are
            adequate by construction.
          required: [adequate, required, missing]
          properties:
            adequate:
              type: boolean
            required:
              type: array
              items:
                type: string
            missing:
              type: array
              items:
                type: string
            note:
              type: string

    ApiToken:
      type: object
      required: [id, scopes, created_at]
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        scopes:
          type: array
          items:
            type: string
        last_used_at:
          type: [string, "null"]
          format: date-time
        created_at:
          type: string
          format: date-time
        revoked_at:
          type: [string, "null"]
          format: date-time
        auth_method:
          type: string
          enum: [static, oauth]
          description: |
            How the token was authenticated at issue time: `static` for
            operator-minted tokens (`fishhawkd token issue`), `oauth` for
            tokens minted through the OAuth device flow
            (`POST /v0/tokens/login`, E39.3). Omitted for legacy rows
            predating the column; callers treat an absent value as `static`.
        provider:
          type: string
          description: |
            The identity provider that authenticated an OAuth token (e.g.
            `github`). Omitted for static tokens.
        subject:
          type: string
          description: |
            The provider-qualified identity the token is bound to (e.g.
            `github:<login>`), the verified subject stamped at issue time.
            The mint 201 echoes it so `fishhawk token login` / `token list`
            can show which identity was authenticated. Omitted for legacy
            rows whose subject is empty.

  responses:
    BadRequest:
      description: Request body or query parameters were invalid.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: |
        Authentication missing or invalid (`error: unauthenticated`).
        Note: a credential that fails to validate because the database
        was unreachable surfaces as `503 service_unavailable` at the
        auth boundary, NOT as 401 ‚Äî a 401 here means the credential is
        absent or genuinely bad on a healthy database (#764).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    ServiceUnavailable:
      description: |
        A dependency required to serve the request was unavailable.
        At the auth boundary (`error: service_unavailable`, message
        `database unavailable; retry shortly`) this means the database
        could not be reached to validate the presented credential ‚Äî
        distinct from a bad credential (401) on a healthy database
        (#764). Transient; retry with backoff.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: |
        Authenticated identity lacks permission for the operation
        (`error: forbidden`), or ‚Äî on state-changing methods from a
        session-cookie identity ‚Äî the `X-CSRF-Token` header didn't
        match the `__Host-csrf` cookie (`error: csrf_required`).
        Bearer-token clients bypass the CSRF check.
        Bearer tokens that authenticate successfully but lack a required
        write scope receive `error: insufficient_scope` with HTTP 403.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    RepoForbidden:
      description: |
        `error: repo_forbidden` ‚Äî the caller is a workspace member in good
        standing, but does not hold at least `read` on this resource's
        repository on the forge (ADR-057 Amendment A2 / #2071).

        Applies to non-admin **cookie-session** callers only. Bearer / MCP
        token identities are bounded by token ownership and are never
        repo-filtered; a workspace `admin` bypasses the check entirely; and a
        deployment with no repo-ACL mirror wired (no database, or no identity
        provider configured) does not filter at all.

        Point reads DENY with this code while list endpoints silently OMIT the
        rows instead ‚Äî see the `repo-scoped visibility` note on each list
        operation. A repo whose forge permission could not be resolved (a forge
        outage or rate limit) is treated as NOT visible and answers this code
        too; the server logs the distinction at WARN. If the mirror's own store
        is unreachable the request fails `503 service_unavailable` rather than
        denying, so a filter fault is never mistaken for a permission answer.

        This is a READ-visibility code only. Writes and approvals are never
        gated on the mirror: it is a non-authoritative TTL'd cache of a forge
        read permission, so a cached deny must not block a caller whose current
        live forge permission authorizes the action, nor pre-empt the live
        decision-point permission check an approval already makes.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Referenced resource does not exist.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Conflict:
      description: Request conflicts with current resource state.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

# ---------------------------------------------------------------------------
# Default security: cookie OR bearer for all UI/CLI endpoints. Runner-
# facing and webhook endpoints override this individually.
# ---------------------------------------------------------------------------
security:
  - sessionCookie: []
  - bearerToken: []

paths:
  # ---------------------------------------------------------------------
  # Liveness ‚Äî public, unversioned
  # ---------------------------------------------------------------------
  /healthz:
    get:
      operationId: getHealthz
      summary: Liveness probe
      description: |
        Lightweight check used by load balancers, ECS health checks, and
        local smoke tests. Returns build version so operators can confirm
        a deploy reached the instance. Implemented in
        `backend/internal/server/handlers.go`.
      security: []
      tags: [diagnostics]
      responses:
        '200':
          description: Process is up.
          content:
            application/json:
              schema:
                type: object
                required: [status, version, git_sha, min_runner_version, schemas]
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: dev
                  git_sha:
                    type: string
                    description: |
                      Git commit SHA the binary was built from. scripts/dev
                      stamps the short HEAD SHA into dev builds, with a
                      "-dirty" suffix when the tree had uncommitted changes at
                      build time. "unknown" only for unstamped builds (built
                      outside scripts/dev without -ldflags). Operators use
                      this to confirm a deploy matches the expected commit.
                    example: abc1234
                  min_runner_version:
                    type: string
                    description: |
                      Minimum fishhawk-runner version required to interoperate
                      with this backend. "dev" signals no enforcement (local dev).
                      Runners older than this value should exit rather than proceed.
                    example: dev
                  schemas:
                    type: object
                    description: |
                      Map of schema name to hex-encoded SHA-256 of the backend's
                      embedded canonical schema bytes. Keys: "plan-standard-v1",
                      "workflow-v0". Callers compare against their own embedded
                      hashes to detect schema drift.
                    additionalProperties:
                      type: string
                    example:
                      plan-standard-v1: "abc123..."
                      workflow-v0: "def456..."
                  start_nonce:
                    type: string
                    description: |
                      Per-start opaque identity token, echoed verbatim from the
                      operator-supplied FISHHAWKD_START_NONCE env var /
                      --start-nonce flag. Present only when the operator set
                      one; omitted otherwise. scripts/dev generates a nonce per
                      spawn and requires it to round-trip here, proving the
                      listener on the port is the daemon it started even
                      across OS pid reuse.
                    example: "9f86d081884c7d65"
        '503':
          description: Process is shutting down or otherwise not ready.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ---------------------------------------------------------------------
  # Auth ‚Äî sign in via GitHub OAuth, manage scoped tokens
  # ---------------------------------------------------------------------
  /v0/auth/github/login:
    get:
      operationId: githubLogin
      summary: Begin GitHub OAuth sign-in
      description: |
        Redirects the browser to GitHub's OAuth authorize endpoint with a
        backend-generated state value. The state is bound to the browser
        via a temporary cookie and verified on callback.
      security: []
      tags: [auth]
      responses:
        '302':
          description: Redirect to GitHub's OAuth authorize URL.
        '500':
          description: OAuth state could not be issued.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/auth/github/callback:
    get:
      operationId: githubCallback
      summary: GitHub OAuth callback
      description: |
        Verifies the state, exchanges the code for a GitHub access token,
        fetches the GitHub profile, then runs the workspace-membership gate
        (E44.3 / ADR-057 Amendment A2) BEFORE any session exists: an
        `invited` `account_members` row admits DB-only; otherwise the user's
        live org list is intersected with org-granularity accounts whose
        `auto_join_role` policy is set (minting an audited `auto_join` row on
        first match). Only an admitted user gets a `fishhawk_session` cookie,
        bound to the resolved account. A user no account admits is redirected
        to the access-denied page with NO session cookie; a forge error
        during auto-join evaluation (with no invited row) fails closed.
      security: []
      tags: [auth]
      parameters:
        - name: code
          in: query
          required: true
          schema: { type: string }
        - name: state
          in: query
          required: true
          schema: { type: string }
      responses:
        '302':
          description: |
            Admitted: redirect to the SPA root with the session cookie set,
            bound to the resolved account. Denied (no admitting account, or
            no membership resolver configured): redirect to the access-denied
            page (default `/access-denied`) with NO session cookie.
        '400': { $ref: '#/components/responses/BadRequest' }
        '502':
          description: |
            Membership resolution failed closed ‚Äî the forge membership API
            errored during auto-join evaluation and no invited grant admits
            (`membership_resolution_failed`). No session is created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/auth/github/manifest-flow-start:
    get:
      operationId: githubManifestFlowStart
      summary: Begin GitHub App manifest registration
      description: |
        Mints a manifest-flow state value, sets it in a short-lived
        cookie, and renders an HTML page with a self-submitting form
        that POSTs the App manifest to GitHub. After the operator
        confirms the App's name on GitHub's side, GitHub redirects
        back to `/v0/auth/github/manifest-callback` with a one-shot
        `code`.

        Designed to be opened directly in a browser; the response is
        HTML, not JSON.
      security: []
      tags: [auth]
      parameters:
        - name: backend_url
          in: query
          required: true
          description: Absolute base URL of fishhawkd (e.g. `http://localhost:8080`).
          schema: { type: string, format: uri }
        - name: webhook_url
          in: query
          required: true
          description: |
            Destination GitHub will deliver webhooks to. For local dev
            this is typically a smee.io forwarding URL since GitHub
            cannot reach `localhost`.
          schema: { type: string, format: uri }
        - name: owner
          in: query
          description: |
            GitHub user or org login. When set, the form posts to
            `https://github.com/organizations/<owner>/settings/apps/new`
            instead of the operator's personal account.
          schema: { type: string }
        - name: name
          in: query
          description: App name override. Defaults to "Fishhawk".
          schema: { type: string }
      responses:
        '200':
          description: HTML form that auto-submits to GitHub.
          content:
            text/html:
              schema: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '503':
          description: Manifest flow not configured on this backend.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/auth/github/manifest-callback:
    get:
      operationId: githubManifestCallback
      summary: Receive GitHub App manifest-flow callback
      description: |
        Verifies the manifest-flow state, exchanges the one-shot
        `code` with `https://api.github.com/app-manifests/{code}/conversions`,
        and renders an HTML success page that displays the freshly
        minted App ID, OAuth client ID + secret, webhook secret, and
        PEM private key once. The backend does not persist these ‚Äî
        the operator copies them out into `.env` (local dev) or the
        configured secrets backend (hosted, deferred).

        The conversion code is single-use and good for ten minutes;
        on `502` the operator must restart from
        `/v0/auth/github/manifest-flow-start`.
      security: []
      tags: [auth]
      parameters:
        - name: code
          in: query
          required: true
          schema: { type: string }
        - name: state
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: HTML success page with one-time-visible credentials.
          content:
            text/html:
              schema: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '502':
          description: GitHub rejected the conversion code (expired, reused, or invalid).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: Manifest flow not configured on this backend.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/auth/me:
    get:
      operationId: getMe
      summary: Current user
      description: |
        Returns the authenticated user, or 401 if unauthenticated. A cookie
        session includes its `account_id` (the workspace account resolved at
        sign-in); a session whose account can no longer be resolved ‚Äî the
        account was deleted after sign-in, or the session predates the
        membership gate ‚Äî is refused with 403 `account_unresolved` (the SPA
        routes this to the access-denied page).
      tags: [auth]
      responses:
        '200':
          description: The authenticated user, with the session's account context.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: |
            The session carries no resolvable workspace account
            (`account_unresolved`). Sign in again.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/auth/logout:
    post:
      operationId: logout
      summary: Sign out
      description: Invalidates the current session.
      tags: [auth]
      responses:
        '204':
          description: Session destroyed.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /v0/onboarding/readiness:
    get:
      operationId: getOnboardingReadiness
      summary: First-run readiness for a repository
      description: |
        Aggregates the four server-side-only checks a repo's first run needs
        (E29.4), consumed by `fishhawk doctor` (E29.5): GitHub App
        installation, the committed workflow spec's parse/validate state,
        per-reviewer availability on this deployment, and the caller token's
        scope adequacy against the run-driving scope subset. Read-only.

        Gates on authentication only (401 for anonymous) ‚Äî NOT a write scope,
        because scope adequacy is itself a reported field: a write-scope gate
        would lock out exactly the callers who need to discover their gap.
        Mirrors `GET /v0/auth/me`.
      tags: [onboarding]
      parameters:
        - name: repo
          in: query
          required: true
          description: Target repository in owner/name form.
          schema:
            type: string
          example: kuhlman-labs/fishhawk
      responses:
        '200':
          description: Aggregated readiness for the repository.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OnboardingReadiness' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v0/onboarding/start:
    get:
      operationId: getOnboardingStart
      summary: Cell entry point for a directory-routed caller
      description: |
        The ONE cell surface the regional directory routes to (ADR-062, E44.7).
        It reports which region this cell serves and the account's recorded home
        region, and points at `/v0/onboarding/readiness` for the rest of the
        walk.

        Two ways to arrive, and the response is the same shape either way:

        - **Carrying a handoff.** The directory appends the signed `fh_*`
          parameter set below to the redirect. This endpoint's middleware
          verifies the signature and expiry, checks the named region is THIS
          cell's own, and stamps `accounts.home_region` with a conditional,
          first-write-wins UPDATE before the handler runs. The HMAC over the
          account identity is itself the credential, so no session is required.
          The pin is UPDATE-only: a handoff for an account this cell has no row
          for is refused `404`, never silently created.
        - **Without a handoff.** A single-cell deployment sees no `fh_*`
          parameters and the request passes through untouched; the caller must
          then be authenticated and name the account explicitly.

        Fail-closed: on a cell with no configured home region or no shared
        handoff secret, a request that DOES carry `fh_sig` is refused `503`. It
        is never served as though the handoff were absent.

        Replay safety comes from the conditional UPDATE, not from a consumed
        nonce: replaying an unexpired handoff verbatim is a harmless no-op,
        while a handoff naming a different region than the account already
        holds is refused `409`.
      tags: [onboarding]
      parameters:
        - name: provider
          in: query
          required: false
          description: |
            Forge discriminator (`github`, `gitlab`). Required WITHOUT a
            handoff; ignored with one (the signed `fh_provider` wins).
          schema: { type: string }
        - name: account_key
          in: query
          required: false
          description: |
            Forge-neutral account key. Required WITHOUT a handoff; ignored with
            one (the signed `fh_account_key` wins).
          schema: { type: string }
        - name: fh_provider
          in: query
          required: false
          description: Handoff ‚Äî the provider the directory authenticated.
          schema: { type: string }
        - name: fh_account_key
          in: query
          required: false
          description: Handoff ‚Äî the account key the directory authenticated.
          schema: { type: string }
        - name: fh_region
          in: query
          required: false
          description: |
            Handoff ‚Äî the region that owns the account. Must equal this cell's
            own region; anything else is refused `409` (the residency
            self-check).
          schema: { type: string }
        - name: fh_expires_at
          in: query
          required: false
          description: Handoff ‚Äî RFC3339 expiry. At or past it, `403`.
          schema: { type: string, format: date-time }
        - name: fh_nonce
          in: query
          required: false
          description: |
            Handoff ‚Äî per-issuance nonce. It BINDS one issuance; it is not
            consumed against a store. Distinct from an OAuth `state`, which the
            directory preserves untouched.
          schema: { type: string }
        - name: fh_sig
          in: query
          required: false
          description: |
            Handoff ‚Äî hex HMAC-SHA256 over a canonical, length-prefixed
            serialization of the other `fh_*` fields. Its PRESENCE is what
            switches this endpoint from pass-through to verify-and-pin.
          schema: { type: string }
      responses:
        '200':
          description: The cell's region and the account's home region.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OnboardingStart' }
        '400':
          description: |
            A malformed handoff (missing or unusable `fh_*` parameter), or a
            handoff-less request that named no account.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: The handoff signature did not verify, or it has expired.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: |
            The handoff names an account this cell has no row for. The pin is
            UPDATE-only, so the account is NOT created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: |
            `region_mismatch` ‚Äî the handoff names another region than this
            cell ‚Äî or `region_conflict` ‚Äî the account is already homed
            elsewhere and first-write-wins keeps that assignment.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: |
            `region_pin_disabled` ‚Äî this cell has no configured home region or
            no shared handoff secret, so it refuses a handoff-bearing request
            rather than serving it unverified.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/tokens:
    get:
      operationId: listTokens
      summary: List API tokens for the current user
      tags: [auth]
      responses:
        '200':
          description: Active tokens. Token strings are NOT returned.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Pagination'
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/ApiToken' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      operationId: createToken
      summary: Mint a new scoped API token
      description: |
        Returns the freshly-minted token string ONCE in the response body.
        The token is not retrievable later; if lost, revoke and re-issue.
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [scopes]
              properties:
                scopes:
                  type: array
                  items: { type: string }
      responses:
        '201':
          description: Token created. The plaintext value is in the response.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiToken'
                  - type: object
                    required: [token]
                    properties:
                      token:
                        type: string
                        description: |
                          The bearer token. Store immediately ‚Äî not
                          retrievable later.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /v0/tokens/login:
    get:
      operationId: tokenLoginDiscovery
      summary: OAuth token-login discovery
      description: |
        Returns the GitHub OAuth App `client_id` the CLI drives the device
        flow with, so `fishhawk token login` can authenticate a user
        without a pre-shared token (E39.3). Unauthenticated ‚Äî this is the
        entry point of the login flow. `503 tokens_unconfigured` when no
        OAuth client_id is wired.
      tags: [auth]
      security: []
      responses:
        '200':
          description: OAuth discovery document.
          content:
            application/json:
              schema:
                type: object
                required: [provider, client_id]
                properties:
                  provider:
                    type: string
                    description: The identity provider (v0 always `github`).
                  client_id:
                    type: string
                    description: The GitHub OAuth App client_id for the device flow.
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
    post:
      operationId: tokenLoginMint
      summary: Mint a user-bound token from an OAuth device-flow access token
      description: |
        The CLI drives the GitHub device flow itself (using the `client_id`
        from the discovery endpoint) and posts the resulting user access
        token here. The backend re-verifies the token server-side to a
        provider-qualified subject (`github:<login>`), enforces mint authz ‚Äî
        the subject must hold at least the configured minimum permission on
        the operator repo AND request only scopes within the operator
        default set ‚Äî then mints a token stamped `auth_method=oauth`,
        `provider=github` and returns the plaintext ONCE (E39.3). The access
        token in the body IS the credential; the endpoint is unauthenticated
        at the bearer layer.
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [access_token]
              properties:
                access_token:
                  type: string
                  description: The GitHub user access token obtained by the CLI's device flow.
                scopes:
                  type: array
                  items: { type: string }
                  description: |
                    Requested scopes. Each must fall within the operator
                    default set or the request is rejected. An empty/omitted
                    list defaults to the operator default set.
      responses:
        '201':
          description: Token created. The plaintext value is in the response.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiToken'
                  - type: object
                    required: [token]
                    properties:
                      token:
                        type: string
                        description: |
                          The bearer token. Store immediately ‚Äî not
                          retrievable later.
        '400': { $ref: '#/components/responses/BadRequest' }
        '401':
          description: |
            The presented access token could not be verified
            (`error: token_verification_failed`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: |
            The verified subject lacks the minimum repository permission
            (`error: insufficient_permission`) or requested a scope outside
            the operator default set (`error: scope_not_allowed`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }

  /v0/tokens/{token_id}:
    delete:
      operationId: revokeToken
      summary: Revoke an API token
      tags: [auth]
      parameters:
        - { name: token_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '204':
          description: Token revoked.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ---------------------------------------------------------------------
  # Runs
  # ---------------------------------------------------------------------
  /v0/runs:
    get:
      operationId: listRuns
      summary: List workflow runs
      description: |
        Cursor-paginated list ordered by `created_at` descending. Filter
        parameters are additive; multiple query values AND together.

        **Repo-scoped visibility (ADR-057 Amendment A2 / #2071).** For a
        non-admin cookie-session caller, this page is narrowed ‚Äî on top of the
        existing workspace-account scoping ‚Äî to repositories the caller holds
        at least `read` on at the forge. Rows for other repositories are
        OMITTED, not errored. Because the offset cursor counts rows BEFORE this
        narrowing, a page may come back shorter than `limit` while
        `next_cursor` is still non-empty; following the cursor to exhaustion
        still yields every visible row exactly once. Bearer / MCP identities
        and workspace admins are not filtered, and a deployment with no
        repo-ACL mirror wired behaves exactly as before.
      tags: [runs]
      parameters:
        - { name: repo, in: query, schema: { type: string } }
        - { name: workflow_id, in: query, schema: { type: string } }
        - { name: state, in: query, schema: { type: string, enum: [pending, running, succeeded, failed, cancelled] } }
        - name: pull_request_url
          in: query
          description: |
            Equality filter on `run.pull_request_url` (#216). Used by
            the threaded-runs view to render every run on a PR.
          schema: { type: string }
        - name: trigger_ref
          in: query
          description: |
            Equality filter on `run.trigger_ref` (e.g. `issue:42`).
            Used by the threaded-runs view to render every run on the
            same trigger when no PR has landed yet.
          schema: { type: string }
        - name: runner_kind
          in: query
          description: |
            Equality filter on `run.runner_kind` (ADR-022 / #388).
            Used by compliance consumers to project to
            `github_actions` only (or to scope to local-runner
            dev-loop runs).
          schema: { type: string, enum: [github_actions, local] }
        - { name: limit, in: query, schema: { type: integer, default: 50, maximum: 200 } }
        - { name: cursor, in: query, schema: { type: string } }
      responses:
        '200':
          description: Page of runs.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Pagination'
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/Run' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
    post:
      operationId: createRun
      summary: Create a workflow run
      description: |
        Creates a `runs` row in the `pending` state and dispatches a
        `workflow_dispatch` event to the customer's repo. The runner
        action picks it up and proceeds through the configured stages.

        Pass `Idempotency-Key: <opaque-string>` to make the call
        retriable. If a run with the same `(repo, key)` exists, it's
        returned with a 200 instead of creating a fresh one. The
        scope is `(repo, key)` so two callers picking the same key
        for different repos don't collide.
      tags: [runs]
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
            description: |
              Opaque caller-chosen string. Same key + same repo =
              the existing run is returned (200). Different key OR
              different repo = a fresh run is created (201). No
              header = always create.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [repo, workflow_id, workflow_sha, trigger_source]
              properties:
                repo:
                  type: string
                  example: kuhlman-labs/fishhawk
                workflow_id:
                  type: string
                  example: feature_change
                workflow_sha:
                  type: string
                trigger_source:
                  type: string
                  enum: [github_issue, cli, ui]
                trigger_ref:
                  type: [string, "null"]
                runner_kind:
                  type: string
                  enum: [github_actions, local]
                  description: |
                    Optional. Execution backend the run will use
                    (ADR-022 / #388). Defaults to `github_actions`
                    when omitted. The local-runner CLI (Phase C of
                    E22 / #389) passes `local` to mint a run that
                    runs on the operator's workstation instead of
                    GitHub Actions.
                workflow_spec:
                  type: string
                  description: |
                    Optional. YAML body of `.fishhawk/workflows.yaml`
                    at `workflow_sha`, sent inline so the backend can
                    create one Stage row per stage definition for
                    API-minted runs (#411). When omitted AND the
                    backend has a GitHub client configured, the
                    handler resolves the App's installation for
                    `repo` and fetches the spec at `workflow_sha`
                    via the GitHub Contents API (#413) ‚Äî used by
                    MCP-driven runs and cross-repo CLI flows that
                    can't easily ship the spec inline. When
                    omitted AND no GitHub client is configured,
                    the run row is created with no stages (the
                    legacy shape, kept for integration test
                    seeding). The `fishhawk run start` CLI always
                    sends this field, populated either via
                    auto-discovery of the local checkout or the
                    `--spec-file` flag. A malformed or
                    unrecognised-workflow_id body returns 400
                    before the run row is created; an App that's
                    not installed on the target repo returns 422
                    `repo_not_installed`; a missing spec at the
                    requested `workflow_sha` returns 422
                    `spec_not_found`.
                issue_context:
                  $ref: '#/components/schemas/IssueContext'
                  description: |
                    Optional. Cached payload from the operator's
                    `gh issue view` (#415). Carries the triggering
                    GitHub issue's title, body, url, and number so
                    the backend's prompt builder reads from the row
                    instead of needing an installation_id to fetch
                    from GitHub. Only valid with
                    `trigger_source: github_issue` ‚Äî a 400 fires
                    when shipped with any other trigger source.
                    Webhook-dispatched runs leave this empty and
                    the backend falls back to the existing
                    GitHub-fetch path.
                drive:
                  type: boolean
                  description: |
                    Optional. Per-run drive-mode override (#1023 /
                    #996 theme 1). When present, wins over the
                    workflow spec's `drive` default; when omitted,
                    the run inherits the spec value (false when the
                    spec doesn't set one or no spec is resolved).
                    The resolved flag is snapshotted on the run row
                    at create time and echoed back as `drive` on the
                    Run resource.
                budget_override:
                  type: boolean
                  description: |
                    Optional. Operator force-past for a blocking
                    periodic cost budget (#688 / ADR-030). When the
                    resolved workflow declares an
                    `enforcement: blocking` budget whose current
                    calendar-period spend has reached `limit_usd`, a
                    new run is normally refused with `402
                    budget_exhausted`. Setting this `true` admits the
                    run anyway and records a
                    `run_admitted_budget_override` audit entry.
                    Ignored when no blocking budget is over ‚Äî it only
                    matters at the moment a budget would block. There
                    is no override on the webhook-dispatch path
                    (webhook triggers can't carry one).
                upstream_run_id:
                  type: [string, "null"]
                  format: uuid
                  description: |
                    Optional. The upstream `feature_change` run whose
                    `ci_green` / `review_merged` a standalone
                    deploy-only `release` run's `required_upstream`
                    pre-flight gate should evaluate (E23.11 / #1417). A
                    deploy-only run has no implement/review stage of its
                    own; set this so the gate evaluates the referenced
                    upstream instead. Omitted (the appended-deploy /
                    non-deploy default) leaves the gate evaluating the
                    current run. DISTINCT from `parent_run_id` (#216) ‚Äî
                    a deploy-gate safety reference, not a follow-up /
                    lineage link. Because it controls a safety-critical
                    deploy gate, the gate validates the reference's
                    provenance at evaluation time: the upstream must be a
                    `feature_change` run in the SAME REPO as the deploy
                    run; a cross-repo or non-`feature_change` reference is
                    treated as unresolved and fails the gate closed.
                    Persisted on the run row and echoed
                    back as `upstream_run_id` on the Run resource.
      responses:
        '200':
          description: Idempotent replay ‚Äî existing run returned unchanged.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Run' }
        '201':
          description: Run created and dispatched.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Run' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '402':
          description: |
            `budget_exhausted` ‚Äî the resolved workflow declares an
            `enforcement: blocking` periodic cost budget whose
            current calendar-period spend has reached `limit_usd`
            (#688 / ADR-030). No run row is created. Clear it by
            raising `limit_usd`, switching the budget to
            `enforcement: advisory`, or retrying with
            `budget_override: true`. In-flight runs and CI-retry /
            decomposition-child continuations are never gated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422':
          description: |
            Returned when the GitHub-fetch fallback can't resolve
            the spec (#413). `repo_not_installed` when the App is
            absent from the target repo; `spec_not_found` when the
            file doesn't exist at the requested `workflow_sha`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }

  /v0/runs/{run_id}:
    get:
      operationId: getRun
      summary: Get a run
      description: |
        Point read. A non-admin cookie-session caller who does not hold `read`
        on the run's repository at the forge is DENIED 403 `repo_forbidden`
        (ADR-057 Amendment A2 / #2071) rather than filtered ‚Äî the same rule
        covers the run's stage, artifact, concern and per-run audit reads,
        which share this run-scoped authorization path.
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: Run details.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Run' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/RepoForbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }

  /v0/runs/{run_id}/cancel:
    post:
      operationId: cancelRun
      summary: Cancel a run
      description: |
        Transitions the run and any non-terminal stages to `cancelled`.
        Idempotent ‚Äî calling on an already-cancelled or already-terminal
        run returns 409 unless `state` already equals `cancelled`.
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: Run cancelled.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Run' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /v0/runs/{run_id}/consolidate:
    post:
      operationId: consolidateRun
      summary: Run the decomposed-parent fan-in (E24.2) on demand
      description: |
        Operator-drivable, error-SURFACING fan-in trigger (E24.2 / ADR-041 /
        #1238) for a decomposed PARENT run parked in `awaiting_children`. The
        60s child-completion sweeper is the automatic backstop that normally
        runs the fan-in, but it is OFF by default in the local dev `fishhawkd`
        ("dev-loop posture"), so on the local runner a parent whose children
        have all settled stays parked with no consolidated branch/PR. This
        endpoint runs the same fan-in on demand AND surfaces why it failed:
        where the event-driven path WARN-swallows a non-conflict
        `IntegrateSlices` error (leaving a silent stuck parent), this returns
        it (502 `slice_integration_error`).

        Mechanism: composes the existing orchestrator primitives
        (`IntegrateSlices` ‚Üí `TransitionStage` ‚Üí `Advance`), mirroring the
        sweeper's `resolveParent`, WITHOUT touching the hot event-driven /
        sweeper paths. On a clean integration the parent implement stage
        resolves `succeeded`, a `children_settled` audit entry is appended
        (payload byte-identical to the sweeper's), the consolidated PR opens,
        and the parent review gate dispatches. On a slice merge conflict the
        parent implement stage fails recoverable (category `B`) and a
        `slice_integration_conflict` audit entry records the conflicting slice
        ‚Äî the E24.2 contract, preserved.

        **Preconditions** (each a refusal): the run is a decomposed parent
        (`decomposed_from` null AND it has ‚â•1 decomposed child, else 400
        `not_a_decomposed_parent`); its implement stage is parked in
        `awaiting_children` (else 409 `not_awaiting_children` ‚Äî already
        resolved or not a decomposition); EVERY child is terminal (else 409
        `children_in_flight`) AND every terminal child `succeeded` (else 409
        `children_failed` ‚Äî resolve/re-drive the failed child rather than
        consolidating a partial set).

        Idempotent-friendly: a second call after a successful consolidate (or
        after the sweeper won the race) finds no `awaiting_children` stage and
        returns 409 `not_awaiting_children`; `IntegrateSlices`' own merges are
        idempotent no-ops, so a retry after a surfaced error re-enters cleanly.

        **Authorization.** Requires `write:runs`. A run-bound MCP token
        (subject `mcp:run:<uuid>`) is refused 403 (`agent_token_forbidden`) ‚Äî
        consolidation is an operator action, not one the implement agent
        self-drives.
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: |
            Fan-in ran. `outcome` is `integrated` (every slice merged; parent
            implement `succeeded`; `consolidated_branch` + `pull_request_url`
            set) or `slice_conflict` (a slice failed to merge; parent implement
            failed recoverable category `B`; `conflicting_slice_index` +
            `conflicting_child_run_id` set).
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id: { $ref: '#/components/schemas/UUID' }
                  outcome:
                    type: string
                    enum: [integrated, slice_conflict]
                    description: 'integrated = clean fan-in; slice_conflict = a slice failed to merge (parent failed recoverable).'
                  resolved_to_state:
                    type: string
                    description: 'The parent implement stage state after the fan-in: succeeded (integrated) or failed (slice_conflict).'
                  consolidated_branch: { type: string, description: 'The consolidated branch name; set on the integrated outcome.' }
                  pull_request_url: { type: string, description: 'The consolidated PR URL; set on the integrated outcome.' }
                  conflicting_slice_index: { type: integer, description: 'The slice index that failed to merge; set on the slice_conflict outcome.' }
                  conflicting_child_run_id: { type: string, description: 'The child run id owning the conflicting slice; set on the slice_conflict outcome.' }
                  detail: { type: string, description: 'Human-readable conflict detail; set on the slice_conflict outcome.' }
        '400':
          description: |
            The run is not a decomposed parent (a child, or has no children).
            Body's `error` is `not_a_decomposed_parent`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: |
            One of two cases: (1) bearer token lacks `write:runs` scope ‚Äî body
            `error` is `insufficient_scope`; (2) a run-bound MCP token attempted
            the fan-in ‚Äî body `error` is `agent_token_forbidden`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: |
            Fan-in not runnable. One of: `not_awaiting_children` (no implement
            stage parked in awaiting_children), `children_in_flight` (a child is
            still non-terminal; `details.non_terminal_child_run_ids` names
            them), or `children_failed` (a child failed;
            `details.failed_child_run_ids` names them).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '502':
          description: |
            The slice integration failed with a non-conflict error (e.g. a base
            ref or branch-create failure). Body's `error` is
            `slice_integration_error` and `details.error` carries the cause. The
            parent implement stage is left `awaiting_children` for retry.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/runs/{run_id}/integrate-wave:
    post:
      operationId: integrateWave
      summary: Non-settling per-wave fan-in of a decomposed parent (E24.X / #1278)
      description: |
        The NON-settling per-wave fan-in (#1278 slice B / ADR-041) the
        topological-wave `fishhawk_run_children` dispatch calls BETWEEN waves.
        It merges the slices SUCCEEDED SO FAR onto the consolidated branch so a
        later wave's dependent slices cut their branch from a tree that already
        contains the predecessors' merged symbols.

        Mechanism: reuses the EXACT same exported `IntegrateSlices` primitive
        `POST /consolidate` uses ‚Äî no new git-merge code ‚Äî which filters to
        succeeded slices ascending and is idempotent (already-merged 204 /
        branch-exists 422 no-ops).

        **How it DIFFERS from `/consolidate` (the terminal fan-in).** Unlike
        `/consolidate`, integrate-wave is intermediate and deliberately does
        NOT settle the parent:
        - it does NOT require all children terminal (it merges whatever has
          succeeded so far);
        - it does NOT transition the parent implement stage (the stage state is
          identical before and after ‚Äî on BOTH the integrated and the
          slice_conflict outcome; the driver decides what to do on a conflict);
        - it does NOT advance the run or open the consolidated PR.
        The final terminal fan-in (stage resolution + consolidated PR) stays
        driven by `/consolidate` after the LAST wave's children settle.

        **Preconditions** (each a refusal): the run is a decomposed parent
        (`decomposed_from` null AND it has ‚â•1 decomposed child, else 400
        `not_a_decomposed_parent`). There is intentionally NO
        terminal-children / awaiting_children precondition ‚Äî that is the whole
        point of the per-wave fan-in.

        **Authorization.** Requires `write:runs`. A run-bound MCP token
        (subject `mcp:run:<uuid>`) is refused 403 (`agent_token_forbidden`) ‚Äî
        the fan-in is an operator action.
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: |
            The per-wave fan-in ran. `outcome` is `integrated` (the succeeded
            slices so far merged; `consolidated_branch` set) or `slice_conflict`
            (a slice failed to merge; `conflicting_slice_index` +
            `conflicting_child_run_id` set). The parent stage is UNCHANGED on
            both outcomes ‚Äî there is no `resolved_to_state`.
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id: { $ref: '#/components/schemas/UUID' }
                  outcome:
                    type: string
                    enum: [integrated, slice_conflict]
                    description: 'integrated = the succeeded slices merged onto the consolidated branch; slice_conflict = a slice failed to merge (parent stage left unchanged).'
                  consolidated_branch: { type: string, description: 'The consolidated branch name; set on the integrated outcome.' }
                  conflicting_slice_index: { type: integer, description: 'The slice index that failed to merge; set on the slice_conflict outcome.' }
                  conflicting_child_run_id: { type: string, description: 'The child run id owning the conflicting slice; set on the slice_conflict outcome.' }
                  detail: { type: string, description: 'Human-readable conflict detail; set on the slice_conflict outcome.' }
        '400':
          description: |
            The run is not a decomposed parent (a child, or has no children).
            Body's `error` is `not_a_decomposed_parent`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: |
            One of two cases: (1) bearer token lacks `write:runs` scope ‚Äî body
            `error` is `insufficient_scope`; (2) a run-bound MCP token attempted
            the fan-in ‚Äî body `error` is `agent_token_forbidden`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '502':
          description: |
            The slice integration failed with a non-conflict error (e.g. a base
            ref or branch-create failure). Body's `error` is
            `slice_integration_error` and `details.error` carries the cause. The
            parent stage is left unchanged for retry.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/runs/{run_id}/recover:
    post:
      operationId: recoverRun
      summary: Recover a category-B-failed run against its approved plan
      description: |
        Operator-initiated category-B recovery (#978). The target shape
        ‚Äî top-level run vs. decomposition child ‚Äî is auto-detected from
        the run's `decomposed_from`:

        **Top-level target.** Mints a NEW plan-stage-less child run that
        re-executes against the parent run's approved plan ‚Äî the same
        inheritance shape as the CI-failure auto-retry, but
        operator-triggered and exempt from the `on_ci_failure` cap: the
        child carries the parent's `retry_attempt` UNCHANGED, with
        `parent_run_id` as provenance. Responds 201 with the new run.

        **Decomposition-child target (#1081).** When the target run is
        itself a decomposition child (`decomposed_from` set), recovery
        re-drives THAT child IN PLACE ‚Äî the same run id, NOT a freshly
        minted run ‚Äî on the shared parent branch, so the parent fan-out
        parked in `awaiting_children` can still consolidate. An in-place
        re-drive (rather than a new child sharing `decomposed_from`) is
        deliberate: a second child row would double-count in the
        parent's consolidation counters. The child's failed implement
        stage is re-opened (`failed` ‚Üí `pending`) and the run
        un-terminal-ed (`failed` ‚Üí `running`), then handed to the
        orchestrator to dispatch; its plan resolves via the existing
        `parent_run_id` walk. Responds 201 with the re-opened child.

        **Eligibility.** A top-level target requires the parent's plan
        stage `succeeded` AND its implement stage `failed` category `B`
        (scope/constraint violation). A decomposition-child target
        requires the CHILD's own implement stage `failed` category `B`
        AND a plan resolvable via the `parent_run_id` walk. Anything
        else is refused 409 `recovery_not_eligible` with `details`
        naming `{plan_state, implement_state, failure_category,
        plan_resolved}`. The stage-level retry endpoint keeps refusing
        category B ‚Äî recovery is broader than a retry, not a retry of
        the terminal stage.

        **Scope amendments.** Optional `add_scope_files` paths land as
        a PRE-APPROVED #961 scope-amendment row on the implement stage
        ‚Äî the newly minted one for a top-level target, the EXISTING
        re-opened one for a decomposition child (its stage id is
        preserved across the re-drive, so the fold by run + stage id
        still sees it) (visible via the scope-amendments list, folded
        by the prompt fetch and the runner's pre-commit refresh).
        `operation: create` entries flow into the net-new-file gates
        like any approved amendment. Note the fold deliberately no-ops
        when the reused plan declares an empty `scope.files` (the
        `git add -A` guard) ‚Äî category-B failures presuppose a
        declared scope, so this is a documented edge, not a refusal.

        **Scope exemptions.** Optional `exempt_scope_files` is the
        inverse of `add_scope_files` (#1229): each `{path, reason}` marks
        a DECLARED `scope.files` path operator-justified-unchanged so the
        runner's `MissingScopeFiles` shortfall gate subtracts it ‚Äî a
        category-B run that failed SOLELY on a declared-but-unchanged file
        recovers in one call with no replan. Unlike `add_scope_files`, an
        exemption does NOT mint a scope-amendment row (it subtracts from
        the gate, it does not widen scope). Each path must be clean
        repo-relative AND carry a non-empty reason; either failure is
        refused 400 `validation_failed` with `field=exempt_scope_files`.
        Exemptions are recorded as `exempted_paths` on the
        `plan_reused_from` provenance and delivered to the runner via the
        implement prompt's `scope_exemptions` field.

        **Provenance.** A `plan_reused_from` audit entry is appended
        on the child with
        `{parent_run_id, parent_failure_category, added_paths,
        exempted_paths, source, reason}`; `source` is `operator_recovery`
        for a top-level target and `decomposition_child_recovery` for an
        in-place child re-drive. The approved amendment row is the second
        surface. The `reason` is additionally injected into the recovery
        agent's binding conditions (Part D, #1229).

        No `workflow_dispatch` is fired ‚Äî identical to `POST /v0/runs`:
        local-runner runs sit pending for the local loop to drive. The
        implement stage's prompt resolves the parent's plan via the
        existing `parent_run_id` walk; the parent's binding approval
        conditions and approval-time `add_scope_files` are inherited.

        `Idempotency-Key` shares the `(repo, key)` keyspace with
        `POST /v0/runs`: a replay returns the existing run with 200.
        Replay is honored BEFORE the budget gate ‚Äî a network retry of
        a successful recovery returns the existing run even when the
        blocking budget tripped between the two calls (replay is not
        new spend).

        **Authorization.** Requires `write:runs` (same as
        `POST /v0/runs`). A decomposition-child target ADDITIONALLY
        rejects agent (MCP subject-bound, `mcp:run:<uuid>`) tokens with
        403 `agent_token_forbidden`: that path re-opens a terminal run
        via the same `run.RedriveChild` action `POST /v0/runs/{id}/redrive`
        performs, which is operator-only ‚Äî an agent may not re-drive any
        run, including its own (#698, #1081).
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
            description: |
              Opaque caller-chosen string, shared keyspace with
              `POST /v0/runs`. Same key + same repo = the existing
              run is returned (200).
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                add_scope_files:
                  type: array
                  description: |
                    Operator-named paths folded into the recovery run's
                    effective scope as a pre-approved scope amendment.
                    Repo-relative; absolute, empty, and `..`-containing
                    paths are refused 400.
                  items:
                    type: object
                    additionalProperties: false
                    required: [path]
                    properties:
                      path:
                        type: string
                        example: docs/companion.md
                      operation:
                        type: string
                        enum: [modify, create]
                        default: modify
                exempt_scope_files:
                  type: array
                  description: |
                    DECLARED `scope.files` paths to mark
                    operator-justified-unchanged so the runner's shortfall
                    gate subtracts them (#1229) ‚Äî the inverse of
                    `add_scope_files`: it subtracts from the gate, it does
                    NOT widen scope (no amendment row). Each entry requires
                    a clean repo-relative `path` AND a non-empty `reason`;
                    either failure is refused 400 `validation_failed` with
                    `field=exempt_scope_files`.
                  items:
                    type: object
                    additionalProperties: false
                    required: [path, reason]
                    properties:
                      path:
                        type: string
                        example: backend/internal/server/handlers.go
                      reason:
                        type: string
                        example: the declared file needs no change on this slice
                reason:
                  type: string
                  description: |
                    Why the recovery (and each added path) is needed;
                    recorded on the amendment row and the
                    `plan_reused_from` audit entry, and injected into the
                    recovery agent's binding conditions (Part D).
                budget_override:
                  type: boolean
                  description: |
                    Force the recovery past a blocking periodic budget
                    that is over its limit (#688); ignored when no
                    blocking budget is over.
      responses:
        '201':
          description: |
            Recovery run created (top-level target) or decomposition
            child re-opened in place (same run id).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Run' }
        '200':
          description: Idempotent replay ‚Äî existing run returned.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Run' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: |
            Missing `write:runs` scope (`insufficient_scope`), OR a
            decomposition-child target presented with an MCP/agent
            subject-bound token (subject `mcp:run:<uuid>`) ‚Äî body `error`
            is `agent_token_forbidden`; that path re-drives a terminal run
            in place, an operator-only action (#698, #1081).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: |
            `recovery_not_eligible` ‚Äî a top-level target whose plan
            stage is not `succeeded` and/or whose implement stage is not
            `failed` category-B, or a decomposition-child target whose
            own implement stage is not `failed` category-B and/or whose
            plan does not resolve via the `parent_run_id` walk.
            `details` carries `{plan_state, implement_state,
            failure_category, plan_resolved}`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422':
          description: |
            `recovery_unsupported` ‚Äî the parent run has no cached
            workflow spec (legacy row), its cached spec no longer
            parses or defines the workflow, or the workflow has no
            non-plan stages. Start a fresh run instead.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }

  /v0/runs/{run_id}/redrive:
    post:
      operationId: redriveChild
      summary: Re-drive a failed decomposition child run
      description: |
        Operator recovery action for a decomposition parent parked in
        `awaiting_children` because every failed child was in a retryable
        failure category (A/C, or D-timeout) ‚Äî see #698. Re-opens the
        failed child run (`failed` ‚Üí `running`) and its failed implement
        stage (`failed` ‚Üí `pending`), then hands off to the orchestrator
        to walk `pending` ‚Üí `dispatched` and fire `workflow_dispatch`.
        Un-terminal-ing the run is what lets the orchestrator act ‚Äî
        `Advance` no-ops on a terminal run. On the child's next terminal
        transition the parked parent reconciles through the normal
        parent-resolution path. Writes a `child_redriven` audit entry on
        success with the prior implement-stage failure category and
        reason in the payload.

        **Authorization.** Re-drive is an operator action. It requires
        the operator retry scope (`write:stages` or `write:retries`, the
        same shape as `POST /v0/stages/{stage_id}/retry`) AND rejects any
        MCP subject-bound (agent) token outright ‚Äî an agent may not
        re-drive any run (not its own, not a sibling/child/parent),
        because re-opening a terminal run is not an agent-permitted
        action. Cookie-session operators are accepted unconditionally.
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: Child re-driven; refreshed Run row (state `running`) in body.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Run' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: |
            One of two cases: (1) the caller presented an MCP/agent
            subject-bound token (subject `mcp:run:<uuid>`) ‚Äî body `error`
            is `agent_token_forbidden`; agent tokens may never re-drive a
            run. (2) a bearer token lacks both `write:stages` and
            `write:retries` scope ‚Äî body `error` is `insufficient_scope`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422':
          description: |
            Re-drive not applicable: the run is not a decomposition child
            (`DecomposedFrom` is null), is not in the `failed` state, or
            has no failed implement stage to re-open. Body's `error` is
            `redrive_not_applicable` and `message` explains the reason.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/runs/{run_id}/revive:
    post:
      operationId: reviveRun
      summary: Revive a terminal-failed run (one-verb batch re-park)
      description: |
        Operator recovery action that re-admits ANY terminal-`failed`
        run for another turn ‚Äî the single verb that replaces the
        retry-without-dispatch dance (see #1915). It **pre-validates**
        that the run is `failed` AND that every failed stage is in a
        retryable failure category (A/C, or the D `sla_timeout`
        sub-reason) BEFORE any mutation, then re-parks each failed stage
        in its correct gate-ordered pre-dispatch state and reopens the
        run `failed` ‚Üí `running`:

          - agent (A) / infrastructure (C) ‚Üí `pending`
          - approval SLA timeout (D `sla_timeout`) ‚Üí `awaiting_approval`
          - a decomposition PARENT's implement stage ‚Üí `awaiting_children`
            (restores the fan-in park, #1891)

        **No dispatch ‚Äî the semantic difference from
        `POST /v0/runs/{run_id}/redrive` and
        `POST /v0/stages/{stage_id}/retry`.** Revive performs NO
        orchestrator `Advance` and never fires `workflow_dispatch`: it
        re-parks only. Each re-parked stage sits in its pre-dispatch
        state until the operator dispatches it later at its proper gate
        turn via the existing verbs. Because no `Advance` fires during
        the revive, a stage cannot be re-dispatched out of gate order.

        **No-partial-mutation pre-validation.** A single non-retryable
        failed stage (category-B, D-rejected, or a stage with no recorded
        category) refuses the WHOLE revive (`422 revive_not_applicable`)
        naming the blocking stage ‚Äî nothing is re-parked and the run
        stays `failed`. A run in any non-`failed` state refuses the same
        way. A run with zero failed stages refuses ONLY when no stage
        sits in a re-parked pre-dispatch state (`pending` /
        `awaiting_approval` / `awaiting_children`); the interrupted-revive
        shape (see below) instead SUCCEEDS.

        **Resumable partial state (#1942).** The re-park batch and the run
        reopen are NOT one transaction ‚Äî each re-park and the closing
        reopen run their own row-locked transaction. A *post-validation*
        failure (an infra error or a concurrent transition) can therefore
        leave the run partially re-parked and return `500 internal_error`
        whose message carries a resume hint. This is deliberate; every
        intermediate state is a valid state-machine state and a second
        revive is the compensation: retrying the verb re-parks the
        remaining failed stages, and when every failed stage was already
        re-parked it completes the interrupted reopen ‚Äî succeeding with an
        EMPTY `restored_stages` and `resumed: true`, consuming no stage's
        retry budget a second time.

        Each re-park bumps the stage's `self_retry_count`, so revive
        consumes per-stage retry budget exactly like
        `POST /v0/stages/{stage_id}/retry` (a resumed revive bumps none).
        Writes one `run_revived` audit entry on success whose payload
        lists every restored stage and the `resumed` flag. The re-park and
        reopen transitions are committed BEFORE this audit append, so an
        audit-append failure does NOT unwind the committed revive: the call
        still returns `200` and surfaces the failure as an `audit_warning`
        string on the body (fail-closed is impossible ‚Äî a committed revive
        cannot be re-run to re-attempt the append, #1943).

        **Authorization.** Revive is an operator action. It requires the
        operator retry scope (`write:stages` or `write:retries`) AND
        rejects any MCP subject-bound (agent) token outright ‚Äî an agent
        may not revive any run, because re-opening a terminal run is not
        an agent-permitted action. Cookie-session operators are accepted
        unconditionally.
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: |
            Run revived; body carries the refreshed Run row (state
            `running`), the per-stage re-park summary, and the `resumed`
            flag. On a resumed revive (an interrupted prior revive
            completed) `restored_stages` is empty and `resumed` is true.
          content:
            application/json:
              schema:
                type: object
                required: [run, restored_stages, resumed]
                properties:
                  run: { $ref: '#/components/schemas/Run' }
                  resumed:
                    type: boolean
                    description: |
                      True when this call completed an INTERRUPTED prior
                      revive (every failed stage was already re-parked;
                      only the run reopen had not landed) rather than
                      performing fresh re-parks. On a resumed revive
                      `restored_stages` is empty and no stage's retry
                      budget is consumed again (#1942).
                  restored_stages:
                    type: array
                    description: One entry per re-parked failed stage, ordered by stage sequence. Empty on a resumed revive.
                    items:
                      type: object
                      required: [stage_id, type, prior_category, prior_reason, restored_state]
                      properties:
                        stage_id: { $ref: '#/components/schemas/UUID' }
                        type:
                          type: string
                          description: The stage type (plan/implement/review/‚Ä¶).
                        prior_category:
                          type: string
                          description: The stage's failure category before the revive (A/C/D).
                        prior_reason:
                          type: string
                          description: The stage's failure_reason before the revive.
                        restored_state:
                          type: string
                          description: The pre-dispatch state the stage was re-parked to.
                  audit_warning:
                    type: string
                    description: |
                      Set ONLY when the revive was committed (re-parks +
                      reopen) but the `run_revived` chained audit append then
                      failed. The revive succeeded ‚Äî this is the
                      caller-visible signal the chained provenance record is
                      missing; investigate the audit store. Omitted on a clean
                      revive (#1943).
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: |
            One of two cases: (1) the caller presented an MCP/agent
            subject-bound token (subject `mcp:run:<uuid>`) ‚Äî body `error`
            is `agent_token_forbidden`; agent tokens may never revive a
            run. (2) a bearer token lacks both `write:stages` and
            `write:retries` scope ‚Äî body `error` is `insufficient_scope`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422':
          description: |
            Revive not applicable: the run is not in the `failed` state,
            has no failed stages to re-park AND no stage in a re-parked
            pre-dispatch state (the interrupted-revive shape succeeds with
            `200` instead), or at least one failed stage is in a
            non-retryable failure category (category-B, D-rejected, or no
            recorded category). Body's `error` is `revive_not_applicable`
            and `message` names the blocking stage. No stage is re-parked
            (no partial mutation).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500':
          description: |
            `internal_error` ‚Äî a post-validation re-park or run-reopen
            failure left the run partially re-parked (the re-park batch is
            not one transaction, #1942). The error message carries a
            resume hint: retry the verb ‚Äî a second revive resumes from the
            partial state (re-parking the remaining failed stages, or
            completing the interrupted reopen).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/runs/{run_id}/reset-branch:
    post:
      operationId: resetRunBranch
      summary: Force-reset a run branch off a foreign on-top commit
      description: |
        Operator-gated, audited ADR-035 remediation (#867) for a foreign
        commit pushed **ON TOP** of a run's own commits on the open PR
        branch ‚Äî the post-prevention (#861/#865) residual vector. Rewinds
        the run/PR branch back to its **last run-authored HEAD** (the newest
        commit attributable to this run's reported-head ledger), dropping
        the on-top foreign commit, then re-parks the review gate so CI + the
        merge reconciler re-evaluate the rewound head.

        Mechanism: resolves the PR base ref + live head from GitHub, builds
        the run's reported-head ledger (seeded `""` so the foreign tip is
        not self-whitelisted), runs the `base...head` compare, and computes
        the last run-authored HEAD. It then force-updates (`PATCH .../git/
        refs/heads/{branch}` with `force:true`) the PR head ref to that SHA,
        re-parks the run's review stage, writes a `branch_reset` audit entry,
        and refreshes the sticky status comment.

        **Destructive ‚Äî safety invariants (all BINDING):**

        - **Operator-gated.** `confirm` MUST be `true`; a missing/false
          confirm is refused 400 (`confirmation_required`). Never silent/auto.
        - **On-top only.** Proceeds only when EVERY foreign commit sits
          strictly above the reset target. A foreign ancestor/interleaved
          commit cannot be dropped by a reset (the run's commits sit on it)
          and is refused 422 (`reset_out_of_scope`) ‚Äî prevention owns it.
        - **Fail-closed.** Unlike the detect path (which fails open so a
          transient GitHub failure never blocks a clean run), the
          destructive action REFUSES on ANY uncertainty ‚Äî unresolvable base
          ref, incomplete ledger, compare error, no identifiable
          run-authored HEAD ‚Äî with 422 (`reset_not_determinable`), never a
          force-update.
        - **Lease re-check.** Immediately before the force-update the live
          PR head is re-read; if it changed since classification (concurrent
          push) the reset aborts 422 (`reset_not_determinable`). The REST
          refs API has no compare-and-swap, so this narrows but does not
          eliminate the TOCTOU window.

        The dropped commit stays recoverable from the remote reflog / the
        foreign pusher's own branch (recorded in the audit `recovery_note`).

        **Authorization.** Requires `write:runs`. A run-bound MCP token
        (subject `mcp:run:<uuid>`) may reset ONLY its own run's branch;
        another run's branch is refused 403 (`cross_run_reset`).
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      requestBody:
        required: true
        description: |
          Confirms the destructive force-rewind and carries an optional
          operator rationale.
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [confirm]
              properties:
                confirm:
                  type: boolean
                  description: |
                    MUST be `true` to proceed ‚Äî the reset force-rewinds the
                    PR head ref and is destructive. A missing/false value is
                    refused 400 (`confirmation_required`).
                reason:
                  type: string
                  description: |
                    Optional operator rationale, recorded on the
                    `branch_reset` audit entry.
      responses:
        '200':
          description: Branch rewound; rewind summary in body.
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id: { $ref: '#/components/schemas/UUID' }
                  pr_number: { type: integer }
                  branch: { type: string }
                  dropped_offending_sha: { type: string, description: 'The foreign on-top commit that was dropped.' }
                  reset_to_sha: { type: string, description: 'The last run-authored HEAD the branch was rewound to.' }
                  prior_head_sha: { type: string, description: 'The branch tip before the rewind.' }
                  reparked_review_stage_id: { type: string, description: 'The re-parked review stage id; omitted on the commit-yourself shape.' }
                  recovery_note: { type: string }
        '400':
          description: |
            Malformed body or `confirm` not `true`. Body's `error` is
            `validation_failed` or `confirmation_required`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: |
            One of two cases: (1) bearer token lacks `write:runs` scope ‚Äî
            body `error` is `insufficient_scope`; (2) an mcp run-bound token
            (subject `mcp:run:<uuid>`) targeting another run's branch ‚Äî body
            `error` is `cross_run_reset`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422':
          description: |
            Reset refused. One of: `reset_out_of_scope` (the foreign commit
            is an ancestor/interleaved, not strictly on top ‚Äî prevention
            owns it); `reset_not_applicable` (the tip is already the last
            run-authored HEAD; nothing on top to drop); or
            `reset_not_determinable` (fail-closed: the lineage could not be
            classified with certainty, or the lease re-check found a
            concurrent push). Body's `message` explains the specific reason.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '502':
          description: |
            The GitHub force-update of the PR head ref failed
            (`reset_force_update_failed`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/runs/{run_id}/vouch-commit:
    post:
      operationId: vouchCommit
      summary: Vouch a foreign commit as run-authored lineage
      description: |
        Operator-gated, audited ADR-035 provenance path (#1044) for a
        foreign commit on a run branch that no loop-native remediation can
        route ‚Äî an operator's mechanical remediation commit (e.g. a
        `scripts/sync-schemas` output pushed onto a decomposition fan-out
        branch whose children are all terminal with zero open concerns). The
        operator DECLARES the commit run-authored lineage; the declaration
        records an `operator_commit_vouched` audit entry and unions the
        vouched SHA into the run's reported-head ledger (on the run's own
        chain AND its decomposition children), so the merge reconciler's
        ADR-035 re-check (`ReverifyBranchLineage`) attributes it cleanly and
        the run it fixed is no longer wedged.

        Distinct from `reset-branch`, which DROPS an on-top foreign commit:
        vouch KEEPS the operator commit and attributes it. Use vouch when
        the commit is a legitimate remediation to retain.

        **Fail-closed is preserved.** The handler records the declaration
        verbatim ‚Äî it does NOT verify the SHA exists on the branch or in the
        compare set. Vouching a wrong/non-existent SHA simply adds an
        unreachable ledger entry and un-wedges nothing; an UN-vouched foreign
        commit still fails category-B at the report boundary and still blocks
        merge resolution.

        **Authorization.** Operator-token-only by design (ADR-035 sole-writer
        invariant). Requires `write:stages`. A run-bound MCP token (subject
        `mcp:run:<uuid>`) is REJECTED OUTRIGHT 403 (`run_token_forbidden`),
        even for its own run ‚Äî an agent self-declaring lineage for a commit
        on its own branch would defeat the invariant the vouch must preserve.
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      requestBody:
        required: true
        description: |
          Names the commit to vouch and carries the operator's rationale.
          Both fields are required ‚Äî the vouch is an audited operator
          declaration.
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [sha, reason]
              properties:
                sha:
                  type: string
                  description: |
                    The commit SHA on the run branch to declare as
                    run-authored lineage.
                reason:
                  type: string
                  description: |
                    Operator rationale ‚Äî why this commit is legitimate
                    run-authored lineage. Recorded verbatim on the
                    `operator_commit_vouched` audit entry.
      responses:
        '200':
          description: Vouch recorded; the declaration is echoed in the body.
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id: { $ref: '#/components/schemas/UUID' }
                  vouched_sha: { type: string, description: 'The commit SHA recorded as run-authored lineage.' }
                  reason: { type: string }
        '400':
          description: |
            Malformed body or an empty `sha`/`reason`. Body's `error` is
            `validation_failed`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: |
            One of two cases: (1) the identity lacks `write:stages` scope ‚Äî
            body `error` is `insufficient_scope` (enforced unconditionally:
            a cookie-session operator without the scope is rejected too, no
            bypass); (2) a run-bound MCP token
            (subject `mcp:run:<uuid>`) attempted the vouch ‚Äî body `error` is
            `run_token_forbidden` (rejected outright, even for its own run).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503':
          description: |
            The run or audit repositories are not wired
            (`vouch_unconfigured`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/runs/{run_id}/merge:
    post:
      operationId: mergeRun
      summary: Record an operator merge verdict and queue the squash merge
      description: |
        The one-verb operator merge path (E48.7 / #1954). Records the
        operator's merge verdict as a chained `merge_verdict_recorded` audit
        entry (modeled on `vouch-commit`) and queues the squash merge through
        the SAME merge seam the delegated `may_merge` arm of the auto-driver
        uses ‚Äî so the human merge and the delegated merge converge on one path.
        The PR-approval review itself stays a `gh pr review --approve` step
        under the operator's own GitHub identity (App-identity approval is
        deferred to E39).

        The endpoint does NOT wait for the merge to land: it only
        ENABLES/queues GitHub's merge (a PR already merge-ready falls back to a
        synchronous REST squash merge), and the `pr_merged` / run-completion
        settle is left to the `pull_request`-closed webhook. The
        `fishhawk_merge_run` MCP tool awaits the terminal run state client-side.

        **Idempotent.** A repeated POST that finds an existing
        `merge_verdict_recorded` row appends NO duplicate and responds
        `already_recorded: true`, but ALWAYS re-dispatches the merge helper ‚Äî
        so a 502-then-reinvoke re-queues the merge without duplicating the
        verdict.

        **Authorization.** Operator-token-only. Requires `write:approvals`,
        enforced unconditionally (a cookie-session operator without the scope
        is rejected too). A run-bound MCP token (subject `mcp:run:<uuid>`) is
        REJECTED OUTRIGHT 403 (`run_token_forbidden`), even for its own run ‚Äî
        an agent self-merging its PR would bypass the operator gate.

        **Fail-closed.** The merge is refused (no verdict recorded) when the
        run has no PR url or is failed/cancelled (`409 run_not_mergeable`),
        when the acceptance gate does not admit a merge
        (`409 acceptance_gate_not_passed`), or when the merge seam is
        unconfigured (`503 merge_seam_unconfigured`). It deliberately does NOT
        block on a review stage awaiting approval (that stage settles ON merge).
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      requestBody:
        required: true
        description: |
          Carries the operator's merge verdict. `verdict` is required ‚Äî the
          merge is an audited operator declaration.
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [verdict]
              properties:
                verdict:
                  type: string
                  description: |
                    Operator merge verdict prose. Recorded verbatim on the
                    `merge_verdict_recorded` audit entry.
      responses:
        '200':
          description: |
            Merge verdict recorded (or already recorded) and the squash merge
            queued through the merge seam.
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id: { $ref: '#/components/schemas/UUID' }
                  merge_queued: { type: boolean, description: 'True once the merge helper was dispatched.' }
                  verdict_sequence: { type: integer, format: int64, description: 'Audit sequence of the merge_verdict_recorded entry.' }
                  already_recorded: { type: boolean, description: 'True when a prior verdict row existed (an idempotent re-POST); no fresh row was appended.' }
                  pr_url: { type: string, description: 'The run pull request url the merge was queued for.' }
        '400':
          description: |
            Malformed body or an empty `verdict`. Body's `error` is
            `validation_failed`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: |
            One of two cases: (1) the identity lacks `write:approvals` ‚Äî body
            `error` is `insufficient_scope` (enforced unconditionally, no
            cookie-session bypass); (2) a run-bound MCP token
            (subject `mcp:run:<uuid>`) attempted the merge ‚Äî body `error` is
            `run_token_forbidden` (rejected outright, even for its own run).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: |
            The run cannot be merged: no PR url or a failed/cancelled run
            (`run_not_mergeable`), or the acceptance gate does not admit a
            merge (`acceptance_gate_not_passed`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '502':
          description: |
            The verdict row is recorded and durable, but queuing the squash
            merge failed (`merge_dispatch_failed`); the merge is retryable ‚Äî a
            re-POST re-queues without duplicating the verdict.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: |
            The run/audit repositories are not wired (`merge_unconfigured`) or
            the merge seam is unconfigured (`merge_seam_unconfigured`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/runs/{run_id}/auto-drive:
    post:
      operationId: autoDriveRunGate
      summary: Drive the run's parked gate under ADR-040 delegation
      description: |
        Exposes the in-process auto-driver (`AutoDriveRunGate`, E25.6 /
        ADR-047) ‚Äî the GHA campaign driver's delegated
        approve/route_fixup/retry/merge contract with double-gating,
        fail-closed observe-only, and must_page_human refusal ‚Äî to the local
        auto-driver (`fishhawk_drive_run`, #1700). The caller's operator-agent
        token identity is the acting identity, so the delegated action's own
        audit row (`approval_submitted` with its delegated rule,
        `stage_fixup_triggered`, `stage_retried`, ‚Ä¶) carries the ADR-040
        delegation context, written TRANSACTIONALLY by the action path.

        **`run_auto_driven` is the SUPPLEMENTARY driver-attribution record,
        NOT the authoritative delegation record.** On an ACTED outcome this
        endpoint ALSO appends a run-chained `run_auto_driven` `act:"gate"`
        entry for driver attribution, carrying the delegated rule
        (`delegated_rule`, the ADR-040 condition that governed the act) for
        provenance alongside the action. The AUTHORITATIVE record of the
        delegated action is that action's own audit row (above); the
        supplementary row exists only to attribute which driver acted.

        **Fail-loud.** If the supplementary append fails after the gate act,
        the endpoint returns `500 auto_drive_record_failed` naming the
        recording failure rather than a silent `acted:true` ‚Äî the drive loop
        surfaces it and STOPS acting. The action's own row is already durable,
        so the primary delegation record is intact even in that window. A
        genuine gate-dispatch failure is surfaced as `500
        auto_drive_dispatch_failed`, never swallowed as observe-only.

        **Merge is queued, not landed.** A delegated `may_merge` ENABLES
        GitHub auto-merge via the configured seam; the real merge lands when
        branch protection clears, observed via the `pull_request`-closed
        webhook. A nil merge seam keeps `may_merge` fail-closed to
        observe-only.

        **Authorization.** Requires `write:approvals` ‚Äî the strictest action
        the gate can dispatch (approve); operator and operator-agent tokens
        already carry it.
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: |
            The gate outcome. Exactly one of `acted`/`paged` is true on a
            non-observe-only outcome; observe-only has both false.
          content:
            application/json:
              schema:
                type: object
                required: [acted, paged, note]
                properties:
                  acted: { type: boolean, description: 'True when a delegated gate action was dispatched.' }
                  action: { type: string, description: 'The delegation verb taken (approve|route_fixup|retry|merge), set when acted.' }
                  paged: { type: boolean, description: 'True when a must_page_human condition was refused.' }
                  page_event: { type: string, description: 'The page event name, set when paged.' }
                  note: { type: string, description: 'Short human-readable summary of the outcome.' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: 'The identity lacks `write:approvals` (`insufficient_scope`).'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500':
          description: |
            `auto_drive_dispatch_failed` (the gate action was attempted and
            errored) or `auto_drive_record_failed` (the gate action landed but
            the supplementary `run_auto_driven` attribution row failed to
            append ‚Äî fail-loud; the authoritative delegated-action row is
            durable, but the driver must stop).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: 'Run or audit repositories are not wired (`auto_drive_unconfigured`).'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/runs/{run_id}/auto-drive/acts:
    post:
      operationId: recordAutoDriveAct
      summary: Record a driver stage dispatch (record-before-dispatch)
      description: |
        The server-owned write path the local auto-driver
        (`fishhawk_drive_run`, #1700) calls to record a stage dispatch BEFORE
        it host-spawns the runner, so no mechanical act can occur unaudited ‚Äî
        the audit chain stays server-owned; the MCP host never writes a chain
        entry itself. On success it appends a run-chained `run_auto_driven`
        `act:"dispatch"` entry under the caller's operator-agent identity.

        Like the gate endpoint, this row is the SUPPLEMENTARY
        driver-attribution record; the stage's own lifecycle audit rows remain
        authoritative. Validation fails CLOSED ‚Äî an unknown run 404s and every
        missing/bad field 400s, appending nothing. A record-append failure is
        fail-loud (`500 auto_drive_record_failed`) so the driver does NOT
        dispatch. Requires `write:approvals`.
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [action, stage, source]
              properties:
                action: { type: string, enum: [dispatch_stage], description: 'The only recognised action.' }
                stage: { type: string, enum: [plan, implement, acceptance, fixup_redispatch], description: 'The stage being dispatched; fixup_redispatch is a delegated fix-up/retry re-open.' }
                source: { type: string, description: 'The driver tag, e.g. fishhawk_drive_run.' }
                note: { type: string, description: 'Optional note (e.g. "retry" on a crash-resume re-record).' }
      responses:
        '200':
          description: The appended attribution row's identifying fields.
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id: { $ref: '#/components/schemas/UUID' }
                  category: { type: string }
                  act: { type: string }
                  action: { type: string }
                  stage: { type: string }
                  source: { type: string }
                  sequence: { type: integer, format: int64 }
        '400':
          description: 'Missing/bad `action`, `stage`, or `source` (`validation_failed`, naming the field). Nothing is appended.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: 'The identity lacks `write:approvals` (`insufficient_scope`).'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500':
          description: 'The record append failed (`auto_drive_record_failed`); the driver must not dispatch.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: 'Run or audit repositories are not wired (`auto_drive_unconfigured`).'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/runs/{run_id}/stages:
    get:
      operationId: listRunStages
      summary: List stages for a run
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: Stages ordered by sequence ascending.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Stage' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v0/runs/{run_id}/stages/{stage_id}:
    get:
      operationId: getRunStage
      summary: Read one stage by its (run, stage) handle, with optional terminal-wait long-poll
      description: |
        Resolves a stage by the durable ADR-037 `(run_id, stage_id)`
        handle and returns the canonical `Stage` shape plus a small
        wait envelope (`state`, `terminal`, optional `next_action`). It
        is the SDK-independent REST analogue of the scope-amendment
        `?wait` long-poll (#1252), giving a detached operator-side
        watcher (a backgrounded shell poll) ONE authoritative signal
        for stage settledness. Companion to the `dispatch_stage`
        non-blocking dispatch work (#1232).

        **Auth** mirrors `GET /v0/runs/{run_id}/scope-amendments`:
        anonymous callers get 401; a run-bound `fhm_` bearer must carry
        `mcp:read` (else 403 `insufficient_scope`) AND match the path
        `run_id` (else 403 `cross_run_stage`); operator bearers/sessions
        (not run-bound) pass. The `(run_id, stage_id)` handle must be
        consistent ‚Äî a stage whose `run_id` differs from the path is
        404 `stage_not_found` (it does not exist at this path).

        **`terminal`** is true when the stage has *settled*: a terminal
        state (`succeeded`, `failed`, `cancelled`) OR a parked state
        awaiting operator action (`awaiting_approval`,
        `awaiting_children`, `awaiting_input`, `awaiting_scope_decision`).
        The in-flight states (`pending`, `dispatched`, `running`) are
        not settled. This is wider than run/stage terminality ‚Äî a
        detached watcher releases the moment the stage needs attention.

        **Optional `?wait=<seconds>` long-poll.** When `wait` is a
        positive integer and the stage is not yet settled, the server
        holds the connection ‚Äî re-reading the stage internally ‚Äî and
        returns the moment the stage settles, at the wait cap (returning
        the still-unsettled stage so the client re-issues), or on client
        disconnect. `wait` is clamped to `0..30`; `0`, absent, or a
        non-positive/non-integer value is the unchanged immediate read.
        An already-settled stage returns immediately regardless of
        `wait`. On a transient re-read error the server returns the
        last-good stage at 200 (never regressing the wait to a 500); no
        new error codes.

        **`next_action`** reuses the same `run_auto_advanced` drive
        distillation as `GET /v0/runs/{run_id}`: best-effort, omitted on
        non-drive runs, terminal runs, any read failure, and when a
        host-dispatch action has been outrun by its named stage
        (suppressed once the stage advances past `{pending,
        awaiting_host_dispatch}`, #1961) ‚Äî never fabricated.
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - { name: stage_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - name: wait
          in: query
          required: false
          description: |
            Optional server-side long-poll in seconds (#1252). `0` or
            absent = no wait (immediate read). When positive and the
            stage is not yet settled, holds until the stage settles
            (terminal OR parked) or the wait elapses; the client
            re-issues to extend. Clamped to `0..30`.
          schema:
            type: integer
            minimum: 0
            maximum: 30
            default: 0
      responses:
        '200':
          description: The stage, with the terminal-wait envelope.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Stage'
                  - type: object
                    required: [state, terminal]
                    properties:
                      state:
                        type: string
                        description: The stage state, echoed at the top level.
                      terminal:
                        type: boolean
                        description: |
                          True when the stage has settled ‚Äî terminal OR
                          parked awaiting operator action.
                      next_action:
                        $ref: '#/components/schemas/RunNextAction'
                        description: |
                          Distilled operator next step, reusing the
                          `GET /v0/runs/{run_id}` drive distillation.
                          Omitted on non-drive runs, terminal runs, on
                          any read failure, and when a host-dispatch
                          action has been outrun by its named stage
                          (suppressed once the stage advances past
                          `{pending, awaiting_host_dispatch}`, #1961).
        '400':
          description: run_id or stage_id is malformed (`validation_failed`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: No authenticated token.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: |
            `insufficient_scope` (run-bound token lacks `mcp:read`)
            or `cross_run_stage` (run-bound token reading another run's
            stage).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: |
            `stage_not_found` ‚Äî no stage with that id, or the stage's
            `run_id` does not match the path `run_id` (inconsistent
            handle).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: Run repository not wired.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/runs/{run_id}/stages/{stage_id}/reap-failure:
    post:
      operationId: reapStageFailure
      summary: Report a spawn-phase runner failure so a stuck 'dispatched' stage fails
      description: |
        Records a detached runner's spawn-phase non-zero exit (#1747). The
        `fishhawk_dispatch_stage` reaper (in the MCP host) calls this when a
        spawned runner exits non-zero BEFORE reporting a terminal stage state
        (e.g. an acceptance pre-flight provision failure) ‚Äî the case that
        otherwise leaves the stage stuck `dispatched` forever, with
        `retry_stage` returning 422 and no audit entry written.

        It is the eager, event-driven complement to the off-by-default ~1h
        dispatch watchdog, and mirrors that watchdog's contract exactly:
        `run.FailStage` (category `C` is the retryable infrastructure class)
        ‚Üí append a `dispatch_reaper_failed` audit entry (actor `system`) ‚Üí
        `orchestrator.Advance`. After it lands the stage is `failed`
        (category `C`), the audit trail names the reason, and `retry_stage`
        is applicable.

        **Idempotent.** A report against an already-terminal stage (a
        double-report, or a race with the dispatch watchdog reaping the same
        stuck stage) is a benign no-op: 200 with `transitioned: false`, NO
        audit entry, and NO advance.

        **Protected `awaiting_children` park (#1891).** A report against a
        stage in `awaiting_children` is the SAME benign no-op (200,
        `transitioned: false`, no audit entry, no advance). That state is a
        live decomposition park owned by its child slices; a doomed runner
        mis-dispatched against a decomposed parent's implement stage would
        otherwise let its spawn-failure report destroy the fan-in park
        (`awaiting_children ‚Üí failed` is a legal sweeper edge). The same no-op
        also covers the race where a concurrent fanout parks the stage
        `awaiting_children` after the pre-check but before the fail transition
        lands.

        **Authorization.** Requires an authenticated identity carrying
        `write:runs` (anonymous ‚Üí 401; a token without the scope ‚Üí 403). The
        operator/MCP token that drives dispatch already carries it.
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - { name: stage_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      requestBody:
        required: true
        description: |
          The failure category, a required reason, and optional diagnostics
          (the parsed `runner_failed` detail and the child's process exit
          code).
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [category, reason]
              properties:
                category:
                  type: string
                  enum: [B, C]
                  description: |
                    Failure category ‚Äî exactly `B` or `C` (mirrors the
                    pull-request failed-outcome contract). The reaper always
                    sends `C` (the retryable infrastructure class) for a
                    process-level non-zero exit.
                reason:
                  type: string
                  description: |
                    Why the runner failed ‚Äî the parsed `runner_failed`
                    reason, or a synthesized `runner exited N before
                    reporting a terminal state` when the runner emitted no
                    structured line. Recorded on the `dispatch_reaper_failed`
                    audit entry.
                detail:
                  type: string
                  description: Optional diagnostic detail from the runner_failed line.
                exit_code:
                  type: integer
                  description: The runner's process exit code.
      responses:
        '200':
          description: |
            The report was recorded. `transitioned` is `true` when this call
            drove the stage to `failed`, `false` on the idempotent
            already-terminal no-op or the protected `awaiting_children`
            decomposition-park no-op (#1891).
          content:
            application/json:
              schema:
                type: object
                required: [transitioned, stage_state]
                properties:
                  transitioned:
                    type: boolean
                    description: True when this call transitioned the stage to failed.
                  stage_state:
                    type: string
                    description: The resulting stage state.
        '400':
          description: |
            Malformed body, an unknown field, a `category` other than
            `B`/`C`, or an empty `reason`. Body's `error` is
            `validation_failed`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: |
            The identity lacks `write:runs` scope (`insufficient_scope`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: |
            `stage_not_found` ‚Äî no stage with that id, or the stage's
            `run_id` does not match the path `run_id` (inconsistent handle).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: |
            The run or audit repositories are not wired
            (`reap_failure_unconfigured`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/runs/{run_id}/stages/{stage_id}/host-dispatch:
    post:
      operationId: hostDispatchStage
      summary: Mark a host-local spawn attempt so a parked stage becomes 'dispatched'
      description: |
        The spawn marker for a runner_kind-locked-`local` run (#1912). The
        backend cannot spawn the host-local runner (ADR-024), so
        `orchestrator.dispatchStage` parks an agent stage at
        `awaiting_host_dispatch` rather than `dispatched`. The MCP host-spawn
        verbs (`fishhawk_run_stage`, `fishhawk_dispatch_stage`,
        `fishhawk_drive_run`) call this endpoint fail-closed IMMEDIATELY BEFORE
        spawning the runner, so post-#1912 `dispatched` unambiguously means "a
        spawn attempt exists".

        It CAS-transitions `{pending, awaiting_host_dispatch} ‚Üí dispatched`:

        - `awaiting_host_dispatch ‚Üí dispatched` ‚Äî the parked-local common case.
        - `pending ‚Üí dispatched` ‚Äî the first plan-stage spawn, which today sits
          at `pending` until trace time; marking it here stamps the spawn
          signal at spawn time.

        **Idempotent.** A stage already `dispatched` returns 200 with
        `transitioned: false` ‚Äî the legal manual re-dispatch of a stage whose
        spawned runner died; the caller proceeds and re-spawns.

        **Not admissible.** A `running`, terminal, or any `awaiting_*` gate
        state returns 409 `dispatch_not_admissible` so a live or settled stage
        can never be re-marked as a fresh spawn.

        **Authorization.** Requires an authenticated identity carrying
        `write:runs` (anonymous ‚Üí 401; a token without the scope ‚Üí 403). The
        operator/MCP token that drives dispatch already carries it.
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - { name: stage_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: |
            The marker was processed. `transitioned` is `true` when this call
            drove the stage `pending|awaiting_host_dispatch ‚Üí dispatched`,
            `false` on the idempotent already-`dispatched` no-op.
          content:
            application/json:
              schema:
                type: object
                required: [transitioned, stage_state]
                properties:
                  transitioned:
                    type: boolean
                    description: True when this call transitioned the stage to dispatched.
                  stage_state:
                    type: string
                    description: The resulting stage state (always `dispatched` on 200).
        '400':
          description: |
            A malformed `run_id` or `stage_id` path value
            (`validation_failed`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: |
            The identity lacks `write:runs` scope (`insufficient_scope`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: |
            `stage_not_found` ‚Äî no stage with that id, or the stage's
            `run_id` does not match the path `run_id` (inconsistent handle).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: |
            `dispatch_not_admissible` ‚Äî the stage is in a `running`, terminal,
            or `awaiting_*` gate state, so a fresh spawn marker cannot be
            applied.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: |
            The run repository is not wired (`host_dispatch_unconfigured`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v0/runs/{run_id}/audit:
    get:
      operationId: listRunAudit
      summary: List audit entries for a run
      description: |
        Cursor-paginated, sequence-ascending. Used by the run-detail UI
        and (eventually) the compliance export.
      tags: [audit]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - name: category
          in: query
          schema: { type: string }
          description: |
            Optional. Filters the feed to entries of this audit category.
            Validated against the curated known-category registry (#1764):
            an unknown or misspelled category is rejected `400
            validation_failed` naming the nearest known categories, rather
            than returning a permissive empty page that would silently arm
            an unsatisfiable `fishhawk_await_audit` wait for the full
            timeout. Pass `allow_unknown=true` to bypass the check.
        - name: allow_unknown
          in: query
          schema: { type: boolean, default: false }
          description: |
            Optional. When `true`, skips the known-category validation on
            `category` (#1764), so a legitimately-unlisted category returns
            a normal (possibly empty) page instead of `400`.
        - name: stage_id
          in: query
          schema: { $ref: '#/components/schemas/UUID' }
          description: |
            Optional. When set, the response is filtered to entries
            tagged with this stage id. Used by the implement-stage
            session view (#215) to render a per-stage activity feed.
        - name: since_sequence
          in: query
          schema: { type: integer, format: int64, minimum: 0 }
          description: |
            Optional. When set, the response is filtered to entries with
            `sequence` strictly greater than this value (applied before
            pagination). `0` is a no-op (sequences start at 1). This is
            the anchor for the sequence-anchored await primitive
            (`fishhawk_await_audit`, #962): a caller polling for "the
            next `<category>` entry after sequence N" never needs
            pagination or a tail-sized limit.
        - { name: limit, in: query, schema: { type: integer, default: 100, maximum: 500 } }
        - { name: cursor, in: query, schema: { type: string } }
      responses:
        '200':
          description: Page of audit entries.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Pagination'
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/AuditEntry' }
        '400':
          description: |
            `validation_failed` ‚Äî `stage_id` not a UUID, `since_sequence`
            not a non-negative integer, `limit` out of range, or `category`
            not a known audit category (absent `allow_unknown=true`; the
            error `details.suggestions` names the nearest known categories).
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v0/runs/{run_id}/gate-view:
    get:
      operationId: getRunGateView
      summary: Gate-scoped decision view for a run
      description: |
        Answers "what is still open at this gate and why" in ONE call
        (#1960): every OPEN concern with its FULL note prose, the per-concern
        cross-round history reconstructed from the immutable audit payloads
        (fix-up routing claims + re-review confirmations/reopens), the settled
        ledger, and the run's suppressed relitigations. Replaces the
        `getRun` + `listRunAudit` stitching an operator otherwise runs at a
        review or fix-up gate. Unlike the run-status concerns block the note
        text is NOT elided, and the MCP tool passes the payload through with
        none of its compaction levers applied. Read-only.

        Auth mirrors `listRunAudit`'s read posture: the full reviewer prose
        must not be anonymously readable, so an ordinary caller must hold the
        `read:audit` scope, while a run-bound `mcp:run:<uuid>` token is
        authorized instead by the cross-run subject guard (own run only).
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
        - name: stage_kind
          in: query
          schema: { type: string, enum: [plan, implement] }
          description: |
            Optional. Scopes the open + settled concerns to one stage kind.
            The operator's narrowing lever when a run carries many concerns.
      responses:
        '200':
          description: The gate view.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GateView' }
        '400':
          description: '`validation_failed` ‚Äî `run_id` not a UUID, or `stage_kind` not `plan`/`implement`.'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: '`insufficient_scope` ‚Äî a token missing the `read:audit` scope; or `cross_run_gate_view` ‚Äî a run-bound `mcp:run:<uuid>` token reading a run other than its own.'
        '404': { $ref: '#/components/responses/NotFound' }
        '503':
          description: '`gate_view_unconfigured` ‚Äî the concern repository is not configured; or `run_repo_unconfigured` ‚Äî the run repository is not configured.'

  /v0/runs/{run_id}/budget:
    get:
      operationId: getRunBudget
      summary: Current periodic-budget status for a run's workflow
      description: |
        Returns the current calendar-period status of the workflow's
        periodic budget (#693 / ADR-030): spend vs limit, the fraction
        consumed, and the `ok`/`warn`/`over` tier. Reuses the same
        evaluation chain the advisory alert path runs (period range ‚Üí
        cross-run cost sum ‚Üí evaluate).

        **Display-only.** This endpoint never gates or blocks a run; it
        exists so the MCP loop can surface spend-vs-limit every stage
        instead of relying on the advisory issue comment.

        When the workflow declares no budget the response is **200 with
        an empty object** (`{}`) rather than a 404, so clients branch on
        the presence of `period`. A workflow with multiple budgets
        surfaces only the first.
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: |
            Periodic-budget status, or an empty object when the workflow
            declares no budget.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RunBudgetStatus' }
        '400':
          description: "`validation_failed` ‚Äî `run_id` not a UUID."
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503': { description: Run repository unavailable. }

  /v0/runs/{run_id}/cache-efficiency:
    get:
      operationId: getRunCacheEfficiency
      summary: Per-run prompt-cache efficiency metric
      description: |
        Returns the run's prompt-cache efficiency, derived purely from the
        run's `cost_recorded` audit ledger (ADR-044 / #1352): the cache-read
        ratio (share of input served from cache), the reuse factor (re-reads
        per cache-write token), and the gross / penalty / net US-dollar
        effect of caching, plus a per-stage breakdown keyed on the entry's
        `source` (`plan_review` / `implement_review`, with the runner
        stage-agent path ‚Äî entries that carry no `source` ‚Äî bucketed as
        `agent`).

        **Display-only.** This endpoint never gates or blocks a run; it
        exists so the MCP loop can surface and maximize cache-hit usage. It
        has no write path and no migration ‚Äî it reads existing audit data.

        When the run has no `cost_recorded` data the response is **200 with
        an empty object** (`{}`) rather than a 404, so clients branch on the
        presence of a field. An unknown / unpriced model contributes 0 to
        the savings figures while its tokens still count toward the ratios.
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: |
            Cache-efficiency metric, or an empty object when the run has no
            cost data.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RunCacheEfficiency' }
        '400':
          description: "`validation_failed` ‚Äî `run_id` not a UUID."
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503': { description: Run repository unavailable. }

  /v0/runs/{run_id}/cost:
    get:
      operationId: getRunCost
      summary: Per-run estimated cost with per-stage and per-merged-PR rollup
      description: |
        Returns the run's estimated cost, derived purely from the run's
        `cost_recorded` audit ledger (#1372): the run's total estimated
        US-dollar cost, a per-stage breakdown keyed on the entry's `source`
        (`plan_review` / `implement_review`, with the runner stage-agent
        path ‚Äî entries that carry no `source` ‚Äî bucketed as `agent`), and ‚Äî
        when the run resolved to a merged PR (a `pr_merged` audit row exists
        AND the run carries a pull-request URL) ‚Äî a cost-per-merged-PR
        rollup summing `cost_usd_total` across every run sharing that PR URL
        plus the contributing run count.

        **Display-only.** This endpoint never gates or blocks a run; it
        exists so the MCP loop can surface the cost to land work. It has no
        write path and no migration ‚Äî it reads existing audit and run data;
        merge state is read from the audit ledger, never the GitHub API.

        When the run has no `cost_recorded` data the response is **200 with
        an empty object** (`{}`) rather than a 404, so clients branch on the
        presence of a field.
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: |
            Cost summary, or an empty object when the run has no cost data.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RunCost' }
        '400':
          description: "`validation_failed` ‚Äî `run_id` not a UUID."
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503': { description: Run repository unavailable. }

  /v0/runs/{run_id}/latency:
    get:
      operationId: getRunLatency
      summary: Per-run gate-latency (wait-on-human) rollup
      description: |
        Returns the run's gate-latency rollup, derived purely from the run's
        audit-chain timestamps (#1702): the time parked at each human gate
        (`plan_approval`, `implement_review_to_dispatch`,
        `checks_green_to_merge`), the total wait on human decisions, and the
        run's end-to-end wall clock. A gate whose opening or closing audit
        marker is absent is omitted (partial rollup); a negative (clock-skewed)
        interval reports a `0` wait.

        **Display-only.** This endpoint never gates or blocks a run; it exists
        so the MCP loop can surface where a change spent its wall-clock time.
        It has no write path and no migration ‚Äî it reads existing audit and
        run data.

        When no gate interval has resolved the response is **200 with an empty
        object** (`{}`) rather than a 404, so clients branch on the presence of
        a field.
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: |
            Gate-latency rollup, or an empty object when no gate has resolved.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RunLatency' }
        '400':
          description: "`validation_failed` ‚Äî `run_id` not a UUID."
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503': { description: Run repository unavailable. }

  /v0/runs/{run_id}/diagnostics:
    get:
      operationId: getRunDiagnostics
      summary: Product-facts-only diagnostic bundle for a run
      description: |
        Returns a redaction-safe diagnostic bundle for the run (#1006):
        the minimal, structured product facts an operator attaches to an
        upstream Fishhawk product report. The bundle carries the run id,
        ordered stage states, the failing stage's category + audit
        surface, the audit sequence range, this backend's build version +
        git SHA (and the minimum runner version it requires), the workflow
        spec hash, and the runner kind.

        **Pure read, no egress.** By construction the bundle carries NO
        diffs, paths, prompts, free text, or audit payload bodies ‚Äî the
        failing stage's free-text reason is excluded. Backs the
        `fishhawk diagnose <run-id>` CLI verb and the foundation of the
        product-feedback egress path (later slices).
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: The product-facts diagnostic bundle.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DiagnosticBundle' }
        '400':
          description: "`validation_failed` ‚Äî `run_id` not a UUID."
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503': { description: Run or audit repository unavailable. }

  /v0/runs/{run_id}/product-reports:
    post:
      operationId: fileProductReport
      summary: File a deduped, audited upstream product report for a run
      description: |
        The deduped, audited egress path for upstream Fishhawk product
        feedback (#1006). Collects the run's product-facts diagnostic
        bundle, fingerprints the failure over (failure category, audit
        surface, failure detail class, fishhawkd version family), searches the FIXED upstream
        product repo for an open report already carrying that fingerprint,
        and either appends an occurrence comment (dedup hit, nothing
        created) or files a new fingerprint-marked report (dedup miss).
        A source-side `product_report_filed` audit entry names what left
        the boundary (fingerprint, destination, created-vs-occurrence).

        **Egress is gated** by a mutually-exclusive entitlement switch
        (widened in #1274). The report may be filed by the run's own
        run-bound agent token, a non-run-bound operator/operator-agent
        bearer token holding `write:runs`, or a cookie-session operator.
        A run-bound token bound to a DIFFERENT run ‚Üí 403 `run_not_entitled`;
        a non-run-bound bearer WITHOUT `write:runs` ‚Üí 403
        `insufficient_scope`. An operator/operator-agent token may file for
        ANY run (operator scope = the deployment). A per-repo
        `product_feedback` kill-switch (`enabled: false`) ‚Üí 403
        `product_feedback_disabled`, files nothing.
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductReportRequest' }
      responses:
        '201':
          description: The report was filed (created) or an occurrence was recorded.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductReportResponse' }
        '400':
          description: "`validation_failed` ‚Äî `run_id` not a UUID or `kind` not bug/feature."
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: |
            `run_not_entitled` ‚Äî a run-bound token may only file for its own
            run; `insufficient_scope` ‚Äî a non-run-bound operator bearer is
            missing `write:runs`; `product_feedback_disabled` ‚Äî the repo's
            kill-switch is off.
        '404': { $ref: '#/components/responses/NotFound' }
        '501':
          description: "`provider_unimplemented` ‚Äî no feedback provider registered for the conventions' provider."
        '502':
          description: "`product_report_failed` ‚Äî the dedup search or upstream filing failed."
        '503': { description: Run or audit repository unavailable. }

  /v0/runs/{run_id}/status-comment:
    get:
      operationId: getStatusComment
      summary: Get rendered sticky-comment body and stored GitHub comment ID
      description: |
        Returns the rendered Markdown body for the run's issue thread sticky
        comment (`RenderStatusBody`) plus the `github_comment_id` from the
        most recent `status_comment_posted` audit entry (0 when no comment
        has been posted yet). Used by the CLI to drive edit-in-place updates
        without re-rendering client-side (#428).
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      responses:
        '200':
          description: Rendered body and stored comment ID.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StatusCommentResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503': { description: Run repository unavailable. }
    post:
      operationId: recordStatusCommentID
      summary: Record the GitHub comment ID after posting the sticky comment
      description: |
        Called by the CLI after `gh api` creates or edits the issue comment.
        Appends a `status_comment_posted` audit entry with the returned
        `github_comment_id` so subsequent GET calls can return it for
        edit-in-place targeting. Idempotent: multiple POSTs are safe (#428).
      tags: [runs]
      parameters:
        - { name: run_id, in: path, required: true, schema: { $ref: '#/components/schemas/UUID' } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [github_comment_id]
              properties:
                github_comment_id:
                  type: integer
                  format: int64
                  minimum: 1
      responses:
        '201':
          description: Comment ID recorded.
        '400':
          description: "`validation_failed` ‚Äî `github_comment_id` missing or ‚â§ 0."
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503': { description: Run repository unavailable. }

  /v0/audit:
    get:
      operationId: listGlobalAudit
      summary: Search the cross-chain audit log
      description: |
        Cross-chain feed for the audit-log search surface (#211): returns
        per-run rows AND global-chain rows (token issuance, OAuth sign-in,
        etc.) merged into one **time-descending** page. Same cursor +
        limit envelope as `/v0/runs/{run_id}/audit`. Optional `category`
        and `run_id` filters; combine for "show me approvals on this run."

        Distinct from `/v0/runs/{run_id}/audit` (sequence-ascending,
        scoped to one run, used by the run-detail audit list and the
        per-run verifier path). The global-chain partition specifically
        is the verifier's input ‚Äî not exposed over HTTP for now.

        **Repo-scoped visibility (ADR-057 Amendment A2 / #2071).** For a
        non-admin cookie-session caller, entries are narrowed to those whose
        run's repository the caller holds at least `read` on at the forge.
        Global-chain entries (no `run_id`) carry no repository to authorize
        against and are therefore ADMIN-ONLY for such a caller ‚Äî they are not
        defaulted to visible. As on other list endpoints the narrowing happens
        after paging, so a short page with a non-empty `next_cursor` is
        expected. Bearer / MCP identities and workspace admins see the feed
        unfiltered.
      tags: [audit]
      parameters:
        - { name: category, in: query, schema: { type: string } }
        - { name: run_id, in: query, schema: { $ref: '#/components/schemas/UUID' } }
        - { name: limit, in: query, schema: { type: integer, default: 100, maximum: 500 } }
        - { name: cursor, in: query, schema: { type: string } }
      responses:
        '200':
          description: Page of audit entries, time-descending across both chains.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Pagination'
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/AuditEntry' }
        '400':
          description: |
            `validation_failed` ‚Äî `limit` out of range or `run_id` not a UUID;
            `cursor_invalid` ‚Äî opaque cursor failed to decode.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503':
          description: |
            Audit repository not configured on this instance, or the repo-ACL
            mirror's store could not be reached so repo visibility could not be
            resolved (`service_unavailable`, #2071).

  /v0/audit/export:
    get:
      operationId: exportAudit
      summary: Compliance export in the verifier's Export v1 wire shape
      description: |
        Producer half of the audit-grade compliance contract (ADR-008 /
        ADR-054). Assembles the EXACT `Export v1` shape the external
        verifier consumes: `{ schema, exported_at, runs }`, where each
        run is keyed by UUID and carries its `signing_key` plus the full
        sequence-ascending `audit_entries` chain.

        **Whole-run page bounding.** The `limit` bounds the number of
        RUNS per page, never splitting a run's chain ‚Äî so every page
        independently passes the verifier's `VerifyExport` from each
        run's nil-`prev_hash` genesis entry. When more runs remain the
        response is partial; partiality and the opaque keyset
        continuation cursor ride RESPONSE HEADERS
        (`X-Fishhawk-Export-Complete`, `X-Fishhawk-Export-Next-Cursor`)
        ‚Äî NEVER the body, because the verifier's `ParseExport` uses
        `DisallowUnknownFields`, making the exact three-field body shape
        binding. Every page byte-parses through `ParseExport`.

        **Run-less chain partitions, one per account (ADR-057 /
        #1828), scoped to the caller (#2097).** Entries not tied to a
        run (token issue/revoke, OAuth events) chain per `account_id`
        and export as one `runs`-map key per partition: a tenant
        partition under its account-UUID key, the untenanted partition
        under the reserved nil-UUID key
        `00000000-0000-0000-0000-000000000000`. All carry `run_id:
        null` ‚Äî exactly the value their hashes were computed over, so
        each partition chain-verifies with no verifier change. Which
        partitions a caller receives is tenant-scoped: a tenant caller
        (token bound to an account) sees ONLY its own account partition
        ‚Äî never another tenant's, never the untenanted nil-UUID
        partition (which is operator-only). An operator / no-account
        caller keeps the full view: the untenanted partition (even when
        empty, as an empty `audit_entries` array, so consumers
        distinguish "no run-less entries" from "not included" ‚Äî never
        silently dropped) plus every tenant partition (each only when it
        has entries). They are emitted on the FIRST page only (empty
        cursor). Opt out of all of them with `include_global=false`.

        **Filtering (mutually exclusive shapes).** Either an explicit
        `run_id` set (repeatable; a requested run that does not exist is
        a `404`, never silently omitted) OR the filter shape (`repo` via
        the runs join, and `from`/`to` on run `created_at`). Combining
        `run_id` with `repo`/`from`/`to` is a `400`.

        Requires the `read:audit-export` scope (E9.5/#1608, ADR-054):
        anonymous callers are `401`, tokens without the scope `403`
        (`insufficient_scope`, `details.required_scope` named);
        cookie-session operators bypass scope checks per the standard
        contract. The export carries entry payloads and content-hash
        POINTERS only ‚Äî trace bundle bytes are never inlined; the
        raw-variant bundle stays behind the existing compliance gate.
      tags: [audit]
      parameters:
        - name: run_id
          in: query
          description: |
            Explicit run to export. Repeatable. Mutually exclusive with
            `repo`/`from`/`to`. A requested run that does not exist is a
            `404 run_not_found`.
          schema: { $ref: '#/components/schemas/UUID' }
        - { name: repo, in: query, description: "Filter by repository (owner/name), resolved through the runs join.", schema: { type: string } }
        - { name: from, in: query, description: "Lower bound (inclusive) on run created_at, RFC3339.", schema: { type: string, format: date-time } }
        - { name: to, in: query, description: "Upper bound (inclusive) on run created_at, RFC3339.", schema: { type: string, format: date-time } }
        - { name: include_global, in: query, description: "Include the run-less chain partitions on the first page, scoped to the caller (#2097): a tenant sees only its own account partition, an operator/no-account caller sees the untenanted nil-UUID partition plus every tenant partition. Default true; set false to omit.", schema: { type: boolean, default: true } }
        - { name: limit, in: query, description: "Maximum RUNS per page (whole-run bounded).", schema: { type: integer, default: 50, maximum: 200 } }
        - { name: cursor, in: query, description: "Opaque keyset continuation cursor from a prior page's X-Fishhawk-Export-Next-Cursor header.", schema: { type: string } }
      responses:
        '200':
          description: |
            One page of the Export v1 wire contract. Byte-parses through
            the verifier's `ParseExport`; whole-run bounded so it also
            passes `VerifyExport` independently.
          headers:
            X-Fishhawk-Export-Complete:
              description: "`true` when this is the final page; `false` when more runs remain."
              schema: { type: boolean }
            X-Fishhawk-Export-Next-Cursor:
              description: Opaque keyset cursor for the next page. Present only when the export is partial.
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuditExport' }
        '400':
          description: |
            `validation_failed` ‚Äî malformed `run_id`/`from`/`to`/`limit`,
            `from` after `to`, or `run_id` combined with `repo`/`from`/`to`;
            `cursor_invalid` ‚Äî opaque cursor failed to decode.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404':
          description: "`run_not_found` ‚Äî an explicitly requested run does not exist (fail-closed)."
        '503':
          description: "`audit_export_unconfigured` ‚Äî the audit, run, or signing repository is not configured on this instance."

  /v0/audit/export.csv:
    get:
      operationId: exportAuditCSV
      summary: Flat CSV rendering of the compliance export for spreadsheet workflows
      description: |
        A flat CSV PROJECTION of `GET /v0/audit/export` (E9.1 / #1604)
        for spreadsheet-driven compliance teams. It is a projection over
        the SAME run-selection and per-run assembly layer the JSON export
        uses ‚Äî never a parallel query path ‚Äî so the CSV rows are a
        field-for-field projection of the JSON `Export v1` body for the
        same run-level filter set (pinned by a parity test).

        **Columns.** One audit entry per row:
        `ts,run_id,repo,category,actor_kind,actor_subject,sequence,entry_hash,payload_summary`.
        `ts` is RFC3339 UTC; nil `actor_kind`/`actor_subject` and the
        global partition's `run_id`/`repo` render as empty cells;
        `sequence` is a base-10 integer; `payload_summary` is the
        compacted payload JSON bounded at 256 runes (rune-boundary safe)
        with a `...(truncated)` suffix when cut. Full payloads remain
        JSON-export-only.

        **Entry-level filters (CSV-only).** `approver` keeps only
        `approval_submitted` entries whose `actor_subject` equals the
        value; `category` keeps only entries of that exact category. The
        two filters compose (ANDed) with each other and with the
        inherited run-level filters. Entry-level filtering is CSV-only by
        design: dropping entries from the JSON `Export v1` body would
        break the verifier's hash-chain walk (each entry's `prev_hash`
        binds its predecessor), so `approver`/`category` are not offered
        on `GET /v0/audit/export`.

        **Run-less rows are tenant-scoped (#2097).** The run-less chain
        partition rows (empty `run_id`/`repo` cells), emitted on the
        first page only, are scoped exactly as the JSON export's run-less
        partitions: a tenant caller (token bound to an account) sees ONLY
        its own account partition rows; the untenanted partition is
        operator-only. An operator / no-account caller sees the full set
        (untenanted plus every tenant partition).

        **Bounding & continuation.** Identical to the JSON export: the
        `limit` bounds the number of RUNS per page (whole-run bounded,
        not rows), and partiality/continuation ride the same
        `X-Fishhawk-Export-Complete` / `X-Fishhawk-Export-Next-Cursor`
        response headers. Because bounding is whole-run, an
        entry-filtered page may legitimately contain zero data rows while
        `X-Fishhawk-Export-Complete` is `false` ‚Äî cursor semantics are
        run-level and unchanged.

        Requires the `read:audit-export` scope (E9.5/#1608), exactly as
        the JSON endpoint: anonymous `401`, token without the scope
        `403`, cookie-session bypass. Pointer-only ‚Äî bundle bytes are
        never inlined.
      tags: [audit]
      parameters:
        - name: run_id
          in: query
          description: |
            Explicit run to export. Repeatable. Mutually exclusive with
            `repo`/`from`/`to`. A requested run that does not exist is a
            `404 run_not_found`.
          schema: { $ref: '#/components/schemas/UUID' }
        - { name: repo, in: query, description: "Filter by repository (owner/name), resolved through the runs join.", schema: { type: string } }
        - { name: from, in: query, description: "Lower bound (inclusive) on run created_at, RFC3339.", schema: { type: string, format: date-time } }
        - { name: to, in: query, description: "Upper bound (inclusive) on run created_at, RFC3339.", schema: { type: string, format: date-time } }
        - { name: include_global, in: query, description: "Include the run-less chain partition rows (empty run_id/repo cells) on the first page, scoped to the caller (#2097): a tenant sees only its own account partition, an operator/no-account caller sees the untenanted partition plus every tenant partition. Default true; set false to omit.", schema: { type: boolean, default: true } }
        - { name: limit, in: query, description: "Maximum RUNS per page (whole-run bounded, not rows).", schema: { type: integer, default: 50, maximum: 200 } }
        - { name: cursor, in: query, description: "Opaque keyset continuation cursor from a prior page's X-Fishhawk-Export-Next-Cursor header.", schema: { type: string } }
        - { name: approver, in: query, description: "CSV-only entry filter: keep only approval_submitted entries whose actor_subject equals this value. ANDed with category and the run-level filters.", schema: { type: string } }
        - { name: category, in: query, description: "CSV-only entry filter: keep only entries of this exact category. ANDed with approver and the run-level filters.", schema: { type: string } }
      responses:
        '200':
          description: |
            One page of the compliance export as CSV. Rows are a
            field-for-field projection of the JSON `Export v1` body for
            the same run-level filter set. Served as an attachment
            download.
          headers:
            Content-Disposition:
              description: "`attachment; filename=\"fishhawk-audit-export-<UTC timestamp>.csv\"` ‚Äî download semantics."
              schema: { type: string }
            X-Fishhawk-Export-Complete:
              description: "`true` when this is the final page; `false` when more runs remain."
              schema: { type: boolean }
            X-Fishhawk-Export-Next-Cursor:
              description: Opaque keyset cursor for the next page. Present only when the export is partial.
              schema: { type: string }
          content:
            text/csv:
              schema: { type: string }
        '400':
          description: |
            `validation_failed` ‚Äî malformed `run_id`/`from`/`to`/`limit`,
            `from` after `to`, or `run_id` combined with `repo`/`from`/`to`;
            `cursor_invalid` ‚Äî opaque cursor failed to decode.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404':
          description: "`run_not_found` ‚Äî an explicitly requested run does not exist (fail-closed)."
        '500':
          description: "`internal_error` ‚Äî run assembly failed; no partial CSV is emitted (the whole page is buffered before any bytes are written)."
        '503':
          description: "`audit_export_unconfigured` ‚Äî the audit, run, or signing repository is not configured on this instance."

  /v0/reports/agent-changes:
    get:
      operationId: agentChangesReport
      summary: Canned compliance report of all agent changes in a date range (JSON)
      description: |
        The E9.3 canned compliance report (#1606): every agent-authored
        change in a run range, with who approved / what reviewed / what
        validated each one, as machine-readable JSON. It is a PROJECTION
        over the E9.1 shared export assembly (the SAME run selection and
        per-run audit-chain assembly `GET /v0/audit/export` uses) ‚Äî never
        a parallel query path ‚Äî so it inherits the identical run-level
        filters (`repo`/`from`/`to`/`limit`/`cursor`, `run_id` mutually
        exclusive with the filter shape) and `created_at`-DESC keyset
        paging.

        **What each change carries.** Per selected run that produced a
        change (a `pull_request_opened` audit entry): the PR (`pr_url`,
        `pr_number`, `branch`, `head_sha`); merge status (`merged`,
        `merger`, `head_sha`, `base_sha`) from `pr_merged`; approvals
        (subject, decision, timestamp) from `approval_submitted` +
        `pr_approved_on_github`; reviews (stage, reviewer model, verdict)
        from `plan_reviewed` + `implement_reviewed`; acceptance (verdict,
        failure mode, evidence hashes, content hash) from
        `acceptance_outcome_recorded`; the audit-chain span (first/last
        sequence + entry hashes + entry count); and redacted-tier
        evidence links (run/audit/export/artifact API pointers per
        ADR-054 ‚Äî never inlined trace bundles).

        **Human-led changes.** Runs whose `workflow_id` is
        `human_led_change` render in a SEPARATE `human_led_changes`
        section with reduced evidence (approval + PR + chain span only ‚Äî
        reviews and acceptance are omitted). Runs that produced no PR are
        excluded from both lists but counted in `totals.runs_without_change`.

        **Continuation is in-band here.** Unlike the verifier-strict
        `Export v1` body, this report is NOT strict-decoded by any
        verifier, so `complete`/`next_cursor` appear BOTH in the response
        headers (`X-Fishhawk-Export-Complete` /
        `X-Fishhawk-Export-Next-Cursor`) AND in the report body ‚Äî a
        partial report declares itself partial in-band (ADR-054 size
        posture). These continuation fields are report-only; they do not
        appear on `GET /v0/audit/export`.

        Requires the `read:audit-export` scope (E9.5/#1608), exactly as
        the export endpoints: anonymous `401`, token without the scope
        `403`, cookie-session bypass. Evidence links stay redacted-tier
        pointers; bundle bytes are never inlined.
      tags: [audit]
      parameters:
        - name: run_id
          in: query
          description: |
            Explicit run to report on. Repeatable. Mutually exclusive with
            `repo`/`from`/`to`. A requested run that does not exist is a
            `404 run_not_found`.
          schema: { $ref: '#/components/schemas/UUID' }
        - { name: repo, in: query, description: "Filter by repository (owner/name), resolved through the runs join.", schema: { type: string } }
        - { name: from, in: query, description: "Lower bound (inclusive) on run created_at, RFC3339.", schema: { type: string, format: date-time } }
        - { name: to, in: query, description: "Upper bound (inclusive) on run created_at, RFC3339.", schema: { type: string, format: date-time } }
        - { name: limit, in: query, description: "Maximum RUNS per page (whole-run bounded).", schema: { type: integer, default: 50, maximum: 200 } }
        - { name: cursor, in: query, description: "Opaque keyset continuation cursor from a prior page's X-Fishhawk-Export-Next-Cursor header.", schema: { type: string } }
      responses:
        '200':
          description: One page of the agent-changes report.
          headers:
            X-Fishhawk-Export-Complete:
              description: "`true` when this is the final page; `false` when more runs remain. Mirrored into the body `complete` field."
              schema: { type: boolean }
            X-Fishhawk-Export-Next-Cursor:
              description: Opaque keyset cursor for the next page. Present only when the report is partial. Mirrored into the body `next_cursor` field.
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AgentChangesReport' }
        '400':
          description: |
            `validation_failed` ‚Äî malformed `run_id`/`from`/`to`/`limit`,
            `from` after `to`, or `run_id` combined with `repo`/`from`/`to`;
            `cursor_invalid` ‚Äî opaque cursor failed to decode.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404':
          description: "`run_not_found` ‚Äî an explicitly requested run does not exist (fail-closed)."
        '503':
          description: "`audit_export_unconfigured` ‚Äî the audit, run, or signing repository is not configured on this instance."

  /v0/reports/agent-changes.md:
    get:
      operationId: agentChangesReportMarkdown
      summary: Canned compliance report of all agent changes (human-readable markdown)
      description: |
        The human-readable markdown rendering of `GET
        /v0/reports/agent-changes` (#1606). Same resolve + build path,
        same run-level filters and continuation semantics; ONE report
        model feeds both renders (one-model-two-renders parity). A partial
        report carries an explicit `PARTIAL REPORT ‚Äî resume with cursor ‚Ä¶`
        banner in the markdown header, mirroring the `complete`/`next_cursor`
