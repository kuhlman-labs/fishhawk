# High-autonomy workflow preset (ADR-048 / E29.1).
#
# Canonical, schema-valid workflow-v1 document seeding `fishhawk init`
# and the App-PR onboarding path. This is the HIGH tier: identical to
# the medium preset PLUS two additional operator_agent knobs —
# `may_waive: solo_low` (waive the sole open low-severity concern) and
# `may_merge: gates_resolved_ci_green` (merge when gates are resolved and
# CI is green). The agent implements and, when every gate passes, merges.
#
# See docs/spec/workflow-preset.md for the low/medium/high → METHODOLOGY
# tier mapping and the delta surface.

version: "1.0"

roles:
  founder:
    members: ["@kuhlman-labs"]

workflows:

  # High autonomy — agent implements and merges if gates pass. The full
  # operator_agent delegation set: approve/fixup/retry (as medium) plus
  # waive (solo low-severity concern) and merge (gates resolved, CI
  # green).
  feature_change:
    description: >-
      Default workflow for feature work and non-trivial changes.
      Human approves plan and PR; agent does the implementation.
    # Drive mode (#1023): fishhawkd auto-advances mechanical transitions
    # (review settlement, fixup re-park, derived awaiting_merge) and
    # surfaces next_action; judgment points still park for the human.
    drive: true
    # Operator-agent delegation (ADR-040 D2 / #1026): the high autonomy
    # preset per METHODOLOGY.md — medium's approve/fixup/retry plus waive
    # and merge, so the agent can carry a clean change through to merge.
    operator_agent:
      may_approve: clean_dual_approval
      may_route_fixup: convergent_concerns
      may_retry: infra_flake
      may_waive: solo_low
      may_merge: gates_resolved_ci_green
      must_page_human:
        - reviewer_reject
        - plan_rejection
        - scope_amendment
        - budget_override
        - policy_override
        - exception_request
        - requirement_arbitration
    policy:
      max_stage_runtime: "30m"
    # Periodic cost ceiling (ADR-030 / #688). Advisory — emits a
    # budget_alert audit entry + originating-issue comment at warn_at
    # (80%) and the 100% crossing; never blocks a run.
    budgets:
      - period: weekly
        limit_usd: 50
        warn_at: 0.8
        enforcement: advisory
    # Auto-retry once on CI failure (#276). The human approves the plan;
    # the agent should self-heal on a routine test or lint regression
    # without forcing the reviewer back into the loop.
    on_ci_failure:
      max_retries: 1

    stages:
      - id: plan
        type: plan
        executor:
          agent: claude-code
        # Advisory plan review (ADR-027): agent reviewers surface
        # verdicts before the human gate. Heterogeneous topology (#955):
        # Claude and Codex review concurrently.
        reviewers:
          agents:
            - provider: claudecode
              model: claude-opus-4-8
            - provider: codex
              model: gpt-5.5
          human: 1
        inputs:
          - source: github_issue
            required: true
        produces:
          - artifact: plan
            schema: standard_v1
            persistence:
              - target: originating_issue
                mode: rendered_comment
                update_on_change: true
              - target: fishhawk_audit_log
                mode: canonical
        budget:
          max_tokens: 200000
          max_runtime_minutes: 15
          enforcement: advisory
        gates:
          - type: approval
            approvers:
              any_of: [founder]

      - id: implement
        type: implement
        executor:
          agent: claude-code
          # #651 execution-grounded verifier: after the agent exits, run
          # the project test command against the committed scope-only
          # tree; on a test failure, feed the captured output back for a
          # bounded fix loop, then re-verify, before the PR opens.
          verify:
            command: "scripts/test verify"
            timeout: "15m"
            max_iterations: 1
        # Advisory implement-review (ADR-027 impl 2/2, #561): agent
        # reviewers read the diff against the approved plan and surface
        # verdicts (incl. scope-drift flag). Heterogeneous topology
        # (#955): same Claude+Codex pair as the plan stage.
        reviewers:
          agents:
            - provider: claudecode
              model: claude-opus-4-8
            - provider: codex
              model: gpt-5.5
          human: 1
        inputs:
          - artifact: plan
            from_stage: plan
        produces:
          - artifact: pull_request
        constraints:
          - max_files_changed: 45
          - forbidden_paths:
              - ".github/workflows/**"
              - ".fishhawk/**"
              - "LICENSE"
              - "NOTICE"
          - required_outcomes:
              - tests_added_or_updated
              - ci_green
        budget:
          max_tokens: 500000
          max_runtime_minutes: 30
          enforcement: advisory

      - id: review
        type: review
        executor:
          human: true
        inputs:
          - artifact: pull_request
            from_stage: implement
        gates:
          - type: approval
            approvers:
              any_of: [founder]
