  timestamp: "2026-07-18T12:00:00Z"
summary: >-
  Rename the RunState column across the storage, server, and CLI layers. The
  change touches more files than the implement-stage cap allows, so it is split
  into an expand->migrate->contract sequence: add the new column, migrate every
  reader/writer to it, then drop the old column.
scope:
  files:
    - path: backend/internal/db/migrations/0042_add_run_state.sql
      operation: create
    - path: backend/internal/storage/run.go
      operation: modify
    - path: backend/internal/server/reads.go
      operation: modify
    - path: backend/internal/server/runs.go
      operation: modify
    - path: cli/internal/runs/render.go
