# Sample standard_v1 plan carrying a split_proposal (#2055, E50.3).
#
# A monolithic change whose scope.files exceeds the resolved implement-stage
# max_files_changed cap BY COUNT must carry split_proposal or be rejected
# server-side (plan_review_failed / category-B) regardless of the over_cap
# hint. This fixture is the committed artifact the round-trip test and the
# sample-validates criterion both anchor on:
#
#   check-jsonschema --schemafile docs/spec/plan-standard-v1.schema.json \
#     docs/spec/examples/split-proposal-example.yaml
#
# The three phases are shaped expand -> migrate -> contract with depends_on
# edges expand(0) <- migrate(1) <- contract(2); each phase's scope.files stays
# at or under a representative cap so every phase ships as its own within-cap
# plan.
plan_version: standard_v1
ticket_reference:
