# Local development stack for Fishhawk.
#
# Brings up the services that mirror production (per ADR-001 / ADR-003):
# - Postgres 16 (the primary state store)
#
# MinIO (S3-compatible storage) will land alongside the audit log
# implementation under E2 (#2) and E13 (#13).
#
# Usage:
#   docker compose up -d
#   FISHHAWKD_DATABASE_URL=postgres://fishhawk:fishhawk@localhost:5432/fishhawk?sslmode=disable \
#     go run ./backend/cmd/fishhawkd migrate
#   go run ./backend/cmd/fishhawkd serve

services:
  postgres:
    image: postgres:16-alpine
    container_name: fishhawk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fishhawk
      POSTGRES_PASSWORD: fishhawk
      POSTGRES_DB: fishhawk
    ports:
      - "5432:5432"
    volumes:
      - fishhawk-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fishhawk -d fishhawk"]
      interval: 2s
      timeout: 2s
      retries: 15

  minio:
    # MinIO is the local-dev S3 backend per ADR-003 (#67). The Go
    # tracestore package uses aws-sdk-go-v2 against this endpoint
    # with path-style addressing; production points the same SDK at
    # AWS S3.
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: fishhawk-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: fishhawk
      MINIO_ROOT_PASSWORD: fishhawk-dev-secret
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # web console
    volumes:
      - fishhawk-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  jaeger:
    # Opt-in local OTLP collector for inspecting the runner's #649
    # GenAI trace spans end-to-end (#679). Gated behind the `otel`
    # profile so it does NOT start under the default `docker compose
    # up -d` — the default loop and scripts/dev's pg/minio-only
    # preflight are unaffected. Start it explicitly with:
    #   docker compose --profile otel up -d
    # then point the runner at it via OTEL_EXPORTER_OTLP_ENDPOINT and
    # view the per-run trace tree at http://localhost:16686.
    #
    # Pinned to an immutable tag per CLAUDE.md's image-pinning rule; a
    # floating tag could change ports/behaviour under us. OTLP is on by
    # default since v1.35, but COLLECTOR_OTLP_ENABLED is set defensively
    # so older tags still accept it.
    image: jaegertracing/all-in-one:1.62.0
    container_name: fishhawk-jaeger
    restart: unless-stopped
    profiles: ["otel"]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # Jaeger UI
      - "4318:4318"    # OTLP HTTP receiver (the runner's otlptracehttp target)
      - "4317:4317"    # OTLP gRPC receiver
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:16686"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  fishhawk-postgres-data:
  fishhawk-minio-data:
