# Local development stack for Fishhawk.
#
# Brings up the services that mirror production (per ADR-001 / ADR-003):
# - Postgres 16 (the primary state store)
#
# MinIO (S3-compatible storage) will land alongside the audit log
# implementation under E2 (#2) and E13 (#13).
#
# Usage:
#   docker compose up -d
#   FISHHAWKD_DATABASE_URL=postgres://fishhawk:fishhawk@localhost:5432/fishhawk?sslmode=disable \
#     go run ./backend/cmd/fishhawkd migrate
#   go run ./backend/cmd/fishhawkd serve

services:
  postgres:
    image: postgres:16-alpine
    container_name: fishhawk-postgres
    environment:
      POSTGRES_USER: fishhawk
      POSTGRES_PASSWORD: fishhawk
      POSTGRES_DB: fishhawk
    ports:
      - "5432:5432"
    volumes:
      - fishhawk-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fishhawk -d fishhawk"]
      interval: 2s
      timeout: 2s
      retries: 15

volumes:
  fishhawk-postgres-data:
