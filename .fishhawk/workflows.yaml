# Fishhawk's own development workflow.
#
# This file exists from day one as a public commitment to the methodology
# described in docs/METHODOLOGY.md: Fishhawk is built using Fishhawk.
#
# It is not yet executed. The Fishhawk runtime that interprets this file is
# the product being built in this repository. Per docs/MVP_SPEC.md §8, the
# target for self-execution is day 21 of the v0 build. Until then, this is
# a placeholder and a public commitment, not a running system.
#
# When the product can execute this spec, the syntax may be revised to
# match the frozen v0 schema. The intent expressed here will not change.

version: "0.4"

roles:
  founder:
    members: ["@kuhlman-labs"]
  # Additional roles will be added as the team grows.

workflows:

  # Medium autonomy — the default for most product work.
  # Agent implements; human approves the plan; human approves the PR.
  feature_change:
    description: >-
      Default workflow for feature work and non-trivial changes.
      Human approves plan and PR; agent does the implementation.
    policy:
      max_stage_runtime: "30m"
    # Periodic cost ceiling (ADR-030 / #688). Advisory — emits a
    # budget_alert audit entry + originating-issue comment at warn_at
    # (80%) and the 100% crossing; never blocks a run. Calibrated from
    # recorded feature_change run costs (avg ~$3.4, max ~$8.4 over the
    # first 29 costed runs). Weekly reset so the alert re-exercises
    # during active dogfooding. Flip enforcement to `blocking` to also
    # dogfood admission-time refusal once the period limit is exhausted.
    budgets:
      - period: weekly
        limit_usd: 50
        warn_at: 0.8
        enforcement: advisory
    # Auto-retry once on CI failure (#276). The human approves the
    # plan; the agent should self-heal on a routine test or lint
    # regression without forcing the reviewer back into the loop.
    on_ci_failure:
      max_retries: 1

    stages:
      - id: plan
        type: plan
        executor:
          agent: claude-code
        # Advisory plan review (ADR-027): an agent reviewer surfaces a
        # verdict before the human gate; agent>0 + human>0 → advisory, so
        # the founder approval below stays authoritative. Exercised locally
        # via the claudecode.Reviewer subprocess (#575).
        reviewers:
          agent: 1
          human: 1
        inputs:
          - source: github_issue
            required: true
        produces:
          - artifact: plan
            schema: standard_v1
            persistence:
              - target: originating_issue
                mode: rendered_comment
                update_on_change: true
              - target: fishhawk_audit_log
                mode: canonical
        budget:
          max_tokens: 200000
          max_runtime_minutes: 15
          enforcement: advisory
        gates:
          - type: approval
            approvers:
              any_of: [founder]

      - id: implement
        type: implement
        executor:
          agent: claude-code
          # #651 execution-grounded verifier (KEPT 2026-06-06, after the
          # dogfood caught a real drift-excluded test failure and the fix loop
          # converged it before the PR opened). After the agent exits, run the
          # project test command against the COMMITTED scope-only tree (the
          # #800/#766 worktree), NOT the working tree; on a test failure, feed
          # the captured output back to the agent for a bounded fix loop, then
          # re-verify, before the PR opens. max_iterations=1 = one fix attempt;
          # 0 (or removing this block) restores the prior single-shot behavior.
          # scripts/test is hermetic — integration tests use testcontainers.
          # Accepted cost: a full scripts/test (-race + testcontainers) runs on
          # every feature_change implement stage. See #651; robustness #804.
          verify:
            command: "scripts/test"
            timeout: "12m"
            max_iterations: 1
        # Advisory implement-review (ADR-027 impl 2/2, #561): an agent
        # reviewer reads the diff against the approved plan and surfaces a
        # verdict (incl. scope-drift flag). agent>0 + human>0 → advisory, so
        # it never blocks; the review stage's founder approval stays the gate.
        # Runs async server-side post-#584; verdict lands ~60-90s after the
        # implement trace upload (poll the audit / get_run_status).
        reviewers:
          agent: 1
          human: 1
        inputs:
          - artifact: plan
            from_stage: plan
        produces:
          - artifact: pull_request
        constraints:
          - max_files_changed: 30
          - forbidden_paths:
              - ".github/workflows/**"
              - ".fishhawk/**"
              - "LICENSE"
              - "NOTICE"
          - required_outcomes:
              - tests_added_or_updated
              - ci_green
        budget:
          max_tokens: 500000
          max_runtime_minutes: 30
          enforcement: advisory

      - id: review
        type: review
        executor:
          human: true
        inputs:
          - artifact: pull_request
            from_stage: implement
        gates:
          - type: approval
            approvers:
              any_of: [founder]

  # Low autonomy — human-led work.
  # Used for cryptographic, policy, and audit-integrity surfaces.
  # The workflow exists to record the work in the audit log; the agent
  # is not the author. See docs/METHODOLOGY.md for what falls under this.
  human_led_change:
    description: >-
      Workflow for human-authored changes to load-bearing surfaces
      (crypto, policy engine, audit integrity, GitHub App auth).
      The audit log records what was changed and who approved it.

    stages:
      - id: review
        type: review
        executor:
          human: true
        inputs:
          - source: pull_request
            required: true
        gates:
          - type: approval
            approvers:
              any_of: [founder]

  # High autonomy — agent implements and merges if gates pass.
  # Reserved for low-risk, high-volume work where the cost of a mistake
  # is contained and CI is a sufficient check.
  routine_change:
    description: >-
      Workflow for documentation, dependency bumps, lint/format fixes,
      and tests for existing behavior. Agent may merge if all gates pass.
    # High-autonomy auto-retry (#276). Routine_change is the
    # canonical case for self-healing: the human never approved
    # anything; the agent's job is to keep the change merging
    # cleanly. One retry strikes the balance between resilience to
    # flaky CI and not spinning forever on a real bug.
    on_ci_failure:
      max_retries: 1

    stages:
      - id: implement
        type: implement
        executor:
          agent: claude-code
        produces:
          - artifact: pull_request
        constraints:
          - max_files_changed: 20
          - allowed_paths:
              - "docs/**"
              - "**/*.md"
              - "go.mod"
              - "go.sum"
              - "**/*_test.go"
          - required_outcomes:
              - ci_green

      - id: review
        type: review
        executor:
          agent: claude-code
        gates:
          # ADR-017 (#249): GitHub branch protection (and a future
          # gh pr merge --auto on the runner side, #255) own the
          # merge-readiness gate for routine_change. The Fishhawk-
          # side gate is degenerate now — it just lets the run
          # advance once branch protection clears.
          - type: check
