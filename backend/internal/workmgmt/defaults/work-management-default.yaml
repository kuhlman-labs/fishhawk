# Shipped default work-management conventions (#1005). This is a product
# artifact, versioned with the product: the canonical copy lives at
# docs/spec/work-management-default.yaml and is mirrored into
# backend/internal/workmgmt/defaults/ by scripts/sync-schemas. Seed
# content extracted from the kuhlman-labs/fishhawk Project #7 conventions
# (AGENTS.md "Project tracker (#7)").
spec_version: work-management-v0
provider: github_projects

project:
  owner: kuhlman-labs
  owner_type: user
  number: 7

# The complexity prior: pick a level by what the change touches, not by
# how it feels. These are the concrete file/coupling definitions.
complexity_levels:
  low: >-
    A single file or a few tightly-scoped edits; no cross-package coupling;
    no schema, wire, or migration change.
  medium: >-
    Multiple files within one module/package, or one cross-package seam;
    may touch a coupled test fixture; no migration.
  high: >-
    Spans wire/domain/persistence boundaries, a schema or DB migration, or
    fans out across modules; needs an integration test for the seam (#618).

# The mandatory trio. Everything else a type declares is optional.
required_fields:
  - Summary
  - Done-means
  - complexity

# Canonical board states -> the Project #7 single-select Status options
# (#1012). The closed canonical set keeps a future Jira provider tractable.
states:
  backlog: Backlog
  in_progress: In Progress
  in_review: In Review
  blocked: Blocked
  done: Done

# Run-lifecycle event -> canonical state. The board-sync hook moves the
# card along these edges, but only from the transition's expected source
# state — a human's manual placement is never overridden.
transitions:
  run_started: in_progress
  pr_opened: in_review
  run_failed: blocked
  run_merged: done

# Per-repo kill-switch for upstream product-feedback egress (ADR-029,
# #1006). Shipped in its enabled (egress-on) position. To hard-disable the
# product-report endpoint for a repo, set the object's enabled to false:
#   product_feedback:
#     enabled: false
# Omitting the block entirely is equivalent to enabled: true.
product_feedback:
  enabled: true

field_hints:
  Summary: One or two sentences naming the motivation and the load-bearing change.
  Done-means: >-
    State the single testable condition that proves the item is complete —
    an observable outcome a reviewer can check, not a description of effort.
  # E34.7 / #1614: the explicit-source anchor for plan criteria. Distinct
  # from Done-means (the change-complete checklist) — this is the
  # behavioral contract the acceptance stage validates.
  Acceptance criteria: >-
    A bulleted list of observable, falsifiable behaviors this issue is done
    when exhibiting — the behavioral contract the acceptance stage
    validates. Distinct from Done-means, which is the change-complete
    checklist (tests/docs/mirrors), not a behavioral claim.
  # E34.8 / #1615: non-binding starting pointers for the planner, distinct
  # from the approved plan's binding scope.files.
  Where to look: >-
    Starting pointers for the planner — files, symbols, precedent PRs/issues
    that ground where the change is likely to land. NON-BINDING: the approved
    plan owns binding scope.files; a pointer here neither folds into scope nor
    obligates the plan to touch it. Give paths and names, never toolchain
    commands (keep it language-agnostic).
  complexity: >-
    Pick low/medium/high from complexity_levels by the files and coupling the
    change touches.

types:
  feature:
    title_format: "[E{epic}.{n}] {summary}"
    body_skeleton:
      - Summary
      - Proposal
      - Where to look
      - Done-means
      - Acceptance criteria
      - Notes
      - Relations
    # 'Where to look' is optional: its heading renders only when the filing
    # supplies content. Omitting it produces a body byte-identical to the
    # pre-section skeleton (#1615).
    optional_sections:
      - Where to look
    default_labels:
      - type:feature
    # Label completeness (#1616): autonomy defaults to autonomy:medium when the
    # filing supplies no autonomy:* label, so no feature is ever filed
    # autonomy-unset. area has no universally-correct default (it is
    # component-specific), so it is required-or-DERIVED from the parent epic;
    # an underivable area is reported loudly in missing_label_namespaces.
    label_defaults:
      autonomy: autonomy:medium
    required_label_namespaces:
      - area
      - autonomy
    default_fields:
      status: Backlog
      complexity: medium
    epic_link: required

  bug:
    title_format: "[E{epic}.{n}] {summary}"
    body_skeleton:
      - Summary
      - Observed
      - Proposal
      - Where to look
      - Done-means
      - Acceptance criteria
      - Notes
      - Relations
    optional_sections:
      - Where to look
    default_labels:
      - type:bug
    label_defaults:
      autonomy: autonomy:medium
    required_label_namespaces:
      - area
      - autonomy
    default_fields:
      status: Backlog
      complexity: medium
    epic_link: optional

  chore:
    title_format: "[E{epic}.{n}] {summary}"
    body_skeleton:
      - Summary
      - Done-means
    default_labels:
      - type:chore
    label_defaults:
      autonomy: autonomy:medium
    required_label_namespaces:
      - area
      - autonomy
    default_fields:
      status: Backlog
      complexity: low
    epic_link: optional

  adr:
    title_format: "[ADR-{number}] {summary}"
    body_skeleton:
      - Context
      - Options
      - Recommendation
      - Decision
      - Consequences
    default_labels:
      - adr
    default_fields:
      status: Backlog
      complexity: medium
    numbering:
      scheme: sequential
      prefix: ADR-
      # Zero-pad the rendered {number} to 3 digits so ADR titles match the
      # established [ADR-NNN] series ([ADR-041], not [ADR-41]) (#1148).
      pad: 3
    epic_link: none

  epic:
    title_format: "[E{number}] {summary}"
    body_skeleton:
      - Summary
      - Scope
      - Notes
    default_labels:
      - epic
    default_fields:
      status: Backlog
      complexity: high
    numbering:
      scheme: sequential
      prefix: E
      # No zero-pad: epic titles are the bare [E29], not [E029]. The anchored
      # discovery regexp built from title_format demands "] " immediately after
      # the captured {number}, so a child title [E29.1] never matches (#1508).
      pad: 0
    epic_link: none
