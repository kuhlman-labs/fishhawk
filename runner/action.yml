name: 'Fishhawk Runner'
description: 'Run an agent under a Fishhawk workflow stage and ship the signed trace bundle to the backend.'
author: 'Fishhawk'
branding:
  icon: 'play-circle'
  color: 'blue'

# Customers reference this action as
#   uses: kuhlman-labs/fishhawk/runner@runner/vX.Y.Z
# and pass the inputs below. The `runner/v…` tag prefix follows
# the Go module convention for non-root modules in a monorepo;
# E5.7's release workflow publishes signed releases at that tag
# pattern. The composite action checks out a Go toolchain and
# invokes ./cmd/fishhawk-runner from this directory.
#
# E5.1 (#52) shipped the scaffold; E5.2 (#29) added the Claude Code
# invocation harness. With prompt-file unset the runner still
# exits 0 after the startup log line, preserving the v0.1
# dispatch-path probe. With prompt-file set, the runner invokes
# Claude Code, captures the trace, and emits it as JSON Lines on
# stdout. Trace bundling (E5.3) and signed shipping to the backend
# (E5.6) replace stdout emission later.

inputs:
  run-id:
    description: 'Workflow run identifier (UUID, supplied by the backend dispatch).'
    required: true
  backend-url:
    description: 'Fishhawk backend URL the runner ships its trace bundle to.'
    required: true
  workflow:
    description: 'Workflow ID matching a top-level key in .fishhawk/workflows.yaml.'
    required: true
  stage:
    description: 'Stage ID within the workflow (e.g. plan, implement, review).'
    required: true
  agent:
    description: 'Coding-agent provider to invoke (claude-code|codex). Defaults to claude-code. Both adapters are implemented; codex spawns the Codex CLI in non-interactive exec mode.'
    required: false
    default: 'claude-code'
  prompt-file:
    description: 'Path to a UTF-8 file containing the prompt. When unset, the runner exits 0 without invoking the agent.'
    required: false
    default: ''
  working-dir:
    description: "Agent CWD; defaults to the runner's CWD."
    required: false
    default: ''
  max-tokens:
    description: 'Hard cap on agent tokens (input + output). 0 means no cap.'
    required: false
    default: '0'
  timeout:
    description: 'Wall-clock cap on the agent invocation (Go duration string, e.g. 15m).'
    required: false
    default: '15m'
  anthropic-api-key:
    description: 'API key forwarded to Claude Code as ANTHROPIC_API_KEY. Customers populate this from a GitHub Secret.'
    required: false
    default: ''
  openai-api-key:
    description: 'API key forwarded to the Codex CLI as OPENAI_API_KEY when agent=codex. Customers populate this from a GitHub Secret. Unused when agent=claude-code.'
    required: false
    default: ''
  bundle-out:
    description: 'Path to write the gzipped trace bundle (ADR-007 *.jsonl.gz). When unset, events go to stdout as JSONL.'
    required: false
    default: ''
  plan-out:
    description: 'Path the agent writes its plan artifact to. When set, the runner validates against standard_v1 after a successful agent invocation.'
    required: false
    default: ''
  upload-trace:
    description: 'After the agent succeeds, issue a signing key from backend-url and POST the bundle to /v0/runs/{run_id}/trace.'
    required: false
    default: 'false'
  stage-id:
    description: 'Stage UUID for trace upload (distinct from stage which is the workflow-spec stage name). Required with upload-trace.'
    required: false
    default: ''
  constraints-file:
    description: 'Path to a JSON file describing the stage constraints (forbidden_paths, allowed_paths, max_files_changed, required_outcomes).'
    required: false
    default: ''
  check-base-ref:
    description: 'Git ref to diff against for constraint evaluation (e.g. origin/main). Constraints run only when both constraints-file and check-base-ref are set.'
    required: false
    default: ''
  fetch-prompt:
    description: 'Fetch the constructed prompt from backend-url (GET /v0/stages/{stage-id}/prompt) before invoking the agent. Requires stage-id. prompt-file wins when both are set, useful for local replay.'
    required: false
    default: 'false'
  github-token:
    description: |
      Threaded through to the runner process for completeness, but
      not directly consumed by the runner's git or PR logic — the
      runner always mints a fresh App installation token at
      push-time via the backend installation-token endpoint. That
      refresh handles the long-running-stage case: App installation
      tokens have a ~1-hour TTL and an agent run can outlive the
      token the auth pre-step minted at workflow start. See #201.

      Customers should still pass this value (typically the auth
      pre-step's token output) to actions/checkout's token input in
      the calling workflow — that's what authenticates the initial
      clone.
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache: false

    # Claude Code is an npm-distributed CLI. Hosted Actions runners
    # don't ship with it, and the runner adapter (claudecode.go)
    # invokes the `claude` binary by name. Install it before the Go
    # entrypoint runs. v0 pulls latest; pinning is a v1+ concern.
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'

    - name: Install Claude Code CLI
      if: ${{ inputs.agent == 'claude-code' }}
      shell: bash
      run: |
        npm install -g @anthropic-ai/claude-code
        claude --version

    # The Codex CLI is the OpenAI-distributed `codex` binary the codex
    # adapter (codex.go) invokes by name. Installed only when selected.
    # The version is pinned to an immutable tag per CLAUDE.md §Build,
    # test,lint — a run-time tool fetched by a workflow MUST NOT float on
    # latest (cf. the golangci-lint master/install.sh break in #607/#608).
    # This pin (0.137.0) matches the codex-cli version the adapter's flag
    # shape + JSONL event schema were validated against (see codex.go).
    # Not yet Dependabot-tracked (npx/npm-in-run-step pins are bumped by
    # hand, same as the @redocly/cli pin) — bump deliberately.
    - name: Install Codex CLI
      if: ${{ inputs.agent == 'codex' }}
      shell: bash
      run: |
        npm install -g @openai/codex@0.137.0
        codex --version

    - name: Run fishhawk-runner
      shell: bash
      working-directory: ${{ github.action_path }}
      # Export only the key the selected agent consumes: ANTHROPIC_API_KEY
      # for claude-code, OPENAI_API_KEY for codex. Forwarding the unused
      # provider's key would needlessly widen the secret surface inside the
      # runner subprocess; the conditional collapses the other to ''.
      env:
        ANTHROPIC_API_KEY: ${{ inputs.agent == 'claude-code' && inputs.anthropic-api-key || '' }}
        OPENAI_API_KEY: ${{ inputs.agent == 'codex' && inputs.openai-api-key || '' }}
      run: |
        go run ./cmd/fishhawk-runner \
          --run-id "${{ inputs.run-id }}" \
          --backend-url "${{ inputs.backend-url }}" \
          --workflow "${{ inputs.workflow }}" \
          --stage "${{ inputs.stage }}" \
          --agent "${{ inputs.agent }}" \
          --prompt-file "${{ inputs.prompt-file }}" \
          --working-dir "${{ inputs.working-dir }}" \
          --max-tokens "${{ inputs.max-tokens }}" \
          --timeout "${{ inputs.timeout }}" \
          --bundle-out "${{ inputs.bundle-out }}" \
          --plan-out "${{ inputs.plan-out }}" \
          --constraints-file "${{ inputs.constraints-file }}" \
          --check-base-ref "${{ inputs.check-base-ref }}" \
          $(if [ "${{ inputs.upload-trace }}" = "true" ]; then echo --upload-trace; fi) \
          $(if [ "${{ inputs.fetch-prompt }}" = "true" ]; then echo --fetch-prompt; fi) \
          --stage-id "${{ inputs.stage-id }}"
